<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-OB-01 旅館環境導覽 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-OB-01 旅館環境導覽 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-OB-01 旅館環境導覽.pdf</div>
      </div>

    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-OB-01", "title": "旅館環境導覽", "source_pdf": "03 SOP教材pdf檔/OP-OB-01 旅館環境導覽.pdf", "questions": [{"id": "OP-OB-01-Q01", "stem": "當旅客詢問飯店建築外觀的設計靈感時，夥伴應如何介紹其獨特造型？", "difficulty": "", "options": [{"text": "以城市森呼吸為概念的具設計感樹木造型", "correct": true, "explanation": "資料明確指出建築外觀採用具設計感的樹木造型，象徵綠色生活與城市森林。"}, {"text": "模仿台中勤美草悟道的綠色草皮曲線", "correct": false, "explanation": "雖然鄰近草悟道，但外觀設計的主題並非模仿草皮曲線，而是樹木。"}, {"text": "採用回收鋼材拼湊而成的工業風格", "correct": false, "explanation": "飯店主打綠色與自然元素，外觀重點在於樹木意象而非工業風。"}, {"text": "結合在地人文與大肚山意象的石造建築", "correct": false, "explanation": "外觀圖片與描述顯示為現代化的樹木造型構件，並非石造意象。"}, {"text": "為了減少風阻而設計的流線型風帆牆", "correct": false, "explanation": "資料並未提及風阻考量，其流線部分是為了呈現樹枝的生命力。"}], "answer_index": 0}, {"id": "OP-OB-01-Q02", "stem": "在介紹飯店所獲得的殊榮時，下列哪一項是正確的認證名稱？", "difficulty": "", "options": [{"text": "台中市五星級觀光旅館認證", "correct": false, "explanation": "飯店目前主要的認證聚焦於環保與低碳，而非傳統星級評鑑。"}, {"text": "全球綠色建築標章 (LEED) 金級認證", "correct": false, "explanation": "資料中並未提及獲得全球 LEED 認證，應以資料所述項目為主。"}, {"text": "行政院環保旅店與台中市低碳旅館認證", "correct": true, "explanation": "根據「殊榮認證」章節，飯店確實獲得此兩項官方環保相關認證。"}, {"text": "ISO 14001 環境管理系統國際認證", "correct": false, "explanation": "雖然此為常見環境認證，但資料中並無列出此項目。"}, {"text": "台灣精品設計建築大獎", "correct": false, "explanation": "資料僅列出環保與低碳旅館相關的政府認證項目。"}], "answer_index": 2}, {"id": "OP-OB-01-Q03", "stem": "大廳「聞香區」是為了紓緩旅途疲憊而設，目前共提供幾種不同味道的精油供旅客體驗？", "difficulty": "", "options": [{"text": "5 種味道", "correct": false, "explanation": "5 種僅為資料中列出的一半數量。"}, {"text": "8 種味道", "correct": false, "explanation": "數量少於導覽手冊中所標示的實際種類。"}, {"text": "10 種味道", "correct": true, "explanation": "資料明確註記精油聞香區提供 10 種味道的精油。"}, {"text": "12 種味道", "correct": false, "explanation": "資料列出的味道清單及說明均為 10 種，非 12 種。"}, {"text": "20 種味道", "correct": false, "explanation": "目前聞香區的設置規格尚未達到 20 種之多。"}], "answer_index": 2}, {"id": "OP-OB-01-Q04", "stem": "關於大廳震撼的藝術裝置「心之光牆」，下列敘述何者符合標準介紹內容？", "difficulty": "", "options": [{"text": "牆面高度約 10 公尺，採用可降解塑料製成", "correct": false, "explanation": "資料記載高度接近 20 公尺，且材質為回收寶特瓶。"}, {"text": "由 26,000 個回收寶特瓶製成，高近 20 公尺", "correct": true, "explanation": "資料精確指出其高度與使用的回收寶特瓶數量。"}, {"text": "全牆面採用天然植生牆與水草燈交織而成", "correct": false, "explanation": "心之光牆主要構造是寶特瓶與 LED，植生牆僅是底部的點綴。"}, {"text": "使用進口壓克力板模擬水面波紋的藝術牆", "correct": false, "explanation": "藝術牆的核心在於廢棄物再生，而非昂貴的壓克力材料。"}, {"text": "每一片葉子皆是由人工噴漆上色的石膏板", "correct": false, "explanation": "牆面上的圖案是透過 LED 燈光效果與寶特瓶排列呈現的。"}], "answer_index": 1}, {"id": "OP-OB-01-Q05", "stem": "旅客若想在「心之光牆」上施放虛擬煙火或投射祝福字句，夥伴應引導其使用哪項設備？", "difficulty": "", "options": [{"text": "向櫃台人員索取遙控器進行操作", "correct": false, "explanation": "操作方式並非透過實體遙控器，而是透過數位載具。"}, {"text": "使用飯店各樓層設置的平板互動 APP", "correct": true, "explanation": "資料提及各樓層平板設置互動 APP，可讓旅客在牆面上施放煙火。"}, {"text": "掃描大廳牆上的 QR Code 並用手機網頁操作", "correct": false, "explanation": "雖然有無紙化 QR Code，但針對光牆互動，資料指明是使用「各層平板」。"}, {"text": "在 B1 餐廳的互動投影區進行語音輸入", "correct": false, "explanation": "B1 主要是用餐空間，光牆的互動終端位於各客房樓層。"}, {"text": "連結客房內的電視系統進行遠端操作", "correct": false, "explanation": "互動媒介是位於電梯梯廳或公共區域的平板電腦。"}], "answer_index": 1}, {"id": "OP-OB-01-Q06", "stem": "大廳展售區販售的項目繁多，若旅客詢問飯店客房使用的洗沐用品，應介紹哪一個品牌？", "difficulty": "", "options": [{"text": "歐舒丹 L'OCCITANE", "correct": false, "explanation": "此為知名品牌，但並非資料中飯店所使用的合作品牌。"}, {"text": "茶籽堂 Cha Tzu Tang", "correct": false, "explanation": "資料中並未提及此品牌，展售區清單有其他具體名稱。"}, {"text": "法國密碼 (Valvola)", "correct": true, "explanation": "展售區項目明確列出販售「法國密碼洗沐用品」。"}, {"text": "英國經典瑰柏翠 Crabtree & Evelyn", "correct": false, "explanation": "此品牌並不在導覽手冊的展售項目清單中。"}, {"text": "無拘無塑環保手工皂", "correct": false, "explanation": "雖然有販售無拘無塑商品，但洗沐用品項目特別標註了品牌名稱。"}], "answer_index": 2}, {"id": "OP-OB-01-Q07", "stem": "位於 B1 的「旭暮 mu café」提供美味早餐，其命名背後的意涵與下列何者相關？", "difficulty": "", "options": [{"text": "象徵太陽與月亮的交替，日以繼夜的服務", "correct": false, "explanation": "命名意涵並非單指天象變化，而是取自藝術表演的術語。"}, {"text": "取自歌劇院中「序暮」之意，開啟美好的一天", "correct": true, "explanation": "資料中詳細解釋了「旭暮」與歌劇院「序暮」的諧音連結。"}, {"text": "源於日文中的「暮色」，代表溫馨的家常感", "correct": false, "explanation": "資料強調的是如序幕般的開始，而非日暮的結束感。"}, {"text": "希望旅客如朝陽般有活力，如暮風般自在", "correct": false, "explanation": "此說法雖然優美，但並非資料中提到的品牌原意。"}, {"text": "由「旭日東升」與「暮然回首」組合而成", "correct": false, "explanation": "品牌內涵聚焦於「序幕」的儀式感。"}], "answer_index": 1}, {"id": "OP-OB-01-Q08", "stem": "關於飯店提供的「貼心服務」，下列哪一項服務並未列在導覽手冊的一樓大廳項目中？", "difficulty": "", "options": [{"text": "外幣兌換服務 (Exchange)", "correct": true, "explanation": "資料中列出了叫車、租借、寄放等多項服務，但唯獨沒有提到外幣兌換。"}, {"text": "嬰兒用品租借", "correct": false, "explanation": "資料明確將其列為貼心服務之一，友善親子家庭。"}, {"text": "環保餐具租借", "correct": false, "explanation": "作為環保旅店，提供環保餐具租借符合其低碳措施與服務項目。"}, {"text": "腳踏車租借", "correct": false, "explanation": "大廳導覽圖中顯示有提供腳踏車，方便旅客遊覽鄰近景點。"}, {"text": "洗衣烘衣設備", "correct": false, "explanation": "資料顯示設有洗衣烘衣空間，供旅人長期停留使用。"}], "answer_index": 0}, {"id": "OP-OB-01-Q09", "stem": "若旅客向夥伴詢問 6 樓的樓層主題，根據「環境介紹-樓層空間」，正確的名稱應為何？", "difficulty": "", "options": [{"text": "綠葉盎然", "correct": false, "explanation": "綠葉盎然通常用於飯店其他視覺描述，並非 6 樓特定主題。"}, {"text": "希望種子", "correct": false, "explanation": "希望種子屬於較低樓層的主題名稱。"}, {"text": "行之於草", "correct": true, "explanation": "資料中樓層空間主題列表清楚標註 6F 為「行之於草」。"}, {"text": "生命枝態", "correct": false, "explanation": "生命枝態是屬於其他樓層的自然美學主題。"}, {"text": "城市森呼吸", "correct": false, "explanation": "這是飯店整體的 Slogan，並非單一樓層的主題。"}], "answer_index": 2}, {"id": "OP-OB-01-Q10", "stem": "當旅客計畫前往「國立自然科學博物館」參觀，夥伴根據資料應提醒旅客大約需步行多久？", "difficulty": "", "options": [{"text": "5 ~ 10 分鐘", "correct": false, "explanation": "此時間僅夠抵達鄰近的草悟道，科博館距離較遠。"}, {"text": "10 ~ 15 分鐘", "correct": false, "explanation": "審計新村與勤美誠品才是此步行範圍內的景點。"}, {"text": "20 ~ 25 分鐘", "correct": true, "explanation": "資料標註科博館的步行時間相對較長，為 20~25 分鐘。"}, {"text": "30 ~ 40 分鐘", "correct": false, "explanation": "實際步行距離並不需要到 40 分鐘這麼久。"}, {"text": "僅需 3 分鐘 (就在隔壁)", "correct": false, "explanation": "飯店緊鄰的是草悟道，科博館尚有一段距離。"}], "answer_index": 2}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
