<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-14 換房需求作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-14 換房需求作業 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-14 換房需求作業.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-14", "title": "換房需求作業", "source_pdf": "03 SOP教材pdf檔/OP-FO-14 換房需求作業.pdf", "questions": [{"id": "OP-FO-14-Q01", "stem": "當客人因為「房間內有煙味」要求換房時，根據標準作業程序，櫃檯人員首要的處理動作流程為何？", "difficulty": "", "options": [{"text": "直接告知客房全滿，建議客人使用空氣清淨機。", "correct": false, "explanation": "這忽略了初步評估與展現共感的步驟，且未嘗試解決客人的核心問題。"}, {"text": "請房務部立即前往除味，並請客人在原房間等待。", "correct": false, "explanation": "雖然除味是方法，但規範中提到應先判定狀況並視房況幫客人換房，而非強制客人在原房等待。"}, {"text": "先對造成不便致歉，判定是否有菸味後視房況安排換房。", "correct": true, "explanation": "符合規範中「聆聽並致歉」以及針對煙味問題「判別後視房況換房」的處理邏輯。"}, {"text": "立即要求客人支付清潔費，因為飯店為全館禁菸。", "correct": false, "explanation": "在確認是該客人吸菸前，應先以服務與解決問題為導向，直接收費會造成不佳的服務體驗。"}, {"text": "通知工程部檢查空調系統，判斷煙味是否由管道間傳入。", "correct": false, "explanation": "這是後續修繕的動作，並非第一時間受理需求時對客人的首要作業流程。"}], "answer_index": 2}, {"id": "OP-FO-14-Q02", "stem": "若客人因個人喜好（例如：不喜歡房間配置）要求更換至較高階的房型，櫃檯人員應如何處理費用部分？", "difficulty": "", "options": [{"text": "為了提升滿意度，應直接提供免費升等。", "correct": false, "explanation": "規範中明確指出「客人喜好」造成的換房需報價並收取價差。"}, {"text": "告知客人目前無空房，婉拒其換房要求。", "correct": false, "explanation": "應先查詢系統房況，而非在未查詢前就直接拒絕客人。"}, {"text": "視客人入住天數，決定是否減免該價差。", "correct": false, "explanation": "作業規範中並未提到可依天數隨意減免，標準程序是需報價並收取價差。"}, {"text": "向客人說明作業流程，進行報價並收取房型價差。", "correct": true, "explanation": "針對「客人喜好」導致的換房需求，標準流程要求必須進行報價並收取差額。"}, {"text": "請客人自行在訂房網站上取消並重新預訂。", "correct": false, "explanation": "這會增加客人的操作困難，櫃檯應在 PMS 系統中直接處理換房與帳務。"}], "answer_index": 3}, {"id": "OP-FO-14-Q03", "stem": "在進行 PMS 系統轉房作業時，除了確保房費與帳務正確外，哪一項是必須執行的跨部門通知動作？", "difficulty": "", "options": [{"text": "通知餐廳部，因為客人的早餐券需要重新列印。", "correct": false, "explanation": "雖然可能相關，但並非換房標準作業指導書中規定的必要跨部門通知。"}, {"text": "通知房務部，告知舊房需改為髒房並告知新房號。", "correct": true, "explanation": "這是為了確保舊房能被及時清掃，且房務人員知道客人的新去處，符合流程規範。"}, {"text": "通知安全部，請其派員監控搬遷過程以防財損。", "correct": false, "explanation": "除非有特殊安全疑慮，否則標準搬遷流程不需安全部全程介入。"}, {"text": "通知總經理室，報備每一筆換房記錄以維持品質。", "correct": false, "explanation": "換房屬於日常櫃檯作業，無需逐案呈報總經理室。"}, {"text": "通知資訊部，檢查新房間的 Wi-Fi 連線是否正常。", "correct": false, "explanation": "櫃檯應查詢系統確認是「乾淨房」， Wi-Fi 檢查通常不包含在標準轉房流程的跨部門通知中。"}], "answer_index": 1}, {"id": "OP-FO-14-Q04", "stem": "當員工陪同客人進行實際搬遷時，以下哪一組物品是標準流程中明確提醒客人檢查的重點？", "difficulty": "", "options": [{"text": "保險箱、衣櫃、浴室、冰箱、充電器。", "correct": true, "explanation": "這些是規範中列出的重點檢查區域，也是客人最容易遺留物品的地方。"}, {"text": "電視遙控器、吹風機、瓶裝水、毛巾、室內拖鞋。", "correct": false, "explanation": "這些屬於房間固定備品，並非提醒客人檢查「個人遺留物」的重點。"}, {"text": "窗簾、地毯、燈具、空調開關、電話。", "correct": false, "explanation": "這些屬於房間硬體設備，與搬遷時提醒遺留物的關聯性較低。"}, {"text": "枕頭套、床單、垃圾桶、滅火器、逃生圖。", "correct": false, "explanation": "這些並非客人搬遷時需要特別檢查是否攜帶走的個人物品。"}, {"text": "飯店簡介、原子筆、便條紙、杯墊、攪拌棒。", "correct": false, "explanation": "這些是消耗性文具或耗材，非提醒客人檢查遺留物的核心清單。"}], "answer_index": 0}, {"id": "OP-FO-14-Q05", "stem": "若客人表達希望「自行搬運行李」以維護隱私，櫃檯人員應採取何種做法？", "difficulty": "", "options": [{"text": "堅持由員工搬運，以符合飯店的五星級服務標準。", "correct": false, "explanation": "規範中強調應「尊重客人隱私」，不應強行介入。"}, {"text": "將新房卡交給客人，請其自行搬遷，並約定舊卡歸還時間。", "correct": true, "explanation": "這完全符合規範中對於客人希望自行搬運時的處理建議。"}, {"text": "要求客人在大廳等待，由房務部進入舊房搬運後再通知客人。", "correct": false, "explanation": "這反而侵犯了客人要求的隱私，且非標準作業流程。"}, {"text": "告知客人若自行搬運造成行李損壞，飯店概不負責。", "correct": false, "explanation": "這種語氣不符合服務標準，且會造成客人的負面觀感。"}, {"text": "直接在系統中退房，請客人重新辦理入住手續。", "correct": false, "explanation": "這屬於多餘的程序，只需在 PMS 執行換房操作即可。"}], "answer_index": 1}, {"id": "OP-FO-14-Q06", "stem": "換房完成後的「品質追蹤」階段，櫃檯人員應在何時致電新房間詢問滿意度？", "difficulty": "", "options": [{"text": "搬遷完成後立即撥打，以免客人忘記回饋。", "correct": false, "explanation": "立即撥打可能會打擾正在整理行李的客人，規範建議稍後再撥。"}, {"text": "搬遷完成後 15 至 30 分鐘內。", "correct": true, "explanation": "這是規範中明確設定的關懷回訪時間區間，能確保客人已有時間使用新房設備。"}, {"text": "等到隔天早上客人退房前再詢問即可。", "correct": false, "explanation": "這時效太晚，若新房間仍有問題，將無法及時修補服務失誤。"}, {"text": "搬遷完成後 1 小時以上，給予客人充足的休息時間。", "correct": false, "explanation": "1 小時可能過久，無法在第一時間掌握客人對新房的適應狀況。"}, {"text": "除非客人再次主動聯繫，否則不需撥打關懷電話。", "correct": false, "explanation": "規範要求需主動致電進行關懷回訪，以確保服務品質。"}], "answer_index": 1}, {"id": "OP-FO-14-Q07", "stem": "在「結案與品質追蹤」流程中，若換房原因是「飯店設備故障」造成不便，飯店可視情況提供何種補償措施？", "difficulty": "", "options": [{"text": "提供該次住宿全額免費。", "correct": false, "explanation": "雖然是補償，但規範中建議的是小禮物或延遲退房，全額免費通常不屬於標準慰問範圍。"}, {"text": "強制客人加入飯店會員以獲得點數回饋。", "correct": false, "explanation": "補償應是慰問性質，不應帶有強迫推銷的色彩。"}, {"text": "提供客訴小禮物或安排延遲退房作為慰問。", "correct": true, "explanation": "這是規範中明確提到的服務補償方案，用以修復因故障造成的不便。"}, {"text": "僅口頭道歉，不需提供實質補償，以免養成客人客訴習慣。", "correct": false, "explanation": "若為飯店疏失（設備故障），主動提供慰問是提升滿意度的關鍵步驟。"}, {"text": "更換至總統套房，不論原訂房型等級。", "correct": false, "explanation": "補償應視情況適度調整，過度升等不符合營運成本控制與標準規範。"}], "answer_index": 2}, {"id": "OP-FO-14-Q08", "stem": "當客人反映房間設備故障且無法立即排除時，櫃檯人員查詢系統找房時的優先順序為何？", "difficulty": "", "options": [{"text": "優先尋找最低階的空房以節省成本。", "correct": false, "explanation": "降低等級換房會導致客人不滿，並非優先選項。"}, {"text": "尋找尚未清掃但等級相同的房間。", "correct": false, "explanation": "規範中指明必須尋找「乾淨房」，以確保客人能立即移入。"}, {"text": "尋找同等級或更高一級的乾淨房。", "correct": true, "explanation": "這是規範中確認房況的準則，確保客人權益不縮水甚至獲得小提升。"}, {"text": "請客人到大廳休息，等待原房間修繕完畢。", "correct": false, "explanation": "若無法排解，應以換房為優先，而非讓客人在大廳無止盡等待。"}, {"text": "僅尋找完全相同房號的對稱房間。", "correct": false, "explanation": "房號並不影響換房，重點在於等級是否符合或更高。"}], "answer_index": 2}, {"id": "OP-FO-14-Q09", "stem": "在關懷回訪的話術中，除了詢問滿意度，還應特別確認哪一個項目？", "difficulty": "", "options": [{"text": "確認客人的信用卡額度是否足夠。", "correct": false, "explanation": "這與換房滿意度無關，且會顯得飯店過於急功近利。"}, {"text": "確認客人是否需要預約明日的計程車。", "correct": false, "explanation": "這是額外的服務，並非換房關懷話術中的核心確認內容。"}, {"text": "詢問新房間的設備使用是否都順手。", "correct": true, "explanation": "這是規範中「關懷用語」明確建議詢問的重點，旨在確認新房功能正常。"}, {"text": "詢問客人是否願意在社群媒體上給予好評。", "correct": false, "explanation": "關懷回訪的核心是確保客人舒適，而非在此刻索取評論。"}, {"text": "詢問客人是否需要加購飯店的晚餐行程。", "correct": false, "explanation": "關懷電話應專注於解決先前的問題，不宜進行業務推銷。"}], "answer_index": 2}, {"id": "OP-FO-14-Q10", "stem": "若舊房是因為「設備故障」而換房，在結案流程中櫃檯必須同步通知哪一個部門？", "difficulty": "", "options": [{"text": "財務部，核銷維修費用。", "correct": false, "explanation": "這是後台行政作業，非第一線結案流程中需同步通報的動作。"}, {"text": "業務部，告知可能影響未來的團體訂房。", "correct": false, "explanation": "維修細節不需第一時間通知業務部。"}, {"text": "工程部，進行報修。", "correct": true, "explanation": "規範中明確指出，若為設備故障，應同步通報工程部修繕，以維持房間可用性。"}, {"text": "採購部，申購新的設備零件。", "correct": false, "explanation": "報修應先經由工程部評估，而非由櫃檯直接對接採購部。"}, {"text": "行銷部，追蹤該故障是否影響飯店品牌聲譽。", "correct": false, "explanation": "這過於誇大日常設備報修的通報層級。"}], "answer_index": 2}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
