<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-05 交班作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-05 交班作業 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-05 交班作業.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-05", "title": "交班作業", "source_pdf": "03 SOP教材pdf檔/OP-FO-05 交班作業.pdf", "questions": [{"id": "OP-FO-05-Q01", "stem": "在執行交班作業的第一步「確認金額及收入」時，應清點的固定「零用金」數額為多少？", "difficulty": "", "options": [{"text": "$\\$5,000$ 元", "correct": false, "explanation": "這可能是其他單位的標準，但根據本指導書規範，零用金應為一萬元整。"}, {"text": "$\\$10,000$ 元", "correct": true, "explanation": "作業流程明確規定清點零用金應為一萬元整，作為次班作業的基礎金額。"}, {"text": "$\\$15,000$ 元", "correct": false, "explanation": "此數額超過了指導書規定的標準零用金金額。"}, {"text": "當班現金收入總額", "correct": false, "explanation": "現金收入包與零用金應分開清點，零用金是固定留存於櫃檯的預備金。"}, {"text": "視當日住房率決定金額", "correct": false, "explanation": "零用金數額是固定的標準作業程序，不應隨住房率波動而改變。"}], "answer_index": 1}, {"id": "OP-FO-05-Q02", "stem": "當櫃檯人員需要為持「國民旅遊卡」的旅客辦理結帳時，根據手冊規定，應優先使用哪一台信用卡機？", "difficulty": "", "options": [{"text": "彰化銀行機台", "correct": false, "explanation": "彰化銀行為主要機台，適用於一般信用卡及行動支付，而非特定用途的國旅卡。"}, {"text": "玉山銀行機台", "correct": true, "explanation": "玉山銀行機台為特定用途機台，專門適用於國民旅遊卡的刷卡交易。"}, {"text": "德安系統虛擬卡機", "correct": false, "explanation": "德安是前台管理系統，實際刷卡交易仍需透過實體卡機進行。"}, {"text": "任何一台空閒的機台", "correct": false, "explanation": "不同銀行的機台配置有特定用途，國旅卡必須使用指定的玉山銀行機台。"}, {"text": "旅客自行提供的掃碼支付", "correct": false, "explanation": "國民旅遊卡為實體卡交易，且手冊已指定專門的處理機台。"}], "answer_index": 1}, {"id": "OP-FO-05-Q03", "stem": "在信用卡機關班流程中，列印單據的順序至關重要。下列哪一個是正確的單據排列與釘掛順序？", "difficulty": "", "options": [{"text": "總額報表 $\\rightarrow$ 明細表 $\\rightarrow$ 結帳報表", "correct": false, "explanation": "此順序錯誤，結帳報表應作為第一張覆蓋在最上方。"}, {"text": "明細表 $\\rightarrow$ 結帳報表 $\\rightarrow$ 總額報表", "correct": false, "explanation": "明細表通常是最後一張，不應排在第一位。"}, {"text": "結帳報表 $\\rightarrow$ 總額報表 $\\rightarrow$ 明細表", "correct": true, "explanation": "根據手冊第 $3$ 點之 $3$，卡機結帳三張釘在一起的順序應以此為準。"}, {"text": "結帳報表 $\\rightarrow$ 明細表 $\\rightarrow$ 總額報表", "correct": false, "explanation": "總額報表應排在結帳報表之後、明細表之前。"}, {"text": "視當班刷卡筆數多寡自行調整", "correct": false, "explanation": "為維護稽核便利性，單據順序有嚴格規範，不可隨意調整。"}], "answer_index": 2}, {"id": "OP-FO-05-Q04", "stem": "在「德安前台系統」執行關班與開班作業後，下列哪一項是必須執行的後續步驟，以確保系統數據更新？", "difficulty": "", "options": [{"text": "直接關閉電腦螢幕", "correct": false, "explanation": "僅關閉螢幕無法確保系統數據的登入狀態已更新。"}, {"text": "立即列印所有發票", "correct": false, "explanation": "開關班後應先處理系統登入狀態，而非立即列印發票。"}, {"text": "重新登入系統", "correct": true, "explanation": "手冊第 $4$ 點之 $6$ 明確指出，執行開關班後需重新登入系統以確保權限與班別正確。"}, {"text": "等待五分鐘後再操作", "correct": false, "explanation": "系統不需要閒置等待，而是需要透過重新登入來刷新狀態。"}, {"text": "通知資訊組更新數據", "correct": false, "explanation": "重新登入是現場作業夥伴應自行完成的標準步驟，無需通知資訊組。"}], "answer_index": 2}, {"id": "OP-FO-05-Q05", "stem": "如果您正在執行「夜班」的德安開關班作業，根據手冊規範，您應選取的班別代碼為何？", "difficulty": "", "options": [{"text": "$1$", "correct": false, "explanation": "代碼 $1$ 對應的是早班。"}, {"text": "$2$", "correct": false, "explanation": "代碼 $2$ 對應的是午班。"}, {"text": "$3$", "correct": true, "explanation": "根據德安關開班注意事項，夜班的班別代碼規定為 $3$。"}, {"text": "$4$", "correct": false, "explanation": "手冊中僅定義了 $1$ 到 $3$ 的代碼，分別對應早、午、夜班。"}, {"text": "$N$", "correct": false, "explanation": "系統班別代碼採數字制而非字母制。"}], "answer_index": 2}, {"id": "OP-FO-05-Q06", "stem": "在信用卡機結帳流程中，有一個警告提到：「列印單據時，順序不可交換，一旦執行某個動作，資料會全部清除」。請問該動作為何？", "difficulty": "", "options": [{"text": "取消交易", "correct": false, "explanation": "取消單筆交易不會清除整機的日報資料。"}, {"text": "列印明細", "correct": false, "explanation": "列印明細僅是讀取數據，並不會導致資料消失。"}, {"text": "清機", "correct": true, "explanation": "手冊第 $3$ 點之 $2$ 警告，一旦進行清機，卡機內的當班交易資料將被清除。"}, {"text": "重新開機", "correct": false, "explanation": "重新開機通常會保留當前未結帳的資料，清機才是清除數據的關鍵。"}, {"text": "更換感熱紙", "correct": false, "explanation": "更換耗材不會影響已儲存的電子交易資料。"}], "answer_index": 2}, {"id": "OP-FO-05-Q07", "stem": "小明正在列印「交班日報表」，在德安系統中選取出納報表後，他應該輸入什麼資訊來查詢正確的帳務？", "difficulty": "", "options": [{"text": "旅客姓名與房號", "correct": false, "explanation": "交班日報表是以班別和收入類別為基準，而非單一旅客。"}, {"text": "班別、入賬收入及小分類", "correct": true, "explanation": "根據報表流程 $1$ 之 $4$，查詢交班日報表需輸入班別並選取入賬收入與小分類。"}, {"text": "刷卡機序號", "correct": false, "explanation": "刷卡機序號用於核對實體單據，非德安系統查詢日報表的主要欄位。"}, {"text": "當日天氣概況", "correct": false, "explanation": "天氣資訊與帳務交班日報表的金額核對無關。"}, {"text": "作廢發票張數", "correct": false, "explanation": "雖然需要核對發票，但這不是查詢日報表時的篩選條件。"}], "answer_index": 1}, {"id": "OP-FO-05-Q08", "stem": "關於「信用卡黏貼表」的整理規範，下列敘述何者完全正確？", "difficulty": "", "options": [{"text": "只需將刷卡簽單釘在一起即可，不需黏貼", "correct": false, "explanation": "指導書要求需在黏貼表上貼上簽單並與結帳單釘在一起。"}, {"text": "只需在表單末端簽名，不需寫日期", "correct": false, "explanation": "手冊規定必須簽名加上日期。"}, {"text": "將刷卡簽單貼上，並在兩台卡機結帳單寫上日期及本人簽名", "correct": true, "explanation": "這是第 $3$ 點之 $5$ 明確要求的行政處理流程，確保責任歸屬。"}, {"text": "將所有單據放入現金包中，不需額外黏貼", "correct": false, "explanation": "信用卡簽單有專門的黏貼表處理流程，不同於現金包處理。"}, {"text": "由下班人員代為簽名核實", "correct": false, "explanation": "應由當班本人簽名以示負責。"}], "answer_index": 2}, {"id": "OP-FO-05-Q09", "stem": "在執行「每日交班稽核表」填寫時，除了確認現金與刷卡單金額是否相符外，還必須確認哪一項資訊？", "difficulty": "", "options": [{"text": "是否有作廢發票", "correct": true, "explanation": "手冊第 $3$ 點之 $6$ 規定，稽核表上需填寫實收現金、刷卡單相符性及有無作廢發票。"}, {"text": "交班人員的工號", "correct": false, "explanation": "雖然工號重要，但手冊重點強調的是發票與金額的稽核。"}, {"text": "櫃檯文具是否有短缺", "correct": false, "explanation": "文具檢查不屬於帳務交班稽核表的範疇。"}, {"text": "隔日早報份數", "correct": false, "explanation": "報份數通常屬於客房服務或接待作業，非關班結帳稽核重點。"}, {"text": "大廳環境整潔度", "correct": false, "explanation": "此項目與財務稽核流程無關。"}], "answer_index": 0}, {"id": "OP-FO-05-Q10", "stem": "小華正在使用德安系統進行關班，他在「開關班(出納廳別)」介面中，應該如何正確操作來關閉當班班別？", "difficulty": "", "options": [{"text": "點選班別後直接按 Delete 鍵", "correct": false, "explanation": "系統操作非使用刪除鍵，而是選單點選。"}, {"text": "選取當班班別，按右鍵選擇「關班」並輸入密碼", "correct": true, "explanation": "手冊第 $4$ 點之 $4$ 說明了具體的滑鼠右鍵操作路徑及安全驗證要求。"}, {"text": "按住 Ctrl 鍵並選取班別", "correct": false, "explanation": "複選操作並非關班的標準動作。"}, {"text": "直接點擊兩下左鍵關閉", "correct": false, "explanation": "標準流程規定需使用右鍵選單進行功能選擇。"}, {"text": "等待系統在午夜自動關班", "correct": false, "explanation": "每個班別交替時都需手動執行關班，非系統自動化處理。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
