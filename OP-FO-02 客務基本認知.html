<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-02 客務基本認知 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-02 客務基本認知 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-02客務基本認知.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-02", "title": "客務基本認知", "source_pdf": "03 SOP教材pdf檔/OP-FO-02客務基本認知.pdf", "questions": [{"id": "OP-FO-02-Q01", "stem": "當房客提出欲租借腳踏車時，下列哪一項是櫃檯夥伴在將鑰匙交給客人「之前」必須執行的標準作業步驟？", "difficulty": "", "options": [{"text": "先向客人收取新台幣 500 元的租賃押金", "correct": false, "explanation": "根據規範，租借腳踏車原則上無須付押金，除非是較為珍貴的物品才需詢問主管。"}, {"text": "請客人至 8 樓洗衣房確認輪胎是否有氣", "correct": false, "explanation": "洗衣房並非存放腳踏車的地點，且確認輪胎狀況應由夥伴在租借前先行完成。"}, {"text": "請客人填寫租借表格並確認目前可租借的車輛數量", "correct": true, "explanation": "標準流程要求先確認庫存數量，並引導客人完成二樓抽屜內的租借單填寫，隨後才拿鑰匙說明使用方式。"}, {"text": "直接請客人至館外自行尋找喜歡的車輛再回報", "correct": false, "explanation": "流程規範需由夥伴拿鑰匙到外面跟客人說明使用方式，而非讓客人自行處理。"}, {"text": "先詢問房客是否具備維修輪胎的基本工具操作能力", "correct": false, "explanation": "調整坐墊雖可能需要工具輔助，但並非租借前的必要確認事項或作業流程。"}], "answer_index": 2}, {"id": "OP-FO-02-Q02", "stem": "若一位房客在凌晨 2 點來到櫃檯，反應房內沒有牙刷與刮鬍刀，根據「客房備品提供」規範，夥伴應如何正確應對？", "difficulty": "", "options": [{"text": "告知房客館內不提供一次性備品，請其自行至鄰近超商購買", "correct": false, "explanation": "飯店雖不主動在房內提供，但規範明確指出顧客可至櫃檯領取。"}, {"text": "告知房客房內不提供一次性備品，若有需要可至櫃檯領取，並主動詢問是否需要其他備品", "correct": true, "explanation": "此做法符合「告知領取地點」以及「主動詢問其他備品需求」的雙重服務標準。"}, {"text": "直接進入房客房間補足所有備品，以展現貼心服務", "correct": false, "explanation": "規範要求須先詢問客人的領取意願，且一次性備品通常是由客人在櫃檯領取。"}, {"text": "請房客先支付 300 元的一次性備品清潔費用", "correct": false, "explanation": "300元是針對「加人」且不含早餐的收費標準，並非領取一次性備品的費用。"}, {"text": "告知房客備品僅能在辦理入住時領取，目前已逾領取時間", "correct": false, "explanation": "資料中並未限制一次性備品的領取時段。"}], "answer_index": 1}, {"id": "OP-FO-02-Q03", "stem": "關於行李寄放的分類管理，若房客寄放的是需要「冷藏或冷凍」的伴手禮，應使用哪一種顏色的行李吊牌？", "difficulty": "", "options": [{"text": "綠色吊牌", "correct": false, "explanation": "綠色吊牌專門用於「預進（入住前）」的行李寄放。"}, {"text": "黃綠色吊牌", "correct": false, "explanation": "黃綠色吊牌是用於「退房後」的行李寄放。"}, {"text": "灰色吊牌", "correct": true, "explanation": "根據行李牌分類規定，灰色吊牌專指冷藏或冷凍的物品。"}, {"text": "紅色吊牌", "correct": false, "explanation": "資料中並未提到紅色吊牌，這是流程外的錯誤干擾選項。"}, {"text": "藍色吊牌", "correct": false, "explanation": "資料中僅定義了綠色、黃綠色與灰色三種吊牌用途。"}], "answer_index": 2}, {"id": "OP-FO-02-Q04", "stem": "有一組房客共 4 位成人，帶著 3 件 24 吋的行李箱要求代叫計程車。根據作業指導書，櫃檯夥伴應如何處理最為妥當？", "difficulty": "", "options": [{"text": "直接撥打 55688 叫兩台普通計程車，確保空間充裕", "correct": false, "explanation": "雖然人數多可分兩台，但規範建議此類人數與行李量可先嘗試叫大車輛。"}, {"text": "告知房客行李過多，請其自行連絡外面的車輛", "correct": false, "explanation": "這違反了櫃檯代叫計程車的服務流程，夥伴應主動協助。"}, {"text": "撥打 55688 並特別要求協助派送「大車輛」以容納人員與行李", "correct": true, "explanation": "規範明確指出若 4 位成人搭配 3 件 24 吋行李，應撥打 55688 協助叫大車。"}, {"text": "請房客將行李寄放櫃檯，改搭大眾運輸工具", "correct": false, "explanation": "此做法並未解決房客代叫計程車的原始需求。"}, {"text": "請房客先支付計程車預約金，以免車輛抵達後取消", "correct": false, "explanation": "流程中僅要求注意取消時間，並無收取預約金的規定。"}], "answer_index": 2}, {"id": "OP-FO-02-Q05", "stem": "在處理房客「加備品（如枕頭、被子）」送入房間的流程中，下列哪項行為符合隱私與安全規範？", "difficulty": "", "options": [{"text": "為了保持神祕感，將備品放在門口後按門鈴即離開", "correct": false, "explanation": "規範要求若客人在房內應詢問送入時機，若房客不在則有特定的放置位置，而非按門鈴後立即消失。"}, {"text": "敲門三下後直接推門進入，並大聲喊叫 Housekeeping", "correct": false, "explanation": "正確敲門流程是「敲門三下 + Housekeeping」，且需重複兩次動作，非直接闖入。"}, {"text": "放置備品時房門須保持打開的狀態，且不宜在房內待過久", "correct": true, "explanation": "保持房門開啟可避免顧客疑慮並保護員工權益，是標準的安全作業要求。"}, {"text": "若客人在房內，直接將備品交給客人，不須進入房間", "correct": false, "explanation": "雖然可以遞交，但規範提到需詢問是否現在送進房內，且若送進房則須遵守房門開啟原則。"}, {"text": "加備品時若房客不在，應將備品放置在浴室地板上以保持整潔", "correct": false, "explanation": "規範建議若房客進房前加備品，應放置在靠近門的「床上」。"}], "answer_index": 2}, {"id": "OP-FO-02-Q06", "stem": "房客希望租借摩托車，櫃檯夥伴告知目前「廣群老闆」回覆尚有車輛可借，後續的正確收費程序為何？", "difficulty": "", "options": [{"text": "請客人在還車時，直接將租車費交給摩托車廠商", "correct": false, "explanation": "規範要求若確定有車可以借，需要先收錢。"}, {"text": "先向客人收取費用，且付款方式僅限現金", "correct": true, "explanation": "根據流程注意事項，摩托車租借若確定有車，需要先收現金。"}, {"text": "請客人在 R 卡上簽名，費用將併入退房時的總帳單扣款", "correct": false, "explanation": "摩托車租借需事先收取現金，不可掛房帳至退房。"}, {"text": "確認車輛品牌後，先向客人收取一半的金額作為訂金", "correct": false, "explanation": "資料並未提到收取「訂金」或比例收費，而是要求直接收錢。"}, {"text": "告知房客本館僅提供諮詢，費用部分需自行與老闆刷卡結算", "correct": false, "explanation": "流程指引由櫃檯填寫合約與派車單並收費（現金）。"}], "answer_index": 1}, {"id": "OP-FO-02-Q07", "stem": "關於「包車流程」中的價格報法，櫃檯夥伴應該如何向客人報價？", "difficulty": "", "options": [{"text": "直接報司機提供的 NET 價格，以展現飯店優待", "correct": false, "explanation": "司機給予的是內部價，夥伴應根據此價格進行調幅後報給客人。"}, {"text": "將司機給的 NET 價格減去 10% 作為促銷優惠報給客人", "correct": false, "explanation": "這樣會導致飯店虧損或利潤損失，與規範方向相反。"}, {"text": "將司機給的 NET 價格多報 10% 給客人", "correct": true, "explanation": "作業標準規定，可依據司機給的 NET 價格多報 10% 給客人作為飯店服務費用。"}, {"text": "請司機直接向客人報價，櫃檯不干涉價格", "correct": false, "explanation": "流程中規定由櫃檯給予客人包車景點資訊及價格，而非讓司機自行報價。"}, {"text": "一律報新台幣 5,000 元，不論行程遠近或人數", "correct": false, "explanation": "價格應根據司機提供的 NET 價格進行計算，而非統一報價。"}], "answer_index": 2}, {"id": "OP-FO-02-Q08", "stem": "若有房客需要幫忙轉交物品給另一位即將抵達的友人，櫃檯夥伴應記錄哪些關鍵資訊？", "difficulty": "", "options": [{"text": "僅需留下物品內容與放置位置即可", "correct": false, "explanation": "這不足以進行後續聯繫或核對領取人身分。"}, {"text": "留下寄物人的姓名電話，以及領取人的姓名電話、預計取件時間", "correct": true, "explanation": "確實交接雙方姓名、手機及取件時間是避免遺失或錯領的重要步驟。"}, {"text": "請寄物人將物品拍照上傳至飯店官方 LINE", "correct": false, "explanation": "流程規定是留下雙方聯絡資訊，並未要求上傳照片。"}, {"text": "要求寄物人先支付 100 元的物品轉交保管費", "correct": false, "explanation": "資料中並無提到轉交物品需收取費用。"}, {"text": "告知物品若存放超過 1 小時，將一律以遺失物處理", "correct": false, "explanation": "規範僅提到逾期未取須「主動致電顧客」，而非直接作為遺失物處理。"}], "answer_index": 1}, {"id": "OP-FO-02-Q09", "stem": "關於館內洗衣服務的說明，下列哪一項敘述是「錯誤」的？", "difficulty": "", "options": [{"text": "8 樓洗衣房提供兩烘兩洗的設備", "correct": false, "explanation": "這是正確的，館內確實提供此項設備。"}, {"text": "洗衣房免費開放時間為上午 8 點至晚上 10 點", "correct": false, "explanation": "這是正確的，資料明確記載了開放時段。"}, {"text": "若客人需要送洗服務，需告知大約需 10 個工作天", "correct": true, "explanation": "錯誤。資料規定送洗的大約工作天為「兩天」，而非十天。"}, {"text": "送洗服務會產生額外的收費", "correct": false, "explanation": "這是正確的，與洗衣房自理免費不同，送洗是會收費的。"}, {"text": "洗衣房內有提供免費的洗衣粉供房客使用", "correct": false, "explanation": "這是正確的，資料註明有提供洗衣粉。"}], "answer_index": 2}, {"id": "OP-FO-02-Q10", "stem": "房客詢問是否可以加床，櫃檯夥伴應如何依照規範回覆？", "difficulty": "", "options": [{"text": "告知加床費用為一晚 500 元（含早餐）", "correct": false, "explanation": "這是「加人」的費用，並非加床服務。"}, {"text": "直接幫房客將兩張單人床併在一起", "correct": false, "explanation": "這與加床服務無關，且資料中未提及此作業。"}, {"text": "禮貌告知本館「無提供加床服務」", "correct": true, "explanation": "規範注意事項明確標註「無加床服務」。"}, {"text": "請房客升等至更大坪數的房型即可提供加床", "correct": false, "explanation": "資料中並未提供加床的替代方案，僅註明無此服務。"}, {"text": "告知房客需自行至 8 樓領取摺疊床墊", "correct": false, "explanation": "館內無加床服務，亦無提供領取床墊的選項。"}], "answer_index": 2}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
