<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-GS-03 指引手勢站姿 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-GS-03 指引手勢站姿 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-GS-03 指引手勢站姿.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-GS-03", "title": "指引手勢站姿", "source_pdf": "03 SOP教材pdf檔/OP-GS-03 指引手勢站姿.pdf", "questions": [{"id": "OP-GS-03-Q01", "stem": "在進行「基本站姿」服務時，下列哪一項符合綠宿行旅的標準作業規範？", "difficulty": "", "options": [{"text": "雙手自然交握於身後，以展現專業的背影。", "correct": false, "explanation": "規範要求雙手應自然交握於身前，而非身後。"}, {"text": "為了節省體力，在沒有顧客時可微靠櫃台站立。", "correct": false, "explanation": "標準規定雙腳自然站穩，不可倚靠櫃台或牆面。"}, {"text": "站立時抬頭、挺胸、雙肩放鬆，雙腳自然站穩。", "correct": true, "explanation": "這是規範中明確定義的基本站姿執行說明。"}, {"text": "為表示親近，站立時可將單手插入側邊口袋。", "correct": false, "explanation": "插口袋屬於禁止行為，會給人不夠專業的印象。"}, {"text": "雙手抱胸站立，以利隨時觀察場域狀況。", "correct": false, "explanation": "雙手抱胸屬於不禮貌的負面站姿，是被明令禁止的。"}], "answer_index": 2}, {"id": "OP-GS-03-Q02", "stem": "當夥伴需要遞交房卡、發票或名片給顧客時，下列操作流程何者正確？", "difficulty": "", "options": [{"text": "為了效率，可以直接將物品放在櫃台上推向顧客。", "correct": false, "explanation": "規範禁止將物品直接推向顧客，這會顯得缺乏尊重。"}, {"text": "以右手遞交物品，左手需在旁輔助並將文字面朝向對方。", "correct": true, "explanation": "雙手遞物是核心標準，且應先調整物品方向以利顧客閱讀。"}, {"text": "單手快速拋遞，同時口頭告知顧客內容。", "correct": false, "explanation": "單手拋遞是禁忌動作，會嚴重影響服務品質。"}, {"text": "由下方遞出物品，不需口頭說明以維持環境安靜。", "correct": false, "explanation": "遞交時應同時口頭說明內容，以確保資訊傳遞準確。"}, {"text": "雙手交叉遞物，以表示熱情款待。", "correct": false, "explanation": "交叉遞物並非標準動作，應採取自然的雙手或主副手遞物。"}], "answer_index": 1}, {"id": "OP-GS-03-Q03", "stem": "顧客詢問餐廳方向時，夥伴應如何正確執行「指引手勢」？", "difficulty": "", "options": [{"text": "單指指向遠方，明確標示餐廳的位置。", "correct": false, "explanation": "不可以單指指人、指路或指物，這是基本的服務禮儀規範。"}, {"text": "五指併攏、掌心自然打開，以整個手掌進行引導。", "correct": true, "explanation": "使用整個手掌且五指併攏是正確的指引方式，代表尊重的引導。"}, {"text": "僅以眼神示意方向，避免大幅度肢體動作。", "correct": false, "explanation": "標準流程要求使用手掌引導，眼神示意不足以構成完整指引。"}, {"text": "右手手背朝上，平攤指向目標方位。", "correct": false, "explanation": "手背朝上通常帶有壓迫感，應以掌心自然打開的方式引導。"}, {"text": "使用文件夾或筆作為輔助指標進行路徑指引。", "correct": false, "explanation": "應使用手掌引導，不應使用額外物品指向路徑。"}], "answer_index": 1}, {"id": "OP-GS-03-Q04", "stem": "在帶領顧客前往客房或設施的「同行與帶看」過程中，哪一項執行說明是錯誤的？", "difficulty": "", "options": [{"text": "行進速度應配合顧客，不可走得太快。", "correct": false, "explanation": "配合顧客步調是正確的標準作業流程。"}, {"text": "應走在顧客的正後方，確保顧客視野開闊。", "correct": false, "explanation": "應走在顧客的「前側方」而非正後方，以便引導路徑。"}, {"text": "到達定位後，應以手勢搭配口頭完成最後指引。", "correct": false, "explanation": "這是標準的結尾動作，確保引導完整到位。"}, {"text": "遇到轉彎、門口或高低差處時，需提前提醒顧客。", "correct": false, "explanation": "提前提醒是為了確保顧客安全，屬於正確的流程細節。"}, {"text": "為了節省時間，帶位時應快步走在顧客前方 5 公尺處。", "correct": true, "explanation": "應走在顧客的前側方並保持適當距離，且速度需配合顧客，而非過快。"}], "answer_index": 4}, {"id": "OP-GS-03-Q05", "stem": "若您正在櫃台內操作電腦，當看見顧客主動接近時，第一時間應如何反應？", "difficulty": "", "options": [{"text": "繼續完成手邊工作，待結束後再向顧客問好。", "correct": false, "explanation": "不可忽視顧客，應立即調整姿態以示歡迎。"}, {"text": "維持坐姿或側向姿勢，以免影響電腦作業進度。", "correct": false, "explanation": "應起身或調整為正面服務姿態，這是對顧客的基本尊重。"}, {"text": "立即起身或調整為正面服務姿態。", "correct": true, "explanation": "根據櫃台服務標準，顧客接近時應即刻切換為正向迎客模式。"}, {"text": "一邊操作電腦一邊口頭回應「您好」。", "correct": false, "explanation": "僅口頭回應而不調整姿勢，會給人冷淡、不專業的感受。"}, {"text": "直接離位去領取可能需要的資料。", "correct": false, "explanation": "不應在未與顧客互動前就擅自離位，且離位需先說明。"}], "answer_index": 2}, {"id": "OP-GS-03-Q06", "stem": "關於櫃台服務中的「離位」標準，下列敘述何者最符合規範？", "difficulty": "", "options": [{"text": "若需離開拿取資料，應先向顧客說明：「請您稍等，我這邊幫您拿取資料。」", "correct": true, "explanation": "離位前先說明理由並告知顧客等待，是標準話術的一部分。"}, {"text": "只要顧客正在填寫資料，夥伴可以不經說明直接離位處理其他事務。", "correct": false, "explanation": "即使顧客在忙，離位仍應告知，以免顧客抬頭找不到人。"}, {"text": "返回櫃台後，只要能接續之前的工作即可，不需特別注意站姿。", "correct": false, "explanation": "返回後應重新以正面站姿服務顧客。"}, {"text": "離位時間若不超過 10 秒，則不需要對顧客做任何說明。", "correct": false, "explanation": "無論時間長短，為了避免顧客疑惑，離位前皆應說明。"}, {"text": "為了保持禮貌，離位時應背對顧客緩慢行走。", "correct": false, "explanation": "離位應講求效率且先與顧客說明，並非強調背對顧客的方式。"}], "answer_index": 0}, {"id": "OP-GS-03-Q07", "stem": "情境題：當顧客帶著年幼的孩子並推著推車進入大廳，夥伴準備帶位至電梯口，哪種做法最適當？", "difficulty": "", "options": [{"text": "先行快速走到電梯按鈕處等待，展現高效率。", "correct": false, "explanation": "行進速度需配合顧客，特別是攜帶幼兒與推車的顧客。"}, {"text": "走在推車的前側方，並在進入電梯時提醒：「前方有門檻，請您留意腳下。」", "correct": true, "explanation": "此做法兼顧了正確位置、速度配合以及危險處的提前提醒。"}, {"text": "在後方指引電梯方向，由顧客自行推車進入。", "correct": false, "explanation": "帶位應走在顧客的前側方，主動引導而非僅在後方指路。"}, {"text": "伸出手指指向電梯，並說：「電梯在那邊，請自便。」", "correct": false, "explanation": "這違反了不可單指指路以及應主動帶位的服務標準。"}, {"text": "保持 3 公尺以上的長距離，以免干擾顧客推車。", "correct": false, "explanation": "應保持「適當距離」而非過遠，否則無法有效引導與溝通。"}], "answer_index": 1}, {"id": "OP-GS-03-Q08", "stem": "在「雙手遞物」的服務標準中，哪一個細節能讓顧客感受到「易讀性」的貼心？", "difficulty": "", "options": [{"text": "遞交時保持沉默，讓顧客專心看物。", "correct": false, "explanation": "應同時口頭說明遞交物品內容，以增加資訊準確度。"}, {"text": "先將房卡、發票等物品的文字方向朝向自己檢查清楚。", "correct": false, "explanation": "遞交前應先將文字方向朝向「對方」，而非朝向自己。"}, {"text": "遞交前先將文字方向朝向對方，方便對方直接閱讀。", "correct": true, "explanation": "這是為了便利顧客操作與確認，是遞物流程的重要細節。"}, {"text": "使用單手將物品轉向後，再遞給顧客。", "correct": false, "explanation": "應以雙手或右手遞、左手輔助，且不應在遞交過程中才草率轉向。"}, {"text": "將物品重疊在一起，以減少佔用的空間。", "correct": false, "explanation": "物品應清楚展示，重疊可能導致文字被遮蔽或遺漏。"}], "answer_index": 2}, {"id": "OP-GS-03-Q09", "stem": "下列哪一句話最不符合「指引手勢」與「同行帶位」的標準話術？", "difficulty": "", "options": [{"text": "「您好，這邊為您服務。」", "correct": false, "explanation": "這是基本站姿服務時的正確開場話術。"}, {"text": "「這是您的房卡與發票，跟您一併交付，請您收好。」", "correct": false, "explanation": "這是遞物時標準的內容說明話術。"}, {"text": "「餐廳就在那邊，你自己走過去就看到了。」", "correct": true, "explanation": "此話術缺乏服務熱忱，且長距離指引應主動帶位或搭配手勢引導。"}, {"text": "「電梯在這個方向，我帶您過去。」", "correct": false, "explanation": "這是指引方向並主動帶位的正確標準話術。"}, {"text": "「前方有階梯，請您留意腳下。」", "correct": false, "explanation": "這是帶位過程中遇到地面落差時的標準提示話術。"}], "answer_index": 2}, {"id": "OP-GS-03-Q10", "stem": "在櫃台服務中，關於「背對顧客」的行為，規範的態度是：", "difficulty": "", "options": [{"text": "只要在處理公務，背對顧客是可被接受的專業展現。", "correct": false, "explanation": "即使處理公務，也不應無故或長時間背對顧客。"}, {"text": "不可背對顧客長時間操作而無任何說明。", "correct": true, "explanation": "這是櫃台服務站姿與離位標準中的重要注意事項。"}, {"text": "背對顧客操作電腦比正面操作更有效率。", "correct": false, "explanation": "效率並非藉口，顧客感受到的服務態度更為重要。"}, {"text": "背對顧客時應保持微笑，以維持氣氛。", "correct": false, "explanation": "背對時顧客無法看見微笑，此舉沒有實質服務意義。"}, {"text": "為了隱私安全，操作電腦時應一律背對顧客。", "correct": false, "explanation": "應在兼顧作業與服務姿態的前提下進行，不可長時間無說明背對。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
