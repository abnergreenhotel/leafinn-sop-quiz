<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-GS-02 服務禮儀常用語 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-GS-02 服務禮儀常用語 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-GS-02 服務禮儀常用語.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-GS-02", "title": "服務禮儀常用語", "source_pdf": "03 SOP教材pdf檔/OP-GS-02 服務禮儀常用語.pdf", "questions": [{"id": "OP-GS-02-Q01", "stem": "當顧客走進館內時，根據「接待問候」的服務標準，下列哪一項做法是正確的？", "difficulty": "", "options": [{"text": "見到顧客後應在 3 秒內主動問候，並搭配眼神接觸與微笑。", "correct": true, "explanation": "服務標準 1.0 明確規定應在見到顧客 3 秒內主動問候，並強調眼神接觸與微笑的重要性。"}, {"text": "為了表示尊重，應等待顧客先開口詢問後再行回應。", "correct": false, "explanation": "規範中特別強調不可等待顧客先開口，服務人員應主動發起問候。"}, {"text": "若手邊有工作，可先低頭完成後再抬頭向顧客打招呼。", "correct": false, "explanation": "標準作業指導書指出不可低頭不語，這會讓顧客感到被忽視。"}, {"text": "統一使用「您好」即可，不需根據早晚時段區分問候語。", "correct": false, "explanation": "規範要求應依據時段使用「早安」、「午安」或「晚安」等問候語。"}, {"text": "只需點頭示意，不一定要開口說話以維持環境安寧。", "correct": false, "explanation": "作業項目明確要求使用問候語，而非僅以肢體語言示意。"}], "answer_index": 0}, {"id": "OP-GS-02-Q02", "stem": "在與顧客確認需求與回應的過程中，下列哪一種話術符合「正向回應」的原則？", "difficulty": "", "options": [{"text": "「應該可以吧，我幫您看看。」", "correct": false, "explanation": "「應該可以」屬於含糊語句，不符合清楚明確的回應原則。"}, {"text": "「好的，請您稍等，我這邊先為您查詢。」", "correct": true, "explanation": "這句話符合告知稍候並明確說明後續處理動作的標準流程。"}, {"text": "「這部分我不知道耶，要問主管。」", "correct": false, "explanation": "使用「不知道」是禁用語，應改以協助查詢或說明原因的方式呈現。"}, {"text": "「沒辦法喔，現在系統壞掉了。」", "correct": false, "explanation": "直接使用「沒辦法」或否定句過於生硬，應提供替代方案或原因說明。"}, {"text": "「您可以自己看那一張公告，上面寫得很清楚。」", "correct": false, "explanation": "「你自己看」是生硬的命令式用語，在服務禮儀中應被避免。"}], "answer_index": 1}, {"id": "OP-GS-02-Q03", "stem": "當發生館方疏失導致客訴時，下列關於「致歉用語」的操作流程，何者最為適切？", "difficulty": "", "options": [{"text": "先致歉並說明處理方式，且語氣需穩定、不推諉責任。", "correct": true, "explanation": "規範 3.0 指出致歉後必須接續具體處理動作，且態度應積極負責。"}, {"text": "只要誠懇地不斷道歉，顧客通常就能平息怒火。", "correct": false, "explanation": "標準規定致歉後需接續具體處理動作，不可只道歉不處理。"}, {"text": "若非自己部門的錯，應向顧客解釋清楚是由哪個單位負責。", "correct": false, "explanation": "致歉時應保持語氣穩定且不推責，避免將責任推給其他同仁或部門。"}, {"text": "為了不讓顧客久等，應先處理問題，等處理完後再補道歉。", "correct": false, "explanation": "發生異常或疏失時，標準流程是先致歉再說明處理方式。"}, {"text": "可以先使用「不知道耶」來觀察顧客反應，再決定致歉強度。", "correct": false, "explanation": "「不知道」是禁用語，且致歉應在第一時間主動進行。"}], "answer_index": 0}, {"id": "OP-GS-02-Q04", "stem": "關於「感謝與送客」的作業標準，下列哪一項行為是嚴格禁止的？", "difficulty": "", "options": [{"text": "在顧客尚未離開前，即轉身開始做自己的事。", "correct": true, "explanation": "規範 4.0 的注意事項明確指出，不可在顧客尚未離開前轉身處理雜事。"}, {"text": "服務完成後主動向顧客致謝。", "correct": false, "explanation": "這是標準流程中要求的正向服務行為。"}, {"text": "在顧客離開時做出目送的動作。", "correct": false, "explanation": "目送動作是提升服務品質的關鍵禮儀標準之一。"}, {"text": "對顧客說：「謝謝您，祝您今天一切順心。」", "correct": false, "explanation": "這是一句標準且被建議使用的送客語。"}, {"text": "提醒顧客若有其他需要，歡迎隨時告知。", "correct": false, "explanation": "這屬於服務完整性的一環，是符合禮儀的表現。"}], "answer_index": 0}, {"id": "OP-GS-02-Q05", "stem": "新進夥伴在教育訓練期間，應優先熟悉並自然使用哪些「七大常用語」？", "difficulty": "", "options": [{"text": "您好、請、謝謝、不好意思、請稍等、跟您確認、我這邊先為您處理。", "correct": true, "explanation": "這是規範 5.0 中列出的核心服務語句，新進人員需重點訓練。"}, {"text": "您好、請看、等一下、沒關係、不知道、沒辦法、再見。", "correct": false, "explanation": "此選項包含「不知道」、「沒辦法」等禁用語或不恰當用語。"}, {"text": "歡迎光臨、請坐、沒問題、對不起、請自便、你看看、慢走。", "correct": false, "explanation": "此選項語句較為口語，且未完全包含標準要求的七大用語。"}, {"text": "早安、請稍後、謝了、抱歉、確認中、等我一下、幫你弄。", "correct": false, "explanation": "此選項用語過於口語化，不符合服務禮儀的正式標準。"}, {"text": "您好、請教、感謝、抱歉、您確定嗎、我幫您查、待會見。", "correct": false, "explanation": "部分用語與官方規範的「七大常用語」不符。"}], "answer_index": 0}, {"id": "OP-GS-02-Q06", "stem": "若顧客提出一個不屬於您負責範疇的問題，根據「禁用語與替代說法」，最適當的回應為何？", "difficulty": "", "options": [{"text": "「這不是我負責的範圍，請您去問那邊的人。」", "correct": false, "explanation": "直接推責會給顧客留下負面印象，是典型的禁用語。"}, {"text": "「我這邊先幫您確認正確窗口，請您稍等一下。」", "correct": true, "explanation": "這是規範 6.0 建議的替代說法，展現了協助查詢的積極態度。"}, {"text": "「我不清楚耶，您可能要自己去櫃檯問一下。」", "correct": false, "explanation": "同時使用了禁用語「不清楚」與不禮貌的「你自己去問」。"}, {"text": "「這不是我的業務，我也沒辦法幫您。」", "correct": false, "explanation": "「沒辦法」與「不是我負責」皆屬於生硬且不負責任的用語。"}, {"text": "「好的，我幫您處理。」（儘管您不會處理也不找人協助）", "correct": false, "explanation": "這屬於敷衍式回應，雖然開頭正確但後續未落實處理動作。"}], "answer_index": 1}, {"id": "OP-GS-02-Q07", "stem": "在執行服務作業時，關於「回應原則」的敘述，下列何者「錯誤」？", "difficulty": "", "options": [{"text": "應先完整聆聽顧客需求後，再進行重述確認。", "correct": false, "explanation": "這是標準 2.0 規定的正確流程，並非錯誤敘述。"}, {"text": "回應時應保持清楚、簡短、正向。", "correct": false, "explanation": "這是規範中列出的核心回應原則，並非錯誤敘述。"}, {"text": "若需要查詢系統，應先告知顧客稍候再行動。", "correct": false, "explanation": "這是標準流程中要求的必要步驟，並非錯誤敘述。"}, {"text": "即使無法立即完成，也應提供下一步處理方式。", "correct": false, "explanation": "這是規範 6.0 特別提到的處理彈性與責任感，並非錯誤敘述。"}, {"text": "為了展現親和力，應盡量使用過度口語化的在地用語。", "correct": true, "explanation": "規範 5.0 提醒需避免過度口語化的用詞，應以專業的常用語為主。"}], "answer_index": 4}, {"id": "OP-GS-02-Q08", "stem": "顧客抱怨櫃檯辦理入住手續等待太久，此時正確的話術應包含：", "difficulty": "", "options": [{"text": "「不好意思，今天客人比較多，所以才讓您久等。」", "correct": false, "explanation": "雖然有致歉，但後續說明帶有推諉給客流量的意味，不符合不推責的原則。"}, {"text": "「不好意思，讓您久等了，我這邊立即為您處理。」", "correct": true, "explanation": "這符合 3.0 先致歉再說明處理動作的標準，展現主動負責的態度。"}, {"text": "「真的很抱歉，我們會再改進，謝謝您的包容。」", "correct": false, "explanation": "僅有致歉與空泛承諾，缺乏「立即處理」的具體行動。"}, {"text": "「請您稍等，我很快就好，不要急。」", "correct": false, "explanation": "語氣帶有命令式（不要急），容易引發顧客反感。"}, {"text": "「不知道前面的人怎麼弄這麼久，不好意思。」", "correct": false, "explanation": "這屬於推諉責任給同仁，是致歉用語中的大忌。"}], "answer_index": 1}, {"id": "OP-GS-02-Q09", "stem": "根據規範 6.0，當面臨無法達成顧客要求的情況時，應該如何轉化生硬的「不行」？", "difficulty": "", "options": [{"text": "改以說明原因、提供替代方案或協助查詢。", "correct": true, "explanation": "這是規範中明確建議將拒絕轉化為專業服務的方式。"}, {"text": "保持沉默並用微笑帶過，避免正面衝突。", "correct": false, "explanation": "沈默不語會讓顧客感到被敷衍，不符合溝通原則。"}, {"text": "反問顧客：「如果是您，您會怎麼處理呢？」", "correct": false, "explanation": "這屬於挑釁式或推卸責任的溝通，極不恰當。"}, {"text": "直接告知這是館方規定，沒有例外。", "correct": false, "explanation": "這種回應過於生硬，未嘗試提供其他協助或說明原因。"}, {"text": "告訴顧客「我沒辦法決定」，請他找更高階的主管。", "correct": false, "explanation": "這屬於「不是我負責」的變形，是缺乏解決問題意願的表現。"}], "answer_index": 0}, {"id": "OP-GS-02-Q10", "stem": "服務標準作業中，關於問候時的非語言行為，下列敘述何者正確？", "difficulty": "", "options": [{"text": "只要聲音宏亮，不一定要看著顧客。", "correct": false, "explanation": "規範要求問候應搭配眼神接觸，以示尊重。"}, {"text": "眼神接觸需持續盯著顧客看，直到對方回應為止。", "correct": false, "explanation": "過度的盯視會造成壓力，適度的眼神接觸搭配微笑才是標準。"}, {"text": "問候時應搭配眼神接觸與微笑，以營造親切感。", "correct": true, "explanation": "這是 1.0 接待問候中明確要求的非語言標準。"}, {"text": "因為戴口罩，所以不需要微笑，只要點頭就好。", "correct": false, "explanation": "即使戴口罩，眼神的笑意與態度依然是服務的重要環節。"}, {"text": "為了效率，可以邊走路邊對顧客喊問候語。", "correct": false, "explanation": "問候應是主動且專注的，匆忙的問候無法體現服務精神。"}], "answer_index": 2}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
