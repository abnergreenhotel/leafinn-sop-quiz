<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-22 發票異常作業處理 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-22 發票異常作業處理 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-22 發票異常作業處理.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-22", "title": "發票異常作業處理", "source_pdf": "03 SOP教材pdf檔/OP-FO-22 發票異常作業處理.pdf", "questions": [{"id": "OP-FO-22-Q01", "stem": "在進行「檢查發票跳開」作業時，若發現發票號碼與日期不符（跳開）的情形，應優先如何處理？", "difficulty": "", "options": [{"text": "直接手寫註記修正跳開的發票號碼", "correct": false, "explanation": "發票異常不應以手寫修正，而需遵循系統化的異常處理規範。"}, {"text": "依照作廢流程作廢發票，並由後台重新開立", "correct": true, "explanation": "作業規範明確要求，若檢查發現跳開發票，需先執行作廢流程，再參照後台開立流程重新開立。"}, {"text": "將該發票留至月底統一報廢處理", "correct": false, "explanation": "異常發票應即時發現即時處理，避免影響後續報表核對與帳務正確性。"}, {"text": "僅在備註欄位輸入跳開原因即可，無需作廢", "correct": false, "explanation": "單純備註無法解決發票號碼不連貫或日期錯亂的異常狀態。"}, {"text": "手開一張同樣金額的三聯式發票覆蓋舊發票", "correct": false, "explanation": "手開三聯發票有其特定使用情境，不應用於補救系統跳開的異常。"}], "answer_index": 1}, {"id": "OP-FO-22-Q02", "stem": "執行「作廢發票流程」時，在德安系統中點選作廢發票後，下一個關鍵的查核步驟是什麼？", "difficulty": "", "options": [{"text": "直接將發票撕毀並丟棄", "correct": false, "explanation": "作廢發票必須保留並貼入表格，不可隨意丟棄。"}, {"text": "通知主管並請主管核對金額", "correct": false, "explanation": "這是管理程序，而非 SOP 中規範的系統操作查核步驟。"}, {"text": "離開後重複以上動作複查是否作廢成功", "correct": true, "explanation": "為了確保系統狀態已更新，作業規範要求完成作廢後須再次進入系統確認狀態。"}, {"text": "立即點選報表列印當日作廢清單", "correct": false, "explanation": "列印清單通常是結帳時的動作，並非作廢單張發票時的立即複查步驟。"}, {"text": "手動修改該張發票的開立金額為 0", "correct": false, "explanation": "作廢功能與修改金額是不同操作，正確程序是直接點選右鍵作廢發票。"}], "answer_index": 2}, {"id": "OP-FO-22-Q03", "stem": "關於「後台開立發票」的設定，在銷售點代號的選取上，應選擇哪一個選項？", "difficulty": "", "options": [{"text": "總務部櫃台", "correct": false, "explanation": "總務部通常不負責前檯或客房發票的直接開立。"}, {"text": "餐飲部櫃台", "correct": false, "explanation": "本作業規範是針對客房部的發票異常作業處理。"}, {"text": "一館櫃台", "correct": false, "explanation": "雖然也是櫃台，但 SOP 圖示中特別標註的是二館特定的代稱。"}, {"text": "客房櫃檯（二館櫃台）", "correct": true, "explanation": "根據 SOP 執行說明第 5 點，銷售點代號應正確選取「客房櫃檯（二館櫃台）」。"}, {"text": "財務部後台", "correct": false, "explanation": "後台開立是功能名稱，但代號仍需選取對應的銷售營業點。"}], "answer_index": 3}, {"id": "OP-FO-22-Q04", "stem": "若顧客入住天數為三天兩夜，根據作業注意事項，發票開立的標準數量為何？", "difficulty": "", "options": [{"text": "必須每天開立一張，共三張", "correct": false, "explanation": "每日開一張會造成行政負擔，且不符合 SOP 的簡化原則。"}, {"text": "顧客入住一天以上，發票只要一張", "correct": true, "explanation": "作業規範中特別註記（*1-1），顧客入住一天以上，發票原則上合併開立一張即可。"}, {"text": "第一天開一張，退房當天再補一張", "correct": false, "explanation": "分兩次開立並非標準流程要求的做法。"}, {"text": "依據顧客退房時的要求，若沒要求則不開", "correct": false, "explanation": "無論顧客是否要求，均需依法開立發票。"}, {"text": "由顧客決定要開一張還是按天數分開開立", "correct": false, "explanation": "雖然可彈性處理，但標準 SOP 是以一張為原則。"}], "answer_index": 1}, {"id": "OP-FO-22-Q05", "stem": "在「手開三聯流程」中，若房價總計為 $2100$ 元，請問「銷售額」應該如何計算？", "difficulty": "", "options": [{"text": "直接填寫 $2100$ 元", "correct": false, "explanation": "總計金額包含了營業稅，銷售額需將稅額剔除。"}, {"text": "以 $2100$ 乘於 $0.05$ 作為銷售額", "correct": false, "explanation": "乘於 $0.05$ 是計算稅額的方法，而非銷售額的推算。"}, {"text": "以 $2100$ 除以 $1.05$ 等於銷售額", "correct": true, "explanation": "根據計算方式規範，銷售額 = 房價 $\\div 1.05$。"}, {"text": "以 $2100$ 減去 $100$ 元計算", "correct": false, "explanation": "扣除固定金額並非法律規定的營業稅內含計算公式。"}, {"text": "以房價乘以 $0.95$ 作為銷售額", "correct": false, "explanation": "這是常見的折扣計算誤區，而非正確的稅前銷售額算法。"}], "answer_index": 2}, {"id": "OP-FO-22-Q06", "stem": "完成手開三聯發票後，應將哪幾聯交給顧客？", "difficulty": "", "options": [{"text": "第一、二、三聯全部給顧客", "correct": false, "explanation": "第一聯為存根聯，必須由開立單位保留。"}, {"text": "僅交付第三聯（收執聯）", "correct": false, "explanation": "三聯式發票若為報帳使用，通常需要交付扣抵聯與收執聯。"}, {"text": "交付第二、三聯給顧客", "correct": true, "explanation": "規範中明確指出，手開三聯發票完成後，第二聯（扣抵聯）與第三聯（收執聯）應交給顧客。"}, {"text": "僅交付第一聯（存根聯）", "correct": false, "explanation": "存根聯應留在發票本中備查，不應交予顧客。"}, {"text": "顧客僅需在發票本上簽名，不需拿走任何聯式", "correct": false, "explanation": "發票是交易憑證，必須將法定聯次交給買受人。"}], "answer_index": 2}, {"id": "OP-FO-22-Q07", "stem": "關於作廢發票的實體處理，下列哪項敘述完全符合規範？", "difficulty": "", "options": [{"text": "蓋上作廢章並妥善收納於抽屜", "correct": false, "explanation": "僅收納於抽屜是不夠的，還需進行黏貼管理。"}, {"text": "蓋上作廢章並黏貼到作廢發票表格", "correct": true, "explanation": "SOP 要求已作廢發票需蓋上作廢章，並完成黏貼於表格的動作以便後續核銷。"}, {"text": "無需蓋章，只要在系統作廢即可", "correct": false, "explanation": "實體發票必須有作廢標記，否則有誤用或漏記的風險。"}, {"text": "將發票對折後直接丟入回收桶", "correct": false, "explanation": "作廢發票是重要憑證，必須保留實體核銷，不可丟棄。"}, {"text": "將發票黏貼於當日的日結報表後方", "correct": false, "explanation": "規範要求黏貼於特定的「作廢發票表格」，而非日結報表。"}], "answer_index": 1}, {"id": "OP-FO-22-Q08", "stem": "在執行「檢查發票跳開」作業時，應該選取哪一段日期區間進行查詢？", "difficulty": "", "options": [{"text": "當週週一至今日", "correct": false, "explanation": "區間過長會降低每日稽核的效率，通常只需檢查近期。"}, {"text": "昨日及今日", "correct": true, "explanation": "SOP 規定選取發票日期（昨日及今日）查詢，以核對發票號碼與日期是否跳開。"}, {"text": "今日整點至目前時間", "correct": false, "explanation": "僅查今日可能漏掉跨日（夜班）產生的跳開問題。"}, {"text": "本月 1 日至今日", "correct": false, "explanation": "這是月底核帳範圍，非每日例行檢查發票跳開的區間。"}, {"text": "上週同一天與今日", "correct": false, "explanation": "這樣的日期組合不具連續性，無法有效核對號碼跳開。"}], "answer_index": 1}, {"id": "OP-FO-22-Q09", "stem": "在「手開三聯流程」中，除了填寫基本資料與計算稅額外，哪一項行政細節是絕對不能遺漏的？", "difficulty": "", "options": [{"text": "必須使用紅筆填寫", "correct": false, "explanation": "一般填寫發票並無規定必須使用紅筆，通常以黑色或藍色原子筆為主。"}, {"text": "蓋上飯店的店章", "correct": false, "explanation": "規範中特別強調的是針對買受人資訊的章戳。"}, {"text": "蓋上統編章", "correct": true, "explanation": "依照 SOP 第 7 點，必須蓋上統編章以符合憑證開立規範。"}, {"text": "註明顧客的聯絡電話", "correct": false, "explanation": "聯絡電話並非發票上的法定必填欄位。"}, {"text": "在發票背面簽名確認", "correct": false, "explanation": "發票簽名通常出現在領收證明，而非三聯式發票開立的標準動作。"}], "answer_index": 2}, {"id": "OP-FO-22-Q10", "stem": "開立三聯式發票時，注意事項中提到的「日期是否回開」主要是在提醒夥伴什麼？", "difficulty": "", "options": [{"text": "注意是否超過發票開立的營業稅期", "correct": false, "explanation": "雖然稅期重要，但「回開」是指發票號碼與日期的前後邏輯一致性。"}, {"text": "檢查發票號碼是否有漏開的情形", "correct": false, "explanation": "漏開與回開是不同概念，回開指的是日期倒置的問題。"}, {"text": "注意日期是否填寫成明年的日期", "correct": false, "explanation": "這是筆誤問題，而非 SOP 強調的「回開」核對重點。"}, {"text": "核對日期是否早於前一張發票，造成序號與日期不符", "correct": true, "explanation": "回開發票會導致發票開立的時間軸與號碼順序衝突，是稅務查核的重點。"}, {"text": "確保發票日期是顧客預約的日期", "correct": false, "explanation": "發票應以實際結帳或開立日為準，而非預約日。"}], "answer_index": 3}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
