<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-25 排房作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-25 排房作業流程 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-25排房作業流程.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-25", "title": "排房作業流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-25排房作業流程.pdf", "questions": [{"id": "OP-FO-25-Q01", "stem": "在執行排房作業（流程 1）時，若遇到同一姓名有多筆訂單，應優先採取的排房原則為何？", "difficulty": "", "options": [{"text": "將其安排在不同樓層，分散音量影響", "correct": false, "explanation": "SOP 明確指出應儘量安排在同一樓層以方便房客，分散樓層會增加房客往返的困擾。"}, {"text": "優先排房，並儘量安排在同一樓層", "correct": true, "explanation": "根據排房流程第 3 點，多筆同名訂單應先行排房，並以同樓層為原則，方便顧客並利於管理。"}, {"text": "待所有單筆訂單排完後，再處理多筆訂單", "correct": false, "explanation": "作業規範要求同名多筆訂單者應「先行排房」，而非最後處理，以確保房源充足且能連號或同層。"}, {"text": "隨機分配房號，之後再由早班統一調整", "correct": false, "explanation": "流程強調需確認資訊正確即完成，且多筆訂單有特定排序邏輯，並非隨機分配後再調整。"}], "answer_index": 1}, {"id": "OP-FO-25-Q02", "stem": "根據排房作業注意事項，若房況許可，應儘量「避免」安排房客入住下列哪些房號？", "difficulty": "", "options": [{"text": "位於電梯正對面的房間", "correct": false, "explanation": "資料中未提到避開電梯對面房間，而是強調避開逃生設備房與角落房。"}, {"text": "高樓層的景觀房", "correct": false, "explanation": "高樓層通常是特殊需求（如：高樓層需求）的安排對象，並非需避開的房型。"}, {"text": "避難逃生設備房間（如 202、305）與角間", "correct": true, "explanation": "注意事項第 3 點明確列出應避開 202、305、606、807 等避難設備房及角間，以維護住客體驗或安全動線。"}, {"text": "靠近員工休息區或備品間的房間", "correct": false, "explanation": "資料中並未規範需避開備品間鄰近區域，其重點在於設備房與建築角落。"}], "answer_index": 2}, {"id": "OP-FO-25-Q03", "stem": "列印 R 卡（旅客登記卡）時，若遇到同批顧客有多間房間，應如何在系統中操作以避免重複或浪費？", "difficulty": "", "options": [{"text": "勾選「全選」後直接列印，系統會自動整合", "correct": false, "explanation": "系統不會自動整合，直接列印會導致每間房都印出一張含有重複資訊的登記卡。"}, {"text": "點選全選後，將該批顧客中「數字最大」的房號取消勾選", "correct": true, "explanation": "流程 2 第 6 點指出，應取消勾選數字最大的房號，此為避免同名多筆訂單重複列印的標準步驟。"}, {"text": "點選全選後，手動刪除多餘的房號資訊", "correct": false, "explanation": "SOP 要求在列印前的清單中取消勾選特定房號，而非列印後才手動刪除。"}, {"text": "每一間房號都必須單獨分開列印，不可使用全選", "correct": false, "explanation": "注意事項提到多筆同名訂單只選一個列印，以避免浪費，而非全部單獨列印。"}], "answer_index": 1}, {"id": "OP-FO-25-Q04", "stem": "當訂單來源顯示為 Agoda、Trip、Klook 或 Expedia 串單至系統時，在製作登記卡時應如何標註金額資訊？", "difficulty": "", "options": [{"text": "註記「已付」並寫上訂單上的實際房價", "correct": false, "explanation": "補充說明 1 明確規定針對這些平台串單，備註需寫「已付」但「不可以寫出金額」。"}, {"text": "註記「已付」且「不可以」寫出金額", "correct": true, "explanation": "這是針對 OTA 第三方代收訂單的嚴格規定，避免因平台價差引起顧客爭議。"}, {"text": "註記「未付」，待客人入住時現場收費", "correct": false, "explanation": "Agoda 等串單通常已在平台付款，應註記為「已付」以符合帳務狀態。"}, {"text": "不需做任何備註，直接空白即可", "correct": false, "explanation": "為了讓櫃檯人員一眼辨識帳務狀態，必須寫上「已付」等狀態字樣。"}], "answer_index": 1}, {"id": "OP-FO-25-Q05", "stem": "在填寫房況表時，若某一房號為「當日退房」，應使用哪種顏色的螢光筆進行標示？", "difficulty": "", "options": [{"text": "紅色螢光筆", "correct": false, "explanation": "紅色螢光筆是專門用於標示「留房」的房號，而非退房。"}, {"text": "黃色螢光筆", "correct": false, "explanation": "流程中並未提到黃色螢光筆的使用，標準作業應使用綠色或紅色。"}, {"text": "綠色螢光筆", "correct": true, "explanation": "流程 5 第 5 點明確規定：當日退房的房號上畫綠色螢光筆。"}, {"text": "藍色螢光筆", "correct": false, "explanation": "藍色螢光筆並非房況表標準化標記顏色，流程指定為綠色。"}], "answer_index": 2}, {"id": "OP-FO-25-Q06", "stem": "關於 9.602 房型的特殊作業需求，在房況表上應該確認哪些項目？", "difficulty": "", "options": [{"text": "確認是否需要加床", "correct": false, "explanation": "資料指出 602 房型需確認的是 SF 或 DD，而非一般加床服務。"}, {"text": "確認當日需做 SF 或 DD，並填寫於表格", "correct": true, "explanation": "流程 5 第 9 點提到 602 為特殊房型，需確認 SF 或 DD 並在查房狀況表上填寫。"}, {"text": "確認是否為外國人使用並註記星號", "correct": false, "explanation": "註記星號是針對「所有」外國人使用的退房，而非 602 房型特有的確認項目。"}, {"text": "確認是否需要更換為併床模式", "correct": false, "explanation": "併床需求是針對 CT 房型（兩小床）的作業，而非 602 房型的特殊要求。"}], "answer_index": 1}, {"id": "OP-FO-25-Q07", "stem": "在德安飯店前台系統中，若要確認某筆訂單是否已經完成「排房」，應查看預進列表中的哪個數字？", "difficulty": "", "options": [{"text": "若排房數字為 1 代表已排房，0 代表未排房", "correct": true, "explanation": "根據流程 1 第 5 點，系統中排房數字 1 代表已完成排房，0 則代表尚未分配房號。"}, {"text": "若排房數字為 1 代表已入住，0 代表預進", "correct": false, "explanation": "此數字反映的是排房狀態，而非顧客是否已經辦理 C/I 入住。"}, {"text": "數字代表該訂單預計入住的總天數", "correct": false, "explanation": "系統中的排房狀態欄位是用來檢核是否已指派房號，而非天數。"}, {"text": "數字代表該筆訂單所含的總房間數", "correct": false, "explanation": "流程明確定義此 0/1 狀態為「已排房」與「未排房」的判斷依據。"}], "answer_index": 0}, {"id": "OP-FO-25-Q08", "stem": "若房客在官網訂購「高鐵聯票」，根據作業指導書的備註金額填寫規範，應如何處理？", "difficulty": "", "options": [{"text": "寫出房費加上高鐵票價的總金額", "correct": false, "explanation": "補充說明 2 提到不可寫出房價加高鐵的總金額，以免產生退票或帳務爭議。"}, {"text": "僅需寫出總房價，勿寫出高鐵金額", "correct": true, "explanation": "補充說明 2 規定備註金額只需寫出總房價，不應包含高鐵費用（註：雖 2026/5/2 後已無此專案，但作業標準仍以此為準）。"}, {"text": "僅寫出高鐵票價，房價部分註記已付", "correct": false, "explanation": "規範要求標註房價而非票價，以便櫃檯核對住宿部分的款項。"}, {"text": "比照 Agoda 串單模式，完全不寫金額", "correct": false, "explanation": "官網訂單有不同的顯示規則，應寫出總房價以利核對，與 OTA 的隱藏金額做法不同。"}], "answer_index": 1}, {"id": "OP-FO-25-Q09", "stem": "在填寫房況表（流程 5）時，關於「備品」的備註作業，下列敘述何者錯誤？", "difficulty": "", "options": [{"text": "入住房客需要的備品名及數量需寫在備註格中", "correct": false, "explanation": "這符合流程 5 第 3 點的正確操作，應寫上如「床圍*1」等資訊。"}, {"text": "退房時須收取的備品（如澡盆）不需記錄在房況表上", "correct": true, "explanation": "此敘述錯誤。流程 5 第 4 點規定：退房須收取的備品名及數量也必須寫在備註格中。"}, {"text": "若有留房（續住）的情況，也必須寫上須收備品", "correct": false, "explanation": "這是正確的操作規範，確保在續住期間對借出備品進行控管。"}, {"text": "外國人使用之退房房間須額外註記星號", "correct": false, "explanation": "這是流程 5 的特殊要求，用以提醒房務或櫃檯注意特定國籍服務差異。"}], "answer_index": 1}, {"id": "OP-FO-25-Q10", "stem": "在製作旅客住宿登記卡時，如何判別應在備註欄寫上「已付」、「未付」或「已授權」？", "difficulty": "", "options": [{"text": "根據顧客的國籍與性別判斷", "correct": false, "explanation": "付款狀態與客人的個人特徵無關，而是取決於訂單帳務資訊。"}, {"text": "根據訂房來源是否為官網判斷", "correct": false, "explanation": "官網訂單也可能有已付或現場付的情況，需確認具體帳務欄位。"}, {"text": "確認應收訂金欄的已付金額與房費對比，以及備註有無預先授權", "correct": true, "explanation": "流程 3 第 6-7 點指出，應比對已付金額與右邊房費金額，並檢查備註是否有 Pre-auth 紀錄來判定。"}, {"text": "由德安系統自動在 R 卡上產生，不需人工判別", "correct": false, "explanation": "SOP 明確要求夥伴應依照情況判別後，在登記卡備註上「寫上」對應狀態。"}], "answer_index": 2}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
