  <script>
    const payload = {"code": "OP-FO-17", "title": "自建單訂房流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-17 自建單訂房流程.pdf", "questions": [{"id": "OP-FO-17-Q01", "stem": "當您在接聽訂房電話時，若因故無法立即登入德安系統輸入資料，根據標準流程應如何處理？", "difficulty": "", "options": [{"text": "請客人稍後再撥，待系統準備好後再服務", "correct": false, "explanation": "這會導致客人的不便並可能流失訂單，非手冊建議的做法。"}, {"text": "先拿出紙本訂房單，一邊聽取需求一邊填寫", "correct": true, "explanation": "手冊明確指出若無法同時輸入德安，可先以訂房單記錄客人需求。"}, {"text": "直接憑記憶背下所有需求，掛電話後再補登", "correct": false, "explanation": "人類記憶有限，容易漏掉日期或房型等重要細節，增加出錯風險。"}, {"text": "請客人改發送 FB 或 LINE 訊息以利後續作業", "correct": false, "explanation": "當客人已經致電時，應優先在電話中提供即時服務而非推託。"}, {"text": "要求另一位同事放下手邊工作協助登入", "correct": false, "explanation": "這會干擾其他同事的作業流程，且手冊已有個人因應措施。"}], "answer_index": 1}, {"id": "OP-FO-17-Q02", "stem": "在進行「新增訂房」時，若需查詢當下館內可賣出的房間數量與網路平台剩餘數，應點選哪一個功能？", "difficulty": "", "options": [{"text": "房價代號查詢", "correct": false, "explanation": "房價代號用於選擇報價專案，而非查詢剩餘庫存數。"}, {"text": "客房維修管理", "correct": false, "explanation": "此功能與房況維修有關，非訂房時的庫存查詢步驟。"}, {"text": "鎖控分頁", "correct": true, "explanation": "手冊說明可按下新增訂房後，點選下方分頁「鎖控」來查看庫存與 WRS 剩餘數。"}, {"text": "歷史旅客查詢", "correct": false, "explanation": "這用於找尋曾入住客人的 Profile 資料，非房量庫存資訊。"}, {"text": "簡訊發送紀錄", "correct": false, "explanation": "這是用於確認匯款資訊發送狀況，與查房量無關。"}], "answer_index": 2}, {"id": "OP-FO-17-Q03", "stem": "關於庫存數計算，若畫面上顯示「庫存數」為 2，「WRS 鎖控剩餘數」為 3，則目前總計尚未售出的房間數是多少？", "difficulty": "", "options": [{"text": "2 間", "correct": false, "explanation": "此數值僅代表館內數量，未包含網路平台的數量。"}, {"text": "3 間", "correct": false, "explanation": "此數值僅代表網路可售數量，未包含館內實體剩餘庫存。"}, {"text": "5 間", "correct": true, "explanation": "計算公式為庫存數加上 WRS 鎖控剩餘數等於總計尚未售出房間數。"}, {"text": "1 間", "correct": false, "explanation": "這是相減的錯誤計算，不符合手冊的加總邏輯。"}, {"text": "0 間（代表已爆房）", "correct": false, "explanation": "只有在庫存數下方小計為負數時才可能代表爆房。"}], "answer_index": 2}, {"id": "OP-FO-17-Q04", "stem": "手冊強調「庫存數」最下方的小計處絕對不能出現什麼情況，否則表示可能發生爆房？", "difficulty": "", "options": [{"text": "數值等於 0", "correct": false, "explanation": "數值為 0 是應保持的標準，代表剛好售完。"}, {"text": "數值大於 10", "correct": false, "explanation": "這僅代表目前空房很多，並非異常狀況。"}, {"text": "數值為負數", "correct": true, "explanation": "手冊註記小計處若為負數，表示超賣或爆房情況發生。"}, {"text": "數值與 WRS 相等", "correct": false, "explanation": "這只是庫存分布的巧合，與爆房判斷無關。"}, {"text": "數值變為紅色", "correct": false, "explanation": "手冊主要以正負數值作為判斷準據，非顏色提示。"}], "answer_index": 2}, {"id": "OP-FO-17-Q05", "stem": "若顧客詢問公司簽約特約價，但在名單中不確定其公司名稱，應如何在系統中輔助查詢？", "difficulty": "", "options": [{"text": "在訂房公司格內直接輸入完整的公司負責人姓名", "correct": false, "explanation": "手冊並無提到以負責人姓名查詢特約名單的步驟。"}, {"text": "在訂房公司格內輸入「%」，再輸入公司統編", "correct": true, "explanation": "手冊明確指導可以使用 % 符號搭配統編來查詢特約商。"}, {"text": "撥打總部電話請求查詢該公司合約狀態", "correct": false, "explanation": "櫃檯應先自行在系統查詢，若無資料才由總部處理，而非第一步就撥打。"}, {"text": "要求客人將合約書正本拍照上傳至 LINE", "correct": false, "explanation": "這會增加客人的作業麻煩，應優先使用系統查詢統編。"}, {"text": "告知客人必須提供實體名片才能查詢價格", "correct": false, "explanation": "電話訂房時無法即時核對名片，系統查詢統編才是標準做法。"}], "answer_index": 1}, {"id": "OP-FO-17-Q06", "stem": "在自建訂單流程中，手動保留一間標準雙人房後，應去哪裡調整網路販售數量以避免重複預訂？", "difficulty": "", "options": [{"text": "德安前檯系統的客務帳務分頁", "correct": false, "explanation": "這是處理結帳的系統，不負責網路庫存調控。"}, {"text": "進入「網路訂房系統」中的「房種庫存管理」", "correct": true, "explanation": "手冊規定需回到主選單進入網路訂房系統，手動扣除網路庫存以成功保留。"}, {"text": "直接在現場排房畫面中鎖定房間", "correct": false, "explanation": "現場排房無法直接連動扣除 OTA 網路平台的剩餘房量。"}, {"text": "撥打網路平台業務電話要求下架房間", "correct": false, "explanation": "此操作太耗時，應由內部網路訂房管理系統自行操作。"}, {"text": "調整「鎖控」分頁中的所有庫存為 0", "correct": false, "explanation": "這樣會導致全館停止對外銷售，不符合單一訂單的操作邏輯。"}], "answer_index": 1}, {"id": "OP-FO-17-Q07", "stem": "若網路房種庫存管理顯示為「1」，更改成「0」存檔後，卻又自動跳回「1」，這代表什麼意義？", "difficulty": "", "options": [{"text": "系統故障，需重啟德安伺服器", "correct": false, "explanation": "這通常是業務邏輯狀況，非系統硬體故障。"}, {"text": "該房間剛好被網路客人訂走，只是尚未串單", "correct": true, "explanation": "手冊提醒若數字無法更改為 0，代表該房已被搶先預訂，訂單串接中。"}, {"text": "該房型已被列為禁賣房，無法手動更改", "correct": false, "explanation": "手冊並無提到禁賣房會導致數字跳回的設定。"}, {"text": "櫃檯操作權限不足，無法變更數字", "correct": false, "explanation": "若是權限不足應是無法存     const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
