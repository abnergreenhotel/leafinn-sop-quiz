<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-13 股東票券流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-13 股東票券流程 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-13 股東票券流程.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-13", "title": "股東票券流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-13 股東票券流程.pdf", "questions": [{"id": "OP-FO-13-Q01", "stem": "當客人詢問是否能在「連續假期」期間使用股東住宿券預約訂房時，根據標準作業流程應如何處理？", "difficulty": "", "options": [{"text": "直接為客人建立訂單，並加收連假差額", "correct": false, "explanation": "資料明確規定連假不開放使用，並非加價即可使用。"}, {"text": "請客人自行聯繫發券單位確認連假資格", "correct": false, "explanation": "這並非標準處理流程，應由一線夥伴根據作業規範直接回覆。"}, {"text": "委婉告知國定假日及連續假期不開放使用住宿券", "correct": true, "explanation": "根據規範，國定假日與連續假期屬於不開放使用的區間，夥伴需進行委婉說明。"}, {"text": "視當日住房率決定是否接受訂房", "correct": false, "explanation": "流程中並未提到可視房況彈性開放，應嚴格遵守不開放的規範。"}, {"text": "告知可以訂房但需以原價計算，不可折抵", "correct": false, "explanation": "雖然可改以一般訂房處理，但針對「使用住宿券」的請求應直接說明規範限制。"}], "answer_index": 2}, {"id": "OP-FO-13-Q02", "stem": "若客人預計在「假日」入住，關於房費的告知與計算方式，下列何者正確？", "difficulty": "", "options": [{"text": "房價以原價計算，無須告知折後金額", "correct": false, "explanation": "假日入住仍有折扣，且流程強調需主動告知折後總額。"}, {"text": "房價以 6 折計算，並需主動告知折後應付總額", "correct": true, "explanation": "規範要求假日入住應以 6 折計算，且為了避免爭議必須主動報價。"}, {"text": "房價以 5 折計算，入住時再核對金額即可", "correct": false, "explanation": "規定的折扣數為 6 折而非 5 折。"}, {"text": "僅需告知平日不加價，假日則依現場價格為準", "correct": false, "explanation": "這會導致報價不明確，應直接依據 6 折計算並告知。"}, {"text": "假日入住必須全額預付，否則無法計算折扣", "correct": false, "explanation": "雖然要處理費用，但計算標準與預付是兩件事。"}], "answer_index": 1}, {"id": "OP-FO-13-Q03", "stem": "在票券初審階段，為避免電話接聽產生誤差，建議請客人透過什麼方式傳送票券照片以便核對？", "difficulty": "", "options": [{"text": "發送電子郵件至訂房組信箱", "correct": false, "explanation": "雖然可行，但非流程中建議的最方便通訊管道。"}, {"text": "傳真至飯店前台", "correct": false, "explanation": "傳真影像通常不清晰，不利於核對細節。"}, {"text": "傳送至官方 LINE 帳號", "correct": true, "explanation": "官方 LINE 是流程建議最方便、清楚且能即時核對正反面照片的管道。"}, {"text": "上傳至飯店官網的留言板", "correct": false, "explanation": "官網留言板通常不具備即時傳圖與對話的功能。"}, {"text": "透過簡訊傳送多媒體訊息 (MMS)", "correct": false, "explanation": "MMS 格式限制較多且不夠普及，並非建議方式。"}], "answer_index": 2}, {"id": "OP-FO-13-Q04", "stem": "辦理票券初審時，下列哪一項不是「執行說明」中明確列出的核對重點？", "difficulty": "", "options": [{"text": "登記券碼是否正確", "correct": false, "explanation": "這是初審的基本動作，必須確認券碼。"}, {"text": "檢查「使用須知」規範", "correct": false, "explanation": "確保客人持有的票券符合當前使用規範。"}, {"text": "核對「適用館別印章」是否正確清晰", "correct": false, "explanation": "這是確認票券適用性的關鍵查核點。"}, {"text": "確認票券的購買來源與發票號碼", "correct": true, "explanation": "流程中僅提到核對券面資訊與印章，並未要求追溯購買來源或發票。"}, {"text": "確認票券正、反面照片皆已提供", "correct": false, "explanation": "流程明確要求請訂房者拍攝正反面傳送。"}], "answer_index": 3}, {"id": "OP-FO-13-Q05", "stem": "在資料蒐集與備註階段，除了詢問交通方式，還必須詢問哪一項重要資訊？", "difficulty": "", "options": [{"text": "客人的用餐禁忌", "correct": false, "explanation": "雖然重要但非本流程中列出的標準查核項。"}, {"text": "預計抵達時間", "correct": true, "explanation": "流程明確要求詢問預計抵達時間以利安排。"}, {"text": "過去是否有入住紀錄", "correct": false, "explanation": "此資訊並非此流程的必要問項。"}, {"text": "是否需要加購早餐", "correct": false, "explanation": "流程重點在於交通與特殊硬體需求。"}, {"text": "隨行家屬的身分證字號", "correct": false, "explanation": "除非辦理入住，否則訂房階段無須蒐集所有家屬字號。"}], "answer_index": 1}, {"id": "OP-FO-13-Q06", "stem": "針對假日的訂房預約，在最後確認與提醒階段，必須進行哪項與財務相關的操作？", "difficulty": "", "options": [{"text": "要求客人全額匯款總房費", "correct": false, "explanation": "流程提到的是「剩餘房費」且可採授權或匯款。"}, {"text": "無需處理費用，入住再付即可", "correct": false, "explanation": "假日有特別規定需先處理剩餘費用。"}, {"text": "需先授權或匯款剩餘房費", "correct": true, "explanation": "這是針對假日入住的特殊財務規定，用以確保預約。"}, {"text": "請客人提供信用卡卡號作為保證但不刷取", "correct": false, "explanation": "流程明確指明要「授權或匯款」，而不只是提供資料。"}, {"text": "收取 1000 元作為作業手續費", "correct": false, "explanation": "流程中並無手續費的規定。"}], "answer_index": 2}, {"id": "OP-FO-13-Q07", "stem": "在「最後確認與提醒」步驟中，夥伴務必提醒客人入住當日應遵守哪項規定，否則會影響優惠核銷？", "difficulty": "", "options": [{"text": "必須攜帶身分證件", "correct": false, "explanation": "身分證是基本要求，但此處流程強調的是「票券」相關核銷。"}, {"text": "必須於 15:00 前辦理入住", "correct": false, "explanation": "入住時間非此核銷流程的重點提醒。"}, {"text": "必須攜帶票券正本", "correct": true, "explanation": "這是核銷最關鍵的憑證，沒帶將影響優惠。"}, {"text": "必須出示訂房成功的 LINE 截圖", "correct": false, "explanation": "截圖不能取代實體票券核銷。"}, {"text": "必須現場填寫股東滿意度問卷", "correct": false, "explanation": "流程中並未要求此項操作。"}], "answer_index": 2}, {"id": "OP-FO-13-Q08", "stem": "根據「入住辦理階段」的標準流程，股東票券在系統操作上有何特殊規定？", "difficulty": "", "options": [{"text": "必須先入全額訂金方可入住", "correct": false, "explanation": "股東票券有特殊的免入訂金規定。"}, {"text": "無須入訂金，直接選擇入住即可", "correct": true, "explanation": "流程中明確標註股東票券無須入訂金的操作路徑。"}, {"text": "系統需手動調整房價為 0 元", "correct": false, "explanation": "流程並未指示手動改價，僅說明訂金處理方式。"}, {"text": "必須先執行退房再重新入住", "correct": false, "explanation": "這是錯誤的系統逻辑。"}, {"text": "系統會自動抓取 LINE 照片核銷", "correct": false, "explanation": "系統無法自動處理 LINE 照片，仍需人工核對實體券。"}], "answer_index": 1}, {"id": "OP-FO-13-Q09", "stem": "在處理異常狀況時，若發現收到的實體住宿券有「任何塗改痕跡」，應如何認定？", "difficulty": "", "options": [{"text": "視為票券瑕疵，可能影響核銷", "correct": true, "explanation": "塗改通常代表票券效力有疑慮，屬於異常處理範圍。"}, {"text": "請客人在塗改處簽名確認即可", "correct": false, "explanation": "規範並未允許透過簽名補強塗改後的票券效力。"}, {"text": "只要券碼清晰，塗改其他位置沒關係", "correct": false, "explanation": "流程中提到「任何塗改痕跡」都是異常狀況。"}, {"text": "要求客人支付票券工本費以換領新券", "correct": false, "explanation": "此非流程內定的異常處理方式。"}, {"text": "請客人聯繫原股東進行背書", "correct": false, "explanation": "這與標準異常處理流程不符。"}], "answer_index": 0}, {"id": "OP-FO-13-Q10", "stem": "下列哪一項是「訂房預約階段」中，最後確認與提醒時「必須再次核對」的項目？", "difficulty": "", "options": [{"text": "生日、身分證字號、戶籍地址", "correct": false, "explanation": "這些資訊在預約階段非首要核對項目。"}, {"text": "入住日期、姓名、電話、備註事項", "correct": true, "explanation": "這些是確保訂單正確性最基礎且關鍵的資訊。"}, {"text": "購買票券的日期與金額", "correct": false, "explanation": "重點在於入住資訊而非票券購買細節。"}, {"text": "同行者人數與保險資料", "correct": false, "explanation": "非流程中規定的核對項目。"}, {"text": "前次入住的房號與滿意度", "correct": false, "explanation": "雖然可增加服務品質，但非本流程標準步驟。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
