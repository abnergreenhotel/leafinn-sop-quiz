  <script>
    const payload = {"code": "OP-FO-09", "title": "入住介紹說明", "source_pdf": "03 SOP教材pdf檔/OP-FO-09入住介紹說明.pdf", "questions": [{"id": "OP-FO-09-Q01", "stem": "當櫃台夥伴發現客人預訂的房型今日有特別升等（UG）時，根據標準話術，除了告知升等訊息外，還應主動要求客人執行下列哪項動作？", "difficulty": "", "options": [{"text": "請客人在退房時將房卡套留作紀念", "correct": false, "explanation": "房卡套通常包含房卡，且手冊中提到房卡需全數歸還才算退房完成。"}, {"text": "若住得舒服，請客人在網路給予滿星好評", "correct": true, "explanation": "標準話術規定，在告知房型升等後，需引導客人若滿意可至網路留下五星好評，增加飯店口碑。"}, {"text": "請客人至 8 樓洗衣房領取額外的備品", "correct": false, "explanation": "一次性備品應在櫃台由夥伴確認需求後領取，非至洗衣房領取。"}, {"text": "邀請客人在「心之光牆」寫下升等感言", "correct": false, "explanation": "心之光牆的互動功能主要是放煙火及投射文字，並非專門用於寫升等感言。"}, {"text": "告知客人若需延遲退房可享半價優惠", "correct": false, "explanation": "手冊中僅提及退房時間為 $11:30$，並未提及升等後可享延退優惠。"}], "answer_index": 1}, {"id": "OP-FO-09-Q02", "stem": "飯店凌晨時間會關閉大門。若客人在凌晨兩點想要回到飯店，應從哪個門進入，且需具備什麼條件？", "difficulty": "", "options": [{"text": "需從地下一樓餐廳入口進入，並撥打分機 $9$ 由大夜夥伴開門", "correct": false, "explanation": "餐廳僅作為用餐地點，並非主要的凌晨進出口。"}, {"text": "需從正門（大樹門）進入，並出示身分證件查驗", "correct": false, "explanation": "凌晨正門會關閉，且查驗證件不符標準流程。"}, {"text": "需從旭暮門進入，並使用房卡感應後方可進入", "correct": true, "explanation": "飯店規範大門於凌晨關閉後，客人需從前門（旭暮門）使用房卡感應進出。"}, {"text": "需從八樓洗手間側門進入，不需任何憑證", "correct": false, "explanation": "八樓為公共設施區，非一樓對外進出口。"}, {"text": "需從側門進入，並搜尋客房專屬無線網路密碼 $greenhotel99$ 後解鎖", "correct": false, "explanation": "無線網路密碼用於上網，不具備門禁開鎖功能。"}], "answer_index": 2}, {"id": "OP-FO-09-Q03", "stem": "有關飯店響應環保的客房備品與飲水規範，下列敘述何者完全正確？", "difficulty": "", "options": [{"text": "房內無瓶裝礦泉水，每樓層皆設有飲水機可使用冷熱水壺盛裝", "correct": true, "explanation": "飯店響應環保，客房內不提供瓶裝水，改提供飲水機及水壺。"}, {"text": "房內提供牙膏、牙刷，但其餘刮鬍刀等一次性備品需至櫃台購買", "correct": false, "explanation": "依照政府規定，房內不提供包含牙膏牙刷在內的所有一次性備品，且並非用購買的方式。"}, {"text": "為了節水，吹風機固定設置在廁所洗手台下方，不可移動", "correct": false, "explanation": "吹風機是放在抽屜內，其位置安排與省水無直接關聯。"}, {"text": "櫃台有備品 A4 立牌，若客人有需要可由房務員送至房內", "correct": false, "explanation": "標準流程是請客人在櫃台辦理入住時領取，而非事後送至房內。"}, {"text": "房內不提供冷水壺，僅提供馬克杯以減少清洗廢水", "correct": false, "explanation": "房內是有提供馬克杯、冷水壺及熱水壺的。"}], "answer_index": 0}, {"id": "OP-FO-09-Q04", "stem": "在「聞香區」的導覽中，$3/9$ 更新後的規定針對「擴香石」的使用方式為何？", "difficulty": "", "options": [{"text": "客人可以選擇喜歡的款式並滴上精油，退房時需將擴香石留在房內", "correct": true, "explanation": "更新後的規範允許客人帶擴香石回房使用，但明確標註不可帶走，需留在房內。"}, {"text": "擴香石是可以讓客人帶回家作為紀念品的特製小禮", "correct": false, "explanation": "手冊明確規定擴香石不可帶走。"}, {"text": "擴香石僅能在櫃台聞香區使用，禁止帶離該區域", "correct": false, "explanation": "規範中提到可以將擴香石帶回房間。"}, {"text": "若擴香石上的味道過重，應直接丟棄至洗衣房的回收桶", "correct": false, "explanation": "若精油味道殘留不散，應使用清水沖洗而非丟棄。"}, {"text": "必須使用房卡套上的書籤沿虛線撕下來，才能墊在擴香石下方使用", "correct": false, "explanation": "書籤與擴香石是兩種不同的聞香載體，目前試管旁使用的是擴香石。"}], "answer_index": 0}, {"id": "OP-FO-09-Q05", "stem": "關於飯店早餐的安排，若遇到餐廳公休而需配合外部店家「早安有喜」時，下列哪一項操作流程不符合標準？", "difficulty": "", "options": [{"text": "辦理入住時先請客人點餐，並核對餐點與送餐時間", "correct": false, "explanation": "這是標準的預訂流程，旨在確保客人需求被準確記錄。"}, {"text": "若客人當下無法決定餐點，請客人在晚上 $9$ 點前將菜單送回櫃台", "correct": false, "explanation": "這是為了配合大夜夥伴在 $9$ 到 $10$ 點間進行餐點統計作業。"}, {"text": "餐點將由外部店家直接送達客人房內，不需經由櫃台中轉", "correct": true, "explanation": "規範中寫到我們將與外部配合送餐到房內，但實務統計與管理是在飯店端，選項敘述省略了飯店端的掌控。"}, {"text": "需請客人在菜單右下角簽名，以示確認訂餐內容", "correct": false, "explanation": "這是確認點餐單有效性的標準手續。"}, {"text": "大夜夥伴需在凌晨統計完畢所有餐盒數量，以便後續作業", "correct": false, "explanation": "統計作業由大夜夥伴負責，是內部作業流程的核心部分。"}], "answer_index": 2}, {"id": "OP-FO-09-Q06", "stem": "館內最具特色的「心之光牆」是由約 $26,000$ 個寶特瓶組成。請問客人可以如何參與光牆的互動？", "difficulty": "", "options": [{"text": "需在早上 $7$ 點至晚上 $10$ 點，使用大廳的桌上型電腦發送文字", "correct": false, "explanation": "時間與設備皆與規範不符，互動開放時間為 $17:00$ 至 $21:30$。"}, {"text": "於下午 $5$ 點至晚上 $9$ 點半，透過各樓層的平板電腦施放煙火", "correct": true, "explanation": "手冊規定特定時間段內，各樓層設有平板可供客人進行互動投射。"}, {"text": "客人在辦理入住時領取特製雷射筆，即可對天井進行投影", "correct": false, "explanation": "互動媒介是平板電腦，並非雷射筆。"}, {"text": "需至八樓洗衣房領取回收寶特瓶，放入心之光牆的互動箱", "correct": false, "explanation": "光牆結構是固定的，並非透過丟入瓶子來互動。"}, {"text": "僅能透過房內電話撥打 $9$ 給櫃台，由服務同仁代為操作", "correct": false, "explanation": "此設施是設計給客人親自體驗的，不需經由櫃台代操。"}], "answer_index": 1}, {"id": "OP-FO-09-Q07", "stem": "飯店提供的「特殊枕頭更換」服務中，若客人偏好高度較高且支撐性較強的枕頭，夥伴應優先推薦哪一款？", "difficulty": "", "options": [{"text": "羽絨枕，具有良好的包覆感", "correct": false, "explanation": "特殊枕頭服務是為了提供羽絨枕以外的選擇，且羽絨枕支撐力相對較弱。"}, {"text": "麵包枕，採圓弧狀乳膠材質設計", "correct": false, "explanation": "麵包枕雖為乳膠枕，但描述中強調其形狀為圓弧狀，並未特別強調高支撐性。"}, {"text": "獨立枕，提供較高的支撐性", "correct": true, "explanation": "根據注意事項，獨立枕的特性即為高度較高、支撐性較佳。"}, {"text": "曲線枕，能貼合頸部曲線的乳膠枕", "correct": false, "explanation": "曲線枕強調的是貼合度，並非單純的高支撐力。"}, {"text": "舒壓枕，內含薄荷精油可助眠", "correct": false, "explanation": "資料中並未提到含有精油的舒壓枕選項。"}], "answer_index": 2}, {"id": "OP-FO-09-Q08", "stem": "有關飯店無線網路 WI-FI 的帳號密碼，下列情境何者說明正確？", "difficulty": "", "options": [{"text": "全館皆使用 $greenhotel1f01$ 作為單一帳號，密碼均相同", "correct": false, "explanation": "這是大廳專用的 WI-FI 帳號，並非全館統一。"}, {"text": "若客人在大廳需要使用，應搜尋 $greenhotel1f01$，密碼與房內相同", "correct": true, "explanation": "大廳有獨立帳號，但為了方便客人，密碼設定與客房 WI-FI 相同。"}, {"text": "客房 WI-FI 密碼為大寫的 $GREENHOTEL99$，以利辨識", "correct": false, "explanation": "密碼應為小寫的 $greenhotel99$。"}, {"text": "需先到櫃台領取旅遊護照，內頁才有標註專屬連線密碼", "correct": false, "explanation": "WI-FI 資訊應在入住時直接口頭或透過卡套告知，密碼為固定值。"}, {"text": "入住後搜尋房號作為帳號，不需輸入任何密碼即可連線", "correct": false, "explanation": "飯店設有明確的密碼保護機制，並非無密碼連線。"}], "answer_index": 1}, {"id": "OP-FO-09-Q09", "stem": "在介紹茶水區與公共設施時，夥伴對於服務細節的掌握下列何者正確？", "difficulty": "", "options": [{"text": "八樓洗衣房提供洗衣機、烘衣機，並須投入代幣後方可使用", "correct": false, "explanation": "手冊中提到八樓公共設施（洗衣、烘衣等）皆讓客人免費使用。"}, {"text": "下午熱茶區固定提供黑糖薑母茶與歐式大吉嶺茶，不限季節", "correct": false, "explanation": "黑糖薑母茶標註為「冬季限定」。"}, {"text": "咖啡機的開放時間為 24 小時，隨時可至一樓享用", "correct": false, "explanation": "咖啡機開放時間為早上 $7$ 點至晚上 $10$ 點。"}, {"text": "若客人詢問茶類是否含咖啡因，應回答茶類仍會含有咖啡因成分", "correct": true, "explanation": "這是注意事項中針對客人特殊詢問的標準應答內容。"}, {"text": "微光書房的書籍僅能在轉角處閱讀，不可帶回房間", "correct": false, "explanation": "手冊註明有興趣的書本都可以帶回房內閱讀。"}], "answer_index": 3}, {"id": "OP-FO-09-Q10", "stem": "在引導客人進入電梯與完成入住流程時，兩位夥伴之間的協作標準為何？", "difficulty": "", "options": [{"text": "兩位夥伴都必須在電梯口列隊，鞠躬送客上樓", "correct": false, "explanation": "人力應有效分配，而非全部集中於電梯口。"}, {"text": "一位夥伴引導客人至茶水區領取檸檬水，另一位直接回櫃台作業", "correct": false, "explanation": "此選項忽略了關鍵的「電梯服務」協作細節。"}, {"text": "一位夥伴介紹房卡與設施，另一位可先幫客人將電梯下到一樓", "correct": true, "explanation": "這是提升服務效率的標準協作流程，減少客人等待電梯的時間。"}, {"text": "其中一位夥伴必須陪同客人進入電梯並送達其住房樓層", "correct": false, "explanation": "標準流程是引導至電梯門口並說「電梯這邊請，入住愉快」，非全程陪同上樓。"}, {"text": "必須等待客人點完早餐後，兩位夥伴再一起介紹心之光牆", "correct": false, "explanation": "各項介紹有先後順序，不需兩位夥伴同時進行導覽。"}], "answer_index": 2}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
