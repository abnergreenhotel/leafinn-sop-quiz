<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-07 入住接待標準作業指導書 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-07 入住接待標準作業指導書 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-07 入住接待標準作業指導書.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-07", "title": "入住接待標準作業指導書", "source_pdf": "03 SOP教材pdf檔/OP-FO-07 入住接待標準作業指導書.pdf", "questions": [{"id": "OP-FO-07-Q01", "stem": "當顧客表示有預訂但德安系統查無訂單，且確認為 WEB 沒下傳的訂單時，應如何處理？", "difficulty": "", "options": [{"text": "請顧客聯繫原訂房平台，櫃台不予處理", "correct": false, "explanation": "指導書指出若為 WEB 沒下傳，應嘗試直接下傳或手建新單，而非拒絕處理。"}, {"text": "若系統能下傳就直接下傳，若不能則手建新單", "correct": true, "explanation": "這是處理 WEB 漏單的標準作業流程，以確保顧客能順利辦理入住。"}, {"text": "請顧客取消原訂單並現場重新訂房", "correct": false, "explanation": "這會增加顧客的困擾，並非指導書建議的補救措施。"}, {"text": "立即致電德安系統商要求處理，請顧客在旁等候", "correct": false, "explanation": "第一時間應先解決顧客入住需求，系統問題可後續再行處理。"}], "answer_index": 1}, {"id": "OP-FO-07-Q02", "stem": "顧客於下午 $13:00$ 到達且希望提前入住，若房間已整理完畢，主管判斷需收費，依規定應加收多少費用？", "difficulty": "", "options": [{"text": "$100$ 元", "correct": false, "explanation": "加休費用的計費標準為每小時 $200$ 元。"}, {"text": "$200$ 元", "correct": false, "explanation": "應從標準入住時間 $15:00$ 逆推計算至 $13:00$，共計兩小時。"}, {"text": "$400$ 元", "correct": true, "explanation": "依指導書規定，加休時間為 $15:00$ 前逆推，一小時 $200$ 元，自 $13:00$ 起算為兩小時。"}, {"text": "$500$ 元", "correct": false, "explanation": "此金額不符合每小時 $200$ 元的計算標準。"}], "answer_index": 2}, {"id": "OP-FO-07-Q03", "stem": "關於大和停車場的補助與操作，下列敘述何者正確？", "difficulty": "", "options": [{"text": "補助至退房當天的下午 $15:00$", "correct": false, "explanation": "大和停車場的電腦消磁補助僅到退房當天的中午 $12:00$。"}, {"text": "進出須輸入相同的四位數字，且需在離場前告知櫃台消磁", "correct": true, "explanation": "這是大和停車場特有的電腦消磁作業流程與顧客須知。"}, {"text": "可以使用折抵券在繳費機掃描出場", "correct": false, "explanation": "使用折抵券的是 TIMES 或模範英才停車場，大和是使用電腦消磁。"}, {"text": "若要多次進出，每次皆由飯店全額補助", "correct": false, "explanation": "原則上每房每晚補助一次，多次短暫進出金額較少時可請客人自行付款。"}], "answer_index": 1}, {"id": "OP-FO-07-Q04", "stem": "若特約停車場皆已停滿，引導顧客前往「民權停車場」停放時，下列哪項指示是正確的？", "difficulty": "", "options": [{"text": "退房後將繳費收據拍照傳給飯店官方 LINE 即可", "correct": false, "explanation": "指導書明確要求需打上統編並回到櫃台請款。"}, {"text": "請顧客自行負擔費用，飯店僅提供地圖資訊", "correct": false, "explanation": "在特約停滿且顧客不再移車的情況下，飯店可提供報帳請款。"}, {"text": "請顧客繳費時務必打上統編，退房時再到櫃台請款", "correct": true, "explanation": "這是針對民權停車場（統聯對面）停滿時的標準補償處理流程。"}, {"text": "告知顧客僅補助路邊停車格，不補助私人收費停車場", "correct": false, "explanation": "若民權停車場也無法使用，才會請客人找路邊或其它停車場。"}], "answer_index": 2}, {"id": "OP-FO-07-Q05", "stem": "在辦理入住登記（Check-in）時，針對「外國顧客」必須額外留下哪一項資料？", "difficulty": "", "options": [{"text": "國外緊急聯絡人電話", "correct": false, "explanation": "指導書並未強調需留下國外緊急聯絡人電話。"}, {"text": "在台聯絡地址", "correct": false, "explanation": "指導書要求的關鍵聯繫資訊是電子郵件。"}, {"text": "E-MAIL", "correct": true, "explanation": "依據入住登記標準，外國顧客須在 R 卡資料中留下 E-MAIL 以供後續聯繫。"}, {"text": "護照影本掃描檔", "correct": false, "explanation": "雖然需查驗證件，但指導書中特別註明需在 R 卡上登記的是 E-MAIL。"}], "answer_index": 2}, {"id": "OP-FO-07-Q06", "stem": "若顧客原本有「預先授權」，但入住當天改用 Apple Pay 支付房費，應如何操作？", "difficulty": "", "options": [{"text": "直接將 Apple Pay 作為預先授權的完成交易", "correct": false, "explanation": "Apple Pay 若非實體卡，一律以銷售交易處理，不可與原授權關聯。"}, {"text": "請顧客聯繫銀行取消，飯店直接刷 Apple Pay 即可", "correct": false, "explanation": "飯店應主動向銀行申請取消預先授權，以釋放顧客的凍結額度。"}, {"text": "以銷售交易刷 Apple Pay，並主動申請取消原預先授權額度", "correct": true, "explanation": "更換支付方式（尤其是非實體卡）時，需取消原授權以免造成重複扣款誤會。"}, {"text": "拒絕更換支付方式，強制顧客使用原授權信用卡", "correct": false, "explanation": "指導書有提供更改付款方式的話術，顯示飯店接受變更支付方式。"}], "answer_index": 2}, {"id": "OP-FO-07-Q07", "stem": "在使用德安系統「入訂金」流程中，若顧客續住多日且希望「所有天數開在同一張發票」，發票開立方式應選取？", "difficulty": "", "options": [{"text": "後開", "correct": false, "explanation": "「後開」通常用於希望一天一張發票的情況。"}, {"text": "已開", "correct": true, "explanation": "依系統操作指南，若客人希望全部開一張發票，應選取「已開」。"}, {"text": "免開", "correct": false, "explanation": "除非特殊稅務狀況，否則住宿皆須開立發票，系統中無「免開」此項說明。"}, {"text": "待開", "correct": false, "explanation": "德安系統作業指導書中定義的選項為「後開」與「已開」。"}], "answer_index": 1}, {"id": "OP-FO-07-Q08", "stem": "在德安系統中完成入訂金與備註後，執行最後的 Check-in 步驟應在哪個頁面操作？", "difficulty": "", "options": [{"text": "訂房管理之訂房管理頁面", "correct": false, "explanation": "訂房管理是用於查詢與建立訂單，實際入住操作需至接待管理。"}, {"text": "接待管理之房間管理頁面的「預計 C/I 清單」", "correct": true, "explanation": "這是執行實體入住（CHECK IN）步驟的標準系統路徑。"}, {"text": "帳務管理之退房結帳頁面", "correct": false, "explanation": "帳務管理與入住流程不同，是在離店時使用。"}, {"text": "房務管理之房間狀況頁面", "correct": false, "explanation": "房務管理頁面主要用於查看清潔狀況，非入住登記的主要操作區。"}], "answer_index": 1}, {"id": "OP-FO-07-Q09", "stem": "若住客反應忘記帶房卡且房內「目前無人」，櫃台人員應如何處理？", "difficulty": "", "options": [{"text": "直接補發一張新卡給住客，請其自行回房", "correct": false, "explanation": "直接給卡有安全風險，應採取更謹慎的處理方式。"}, {"text": "要求住客在櫃台等待其他室友回來", "correct": false, "explanation": "在確認身份無誤後，應協助住客回房而非消極等待。"}, {"text": "核對訂房資訊無誤後，帶領客人上樓進房間", "correct": true, "explanation": "這是處理忘記帶卡且房內無人時的標準安全作業程序。"}, {"text": "請住客出示身分證件影本留存後，方可開啟房門", "correct": false, "explanation": "指導書強調的是核對姓名房號並由人員帶領上樓。"}], "answer_index": 2}, {"id": "OP-FO-07-Q10", "stem": "關於入訂金時在德安系統訂單備註的格式，下列何者符合規定？", "difficulty": "", "options": [{"text": "已收現 $3000$ 元", "correct": false, "explanation": "標準格式需包含「沖訂金編號」。"}, {"text": "沖 $2500001234$，統編", "correct": true, "explanation": "依規範，備註應打上「沖<訂金編號>，統編」，並刪除無用資訊。"}, {"text": "已付清，停車車號 $ABC-1234$", "correct": false, "explanation": "此資訊雖重要，但非系統入訂金流程中規定的備註格式。"}, {"text": "網路訂單已入帳", "correct": false, "explanation": "備註必須連結至德安系統產生的特定訂金編號。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
