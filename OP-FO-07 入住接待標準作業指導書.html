<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <title>OP-FO-07 入住接待標準作業指導書 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>

<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-07 入住接待標準作業指導書 教育訓練測驗</h1>

    </div>

    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-07", "title": "入住接待標準作業指導書", "source_pdf": "03 SOP教材pdf檔/OP-FO-07 入住接待標準作業指導書.pdf", "questions": [{"id": "OP-FO-07-Q01", "stem": "當顧客抵達櫃台但德安系統查無訂單，且確認為 WEB 訂單未下傳至後台時，櫃台夥伴應如何優先處理？", "difficulty": "", "options": [{"text": "請顧客聯繫訂房平台客服，等訂單同步後再辦理入住", "correct": false, "explanation": "指導書指出若有房且無帳款異常，應先處理顧客當下入住需求，而非要求顧客自行聯繫客服。"}, {"text": "若能下傳就直接下傳，若不能下傳則手建新單，先處理顧客入住需求", "correct": true, "explanation": "根據流程 3-2，應優先確保顧客能入住，後續再處理訂單同步問題。"}, {"text": "告知顧客因系統無資料，需請其重新支付全額房費後再入住", "correct": false, "explanation": "這會造成重複收款，流程規定只要確認有預訂且有房，應先滿足入住需求。"}, {"text": "直接引導顧客至未串單流程，要求出示付款證明後再開始查單", "correct": false, "explanation": "未串單流程是針對後台完全無紀錄時的備援方案，若已知是 WEB 未下傳則有特定處理路徑。"}, {"text": "請顧客在現場稍候，待工程部修復系統連線後再行處理", "correct": false, "explanation": "這會導致顧客等待時間過長，違反「先處理顧客當下需求」的服務原則。"}], "answer_index": 1}, {"id": "OP-FO-07-Q02", "stem": "一位顧客於下午 14:15 抵達飯店，此時該房型已有清掃完畢的房間，櫃台夥伴應如何應對？", "difficulty": "", "options": [{"text": "告知入住時間為 15:00，請顧客先在休息區等待至整點入住", "correct": false, "explanation": "指導書規定 14:00-15:00 期間若房況允許，可提供彈性。"}, {"text": "向顧客說明入住時間為 15:00，但因房間已整理好，可免費提早提供，並順帶推好評", "correct": true, "explanation": "流程 1-1 明確指出此時段房好可先行給客入住（FREE），並可藉此推廣好評。"}, {"text": "依照規範向顧客收取提早入住費用（一小時 $200）", "correct": false, "explanation": "收費通常針對 14:00 以前的特殊狀況或加休需求，14:00-15:00 若有空房應採彈性免費處理。"}, {"text": "直接將房卡交給顧客，不需特別提到入住時間規範", "correct": false, "explanation": "應主動說明飯店規範並強調此為提早服務，以增加顧客好感度。"}, {"text": "告知顧客需加收半小時的早進費用才能領取房卡", "correct": false, "explanation": "流程中並未規定 14:00 後需按分鐘計費，且 14:00-15:00 有房時可免費入住。"}], "answer_index": 1}, {"id": "OP-FO-07-Q03", "stem": "若飯店特約停車場皆已停滿，櫃台夥伴引導顧客停至「民權停車場」時，應提醒顧客哪些退房時的注意事項？", "difficulty": "", "options": [{"text": "請顧客自行負擔費用，飯店不提供補助", "correct": false, "explanation": "特約停滿時，飯店可專案處理民權停車場的費用請款。"}, {"text": "請顧客在離場前先回櫃台領取停車券，否則無法折抵", "correct": false, "explanation": "民權停車場不使用飯店折抵券，而是採取憑證請款模式。"}, {"text": "請顧客在退房繳費時打上飯店統編，憑單據到櫃台請款房費補助", "correct": true, "explanation": "停車指引注意事項 1 明確要求民權停車場需繳費並打上統編再回櫃台請款。"}, {"text": "告知顧客民權停車場僅能停放至隔日中午 12 點，逾時不候", "correct": false, "explanation": "12 點限制是針對「大和」停車場的系統消磁，非針對民權停車場的請款規定。"}, {"text": "提醒顧客必須輸入四位數字才能出場", "correct": false, "explanation": "輸入四位數字是「大和」停車場的進出規則，民權停車場流程不同。"}], "answer_index": 2}, {"id": "OP-FO-07-Q04", "stem": "關於「大和停車場」的折抵與使用規則，下列敘述何者正確？", "difficulty": "", "options": [{"text": "大和停車場提供 24 小時無限制進出折抵", "correct": false, "explanation": "大和停車場補助僅到退房當日中午 12 點，非 24 小時。"}, {"text": "顧客離場前需自行在機器輸入車號，不需回報櫃台", "correct": false, "explanation": "流程指出離場前須先告知櫃台，以便進行電腦消磁。"}, {"text": "大和停車場使用電腦消磁，進出須輸入相同之四位數字", "correct": true, "explanation": "根據停車指引 1，大和使用電腦消磁並需輸入相同的四位數字進出。"}, {"text": "大和停車場若超過 12 點，系統會自動續約至下午 3 點", "correct": false, "explanation": "系統於 12 點會自動消磁，12 點後費用需由顧客自行繳納。"}, {"text": "若顧客忘記四位數字，夥伴應請顧客直接撥打 0809 服務專線", "correct": false, "explanation": "0809 專線是 TIMES 停車場的聯絡電話，大和停車場應詢問車號並打給廠商協助。"}], "answer_index": 2}, {"id": "OP-FO-07-Q05", "stem": "顧客辦理入住登記（R卡）時，對於外籍旅客，哪一項資料是必須特別留存的？", "difficulty": "", "options": [{"text": "在台緊急聯絡人電話", "correct": false, "explanation": "指導書中未強制要求留存緊急聯絡人，但有規定其他通訊方式。"}, {"text": "外籍旅客必須留下 E-MAIL 地址", "correct": true, "explanation": "流程 3-1 註明外國顧客須留下 E-MAIL。"}, {"text": "旅客在母國的詳細居住地址", "correct": false, "explanation": "流程中僅要求國籍、生日、姓名等基本資訊，未特別強調母國地址。"}, {"text": "旅客的職業與入境事由", "correct": false, "explanation": "指導書規範的必要資訊包含基本個資，不包含職業調查。"}, {"text": "旅客護照正本需留存在櫃台直到退房", "correct": false, "explanation": "飯店僅需借證件登記資料，不得留置旅客證件正本。"}], "answer_index": 1}, {"id": "OP-FO-07-Q06", "stem": "若顧客原本已有信用卡預先授權（Pre-auth），入住時欲改用「Apple Pay」支付房費，櫃台應如何處理？", "difficulty": "", "options": [{"text": "直接在預先授權清單中點選取消，然後請顧客感應 Apple Pay", "correct": false, "explanation": "取消預授權後，Apple Pay 應以「銷售交易」方式進行，而非單純感應。"}, {"text": "向銀行申請預授權轉入帳，並請顧客輸入 Apple Pay 密碼", "correct": false, "explanation": "Apple Pay 綁定的虛擬卡號不同，無法直接執行預授權轉入帳（Capture）。"}, {"text": "預先授權須取消額度，且改用「銷售交易」刷入房費", "correct": true, "explanation": "收款流程 2-2 註明若非實體卡（如 Apple Pay），一律以銷售交易處理，且須取消原預先授權以免重複佔額。"}, {"text": "告知顧客預先授權後不能更改支付方式，必須刷原卡", "correct": false, "explanation": "顧客有權更改付款方式，櫃台應協助處理退還額度與新入帳。"}, {"text": "請顧客聯繫發卡銀行將預先授權金額轉為 Apple Pay 紀錄", "correct": false, "explanation": "銀行端無法直接跨卡種轉換授權，必須由櫃台執行取消與重刷。"}], "answer_index": 2}, {"id": "OP-FO-07-Q07", "stem": "在德安系統「入訂金流程」中，若顧客希望「每一天開立一張發票」，發票開立方式應選擇何種選項？", "difficulty": "", "options": [{"text": "選「已開」", "correct": false, "explanation": "「已開」通常用於全部合開一張的情況。"}, {"text": "選「不開」", "correct": false, "explanation": "不論何種方式皆須開立發票，除非是特定免稅或折讓情況。"}, {"text": "選「後開」", "correct": true, "explanation": "德安系統操作流程 2-1 指出，一天的發票（或客人希望一天一張）選「後開」。"}, {"text": "選「續開」", "correct": false, "explanation": "系統選項中並無「續開」這一項流程指示。"}, {"text": "選「彙開」", "correct": false, "explanation": "「彙開」並非指導書中針對一天一張發票所指定的標準操作選項。"}], "answer_index": 2}, {"id": "OP-FO-07-Q08", "stem": "顧客反應忘記帶房卡且房內無人時，夥伴核對身分無誤後的正確流程為何？", "difficulty": "", "options": [{"text": "直接在櫃台製作一張新房卡交給顧客", "correct": false, "explanation": "指導書中關於忘記帶房卡的處理方式是「帶客上樓」，非直接補發卡。"}, {"text": "核對無誤後，請顧客在櫃台簽名具結後自行上樓", "correct": false, "explanation": "為了安全，應由夥伴引導。流程規定需確認房內是否有人，再帶客上樓。"}, {"text": "請顧客撥打電話給同房室友，若無法聯繫則不能開門", "correct": false, "explanation": "若身分核對正確且房內無人，飯店應協助開門入住。"}, {"text": "確認訂房姓名及房號，核對無誤並確認房內無人後，帶客人上樓進房間", "correct": true, "explanation": "這是「忘記帶房卡」作業標準流程三的標準步驟。"}, {"text": "要求顧客支付房卡工本費後，由房務人員送卡至房門口", "correct": false, "explanation": "此情境為「忘記帶卡」而非「損毀/遺失補發」，不應收費且應由櫃台人員帶領。"}], "answer_index": 3}, {"id": "OP-FO-07-Q09", "stem": "在德安系統執行 CHECK IN 步驟時，若遇到一筆訂單有多間房間的情況，下列注意事項何者正確？", "difficulty": "", "options": [{"text": "系統會自動批次處理，不需逐一確認入住狀況", "correct": false, "explanation": "多房訂單若非同時 Check In，須避免忘記處理未抵達的房間。"}, {"text": "必須確認是否全部同時 CHECK IN，若非同時須避免忘記", "correct": true, "explanation": "德安 CHECK IN 步驟注意事項 1 特別強調多間房非同時入住時的提醒。"}, {"text": "只需將第一間房點選 CHECK IN，系統會自動聯動其他房間", "correct": false, "explanation": "系統操作需勾選欲入住的房間，不會自動聯動所有狀態。"}, {"text": "多筆訂單時，僅需針對主訂單進行 CHECK IN 操作", "correct": false, "explanation": "注意事項 2 提到若是多筆訂單，需確認皆有 CHECK IN。"}, {"text": "若有房間尚未清掃，系統會強制鎖定整筆訂單無法入住", "correct": false, "explanation": "系統通常允許個別房間操作，且指導書強調需判別房況，非由系統完全封鎖。"}], "answer_index": 1}, {"id": "OP-FO-07-Q10", "stem": "顧客刷卡付費後，關於簽單簽名的規定，下列敘述何者最符合飯店會計要求？", "difficulty": "", "options": [{"text": "只要卡片感應成功，即便沒有簽名也完全沒關係", "correct": false, "explanation": "雖然刷卡機可能免簽，但飯店會計仍有核對需求。"}, {"text": "請顧客在 R 卡背面簽名即可，不需在簽單上簽名", "correct": false, "explanation": "R 卡與刷卡簽單是不同的會計憑證，不能混用。"}, {"text": "告知顧客雖為免簽，但會計核對需要，仍請於空白處簽名確認", "correct": true, "explanation": "收款流程 4 之話術明確說明，因會計核對身分需求，仍需請客人簽名。"}, {"text": "若使用國旅卡則強制必須核對身分證後才能免簽", "correct": false, "explanation": "指導書對國旅卡僅提到刷額度，簽名規定一體適用於刷卡簽單。"}, {"text": "簽單必須請顧客簽署全名，不可使用草寫或蓋章", "correct": false, "explanation": "流程中未限制簽名形式，僅強調需進行「簽名確認」。"}], "answer_index": 2}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
