<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-01 站點整備 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-01 站點整備 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-01 站點整備.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-01", "title": "站點整備", "source_pdf": "03 SOP教材pdf檔/OP-FO-01 站點整備.pdf", "questions": [{"id": "OP-FO-01-Q01", "stem": "在執行「櫃台環境檢查」時，除了確認桌面無雜物外，下列哪一項也是該項目的執行重點？", "difficulty": "", "options": [{"text": "確認當日所有客房的維修狀態", "correct": false, "explanation": "維修狀態屬於作業日誌與當日重點掌握的範疇，而非環境檢查的基礎內容。"}, {"text": "清點房卡與停車券的剩餘數量", "correct": false, "explanation": "備品清點屬於獨立的第二項作業，與環境整潔的初步巡視不同。"}, {"text": "確保燈光、音樂與空調符合營運需求", "correct": true, "explanation": "環境檢查不僅包含視覺的整潔，也包含氛圍控制與硬體設施（如空調、門口狀態）的營運設定。"}, {"text": "測試 PMS 系統與刷卡機功能", "correct": false, "explanation": "設備功能測試是環境檢查之後的專門程序，旨在確保軟硬體連線正常。"}, {"text": "回報當班可正式接待客人的狀態", "correct": false, "explanation": "回報正式接待是開站流程的最後一個步驟，而非環境檢查的一部分。"}], "answer_index": 2}, {"id": "OP-FO-01-Q02", "stem": "關於備品清點與補充的原則，下列敘述何者正確？", "difficulty": "", "options": [{"text": "為避免浪費，應等到顧客提出需求時再行補充", "correct": false, "explanation": "標準規範要求備品不足需當班即時補充，避免在顧客使用時才處理，以維護服務效率。"}, {"text": "清點項目僅限房卡與發票紙，其他文具由行政人員處理", "correct": false, "explanation": "櫃台夥伴需清點包含租借表單、寄物牌、地圖與文具在內的所有常用備品。"}, {"text": "備品清點僅需在夜間時段進行，開站時不需執行", "correct": false, "explanation": "開站整備流程明確要求在上班後需進行備品與文件清點，以應對當日營運。"}, {"text": "若發現備品不足，應先補足至規定的安全庫存量", "correct": true, "explanation": "維持安全庫存是備品管理的關鍵，能確保在突發高需求量時仍有足夠資源服務顧客。"}, {"text": "文件清點只需確認是否有發票紙，敏感文件不在此限", "correct": false, "explanation": "敏感文件的處理主要在環境檢查中確保不外露，且所有常用表單皆在清點範疇內。"}], "answer_index": 3}, {"id": "OP-FO-01-Q03", "stem": "若在「設備功能確認」階段發現刷卡機連線異常，應如何處理最符合 SOP？", "difficulty": "", "options": [{"text": "先行測試基本排除並立即回報主管", "correct": true, "explanation": "發現異常時需具備初步排除能力並同步通報，以避免問題拖延至營運高峰期。"}, {"text": "先處理顧客退房，等空閒時再行報修", "correct": false, "explanation": "規範中強調不可等到尖峰時段再處理異常，以免影響現場服務順暢度。"}, {"text": "不需理會，直接交由資訊人員定期維護即可", "correct": false, "explanation": "站點整備要求開站前需確認所有設備正常，不應將現有故障留待後續維護。"}, {"text": "僅需重啟 PMS 系統，因為刷卡機異常通常是系統問題", "correct": false, "explanation": "排除動作應針對異常設備本身（刷卡機），且需有測試與回報的完整動作。"}, {"text": "自行拆解設備檢查線路，不需麻煩主管", "correct": false, "explanation": "規範要求的是基本排除與回報，過度的自行拆修可能導致設備損壞。"}], "answer_index": 0}, {"id": "OP-FO-01-Q04", "stem": "在「交班紀錄簿閱讀」項目中，若夥伴尚未讀完前一班的紀錄，應如何行動？", "difficulty": "", "options": [{"text": "可以先幫現場排隊的客人辦理入住，事後再補讀", "correct": false, "explanation": "規範明確規定未讀交班紀錄者不得直接接手櫃台，以避免資訊斷層導致服務錯誤。"}, {"text": "請前一班夥伴口頭快速帶過即可，不需閱讀文字", "correct": false, "explanation": "閱讀文字紀錄包含未完成案件與特殊細節，口頭摘要容易遺漏重要帳務或客訴提醒。"}, {"text": "必須詳讀完畢後，方可正式接手櫃台事務", "correct": true, "explanation": "確保對前一班遺留案件、VIP 與特殊房況有完整掌握，是提供延續性服務的基礎。"}, {"text": "只需閱讀關於「客訴」的部分，其餘維修資訊可略過", "correct": false, "explanation": "閱讀範疇包含交接事項、未完成案件、房況、帳務與停車等多個層面。"}, {"text": "若前一班表示「沒事」，即可不閱讀直接簽名", "correct": false, "explanation": "即使前班表示無事，接班者仍有責任檢視完整紀錄以確認無漏掉的細節。"}], "answer_index": 2}, {"id": "OP-FO-01-Q05", "stem": "夥伴在詢問前班同事：「請問今天有什麼重要事項需要交接的嗎？」時，其核心目的為何？", "difficulty": "", "options": [{"text": "為了練習標準禮儀話術", "correct": false, "explanation": "話術只是溝通工具，其核心目的在於確保服務資訊的無縫接軌。"}, {"text": "確認是否有需要提前安排的顧客需求或特殊活動", "correct": true, "explanation": "透過主動詢問與紀錄閱讀，能掌握當日重點並預先為顧客需求做準備。"}, {"text": "核對當日出勤人數是否正確", "correct": false, "explanation": "交接的核心在於業務執行細節與顧客相關事務，而非行政考勤。"}, {"text": "確認前班夥伴是否有準時下班", "correct": false, "explanation": "這句話術專注於工作內容的傳承，並非監督同事的差勤狀態。"}, {"text": "僅為了確認停車場是否還有空位", "correct": false, "explanation": "停車雖然是交接內容之一，但並非該詢問動作的唯一核心目的。"}], "answer_index": 1}, {"id": "OP-FO-01-Q06", "stem": "關於「作業日誌與當日重點掌握」的注意事項，下列哪一項做法不正確？", "difficulty": "", "options": [{"text": "整合判讀當日重點與交班事項", "correct": false, "explanation": "這是標準要求，必須將不同來源的資訊整合分析而非單看單一紀錄。"}, {"text": "僅閱讀當日退房名單，忽略團體與特殊活動資訊", "correct": true, "explanation": "作業日誌要求全面掌握住房、退房、團體、活動與維修等多項重點，不可偏廢。"}, {"text": "確認是否有須提前安排的顧客需求", "correct": false, "explanation": "這是掌握重點後的關鍵應用，屬於正確的服務準備流程。"}, {"text": "檢視主管在日誌中的提醒事項", "correct": false, "explanation": "主管提醒通常涉及營運調整或重要方針，是每日必讀項目。"}, {"text": "將重要案件再次記錄於個人工作清單中", "correct": false, "explanation": "這有助於確保在忙碌的執行過程中不會遺漏關鍵的交辦任務。"}], "answer_index": 1}, {"id": "OP-FO-01-Q07", "stem": "執行「開站完成確認」的最後一個動作應為何？", "difficulty": "", "options": [{"text": "立即開始整理前一日的帳務資料", "correct": false, "explanation": "帳務處理並非開站確認的最後動作，通常是交接或營運中的專門任務。"}, {"text": "回報當班可正式接待", "correct": true, "explanation": "完成所有檢查項目的最後一步是正式宣告狀態，讓團隊知道櫃台已準備就緒。"}, {"text": "關閉所有的走廊燈光以節省電源", "correct": false, "explanation": "環境檢查已要求燈光需符合營運需求，隨意關燈可能違反服務標準。"}, {"text": "重新清點一次所有的備品庫存", "correct": false, "explanation": "備品清點在第二步驟已完成，最後步驟不需要重複執行同一動作。"}, {"text": "檢查個人手機訊息是否有私事待辦", "correct": false, "explanation": "開站程序中應確保桌面無私人物品，處理私事不屬於標準作業流程。"}], "answer_index": 1}, {"id": "OP-FO-01-Q08", "stem": "若你在值勤期間發現大廳門口有客人的垃圾，而你已經在早晨完成「開站整備」，你該如何處理？", "difficulty": "", "options": [{"text": "不需理會，因為環境檢查在開站時已通過", "correct": false, "explanation": "規範強調開站完成不代表後續可忽略巡檢，需持續維持環境整潔。"}, {"text": "等待下一班交接時再請接班夥伴處理", "correct": false, "explanation": "這違反了當班即時維護的原則，會導致服務品質下降。"}, {"text": "持續補強並維持環境整潔，即時清理", "correct": true, "explanation": "值勤中若發現環境異常，應秉持持續維持的精神進行補強，確保隨時處於最佳狀態。"}, {"text": "記錄在交班簿上即可，不需動手清理", "correct": false, "explanation": "現場問題應立即解決，僅做記錄而未改善會影響當下的顧客體驗。"}, {"text": "請清潔人員在下一次固定清掃時間再來處理", "correct": false, "explanation": "櫃台夥伴負有巡視與維持環境整潔的責任，不可完全依賴固定清掃。"}], "answer_index": 2}, {"id": "OP-FO-01-Q09", "stem": "在「備品與文件清點」中，哪一項物品的補給不需要達到「安全庫存」？", "difficulty": "", "options": [{"text": "美食護照", "correct": false, "explanation": "美食護照屬於常用備品，必須維持足夠數量。"}, {"text": "發票紙", "correct": false, "explanation": "發票紙是營運必需品，若不足會導致交易中斷，必須維持庫存。"}, {"text": "所有列出的常用備品皆需補足至安全庫存", "correct": true, "explanation": "SOP 明確指出包含房卡、表單、文具等在內的所有常用備品，若不足皆需補至安全庫存。"}, {"text": "僅有房卡需要維持庫存，文具不需要", "correct": false, "explanation": "文具亦被歸類在常用備品中，同樣需要清點與補充。"}, {"text": "顧客寄放的行李", "correct": false, "explanation": "寄放行李是服務項目而非「清點補給」的耗材備品，題目語境不符。"}], "answer_index": 2}, {"id": "OP-FO-01-Q10", "stem": "針對「敏感文件外露」的檢查，主要是在防範下列哪種風險？", "difficulty": "", "options": [{"text": "防止文件被空調吹散", "correct": false, "explanation": "雖然也是問題，但環境檢查強調的是「敏感性」，與資訊安全或隱私較相關。"}, {"text": "確保顧客資訊隱私與營運機密不被窺視", "correct": true, "explanation": "櫃台桌面是顧客可見區域，不應放置包含個資或敏感資訊的表單，以符合專業標準。"}, {"text": "減少櫃台人員尋找文件的時間", "correct": false, "explanation": "這是組織管理的益處，但檢查「敏感文件」的主因是安全防護。"}, {"text": "確保文件有足夠的空白處可以寫字", "correct": false, "explanation": "這屬於文件的可用性，而非環境檢查中提到的「外露」問題。"}, {"text": "避免文件被陽光曬到褪色", "correct": false, "explanation": "此說法與酒店營運環境的實務操作無關。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
