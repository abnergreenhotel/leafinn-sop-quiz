<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-28 寄售商品作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-28 寄售商品作業 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-28 寄售商品作業.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-28", "title": "寄售商品作業", "source_pdf": "03 SOP教材pdf檔/OP-FO-28 寄售商品作業.pdf", "questions": [{"id": "OP-FO-28-Q01", "stem": "在處理「展覽合作」商品的銷售時，下列關於付款方式的敘述何者正確？", "difficulty": "", "options": [{"text": "僅限使用現金支付", "correct": true, "explanation": "根據流程規範，展覽合作商品僅能接受現金付款，後續再由櫃台補入德安系統。"}, {"text": "可選擇信用卡或現金支付", "correct": false, "explanation": "作業規範中特別強調此類商品客方僅能使用現金，不可使用信用卡或其他電子支付。"}, {"text": "統一由旅客退房時掛帳處理", "correct": false, "explanation": "文件註記展覽合作商品需收現並放入當班帳包，並非一律掛帳處理。"}, {"text": "僅接受行動支付以利系統對帳", "correct": false, "explanation": "作業指南明確指出只能使用現金，並非行動支付。"}, {"text": "視合作商要求決定支付方式", "correct": false, "explanation": "SOP 已統一規定為現金支付，而非彈性視情況決定。"}], "answer_index": 0}, {"id": "OP-FO-28-Q02", "stem": "進行「扣商品庫存」作業時，第一步操作程序為何？", "difficulty": "", "options": [{"text": "開啟雲端資料夾", "correct": true, "explanation": "扣庫存的標準作業流程起始於開啟雲端資料夾以進行後續資料登錄。"}, {"text": "直接在德安系統修改數量", "correct": false, "explanation": "德安系統主要用於入帳，庫存扣除需先透過雲端資料夾進行記錄。"}, {"text": "致電主管核准扣額", "correct": false, "explanation": "扣庫存為一般銷售程序，除非商品破損，否則不需每筆都致電主管。"}, {"text": "填寫紙本領用清單", "correct": false, "explanation": "作業流程中使用的是雲端資料夾，而非傳統紙本清單。"}, {"text": "掃描商品條碼", "correct": false, "explanation": "根據手冊指示，庫存管理是透過搜尋品項名稱後手動輸入購買數量。"}], "answer_index": 0}, {"id": "OP-FO-28-Q03", "stem": "若商品發生損壞導致無法販售，櫃台人員應如何應對？", "difficulty": "", "options": [{"text": "請客人直接照價賠償，並視情況請主管處理", "correct": true, "explanation": "流程規定當商品損壞時應請客人按原價賠償，且必要時須介入管理職權。"}, {"text": "自行吸收損失，將商品直接報廢", "correct": false, "explanation": "手冊中明確要求需向客人提出照價賠償，並非直接報廢處理。"}, {"text": "將損壞商品退回給原廠商", "correct": false, "explanation": "損壞賠償應由現場責任歸屬方（如客人）負擔，而非直接退回廠商。"}, {"text": "以五折價格促銷售出", "correct": false, "explanation": "文件指出損壞商品已「無法販售」，故不應以促銷方式處理。"}, {"text": "請客人自行聯繫廠商維修", "correct": false, "explanation": "飯店應直接與客人對接賠償事宜，而非讓客人聯繫廠商。"}], "answer_index": 0}, {"id": "OP-FO-28-Q04", "stem": "在德安飯店前台系統中進行入帳時，進入「旅客帳處理」前的正確路徑為何？", "difficulty": "", "options": [{"text": "接待管理 ⮕ 房間管理 ⮕ 找到該名旅客後按右鍵", "correct": true, "explanation": "這是德安系統中定位特定旅客並進行帳務操作的標準導航步驟。"}, {"text": "財務管理 ⮕ 應收帳款 ⮕ 旅客查詢", "correct": false, "explanation": "作業指南指定路徑為接待管理下的房間管理，而非財務管理模組。"}, {"text": "系統設定 ⮕ 參數維護 ⮕ 帳務設定", "correct": false, "explanation": "入帳屬於日常接待流程，不涉及系統層級的參數維護。"}, {"text": "櫃台結帳 ⮕ 日結作業 ⮕ 消費錄入", "correct": false, "explanation": "日結作業是收班時的操作，銷售入帳需在房間管理中即時處理。"}, {"text": "訂房管理 ⮕ 訂單查詢 ⮕ 旅客名單", "correct": false, "explanation": "雖然訂房管理有旅客名單，但手冊指定的操作入口是房間管理。"}], "answer_index": 0}, {"id": "OP-FO-28-Q05", "stem": "根據作業指導書，關於「電子發票列印」的特殊規定為何？", "difficulty": "", "options": [{"text": "只有二館需要進行此步驟", "correct": true, "explanation": "流程中特別標註只有二館在結帳完成後需要點選列印電子發票。"}, {"text": "所有分館皆必須列印紙本發票", "correct": false, "explanation": "指導書中明確標註「只有二館要」，表示這並非所有分館的共通程序。"}, {"text": "僅限於購買展覽商品時列印", "correct": false, "explanation": "列印發票的規範是與館別掛鉤，而非與商品類別掛鉤。"}, {"text": "若客人不索取則不需點選列印", "correct": false, "explanation": "程序上要求特定館別須點選確定，並非視客人意願決定。"}, {"text": "每月結帳時統一補開", "correct": false, "explanation": "發票是在銷售入帳、結帳流程的最後一步即時處理的。"}], "answer_index": 0}, {"id": "OP-FO-28-Q06", "stem": "當客人購買展覽合作商品後，收取的現金應如何保管？", "difficulty": "", "options": [{"text": "放在當班帳包內即可", "correct": true, "explanation": "作業標準是將展覽商品收到的現金存放在當班的帳包中，以利後續對帳。"}, {"text": "直接存入銀行自動存款機", "correct": false, "explanation": "飯店現金流管理需先入帳包統計，而非由個別櫃台人員直接存款。"}, {"text": "暫存於櫃台抽屜，下班交給警衛", "correct": false, "explanation": "帳務現金應放入專用的帳包內，而非隨意存放在抽屜或移交給非會計/主管人員。"}, {"text": "交給原展覽合作商帶回", "correct": false, "explanation": "現金應先保留在館內，待月結後再由會計與廠商進行結算。"}, {"text": "換成零錢存入櫃台零用金", "correct": false, "explanation": "這是銷售收入而非零用金撥補，應獨立放入帳包保管。"}], "answer_index": 0}, {"id": "OP-FO-28-Q07", "stem": "月結作業的主要流程中，主管的角色負責下列哪一項任務？", "difficulty": "", "options": [{"text": "與廠商盤點核對並結算銷售金額", "correct": true, "explanation": "主管需每月定期與廠商對帳並結算，完成後再將資料提供給會計。"}, {"text": "負責將每筆交易登入德安系統", "correct": false, "explanation": "系統入帳通常由銷售當下的櫃台人員負責，而非主管在月結時補做。"}, {"text": "代表飯店支付現金給廠商", "correct": false, "explanation": "主管負責對帳與結算，最終的款項撥付通常由會計或財務部門執行。"}, {"text": "向客人追討破損賠償費用", "correct": false, "explanation": "這是發生損壞時的即時處理，並非月結作業的常態內容。"}, {"text": "親自補齊所有客房備品庫存", "correct": false, "explanation": "備品補齊是日常營運事項，月結重點在於與外部廠商的帳務核對。"}], "answer_index": 0}, {"id": "OP-FO-28-Q08", "stem": "在德安系統中，「入帳」之後至「結帳」之前的關鍵動作為何？", "difficulty": "", "options": [{"text": "選擇付款方式為現金", "correct": true, "explanation": "在入帳程序完成後，必須點選結帳並選擇「現金」作為付款方式。"}, {"text": "重新確認雲端資料夾數量", "correct": false, "explanation": "庫存扣除是在入帳前完成的步驟，結帳時應專注於系統內的帳務操作。"}, {"text": "列印銷售報表", "correct": false, "explanation": "報表通常在日結或月結才產生，單筆結帳時不需要此動作。"}, {"text": "請主管刷授權卡", "correct": false, "explanation": "標準流程中並未提到一般商品銷售結帳需要主管授權卡。"}, {"text": "將商品包裝並交給客人", "correct": false, "explanation": "這是實體交付動作，此題考點在於德安系統內的操作邏輯步驟。"}], "answer_index": 0}, {"id": "OP-FO-28-Q09", "stem": "為何在德安系統入帳的「備註」欄位需寫上賣出商品名稱？", "difficulty": "", "options": [{"text": "以利主管進行對帳核對", "correct": true, "explanation": "在備註欄標記商品名稱是為了讓主管在後續查帳時能明確對應銷售品項。"}, {"text": "方便會計開立收據給客人", "correct": false, "explanation": "發票/收據是根據系統消費項生成的，備註主要是用於內部核對。"}, {"text": "作為廠商的保固憑證", "correct": false, "explanation": "備註內容主要對應內部對帳，而非提供給客人的保固文件。"}, {"text": "紀錄客人的購物偏好", "correct": false, "explanation": "這是帳務處理流程，主要目的是財務核銷，而非顧客關係管理(CRM)。"}, {"text": "避免重複計價", "correct": false, "explanation": "避免重計是透過系統數量控制，備註是為了審核方便。"}], "answer_index": 0}, {"id": "OP-FO-28-Q10", "stem": "關於庫存管理，作業流程中規定應多久執行一次「定期補齊商品庫存」？", "difficulty": "", "options": [{"text": "未明訂天數，但需定期執行", "correct": true, "explanation": "手冊中僅註明「需定期補齊商品庫存」，並未硬性規定每日或每週。"}, {"text": "每小時檢查一次", "correct": false, "explanation": "過於頻繁且手冊未如此要求，只需確保庫存充足即可。"}, {"text": "只有在主管交辦時才執行", "correct": false, "explanation": "這是櫃台的常態性注意項目，不應被動等待指示。"}, {"text": "每個月結帳後才補一次", "correct": false, "explanation": "庫存若等到月結才補，可能會造成平日銷售的中斷。"}, {"text": "當客人詢問時才去確認", "correct": false, "explanation": "應主動定期補齊，以確保現場隨時有貨可售。"}], "answer_index": 0}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
