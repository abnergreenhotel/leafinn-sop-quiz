<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-15 訪客接待流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-15 訪客接待流程 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-15 訪客接待流程.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-15", "title": "訪客接待流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-15 訪客接待流程.pdf", "questions": [{"id": "OP-FO-15-Q01", "stem": "當訪客抵達櫃台時，夥伴首先應採取的標準服務態度與動作為何？", "difficulty": "", "options": [{"text": "保持坐姿並直接詢問訪客是否與住客有約", "correct": false, "explanation": "指導書規範應起身接待，且應以親切詢問代替直接質疑。"}, {"text": "起身、微笑並親切禮貌地詢問訪客的需求", "correct": true, "explanation": "這符合指導書中對接待態度的要求，強調主動服務與建立良好第一印象。"}, {"text": "先查詢系統內是否有當日的訪客備註，再決定是否起身", "correct": false, "explanation": "無論是否有備註，接待的基本動作皆應為起身與微笑，而非先查閱電腦。"}, {"text": "觀察訪客衣著與神態，若有疑慮則聯繫主管處理", "correct": false, "explanation": "規範中強調切勿讓顧客感受到被質疑的感覺，應先進行標準禮貌詢問。"}, {"text": "遞給訪客訪客登記表，請其先自行填寫基本資料", "correct": false, "explanation": "指導書中並未提及先填表，而是應由夥伴主動詢問如何協助。"}], "answer_index": 1}, {"id": "OP-FO-15-Q02", "stem": "若住客已事先告知有朋友來訪，訪客報上顧客全名後，夥伴應如何處理？", "difficulty": "", "options": [{"text": "直接告知訪客房間號碼並指引電梯位置", "correct": false, "explanation": "這違反了隱私原則，不應直接透露房號，且需先徵得住客同意。"}, {"text": "核對訪客證件，確認無誤後自行協助感應電梯讓客上樓", "correct": false, "explanation": "流程規定即使住客已告知，仍需致電客房確認訪客已到達。"}, {"text": "致電客房，在顧客同意後再協助感應電梯讓訪客上樓", "correct": true, "explanation": "這是標準作業流程，確保住客在當下確實準備好接待並同意放行。"}, {"text": "請訪客在沙發區稍坐，待住客下樓親自帶領", "correct": false, "explanation": "指導書規定是致電客房並協助訪客上樓，而非強制住客下樓。"}, {"text": "詢問住客手機，由夥伴代為撥打住客手機確認", "correct": false, "explanation": "流程明確標註是致電「顧客房間」，而非撥打手機。"}], "answer_index": 2}, {"id": "OP-FO-15-Q03", "stem": "在詢問訪客身分時，哪一項話術最符合作業指導書的規範？", "difficulty": "", "options": [{"text": "「請問您有預約嗎？我們需要確認您的身分。」", "correct": false, "explanation": "此說法較為生硬，可能讓顧客感受到被質疑。"}, {"text": "「請問您是要找哪一位住客？請問您的大名？」", "correct": false, "explanation": "雖然包含了目的，但語氣不若標準話術溫和。"}, {"text": "「好的，為您查詢，請問怎麼稱呼您，是顧客的哪位呢？」", "correct": true, "explanation": "此話術同時完成了身分確認與關係詢問，且語氣溫馨有禮。"}, {"text": "「由於隱私規定，請您先報上住客的全名與手機後三碼。」", "correct": false, "explanation": "指導書中的標準話術並無包含要求訪客提供住客手機號碼。"}, {"text": "「住客現在可能在休息，您方便留個電話我幫您轉達嗎？」", "correct": false, "explanation": "這屬於預設拒絕的立場，並非標準的查詢流程。"}], "answer_index": 2}, {"id": "OP-FO-15-Q04", "stem": "當訪客欲找尋的住客「並未」特別提到有朋友來訪時，櫃台應如何回覆訪客？", "difficulty": "", "options": [{"text": "「您好，目前住客沒有交代有朋友，請您親自聯繫他。」", "correct": false, "explanation": "直接承認有此住客會洩漏住客隱私。"}, {"text": "「您好，目前沒有查詢到訂單耶。」", "correct": true, "explanation": "這是為了保護住客隱私的標準回覆，不確認也不否認住客是否存在。"}, {"text": "「您好，很抱歉，基於個資法我們不能透漏住客資訊。」", "correct": false, "explanation": "過於生硬的法條回覆會降低服務溫度。"}, {"text": "「好的，幫您試試看撥打房內電話，若沒人接聽請您離開。」", "correct": false, "explanation": "若未預約且無訂單資訊，不應隨意撥打電話打擾住客。"}, {"text": "「目前系統顯示該住客正在休息，請稍後再來。」", "correct": false, "explanation": "這間接透露了住客確實在店內，違反隱私保護原則。"}], "answer_index": 1}, {"id": "OP-FO-15-Q05", "stem": "若住客設定為「請勿打擾」狀態，當有訪客找尋該位住客時，正確的應對方式為何？", "difficulty": "", "options": [{"text": "致電住客詢問是否願意暫時取消請勿打擾以接見訪客", "correct": false, "explanation": "「請勿打擾」狀態不應被櫃台主動致電破壞。"}, {"text": "協助訪客填寫留言條，由房務人員送進房間", "correct": false, "explanation": "這不在規定的作業流程中，且同樣會干擾住客。"}, {"text": "請訪客在大廳等候，直到住客主動聯繫櫃台", "correct": false, "explanation": "這可能導致訪客在大廳無限期滯留。"}, {"text": "回覆訪客：「您好，目前沒有查詢到訂單耶。」", "correct": true, "explanation": "無論是未提及來訪或設定請勿打擾，均採用此統一回覆以保護住客。"}, {"text": "告知訪客住客目前狀態為請勿打擾，請其改日再來", "correct": false, "explanation": "這會直接揭露住客的存在，違反隱私保護規範。"}], "answer_index": 3}, {"id": "OP-FO-15-Q06", "stem": "若訪客表示其手機遺失或無手機，無法親自聯繫住客時，櫃台夥伴該如何提供協助？", "difficulty": "", "options": [{"text": "婉拒其要求，請其至店外的公用電話撥打", "correct": false, "explanation": "這不符合良好的服務品質與協助精神。"}, {"text": "使用夥伴自己的私人手機幫訪客撥打電話", "correct": false, "explanation": "工作現場不應使用私人物品處理公務，且有隱私疑慮。"}, {"text": "讓顧客（訪客）使用櫃台電話聯繫住客", "correct": true, "explanation": "這是注意事項中明確提及的彈性協助方案。"}, {"text": "直接帶領訪客上樓敲門確認", "correct": false, "explanation": "這嚴重違反安全與隱私流程。"}, {"text": "請訪客提供號碼後，由夥伴代為撥號並轉接至客房", "correct": false, "explanation": "流程是讓訪客直接使用櫃台電話，而非夥伴代為轉接。"}], "answer_index": 2}, {"id": "OP-FO-15-Q07", "stem": "當訪客離開後，若該次訪客是「非預期」的，櫃台夥伴後續的操作重點為何？", "difficulty": "", "options": [{"text": "不需做任何處置，以避免住客感到困擾", "correct": false, "explanation": "住客有權知曉有人找尋，以利其後續自行決定是否聯繫。"}, {"text": "致電住客告知房號已被揭露，請住客留意安全", "correct": false, "explanation": "流程強調「無告知房號」，此選項敘述錯誤。"}, {"text": "在系統中註記訪客的長相特徵，以備不時之需", "correct": false, "explanation": "指導書未要求進行容貌註記。"}, {"text": "致電住客告知有人來訪，並強調因隱私關係未告知房號", "correct": true, "explanation": "這能讓住客安心並掌握來訪資訊，同時重申飯店的隱私保護立場。"}, {"text": "立即聯繫保全人員加強該樓層巡邏", "correct": false, "explanation": "除非有安全疑慮，否則標準流程只需致電告知住客即可。"}], "answer_index": 3}, {"id": "OP-FO-15-Q08", "stem": "在訪客接待流程中，何種情況下夥伴必須「立即回報主管」？", "difficulty": "", "options": [{"text": "訪客表示要在大廳長時間等候住客時", "correct": false, "explanation": "除非造成干擾，否則這通常不屬於需要立即上報的範疇。"}, {"text": "只要有任何問題或突發狀況產生時", "correct": true, "explanation": "注意事項第三點明確要求「有問題須立即回報主管」。"}, {"text": "當訪客不願意提供自己的姓名時", "correct": false, "explanation": "夥伴可依據標準回覆婉拒，若無進一步衝突則不一定需立即上報。"}, {"text": "住客同意訪客上樓，但訪客沒有帶證件時", "correct": false, "explanation": "指導書未規定訪客必須帶證件才能上樓。"}, {"text": "當系統查無訂單，但訪客堅持住客住在店內時", "correct": false, "explanation": "應先堅持標準話術回覆，除非訪客鬧事才需上報。"}], "answer_index": 1}, {"id": "OP-FO-15-Q09", "stem": "對於「感應電梯讓客上樓」的權限，下列敘述何者正確？", "difficulty": "", "options": [{"text": "只要訪客能報出住客全名，即可協助感應", "correct": false, "explanation": "報出全名後仍需致電客房，徵得住客同意後才可感應。"}, {"text": "訪客若持有住客的房卡影本，可自行上樓", "correct": false, "explanation": "指導書並無此項規定，安全原則上應由櫃台控管感應。"}, {"text": "必須在住客同意後，由櫃台協助感應電梯", "correct": true, "explanation": "這是確保訪客進入客房區經過住客授權的核心步驟。"}, {"text": "訪客必須由櫃台人員一路陪同進房", "correct": false, "explanation": "櫃台僅需協助感應電梯，不需陪同進房。"}, {"text": "住客必須親自下樓至電梯口帶領，櫃台不代為感應", "correct": false, "explanation": "流程規定櫃台可以提供「協助感應電梯」的服務。"}], "answer_index": 2}, {"id": "OP-FO-15-Q10", "stem": "統一回覆「目前沒有查詢到訂單耶」的最主要目的為何？", "difficulty": "", "options": [{"text": "為了縮短與訪客溝通的時間，避免櫃台阻塞", "correct": false, "explanation": "速度並非此話術的首要考量。"}, {"text": "因為系統真的無法查詢訪客名單，只能這樣回覆", "correct": false, "explanation": "系統可查詢，此話術是基於隱私考量的技術性回覆。"}, {"text": "為了讓訪客主動放棄找尋，減少櫃台工作量", "correct": false, "explanation": "服務不應以逃避工作量為目的。"}, {"text": "為了防止洩漏住客隱私，不讓外部人員確認住客是否在店", "correct": true, "explanation": "這是保護住客隱私的標準防線，避免未經授權的追蹤。"}, {"text": "測試訪客是否真的認識住客，看其是否會露出破綻", "correct": false, "explanation": "櫃台不應採行測試或質疑顧客的立場。"}], "answer_index": 3}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
