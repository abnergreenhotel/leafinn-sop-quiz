<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-12 續住作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-12 續住作業流程 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-12 續住作業流程.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-12", "title": "續住作業流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-12 續住作業流程.pdf", "questions": [{"id": "OP-FO-12-Q01", "stem": "當住客來到櫃台表示想要辦理「續住」時，櫃台人員的第一個作業步驟應為何？", "difficulty": "", "options": [{"text": "確認該住客的房號", "correct": true, "explanation": "在進行任何房務或系統操作前，首要任務是準確核實住客目前所居住的房號。"}, {"text": "直接告知續住折扣", "correct": false, "explanation": "在確認是否有房可續住及核對身份前，不應直接討論房價優惠。"}, {"text": "請住客先支付房費", "correct": false, "explanation": "支付房費應在確認有空房並安排好房號之後才進行，並非第一步驟。"}, {"text": "詢問是否需要清消房型", "correct": false, "explanation": "清潔需求應在確認住客可以續住後，再進一步詢問其出門時間與需求。"}, {"text": "聯絡房務部確認房間狀況", "correct": false, "explanation": "應先確認住客房號並由櫃台系統查詢空房狀態，而非第一時間連絡房務。"}], "answer_index": 0}, {"id": "OP-FO-12-Q02", "stem": "根據續住作業流程，關於續住客人的房間安排，應遵循下列哪項原則？", "difficulty": "", "options": [{"text": "強制要求客人換到較大的房型", "correct": false, "explanation": "流程中並未要求升等房型，且應盡量減少客人搬遷的不便。"}, {"text": "安排同一個房號入住，儘量避免換房", "correct": true, "explanation": "安排原房續住可以提升住客便利性，同時減少房務部清理退房與準備新房的工作量。"}, {"text": "優先安排至剛打掃完畢的新房間", "correct": false, "explanation": "作業指導書明確指出應「避免換房」，以客人的續住便利為優先。"}, {"text": "依據當日退房狀況隨機分配房號", "correct": false, "explanation": "隨機分配會增加住客換房的頻率，不符合作業流程中「安排同一房號」的要求。"}, {"text": "若有空房則必須更換至不同樓層", "correct": false, "explanation": "作業流程建議儘量不換房，除非該房型已無空房或有特殊需求。"}], "answer_index": 1}, {"id": "OP-FO-12-Q03", "stem": "在詢問續住客人的清潔需求時，作業指導書規定最晚的續掃時間為何？", "difficulty": "", "options": [{"text": "中午 12 點前", "correct": false, "explanation": "中午 12 點通常是退房截止時間，但續掃服務有更彈性的時限規定。"}, {"text": "下午 1 點前", "correct": false, "explanation": "此時間並非標準作業指導書中所規定的續掃截止時間。"}, {"text": "下午 2 點前", "correct": true, "explanation": "根據流程話術，應提醒客人最晚的續掃服務提供時間是下午兩點。"}, {"text": "下午 3 點前", "correct": false, "explanation": "下午三點通常是入住高峰期，房務部已須全力處理入住房型，故續掃截止時間較早。"}, {"text": "晚上 6 點前", "correct": false, "explanation": "晚間時段房務人員配置通常較少，無法提供大規模的續掃服務。"}], "answer_index": 2}, {"id": "OP-FO-12-Q04", "stem": "當確認客人續住後，櫃台人員應立即執行的後續動作不包括下列何者？", "difficulty": "", "options": [{"text": "回報房務群組住客是否需要打掃", "correct": false, "explanation": "這是標準流程第 4 步與注意事項第 1 點明確要求的必要動作。"}, {"text": "告知房務人員住客預計出門的時間", "correct": false, "explanation": "告知出門時間有助於房務部安排清潔排程，是必要的流程步驟。"}, {"text": "與客人約定支付續住房費的時間", "correct": false, "explanation": "確認續住後應與客人確認付款細節，這是確保款項入帳的標準動作。"}, {"text": "馬上幫客人辦理退房並重新核發房卡", "correct": true, "explanation": "續住作業應著重於「延續」而非重新辦理退房手續，應避免不必要的行政流程。"}, {"text": "查詢該房型是否還有剩餘空房", "correct": false, "explanation": "確認續住的可行性必須先透過查詢空房來達成，是核心作業之一。"}], "answer_index": 3}, {"id": "OP-FO-12-Q05", "stem": "若系統查詢後發現「目前已無空房」可供客人續住，櫃台人員應如何回應？", "difficulty": "", "options": [{"text": "請住客自行上訂房網站確認", "correct": false, "explanation": "櫃台應代表館方直接給予回覆，而非推諉給外部平台。"}, {"text": "「您好，目前已無空房，非常抱歉」", "correct": true, "explanation": "這是指導書中明確規範的標準遺憾話術，簡潔且具禮貌。"}, {"text": "請住客至其他分館詢問有無房間", "correct": false, "explanation": "在未確認其他館別狀態前，不應隨意給予住客不確定的承諾或指引。"}, {"text": "建議住客在大廳等候是否有其他人退房", "correct": false, "explanation": "這不是專業的客務處理方式，且會造成住客困擾。"}, {"text": "直接忽略客人的請求，處理下一位住客", "correct": false, "explanation": "這違反基本服務禮儀，且未完成該作業流程的回應動作。"}], "answer_index": 1}, {"id": "OP-FO-12-Q06", "stem": "關於續住作業中的房費支付規定，下列哪一項敘述最符合流程指引？", "difficulty": "", "options": [{"text": "必須在辦理續住的當下立即結清款項", "correct": false, "explanation": "流程指引建議可以與客人「約定時間」，在該時間前至櫃台支付即可。"}, {"text": "可與客人約定時間，在該時間前至櫃台支付", "correct": true, "explanation": "這是流程中賦予櫃台人員的執行說明，增加了收款作業的彈性。"}, {"text": "一律等到最終退房那天再合併結算", "correct": false, "explanation": "為了降低財務風險，應在續住當日或約定時間內收取費用，而非全數延後。"}, {"text": "續住費用僅能透過線上轉帳支付", "correct": false, "explanation": "流程提到應請客人「至櫃台」支付，並未限制支付方式。"}, {"text": "續住一律不收費，視為贈送", "correct": false, "explanation": "續住屬於營收項目，雖然可給折扣，但仍需收取房費。"}], "answer_index": 1}, {"id": "OP-FO-12-Q07", "stem": "在續住作業中，關於「告知房務部」的注意事項，下列何者正確？", "difficulty": "", "options": [{"text": "只需告知房號，不需告知清潔需求", "correct": false, "explanation": "清潔需求與出門時間是房務部安排人力的重要依據，必須告知。"}, {"text": "等到客人真的出門後再聯絡房務", "correct": false, "explanation": "注意事項第一點強調「確認續住後須馬上告知房務」，以便提前規劃。"}, {"text": "確認續住後須馬上告知房務，並說明清潔需求與出門時間", "correct": true, "explanation": "這是注意事項的核心，能確保櫃台與房務部資訊同步，確保服務品質。"}, {"text": "如果客人不需要打掃，就不必告知房務部", "correct": false, "explanation": "即使不需要打掃，房務部也需要知道該房為續住房，以免誤闖或誤報退房。"}, {"text": "僅需在交班本上登記，不需要傳到群組", "correct": false, "explanation": "執行說明中提到應「回報房務群組」，以確保即時性。"}], "answer_index": 2}, {"id": "OP-FO-12-Q08", "stem": "當客人詢問續住價格時，根據作業指導書，櫃台人員應如何處理？", "difficulty": "", "options": [{"text": "告知續住一律恢復原價", "correct": false, "explanation": "注意事項第二點提到「續住可給房價折扣」，這是有助於提升續住率的誘因。"}, {"text": "告知續住可給予房價折扣", "correct": true, "explanation": "這是公司為了鼓勵客人延長住宿所提供的優惠政策。"}, {"text": "告知續住需加收 20% 的服務費", "correct": false, "explanation": "流程中並未提到加價規定，而是提到可以給予折扣。"}, {"text": "請客人自己上網比價，以網路價為準", "correct": false, "explanation": "現場人員應具備處理續住價格的權限或依據流程給予折扣。"}, {"text": "告知續住價格必須比第一晚入住時更高", "correct": false, "explanation": "這不符合流程中鼓勵續住並提供折扣的經營方向。"}], "answer_index": 1}, {"id": "OP-FO-12-Q09", "stem": "情境：住客陳先生表示要續住，櫃台查詢後確認有空房，且陳先生表示他要先去吃早餐，大約下午 1 點才會出門，需要打掃。下列何種回報方式最正確？", "difficulty": "", "options": [{"text": "回報房務群組：房號 XXX 續住，不需打掃", "correct": false, "explanation": "這與客人的需求（需要打掃）不符，會造成客訴。"}, {"text": "回報房務群組：房號 XXX 續住，下午 1 點後清潔", "correct": true, "explanation": "完整包含房號、續住狀態、出門時間及清潔需求，符合標準作業程序。"}, {"text": "等下午 1 點陳先生真的出門後再說", "correct": false, "explanation": "這違反了「確認續住後須馬上告知房務」的原則。"}, {"text": "告知陳先生 1 點太晚了，房務沒辦法掃", "correct": false, "explanation": "最晚續掃時間是下午 2 點，下午 1 點仍在可服務的時間範圍內。"}, {"text": "僅告知房務部有續住，不提清潔時間", "correct": false, "explanation": "未告知清潔時間會導致房務人員無法有效排程，可能發生與客人在房內碰撞的情況。"}], "answer_index": 1}, {"id": "OP-FO-12-Q10", "stem": "在「續住作業流程」的服務標準中，對於修訂日期與版本的標註，下列敘述何者正確？", "difficulty": "", "options": [{"text": "修訂日期為 2026/04/09，版本為 1", "correct": true, "explanation": "根據文件標頭資訊，該作業指導書的修訂日期為 2026/04/09，版本號為 1。"}, {"text": "修訂日期為 2024/05/18，版本為 2", "correct": false, "explanation": "文件顯示的日期為 2026 年，並非 2024 年。"}, {"text": "修訂日期為 2025/12/31，版本為 5", "correct": false, "explanation": "此日期與文件標註的 2026/04/09 不符。"}, {"text": "修訂日期為 2026/01/01，版本為 A", "correct": false, "explanation": "文件標註版本為數字「1」，而非英文字母。"}, {"text": "此文件沒有標註修訂日期", "correct": false, "explanation": "文件右上角明確標示了修訂日期為 2026/04/09。"}], "answer_index": 0}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
