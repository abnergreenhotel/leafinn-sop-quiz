<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-11 退房作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-11 退房作業流程</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-11 退房作業流程.pdf｜10 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-11", "title": "OP-FO-11 退房作業流程", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-11 退房作業流程.pdf", "questions": [{"id": "OP-FO-11-Q01", "stem": "當旅客報出的房號與系統顯示的登記人姓名不符時，櫃檯人員第一步應如何處理？", "hint": "思考如何利用現有系統功能與旅客提供的資訊進行二次確認。", "difficulty": "", "options": [{"text": "請旅客出示身分證件，並直接在德安系統修改登記人姓名。", "correct": false, "explanation": "隨意修改原始登記資料會導致帳務與身分追蹤混亂，且未先確認原登記人身分。"}, {"text": "詢問旅客入住時登記人的名稱，並透過系統的「房間管理」功能核對資料。", "correct": true, "explanation": "這是標準的核對程序，透過詢問登記人姓名並在德安系統中進行交叉比對，以確保身分相符。"}, {"text": "直接告知旅客資料不符，請其確認正確房號後再重新辦理退房。", "correct": false, "explanation": "此做法過於消極，應主動詢問登記人名稱以協助旅客找出可能的紀錄偏差。"}, {"text": "先幫旅客辦理退房，待稍後房務檢查房間時再行確認。", "correct": false, "explanation": "在身分未確認前辦理退房會導致帳務錯誤風險，必須在結帳前完成核對。"}], "answer_index": 1}, {"id": "OP-FO-11-Q02", "stem": "旅客辦理退房時，表示不小心弄丟了一張房卡，根據作業標準應如何收費？", "hint": "請注意 SOP 中對於硬體資產遺失的具體定價。", "difficulty": "", "options": [{"text": "向旅客收取遺失費用一百元。", "correct": true, "explanation": "SOP 明確規定若遺失房卡，需依規定收取每張一百元的工本費。"}, {"text": "請旅客至大廳沙發稍候，待找到後再辦理，不另收費。", "correct": false, "explanation": "遺失應立即按價賠償，以免延誤旅客行程或導致資產流失。"}, {"text": "檢查房間設備是否完整，若無損壞則可免收房卡賠償費。", "correct": false, "explanation": "房卡賠償與客房設備損壞是兩項獨立的收費項目。"}, {"text": "收取兩百元作為房卡磁條重新設定的費用。", "correct": false, "explanation": "金額不符合 SOP 定價，SOP 規定一張房卡為一百元。"}], "answer_index": 0}, {"id": "OP-FO-11-Q03", "stem": "旅客欲歸還借用的「酒杯」與「餐具組」，櫃檯人員應採取什麼行動？", "hint": "針對需要「清洗」的特定借用物，跨部門溝通是關鍵。", "difficulty": "", "options": [{"text": "請旅客自行拿至餐廳交給洗碗人員清潔。", "correct": false, "explanation": "櫃檯應作為服務窗口處理物品回收，不應增加旅客負擔。"}, {"text": "詢問房務部是否已收到相關物品並確認清洗完畢。", "correct": true, "explanation": "針對需要清洗的借用物，需透過房務端確認物品現況與清潔進度。"}, {"text": "直接收下並放置於櫃檯後方，等有空再通知房務。", "correct": false, "explanation": "借用物若含有食物殘渣或髒污，未及時通知房務處理會影響環境衛生及後續備品使用。"}, {"text": "告知旅客餐具不需回收，可直接留在房間內。", "correct": false, "explanation": "退房時必須確認所有租借物品是否繳回，以利資產盤點。"}], "answer_index": 1}, {"id": "OP-FO-11-Q04", "stem": "旅客在 11:30 退房時間後提出希望「再多待三小時」，櫃檯應如何處理？", "hint": "請確認 SOP 對於「加休時數」的最高限制。", "difficulty": "", "options": [{"text": "告知每小時酌收兩百元，共收取六百元，並幫其延長時間。", "correct": false, "explanation": "雖然收費金額正確，但 SOP 規定加休最多只能延長兩小時。"}, {"text": "委婉告知加休上限為兩小時，並通知房務部調整後的退房時間。", "correct": true, "explanation": "符合 SOP 中關於加休上限兩小時的規定，且正確履行了通知房務的義務。"}, {"text": "請旅客先辦理退房，行李寄放後再到大廳休息，不提供加休服務。", "correct": false, "explanation": "飯店提供收費加休服務，不應在未溝通限制條件的情況下直接拒絕。"}, {"text": "直接同意加休需求，待旅客離開時再根據實際時間收費。", "correct": false, "explanation": "加休需事先確認時間、告知收費標準並立即通知房務部，不能事後才結算。"}], "answer_index": 1}, {"id": "OP-FO-11-Q05", "stem": "一位旅客透過 Agoda 平台訂房，退房時要求櫃檯開立「含公司統編的紙本發票」，應如何應對？", "hint": "不同訂房來源（平台 vs 現場）的發票開立對象有所不同。", "difficulty": "", "options": [{"text": "在德安系統中補入統編，直接列印電子發票交給旅客。", "correct": false, "explanation": "透過特定訂房平台（如 Agoda）訂位時，飯店端不開立發票給旅客。"}, {"text": "委婉說明訂房平台之發票需向原訂房平台申請，飯店無法重覆開立。", "correct": true, "explanation": "針對 Agoda, EXP, KLOOK 等平台，SOP 明確指出旅客需向原平台索取發票。"}, {"text": "請旅客提供電子信箱，告知退房後系統會自動補發電子發票。", "correct": false, "explanation": "飯店端並無發票開立紀錄可供補發，此回應會誤導旅客。"}, {"text": "開立一張住宿證明給旅客，並在房費欄位註明「已開立發票」。", "correct": false, "explanation": "這與發票申請問題無關，且未解決旅客對於報帳憑證的需求。"}], "answer_index": 1}, {"id": "OP-FO-11-Q06", "stem": "若旅客是透過「旅行社付款」，在協助開立「住宿證明」時，下列哪項做法是正確的？", "hint": "開立證明時，「房費顯示」與「發票開立對象」有直接關聯。", "difficulty": "", "options": [{"text": "住宿證明上不可顯示房費金額。", "correct": true, "explanation": "SOP 規定，若旅客為旅行社付款（飯店未開立發票予旅客），住宿證明不可顯示房費。"}, {"text": "照常填寫房費，但在下方蓋上「旅行社已付」章戳。", "correct": false, "explanation": "與 SOP 規定的「無發票者不可顯示房費」原則相違背。"}, {"text": "請旅客自行向旅行社索取住宿證明，飯店端不提供。", "correct": false, "explanation": "飯店仍可提供住宿證明（包含姓名、日期等資訊），只是房費欄位有顯示限制。"}, {"text": "僅在住宿證明上顯示稅額，不顯示總價。", "correct": false, "explanation": "只要沒有開立發票給旅客，任何與房費相關的具體金額都不應顯示。"}], "answer_index": 0}, {"id": "OP-FO-11-Q07", "stem": "在德安系統進行「旅客帳處理」的結帳流程中，選擇付款方式後，最後的操作步驟為何？", "hint": "回想 SOP 最後一個流程圖步驟，確保系統與實際房態同步。", "difficulty": "", "options": [{"text": "點選「入帳」並輸入金額。", "correct": false, "explanation": "入帳是結帳前的準備步驟，並非最後一步。"}, {"text": "點選「房間管理」並重新整理房態。", "correct": false, "explanation": "這只是房態確認，不代表完成結帳手續。"}, {"text": "點選「結帳」，並在彈跳視窗選擇「確定退房」。", "correct": true, "explanation": "這是系統操作的最後關鍵步驟，確保房態轉為已退房且帳務關閉。"}, {"text": "直接關閉視窗，旅客住宿卡會自動歸檔。", "correct": false, "explanation": "未點選確定退房會導致系統房態錯誤，且住宿卡需人工放置於櫃檯下方留存。"}], "answer_index": 2}, {"id": "OP-FO-11-Q08", "stem": "詢問顧客住房滿意度時，旅客反映房間排水孔有異味導致睡眠不佳，應如何依流程處理？", "hint": "處理客怨時，關懷、致歉與回報階層是標準步驟。", "difficulty": "", "options": [{"text": "告知旅客我們會轉達給工務組，並請其下次入住再觀察。", "correct": false, "explanation": "回應過於官條，未展現即時關懷或致歉。"}, {"text": "先向旅客誠懇致歉、視情況送禮物賠罪，若無法處理應立即通知主管。", "correct": true, "explanation": "這是 SOP 規定的客怨處理原則：關心、道歉、補償、必要時上報。"}, {"text": "解釋是因為天氣氣壓影響導致異味，請旅客體諒。", "correct": false, "explanation": "找藉口會讓旅客感受不佳，應優先以客人的感受為重。"}, {"text": "直接給予房費折讓，不需要打擾主管。", "correct": false, "explanation": "SOP 規定若無法處理（如涉及金額折讓等授權）必須通知主管，不可擅自決定。"}], "answer_index": 1}, {"id": "OP-FO-11-Q09", "stem": "關於退房後的「送客服務」，下列哪一項做法符合 SOP 的規範？", "hint": "思考在特殊天氣（如雨天）或行李較多時，能提供什麼額外的協助。", "difficulty": "", "options": [{"text": "在櫃檯內微笑點頭致意即可。", "correct": false, "explanation": "SOP 要求的送客包含更多主動服務，如開門或拿行李。"}, {"text": "幫客人開門、拿行李，若遇雨天需主動幫顧客撐傘。", "correct": true, "explanation": "SOP 明確列出開門、拿行李、雨天撐傘與目送離開等細節。"}, {"text": "等客人走到門口後，大聲喊出「期待下次入住」。", "correct": false, "explanation": "送客應包含肢體服務，而非僅有口頭道別。"}, {"text": "請行李員處理即可，櫃檯人員需留在座位處理行政工作。", "correct": false, "explanation": "SOP 指導書中並未區分職位，這是每位現場夥伴應執行的送客標準。"}], "answer_index": 1}, {"id": "OP-FO-11-Q10", "stem": "退房手續完成後，旅客填寫的「住宿登記卡」應如何管理？", "hint": "這涉及到個資安全與後續資料留存的位置規定。", "difficulty": "", "options": [{"text": "直接放入碎紙機銷毀，以免資料外洩。", "correct": false, "explanation": "登記卡需保留存查，不可立即銷毀。"}, {"text": "放置於櫃檯桌面，方便下一班交接核對。", "correct": false, "explanation": "桌面屬於公共區域，隨意放置會導致個人個資外洩。"}, {"text": "統一放置於櫃檯下方留存，並嚴禁洩漏個資。", "correct": true, "explanation": "SOP 明確規定住宿登記卡應放置於櫃檯下方留存，並強調個資保護。"}, {"text": "交由房務人員帶回辦公室存檔。", "correct": false, "explanation": "房務人員不負責前台帳務與資料管理，應由櫃檯單位依規範留存。"}], "answer_index": 2}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
