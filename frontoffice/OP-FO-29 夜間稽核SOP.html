<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-29 夜間稽核SOP 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-29 夜間稽核SOP</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-29 夜間稽核 SOP.pdf｜6 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-29", "title": "OP-FO-29 夜間稽核SOP", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-29 夜間稽核 SOP.pdf", "questions": [{"id": "OP-FO-29-Q01", "stem": "在進行當日帳務總檢時，若發現有一筆信用卡授權單據遺失，且系統顯示該筆帳款未結，最正確的處理方式為何？", "hint": "", "difficulty": "", "options": [{"text": "為了不延誤過夜時間，先將該帳務直接結轉，等隔日早班再補單。", "correct": false, "explanation": "異常帳款若未經釐清直接帶入過夜，會導致後續財務查帳困難且帳務不連續。"}, {"text": "應先釐清該筆帳款的來源並確認單據去向，於過夜前完成核對。", "correct": true, "explanation": "確保所有單據齊全並釐清異常案件，是維護當日帳務正確性並順利進行稽核的關鍵步驟。"}, {"text": "直接手動沖銷該筆帳款，將差額記錄在當日損益中。", "correct": false, "explanation": "手動沖銷而未經核實會造成實際營收與系統數據不符，違反會計稽核原則。"}, {"text": "僅需在交班表註記「單據遺失」，不需尋找單據即可進行下一步。", "correct": false, "explanation": "註記雖重要，但 SOP 要求必須先確認單據齊全並釐清異常，而非僅是口頭或書面交代。"}], "answer_index": 1}, {"id": "OP-FO-29-Q02", "stem": "夜間稽核人員核對卡機總額與系統報表時，發現實收金額與報表數字不符，此時應優先執行的動作是什麼？", "hint": "", "difficulty": "", "options": [{"text": "先找出導致金額不一致的原因，確認無誤後再進行結轉。", "correct": true, "explanation": "確認每日收入資料的一致性是結轉的前提，避免將錯誤數據滾動至隔日帳務。"}, {"text": "以卡機金額為準，直接修改系統報表的數字使其符合。", "correct": false, "explanation": "未經查證就強行平衡帳務，會掩蓋實際發生的操作錯誤或金流漏洞。"}, {"text": "先行執行系統結轉，待財務部後續通知後再補正。", "correct": false, "explanation": "系統結轉後數據會存檔，若帶著錯誤結轉會大幅增加財務同仁後續核對的行政成本。"}, {"text": "將該筆差額掛在「待處理帳項」，留給早班同事核對現金。", "correct": false, "explanation": "夜間稽核的職責包含確認當日收入一致，不應在未嘗試尋找原因的情況下推給下一班。"}], "answer_index": 0}, {"id": "OP-FO-29-Q03", "stem": "在檢查房態時，發現有一間房在系統中顯示「待入住」，但目前已是凌晨時分且查無入住紀錄，此動作對隔日作業有何直接影響？", "hint": "", "difficulty": "", "options": [{"text": "沒有影響，只需等待早班人員聯絡客人即可。", "correct": false, "explanation": "錯誤的房態會產生虛假的可用房資訊，直接干擾隔日的排房規劃。"}, {"text": "會直接影響隔日的排房作業與接待流程。", "correct": true, "explanation": "正確的過夜房態（在住房、未到店、空房）是確保隔日櫃檯接待與排房邏輯正確的基礎。"}, {"text": "僅會影響當日的早餐人數清點，不影響房況。", "correct": false, "explanation": "房態異常的影響層面不僅限於早餐，更核心的是影響房間的調度與銷售狀態。"}, {"text": "只需確認該房已清潔，系統狀態不正確並不妨礙排房。", "correct": false, "explanation": "系統房態若與實際不符，會導致排房人員誤判房間可用性，造成接待衝突。"}], "answer_index": 1}, {"id": "OP-FO-29-Q04", "stem": "關於「德安系統」夜間稽核的啟動時機，下列哪項敘述最符合 SOP 要求？", "hint": "", "difficulty": "", "options": [{"text": "只要到了凌晨 $1:00$ 即可直接啟動，不必理會其他事務。", "correct": false, "explanation": "系統稽核是最後一步，必須在確認常態事務（如早餐人數、沖銷帳）完成後才可啟動。"}, {"text": "只要確認信用卡與現金金額正確，即可先行啟動系統稽核。", "correct": false, "explanation": "除了金流，房態確認與早餐人數清點等常態性事務也是啟動稽核的必要條件。"}, {"text": "確認早餐人數清點、沖銷帳與排房等常態事務均已完成且無異常後再執行。", "correct": true, "explanation": "確認所有前置條件完整後再啟動系統稽核，可避免系統作業中途出錯且難以修正。"}, {"text": "系統稽核完成後，再開始處理當日的早餐人數清點與排房作業。", "correct": false, "explanation": "順序錯誤，常態事務必須在系統執行稽核前確認完成，以確保數據一併結轉。"}], "answer_index": 2}, {"id": "OP-FO-29-Q05", "stem": "在填寫「每日交班稽核表」時，有關報表留存與整理的原則，何者是正確的？", "hint": "", "difficulty": "", "options": [{"text": "報表留存順序需固定，以利財務同仁後續查核。", "correct": true, "explanation": "固定的報表留存與整理邏輯能提升後續財務核對的效率，減少溝通成本。"}, {"text": "隨意擺放即可，只要有將所有單據放入資料夾中即可。", "correct": false, "explanation": "缺乏組織的報表存放會增加後續查帳的困難，不符合財務規範。"}, {"text": "只需填寫總金額，細節的行動支付或信用卡明細不需要分類。", "correct": false, "explanation": "交班稽核表需涵蓋各類支付（信用卡、現金、行動支付）營收，分類不清會導致對帳異常。"}, {"text": "報表正本應交由夜班自行保管，不需交接給財務。", "correct": false, "explanation": "報表與稽核表的核心功能就是提供財務核對，必須按流程留存與轉交。"}], "answer_index": 0}, {"id": "OP-FO-29-Q06", "stem": "若夜間稽核作業中遇到特殊無法處理的案件（如：金額異常無法即時查出原因），應如何進行交接？", "hint": "", "difficulty": "", "options": [{"text": "若早班主管沒問，就不必特別說明，以免被究責。", "correct": false, "explanation": "隱瞞異常會導致問題擴大，違反明確交接的原則。"}, {"text": "口頭告訴下一班同仁即可，不需浪費時間書寫記錄。", "correct": false, "explanation": "口頭交接極易遺忘或產生誤解，SOP 明確規定不可只口頭帶過。"}, {"text": "將事件記錄下來，並明確交接給隔天早班主管處理。", "correct": true, "explanation": "特殊情況必須透過書面記錄明確轉達給主管處理，確保責任歸屬與問題解決。"}, {"text": "直接將該筆異常帳務刪除，使當日報表看起來平衡。", "correct": false, "explanation": "刪除異常數據是嚴重的違規行為，會造成帳務缺漏與法律風險。"}], "answer_index": 2}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
