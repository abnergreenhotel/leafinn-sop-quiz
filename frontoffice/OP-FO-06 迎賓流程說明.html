<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-06 迎賓流程說明 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-06 迎賓流程說明</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-06 迎賓流程說明.pdf｜5 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-06", "title": "OP-FO-06 迎賓流程說明", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-06 迎賓流程說明.pdf", "questions": [{"id": "OP-FO-06-Q01", "stem": "當客人在櫃檯辦理完業務準備離開時，根據迎賓流程，櫃檯人員應該在什麼時機點才可以轉身入座？", "hint": "", "difficulty": "", "options": [{"text": "確認客人已經轉身往門口走去時", "correct": false, "explanation": "即使客人已經轉身，若尚未完全離開，立即入座會給人服務終止太快的感覺。"}, {"text": "待客人完全離開現場後", "correct": true, "explanation": "這能確保服務的完整性，展現對客人的尊重直到最後一刻。"}, {"text": "完成電腦系統輸入並存檔後", "correct": false, "explanation": "行政作業應排在客人感受之後，不應為了存檔而先行轉身入座。"}, {"text": "下一組客人抵達櫃檯前", "correct": false, "explanation": "入座的時機是取決於前一位客人的離開，而非後一位客人的抵達。"}], "answer_index": 1}, {"id": "OP-FO-06-Q03", "stem": "在雨天接待情境下，關於「放置小心地滑告示牌」的執行時機，下列敘述何者正確？", "hint": "", "difficulty": "", "options": [{"text": "等門口累積一定積水後再放置", "correct": false, "explanation": "為了安全考量，防護措施應具備預防性，而非等積水後才處理。"}, {"text": "發現因下雨門口地面潮濕時即可擺放", "correct": true, "explanation": "這能確保客人在踏入館內的第一時間就受到安全提醒與保護。"}, {"text": "待客人進入大廳入座後再補放", "correct": false, "explanation": "這會導致客人在進門最濕滑的瞬間缺乏警示，增加跌倒風險。"}, {"text": "雨勢變大到需要撐傘時才需要放置", "correct": false, "explanation": "只要是雨天就應留意地面濕滑，不論雨勢大小。"}], "answer_index": 1}, {"id": "OP-FO-06-Q04", "stem": "當飯店門口出現大型團體旅客（團客）或人潮眾多時，為了流程順暢，應如何操作自動門？", "hint": "", "difficulty": "", "options": [{"text": "請領隊站在門邊持續按住開門鈕", "correct": false, "explanation": "這會造成領隊的不便，且不符合飯店主動服務的原則。"}, {"text": "調整感應器靈敏度讓門保持開啟", "correct": false, "explanation": "調整機器設定過於繁瑣，並非 SOP 建議的標準做法。"}, {"text": "先按開自動門，隨即關閉電源讓門維持常開，待客進入後重啟", "correct": true, "explanation": "這是確保大量人群通行順暢且避免門頻繁開關夾傷客人的標準做法。"}, {"text": "手動將玻璃門推開並用滅火器頂住", "correct": false, "explanation": "使用非專業物品頂門會損壞設備且有礙觀瞻。"}], "answer_index": 2}, {"id": "OP-FO-06-Q05", "stem": "關於行李服務，在何種情況下，夥伴應主動說出：「您好，需要幫您將行李放置房內嗎？」", "hint": "", "difficulty": "", "options": [{"text": "只要客人行李超過兩件時", "correct": false, "explanation": "此服務並非單純看件數，而是需評估現場人力狀況。"}, {"text": "當現場夥伴有空閒時間時", "correct": true, "explanation": "在不影響櫃檯主流程且人力允許下，提供延伸的入房服務能提升滿意度。"}, {"text": "只有在客人主動開口要求協助時", "correct": false, "explanation": "SOP 強調主動服務，而非等待客人提出要求。"}, {"text": "僅限於雨天客人不便自行拿行李時", "correct": false, "explanation": "此項服務不限於天候，而是根據現場人力餘裕度來決定。"}], "answer_index": 1}, {"id": "OP-FO-06-Q06", "stem": "在執行「主動接待」流程時，SOP 對於溝通禮儀有哪項明確的要求？", "hint": "", "difficulty": "", "options": [{"text": "與客人談話時，眼神一定要注視著對方", "correct": true, "explanation": "眼神交流是建立信任感與展現服務熱忱的最基本要求。"}, {"text": "必須在距離客人三公尺處大聲問候", "correct": false, "explanation": "問候應自然，而非單純追求聲音大小或固定距離。"}, {"text": "溝通時手部必須隨時引導方向", "correct": false, "explanation": "雖然引導是好事，但 SOP 特別強調的是眼神注視而非手勢。"}, {"text": "為了展現效率，說話速度應加快", "correct": false, "explanation": "過快的語速可能導致客人聽不清楚，並非優質服務的表現。"}], "answer_index": 0}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
