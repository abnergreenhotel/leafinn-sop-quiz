<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-08 收款入帳作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-08 收款入帳作業</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-08 收款入帳作業.pdf｜8 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-08", "title": "OP-FO-08 收款入帳作業", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-08 收款入帳作業.pdf", "questions": [{"id": "OP-FO-08-Q01", "stem": "當一位顧客撥打電話告知已完成匯款，並提供帳號末五碼供核對時，櫃檯人員應登入玉山銀行網路銀行，並選擇哪一個帳號進行查帳作業？", "hint": "", "difficulty": "", "options": [{"text": "第一個帳號", "correct": false, "explanation": "根據匯款查帳作業標準，應固定點選第二個帳號進行明細查詢，而非第一個帳號。"}, {"text": "末五碼為 26358 的帳號", "correct": true, "explanation": "作業規範要求點選第二個帳號，其末五碼應為 26358，以確保核對的是正確的收款帳戶。"}, {"text": "與顧客匯款帳號相同的末五碼帳號", "correct": false, "explanation": "銀行帳號末五碼是指本館的收款帳號（26358），並非指要找一個與顧客帳號相同的收款帳號。"}, {"text": "隨機點選有交易紀錄的帳號", "correct": false, "explanation": "查帳需在特定的公司帳戶內進行，不可隨機選擇，否則會導致帳務核對錯誤。"}], "answer_index": 1}, {"id": "OP-FO-08-Q02", "stem": "在執行信⽤卡預先授權時，若顧客提供的是「中國信託簽帳金融卡（卡號開頭為 4477-5787）」，櫃檯人員應如何反應最適當？", "hint": "", "difficulty": "", "options": [{"text": "照常進行預先授權操作", "correct": false, "explanation": "SOP 特別註記特定簽帳金融卡無法進行授權，強行操作將導致授權失敗。"}, {"text": "告知顧客此卡種無法授權，建議更換信用卡或改用匯款方式", "correct": true, "explanation": "針對無法授權的簽帳金融卡，應引導顧客提供其他信用卡或轉為匯款流程，以完成訂房保障。"}, {"text": "直接將訂單標示為無效並取消", "correct": false, "explanation": "應先與顧客溝通更換支付方式，不應在未通知的情況下直接取消訂單。"}, {"text": "請顧客聯繫銀行開啟預先授權功能", "correct": false, "explanation": "這是特定卡種的系統限制，而非開通功能即可解決，應優先請顧客更換支付工具。"}], "answer_index": 1}, {"id": "OP-FO-08-Q03", "stem": "針對 Booking.com 的訂單，若在執行信用卡預先授權後不幸失敗，除了在 Booking.com 後台標示無效與傳送簡訊外，還必須在哪個系統中記錄以便後續追蹤？", "hint": "", "difficulty": "", "options": [{"text": "德安系統的備註欄位與 NOTION 的授權失敗表單", "correct": true, "explanation": "多處記錄（德安、Booking.com、NOTION）能確保內部團隊清楚掌握授權狀態，防止追蹤遺漏。"}, {"text": "僅在德安系統的客務帳包記錄", "correct": false, "explanation": "除了德安系統，SOP 要求需填入 NOTION 表單，以便管理端進行整體追蹤。"}, {"text": "玉山銀行網路銀行備註", "correct": false, "explanation": "授權失敗不會在銀行端產生成功入帳紀錄，因此無法也不需在銀行端備註。"}, {"text": "三竹簡訊系統的歷史紀錄", "correct": false, "explanation": "簡訊系統僅用於發送通知，並非正式的授權失敗追蹤與管理平台。"}], "answer_index": 0}, {"id": "OP-FO-08-Q04", "stem": "顧客辦理入住時，需針對之前的預先授權做「補登交易（授權完成）」，此時刷卡機操作流程中，哪一組資訊是不需要輸入的？", "hint": "", "difficulty": "", "options": [{"text": "授權碼", "correct": false, "explanation": "補登交易必須對應原授權號碼，因此授權碼是必要資訊。"}, {"text": "系統追蹤號", "correct": false, "explanation": "追蹤號用於核對交易明細，是刷卡機完成補登流程的必填欄位。"}, {"text": "顧客的匯款帳號末五碼", "correct": true, "explanation": "匯款帳號資訊屬於「匯款流程」，在信用卡授權補登交易中完全不需要用到。"}, {"text": "序號", "correct": false, "explanation": "補登流程中需依照序號進行對應，以確保該筆授權被正確完成。"}], "answer_index": 2}, {"id": "OP-FO-08-Q05", "stem": "在德安系統執行「入訂金流程」時，若一位顧客預計入住 5 天，且明確要求「最後只需要一張總發票」，櫃檯人員應如何選擇發票開立方式？", "hint": "", "difficulty": "", "options": [{"text": "選擇「後開」", "correct": false, "explanation": "「後開」通常用於每天都要產出一張發票的情況，不符合顧客要求單一總發票的需求。"}, {"text": "選擇「不開立」", "correct": false, "explanation": "無論顧客需求為何，入帳後皆須設定發票開立邏輯，不可略過此步驟。"}, {"text": "選擇「已開」", "correct": true, "explanation": "根據 SOP 補充說明，若入住多天僅需一張總發票，應選擇「已開」選項以符合帳務處理邏輯。"}, {"text": "選擇「待確認」", "correct": false, "explanation": "系統中並無此預設標準選項，應依據顧客需求直接選擇對應的發票處理方式。"}], "answer_index": 2}, {"id": "OP-FO-08-Q06", "stem": "當顧客臨時更改付款方式，需取消之前的預先授權時，關於退還額度的時間點，櫃檯人員應如何向顧客說明？", "hint": "", "difficulty": "", "options": [{"text": "刷卡機點選取消後，額度會立即恢復", "correct": false, "explanation": "取消授權後銀行端仍需作業時間，並非即時恢復額度，不應給予顧客錯誤期待。"}, {"text": "申請約需 7 到 14 個工作天，依銀行作業而定", "correct": true, "explanation": "這是 SOP 規定提供給顧客的標準話術，能專業地說明銀行處理的預計週期。"}, {"text": "需等到顧客下次收到帳單時才會歸還", "correct": false, "explanation": "授權取消與實際請款後的刷退不同，額度恢復通常在 7-14 個工作天內，而非等到帳單結帳。"}, {"text": "退還時間由德安系統自動決定，無法預知", "correct": false, "explanation": "退還額度是銀行的作業範圍，與飯店的德安前台系統無關。"}], "answer_index": 1}, {"id": "OP-FO-08-Q07", "stem": "在執行「結帳流程」時，若該筆訂單來源為訂房網站（如 Booking.com），且需開立發票給顧客，則付款方式代號應選擇哪一個？", "hint": "", "difficulty": "", "options": [{"text": "00 沖客房訂金", "correct": false, "explanation": "「00 沖客房訂金」僅適用於現場已有預收訂金款項的情境。"}, {"text": "客⼾簽帳", "correct": true, "explanation": "SOP 補充說明提到，除了有收款沖訂金外，其餘訂房網站應選擇「客戶簽帳」並輸入代號。"}, {"text": "住宿券", "correct": false, "explanation": "住宿券僅適用於顧客持券消費的情境，不適用於一般訂房網站結帳。"}, {"text": "現金結帳", "correct": false, "explanation": "訂房網站通常涉及佣金或線上支付，與一般的現金結帳流程有所區別。"}], "answer_index": 1}, {"id": "OP-FO-08-Q08", "stem": "顧客在入住期間購買了飯店的備品或產生了額外消費（其他費用），櫃檯人員應如何在德安系統中進行「入帳」操作？", "hint": "", "difficulty": "", "options": [{"text": "進入訂房系統點選入訂金流程", "correct": false, "explanation": "額外消費屬於住客帳處理，不應與預收訂金流程混淆。"}, {"text": "在房間管理找到旅客後，點選「旅客帳處理」再點選「入帳」", "correct": true, "explanation": "這是針對在店旅客產生非房費消費時，標準的系統操作路徑。"}, {"text": "直接在住客帳維護中點選預估款", "correct": false, "explanation": "預估款用於結帳流程前的確認，新增單筆消費應從旅客帳處理進入。"}, {"text": "在公帳號設定中產生新的公帳號", "correct": false, "explanation": "公帳號用於特定帳務拆分或轉帳，而非記錄單一旅客的即時消費。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
