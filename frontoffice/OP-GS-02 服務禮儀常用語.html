<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-GS-02 服務禮儀常用語 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-GS-02 服務禮儀常用語</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-GS-02 服務禮儀常用語.pdf｜9 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-GS-02", "title": "OP-GS-02 服務禮儀常用語", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-GS-02 服務禮儀常用語.pdf", "questions": [{"id": "OP-GS-02-Q01", "stem": "當您在飯店大廳看見一位剛進門的顧客時，下列哪一項做法最符合服務標準？", "hint": "", "difficulty": "", "options": [{"text": "保持微笑並與顧客有眼神接觸，在三秒內主動說出「午安，您好」。", "correct": true, "explanation": "服務標準要求在見到顧客三秒內主動問候，並搭配眼神接觸與微笑，以展現親切感。"}, {"text": "為了不打擾顧客，先等顧客主動開口詢問後再回應。", "correct": false, "explanation": "SOP 明確禁止低頭不語或等待顧客先開口，這會顯得服務主動性不足。"}, {"text": "點頭示意即可，等顧客走到櫃檯前再進行口頭問候。", "correct": false, "explanation": "標準流程強調應在見到顧客「三秒內」主動問候，而非等到近距離接觸才開始。"}, {"text": "一邊處理手邊的電腦文書，一邊抬頭說「您好」。", "correct": false, "explanation": "問候時應專注並搭配眼神接觸，分心處理其他事務會讓顧客感到不被重視。"}], "answer_index": 0}, {"id": "OP-GS-02-Q03", "stem": "如果某項服務需要操作電腦查詢較久，您該如何與顧客溝通？", "hint": "", "difficulty": "", "options": [{"text": "先向顧客說：「好的，請您稍等，我這邊先為您查詢。」", "correct": true, "explanation": "回應應以清楚、正向為原則，且在執行查詢動作前必須先告知顧客稍候。"}, {"text": "沉默地快速操作電腦，等查到結果後再告知顧客。", "correct": false, "explanation": "長時間的沉默會讓顧客感到不安，應先口頭說明下一步動作。"}, {"text": "告訴顧客：「現在系統有點慢，您可能要等很久喔。」", "correct": false, "explanation": "回應應維持正向原則，而非傳遞負面或帶有抱怨性質的資訊。"}, {"text": "跟顧客說：「我查一下喔，大概可以吧。」", "correct": false, "explanation": "「大概可以」屬於含糊回應，容易造成服務糾紛或顧客誤解。"}], "answer_index": 0}, {"id": "OP-GS-02-Q04", "stem": "當顧客因為進房時間稍微延誤而向您反映時，最合適的應對順序為何？", "hint": "", "difficulty": "", "options": [{"text": "先向顧客致歉，說明處理方式並立即協助確認。", "correct": true, "explanation": "面對異常或延遲，應先致歉再說明處理方式，語氣需穩定且不推卸責任。"}, {"text": "先解釋是因為房務人員太少，所以才會延誤。", "correct": false, "explanation": "這屬於推諉責任的表現，SOP 要求語氣需穩定且不找藉口。"}, {"text": "只道歉不處理，重複說：「不好意思，造成您的不便。」", "correct": false, "explanation": "SOP 明確規定致歉後需接續具體的處理動作，不可只道歉不處理。"}, {"text": "直接請主管出來處理，不需進行初步對話。", "correct": false, "explanation": "現場夥伴應先進行初步致歉並告知會如何處理，而非第一時間就放棄溝通。"}], "answer_index": 0}, {"id": "OP-GS-02-Q05", "stem": "服務完成，顧客準備離開飯店前往景點時，哪一種服務行為是錯誤的？", "hint": "", "difficulty": "", "options": [{"text": "主動說：「謝謝您，祝您今天一切順心。」", "correct": false, "explanation": "這是標準的感謝與送客語，有助於提升品牌形象。"}, {"text": "除了口頭送客，同時要有目送顧客離開的動作。", "correct": false, "explanation": "送客不僅是語言，視覺上的目送也是禮儀的一部分。"}, {"text": "說完「謝謝您」後，趁顧客還在門口時立刻蹲下整理櫃檯內的垃圾桶。", "correct": true, "explanation": "SOP 規定不可在顧客尚未離開前就轉身做自己的事，這會讓服務顯得虎頭蛇尾。"}, {"text": "親切地提醒顧客：「若還有需要歡迎再跟我們說。」", "correct": false, "explanation": "這展現了後續服務的熱忱，符合感謝語的精神。"}], "answer_index": 2}, {"id": "OP-GS-02-Q06", "stem": "顧客詢問某個他館的活動資訊，但您並不清楚細節，下列哪種說法最合適？", "hint": "", "difficulty": "", "options": [{"text": "「這不是我負責的，您可以打電話問那間旅館。」", "correct": false, "explanation": "這屬於禁用語中的推諉，會讓顧客覺得服務生硬、不被協助。"}, {"text": "「我這邊先幫您確認正確窗口，請您稍等一下。」", "correct": true, "explanation": "即使無法立即回答，也應說明原因、提供替代方案或主動協助查詢。"}, {"text": "「不知道耶，飯店官網應該有寫，您自己看。」", "correct": false, "explanation": "「不知道」與「你自己看」皆為禁用語，是不負責任的應對方式。"}, {"text": "「不好意思，我們這邊不行查他館的資訊。」", "correct": false, "explanation": "應避免直接生硬地說「不行」，而應轉化為積極的協助態度。"}], "answer_index": 1}, {"id": "OP-GS-02-Q07", "stem": "新進夥伴在教育訓練期間，應如何使用「七大常用語」？", "hint": "", "difficulty": "", "options": [{"text": "只需在被主管盯場時使用，平常可以隨意說話。", "correct": false, "explanation": "常用語應融入日常執勤中，成為自然的習慣。"}, {"text": "應於教育訓練期間熟悉，並在值勤期間優先且自然地使用。", "correct": true, "explanation": "SOP 規定新進夥伴需熟悉這些語言，並於執勤期間優先使用，以確保服務標準化。"}, {"text": "只要背下文字即可，不需要考慮語氣或情境。", "correct": false, "explanation": "教育訓練的目標是「自然使用」，包含語氣、態度與情境的配合。"}, {"text": "盡量使用過度口語化的方式來拉近與客人的距離。", "correct": false, "explanation": "SOP 提醒需避免過度口語化，應維持專業的服務禮儀常用語。"}], "answer_index": 1}, {"id": "OP-GS-02-Q08", "stem": "在處理顧客投訴飯店設施故障時，下列哪一項「致歉用語」的原則是錯誤的？", "hint": "", "difficulty": "", "options": [{"text": "說話語氣需保持穩定。", "correct": false, "explanation": "穩定的語氣能安撫顧客情緒，是致歉的基本要求。"}, {"text": "如果真的是工程部的疏失，可以向顧客說明是哪位同事的錯。", "correct": true, "explanation": "SOP 要求致歉時「不推責」，將內部疏失歸咎於特定人員是不專業的行為。"}, {"text": "先致歉，再說明後續的處理方式。", "correct": false, "explanation": "這是標準的處理順序，先表達歉意再展現解決問題的誠意。"}, {"text": "致歉後應接續具體的處理動作（如立即派人維修）。", "correct": false, "explanation": "具體動作才能真正解決顧客問題，僅有口頭道歉是不夠的。"}], "answer_index": 1}, {"id": "OP-GS-02-Q09", "stem": "關於「禁用語與替代說法」，當顧客提出一個違反飯店規範的要求時，該如何應對？", "hint": "", "difficulty": "", "options": [{"text": "直接說「不行」，讓顧客知道飯店的底線。", "correct": false, "explanation": "「不行」是直接生硬的語句，應避免使用。"}, {"text": "先說明原因，並嘗試提供替代方案或協助查詢折衷辦法。", "correct": true, "explanation": "即使結果是拒絕，也應透過說明原因或提供替代方案來降低顧客的不適感。"}, {"text": "告訴顧客：「規定就是這樣，我也沒辦法。」", "correct": false, "explanation": "這屬於消極的回應方式，沒有提供顧客下一個步驟或解釋。"}, {"text": "不說話，直接把飯店規章推給顧客看。", "correct": false, "explanation": "這符合「你自己看」的生硬態度，缺乏服務溫度與專業溝通。"}], "answer_index": 1}, {"id": "OP-GS-02-Q10", "stem": "在「七大常用語」中，哪一句話最適合用來結束一段服務，讓顧客感受到被尊重？", "hint": "", "difficulty": "", "options": [{"text": "「謝謝您，祝您今天一切順心。」", "correct": true, "explanation": "這句話結合了感謝與祝福，是送客與結束服務時非常標準且暖心的常用語。"}, {"text": "「好啦，就這樣。」", "correct": false, "explanation": "這屬於過度口語化的用語，不符合專業服務標準。"}, {"text": "「您慢走。」", "correct": false, "explanation": "雖然也是送客，但相較於 SOP 推薦的「祝您一切順心」，顯得較為簡短且例行公事。"}, {"text": "「再見。」", "correct": false, "explanation": "過於日常且單薄，應使用更具感謝意味與祝願的常用語。"}], "answer_index": 0}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
