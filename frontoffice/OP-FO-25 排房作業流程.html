<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-25 排房作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-25 排房作業流程</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-25排房作業流程.pdf｜9 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-25", "title": "OP-FO-25 排房作業流程", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-25排房作業流程.pdf", "questions": [{"id": "OP-FO-25-Q01", "stem": "當你在德安系統中發現同一位旅客「王大同」預訂了三間房間時，根據排房作業流程，你應該優先如何處理？", "hint": "", "difficulty": "", "options": [{"text": "將三間房間盡量安排在同一樓層，並優先進行排房。", "correct": true, "explanation": "SOP 指出同名多筆訂單應先行排房，且為了方便旅客與管理，應盡量排在同一樓層。"}, {"text": "為了分散客流量，應將這三間房間隨機分配到不同樓層。", "correct": false, "explanation": "將同名訂單分散樓層會增加旅客同行的不便，也不符合 SOP 優先排在同一樓層的原則。"}, {"text": "等當天所有單間預訂排完後，再處理這類多筆訂單的排房。", "correct": false, "explanation": "SOP 規定同名多筆訂單應「先行排房」，而非最後處理。"}, {"text": "直接交由系統自動分配，不需人工介入干預樓層。", "correct": false, "explanation": "SOP 要求人工確認特殊需求（如高樓層）並執行拖曳排房動作，以確保準確性。"}], "answer_index": 0}, {"id": "OP-FO-25-Q02", "stem": "在房況許可的情況下，以下哪一個房號應該盡量避開，不優先安排給部落客導覽入住？", "hint": "", "difficulty": "", "options": [{"text": "305 號房", "correct": true, "explanation": "SOP 明確列出 205、305、506、606、707、807為避難逃生設備房間，導覽拍照應避免安排。"}, {"text": "501 號房", "correct": false, "explanation": "SOP 僅提到應避免安排避難逃生設備房與角落房，501 並非文件中提到的限制房號。"}, {"text": "602 號房", "correct": false, "explanation": "602 是特殊房型，需確認 SF 或 DD 狀況，但並非 SOP 中列出應主動避開的避難設備房。"}, {"text": "502號房", "correct": false, "explanation": "SOP 僅提到應避免安排避難逃生設備房與角落房，502 並非文件中提到的限制房號。"}], "answer_index": 0}, {"id": "OP-FO-25-Q03", "stem": "執行「列印 R 卡」作業時，若遇到同批顧客有多個房號，為了避免浪費與重複，應該如何操作勾選清單？", "hint": "", "difficulty": "", "options": [{"text": "選入最小房號的房間做列印，列印出來後再將剩餘的房號依序手動寫上", "correct": true, "explanation": "SOP 規定在列印旅客登記卡時，應全選後取消勾選同批中數字最大的房號，以維持資料正確並減少浪費。"}, {"text": "直接點選「全選」並列印所有產出的 R 卡。", "correct": false, "explanation": "直接全選列印會導致多筆同名訂單重複列印，造成紙張浪費且不符合 SOP 規範。"}, {"text": "只勾選最小房號的訂單，其餘全部手動取消勾選。", "correct": false, "explanation": "SOP 的具體做法是取消「數字最大」者，而非僅選最小者，操作邏輯不符。"}, {"text": "先列印第一張，確認無誤後再手動一張張補印。", "correct": false, "explanation": "此做法效率過低，且 SOP 已有明確的大量處理勾選邏輯。"}], "answer_index": 0}, {"id": "OP-FO-25-Q04", "stem": "若旅客是透過 Agoda 訂房且已在線上完成付款，在製作「旅客住宿登記卡（R卡）」的備註時，下列哪種標註方式正確？", "hint": "", "difficulty": "", "options": [{"text": "備註寫「已付」，但不寫出具體金額。", "correct": true, "explanation": "根據補充說明 1，若由 Agoda 等平台串單，備註需寫已付，且嚴禁寫出具體金額。"}, {"text": "備註寫「已付」，並註明訂單上的總金額以便確認。", "correct": false, "explanation": "SOP 特別強調「不可以寫出金額」，以免因平台價差或商業契約產生爭議。"}, {"text": "備註寫「未付」，等旅客現場出示憑證後再修改。", "correct": false, "explanation": "既然系統顯示已串單且為已付狀態，應正確標註為「已付」，否則會導致櫃檯重複收款。"}, {"text": "備註寫「已授權」，代表款項由平台擔保。", "correct": false, "explanation": "對於 Agoda 等已結算之串單，SOP 要求標註「已付」而非「已授權」。"}], "answer_index": 0}, {"id": "OP-FO-25-Q05", "stem": "在填寫「房況表」時，關於房號標記的顏色規範，下列哪一項操作是正確的？", "hint": "", "difficulty": "", "options": [{"text": "在當日退房的房號上畫綠色螢光筆。", "correct": true, "explanation": "SOP 規範當日退房使用綠色螢光筆標記，以便快速識別空房進度。"}, {"text": "在當日預進的房號上畫紅色螢光筆。", "correct": false, "explanation": "SOP 規定當日預進房號應用「鉛筆圈起」，而非螢光筆。"}, {"text": "在續住的房號上畫紅色螢光筆，不需寫字。", "correct": false, "explanation": "紅色螢光筆適用於「留房」，且續住房需另外加註 I/H 與退房日期。"}, {"text": "在所有預計入住的房號上畫綠色螢光筆。", "correct": false, "explanation": "綠色螢光筆專用於「當日退房」，用於預進房會導致顏色判讀混亂。"}], "answer_index": 0}, {"id": "OP-FO-25-Q06", "stem": "若當日有外籍旅客預計退房，在房況表上除了標記退房顏色外，還需要做什麼特別註記？", "hint": "", "difficulty": "", "options": [{"text": "在該房號處註記星號 (*)。", "correct": true, "explanation": "SOP 特別規定若退房為外國人使用之房間，必須在房況表上注記星號。"}, {"text": "在該房號處註記該旅客的國籍名稱。", "correct": false, "explanation": "SOP 簡化標記為「星號」，並未要求寫出具體國籍。"}, {"text": "在該房號處用紅筆圈起來。", "correct": false, "explanation": "紅筆或紅色螢光筆另有他用，SOP 對於外籍退房的規範是使用星號。"}, {"text": "在該房號備註欄寫下「Foreigner」。", "correct": false, "explanation": "SOP 統一使用星號標記，以維持表格簡潔並符合內部標準代碼。"}], "answer_index": 0}, {"id": "OP-FO-25-Q07", "stem": "當你在排房時發現有一間訂房CT 房型旅客備註需要「併床」，你應該如何處理排房表？", "hint": "", "difficulty": "", "options": [{"text": "直接在排房表上將房型狀態更改為「併」。", "correct": true, "explanation": "SOP 提到 CT 房型為兩小床，若有併床需求，應直接在排房表上更改為「併」。"}, {"text": "在房況表的備註欄寫上「需要併床」，由房務現場判斷。", "correct": false, "explanation": "SOP 要求直接在排房表上進行狀態更改，而不僅僅是寫在備註欄。"}, {"text": "將該訂單更改為標準大床房 (DBL) 以節省作業時間。", "correct": false, "explanation": "任意更改旅客預訂的房種（CT 轉 DBL）可能違反合約或影響排房規劃。"}, {"text": "不需在表單註記，只需口頭交代交班人員即可。", "correct": false, "explanation": "口頭交接容易遺漏，SOP 規定需在排房表上進行正式更改。"}], "answer_index": 0}, {"id": "OP-FO-25-Q09", "stem": "在填寫「房況表」時，如果某個房間的住客需要使用「床圍」，你應該將此資訊填寫在何處？", "hint": "", "difficulty": "", "options": [{"text": "填寫在房號的備註空格中，並註明備品名與數量。", "correct": true, "explanation": "SOP 規範應在房號的備註空格中寫上當日入住房客需要的備品名及數量（如：床圍*1）。"}, {"text": "填寫在 R 卡的右下角空白處。", "correct": false, "explanation": "R 卡主要是給旅客確認資料與備註付款狀態，備品調度應記錄在房況表上。"}, {"text": "填寫在德安系統的「訂單備註」即可，不需寫在紙本表單。", "correct": false, "explanation": "雖然系統需記錄，但房況表是現場作業與房務溝通的核心工具，必須依 SOP 填寫。"}, {"text": "記錄在交班簿上，不需影響房況表的格式。", "correct": false, "explanation": "SOP 已明確規定備品需求應寫在房號旁的備註格中，以便房務作業時一目了然。"}], "answer_index": 0}, {"id": "OP-FO-25-Q10", "stem": "關於 602 號房的房況作業，下列哪項描述符合 SOP 的特殊執行說明？", "hint": "", "difficulty": "", "options": [{"text": "它是特殊房型，需確認當日要做 SF（單床）或 DD（雙床）並填入表內。", "correct": true, "explanation": "SOP 第 9 點明確指出 602 為特殊房型，需在查房狀況表上確認並填寫 SF 或 DD。"}, {"text": "它是避難設備房，除非其他房間滿房，否則不排入 602。", "correct": false, "explanation": "避難設備房是 202, 305, 606, 807，602 是屬於「特殊房型」需確認配置，而非避難房。"}, {"text": "它是角落房，排房時應盡量跳過此房號。", "correct": false, "explanation": "SOP 雖說避開角落房，但對 602 的具體指令是確認 SF/DD，而非全面避免安排。"}, {"text": "它是唯一需要用紅鉛筆圈選的預進房號。", "correct": false, "explanation": "SOP 規定預進房號統一用「鉛筆」圈起，並未對 602 規定特殊的顏色標記。"}], "answer_index": 0}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
