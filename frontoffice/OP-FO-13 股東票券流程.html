<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-13 股東票券流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-13 股東票券流程</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-13 股東票券流程.pdf｜8 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-13", "title": "OP-FO-13 股東票券流程", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-13 股東票券流程.pdf", "questions": [{"id": "OP-FO-13-Q01", "stem": "有一位客人在電話中表示想預約「中秋節連假」期間使用股東票券入住，身為訂房人員，你應該如何處理？", "hint": "請回想 SOP 中關於特定日期的使用規範限制。", "difficulty": "", "options": [{"text": "直接為客人查詢剩餘房況並協助訂房", "correct": false, "explanation": "忽視了特定節日的使用限制，可能導致後續核銷失敗。"}, {"text": "委婉告知國定假日及連續假期不開放使用該票券", "correct": true, "explanation": "股東票券在國定假日及連假期間是不適用的，應在初步諮詢時就明確告知。"}, {"text": "請客人先傳送票券照片，確認代碼後再決定是否開放", "correct": false, "explanation": "即便票券代碼正確，日期若屬於連假，規則上仍無法受理。"}, {"text": "告知連假需以原價入住，票券僅能折抵 $500$ 元", "correct": false, "explanation": "隨意更改票券優惠內容並不符合操作流程，應直接依照日期規範執行。"}], "answer_index": 1}, {"id": "OP-FO-13-Q02", "stem": "在電話預約階段，為了確保票券內容核對準確並避免聽覺誤差，下列哪一項是建議的操作方式？", "hint": "通訊軟體的便利性可以解決電話溝通中的訊息落差。", "difficulty": "", "options": [{"text": "請客人在電話中逐字唸出票券後方的所有使用須知", "correct": false, "explanation": "口頭核對繁瑣且容易發生聽錯或誤解，效率較低。"}, {"text": "請客人將票券正、反面拍攝後傳送至官方 LINE 帳號", "correct": true, "explanation": "透過影像確認券碼、須知與印章最為清晰，能有效降低人工輸入錯誤。"}, {"text": "要求客人將票券正本先行掛號郵寄至旅館辦公室", "correct": false, "explanation": "這會增加客人的麻煩與寄送風險，並非初審階段的必要流程。"}, {"text": "僅記錄客人提供的姓名與電話，待現場入住再核對票券", "correct": false, "explanation": "未在訂房階段初審票券，若現場發現票券有問題將導致爭議。"}], "answer_index": 1}, {"id": "OP-FO-13-Q03", "stem": "當客人預約在「週六」使用股東票券入住時，訂房人員在報價時必須特別注意什麼？", "hint": "假日的計價方式與平日不同，且必須在確認階段主動提醒金額。", "difficulty": "", "options": [{"text": "告知假日房價需以原價計算，不提供任何折扣", "correct": false, "explanation": "這會讓客人損失應有的權益，股東票券在假日仍有其優惠折數。"}, {"text": "主動告知假日房價以 $6$ 折計算，並說明折後應付金額", "correct": true, "explanation": "針對假日入住，應主動說明折扣標準（$6$ 折）並讓客人清楚最終需支付的房費。"}, {"text": "告知假日的折扣與平日相同，均不需額外補貼", "correct": false, "explanation": "忽略了平日與假日的計價差異，可能造成現場收費時的糾紛。"}, {"text": "請客人自行查閱票券後方的假日收費標準，不另行口頭告知", "correct": false, "explanation": "訂房人員有義務在最後確認階段主動核對並重複折後金額。"}], "answer_index": 1}, {"id": "OP-FO-13-Q04", "stem": "在資料蒐集與備註階段，除了基本資料外，哪一項資訊是必須詢問並記錄的細節？", "hint": "考量客人的交通需求與現場作業的安排。", "difficulty": "", "options": [{"text": "客人的交通方式（是否開車）及預計抵達時間", "correct": true, "explanation": "掌握交通與抵達時間有助於安排停車位與接待人力，是 SOP 規定的蒐集項目。"}, {"text": "客人的職業背景與過往入住其他飯店的經驗", "correct": false, "explanation": "這些屬於過度蒐集的私人資料，並非標準訂房作業的核心項目。"}, {"text": "確認客人是否願意支付額外費用升等房型", "correct": false, "explanation": "雖然是銷售機會，但並非 SOP 流程中針對票券預約指定的必填資訊。"}, {"text": "詢問客人的票券購買來源或購買價格", "correct": false, "explanation": "重點應在於核對票券本身的真偽與規範，而非其取得管道。"}], "answer_index": 0}, {"id": "OP-FO-13-Q05", "stem": "針對「假日的票券預約」，為了確保訂單有效性，訂房人員應提醒客人完成哪項程序？", "hint": "假日的訂單通常需要金流上的擔保，例如匯款或授權。", "difficulty": "", "options": [{"text": "假日入住只需口頭確認即可，不需支付任何款項", "correct": false, "explanation": "未進行擔保可能導致客人爽約，且不符合假日的特殊作業要求。"}, {"text": "提醒客人入住當日必須先支付全額原價現金作為押金", "correct": false, "explanation": "收費金額與方式應依折扣後房費為準，而非要求全額原價現金。"}, {"text": "要求客人必須先行授權或匯款剩餘的房費金額", "correct": true, "explanation": "對於假日入住，預先收取或授權餘額房費是保障營收的重要步驟。"}, {"text": "請客人在 LINE 上面回覆「同意入住」即可取代匯款", "correct": false, "explanation": "文字回覆不具備實質的金流保障功能。"}], "answer_index": 2}, {"id": "OP-FO-13-Q06", "stem": "在系統中辦理「股東票券」的入住核銷作業時，關於訂金的錄入方式何者正確？", "hint": "這類票券的系統操作比一般訂單更簡便，不需要處理訂金入帳。", "difficulty": "", "options": [{"text": "必須先在系統手動錄入與房費相等的虛擬訂金", "correct": false, "explanation": "這會導致系統帳務邏輯錯誤，SOP 針對此類票券有簡化處理。"}, {"text": "無須錄入訂金，直接選擇入住即可", "correct": true, "explanation": "股東票券的特性在系統操作上不需錄入訂金，簡化流程以符合票券核銷邏輯。"}, {"text": "將票券代碼輸入在訂金備註欄，並錄入 $1$ 元作為記號", "correct": false, "explanation": "不正確的錄入金額會影響財務報表的準確性。"}, {"text": "必須等待主管授權後，方可進入系統錄入訂金", "correct": false, "explanation": "SOP 已明確規定此票券的操作流程，不需逐筆申請授權錄入訂金。"}], "answer_index": 1}, {"id": "OP-FO-13-Q07", "stem": "辦理入住時，若發現客人的實體住宿券上有明顯的塗改痕跡，應如何處理？", "hint": "票券的完整性是核銷成功的關鍵，任何更動都應視為異常。", "difficulty": "", "options": [{"text": "只要券碼清晰，塗改處不影響辨識即可接受", "correct": false, "explanation": "塗改可能涉及非法變造或效期爭議，不能輕易允收。"}, {"text": "視為票券瑕疵，應根據異常狀況處理規範進行處置", "correct": true, "explanation": "塗改痕跡是票券瑕疵的徵兆，必須依 SOP 異常流程判斷其合法性或拒絕使用。"}, {"text": "請客人在塗改處簽名確認，即可視同有效票券", "correct": false, "explanation": "簽名並不能修復票券本身的效力，仍存在核銷失敗的風險。"}, {"text": "將塗改處拍照上傳，等退房後再請後勤單位判斷", "correct": false, "explanation": "核銷應在入住辦理階段完成，若退房後才發現無效會難以追回房費。"}], "answer_index": 1}, {"id": "OP-FO-13-Q08", "stem": "若客人抵達現場辦理入住時表示「忘記帶票券正本」，櫃檯人員應給予什麼提醒？", "hint": "正本票券與優惠的關係是「必要條件」。", "difficulty": "", "options": [{"text": "告知只要有 LINE 的照片截圖，一樣可以享有優惠", "correct": false, "explanation": "照片僅供初審，現場必須回收實體券才能完成核銷流程。"}, {"text": "告知必須攜帶票券正本，否則將影響優惠核銷", "correct": true, "explanation": "實體票券是優惠核銷的唯一憑證，未帶正本會導致無法依票券優惠計價。"}, {"text": "請客人現場填寫切結書，承諾一週內寄回即可", "correct": false, "explanation": "SOP 中並未提及切結書替代方案，未帶正本通常需改按一般方式收費。"}, {"text": "直接請客人返家領取，否則櫃檯不能為其辦理入住", "correct": false, "explanation": "應告知對優惠核銷的影響，而非直接拒絕入住，通常會涉及計價方式的變更。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
