<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-23 非住宿旅客參訪 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-23 非住宿旅客參訪</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-23 非住宿旅客參訪.pdf｜7 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-23", "title": "OP-FO-23 非住宿旅客參訪", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-23 非住宿旅客參訪.pdf", "questions": [{"id": "OP-FO-23-Q01", "stem": "當一位訪客步入大廳，且並非飯店住客時，櫃檯夥伴的第一步行動應為何？", "hint": "", "difficulty": "", "options": [{"text": "請對方先在沙發區稍坐，並遞上茶水招待", "correct": false, "explanation": "尚未確認來客身份與意圖前，過早安排座位可能導致後續流程不順或影響大廳秩序。"}, {"text": "主動詢問來客身份以及進來飯店的具體目的", "correct": true, "explanation": "優先確認身份與來意是標準作業流程的第一步，能協助後續判斷應適用的處理規範。"}, {"text": "直接帶領訪客前往電梯口介紹環境", "correct": false, "explanation": "未經身份確認與登記便讓非住宿旅客進入客房層，會產生嚴重的安全管理漏洞。"}, {"text": "要求訪客立即出示身分證件進行登記", "correct": false, "explanation": "在確認來意前直接要求證件可能顯得唐突，應先透過詢問引導出客人的參訪需求。"}], "answer_index": 1}, {"id": "OP-FO-23-Q02", "stem": "某位訪客表示自己是主管 Kevin 的熟人想參觀，但你查閱交接事項後發現今日並無相關預約，應如何處理？", "hint": "", "difficulty": "", "options": [{"text": "請顧客留下姓名及手機，聯繫當班主管或 Kevin 確認，並請客人在一樓稍候", "correct": true, "explanation": "當交接事項未記載時，必須先取得連繫資訊並向上呈報，且嚴禁在確認前讓客人才上樓。"}, {"text": "既然是主管的熟人，可先行帶領其參觀以示禮貌，事後再補報備", "correct": false, "explanation": "這違反了「切勿直接讓顧客上樓」的禁令，且可能造成主管行程安排上的困擾。"}, {"text": "告知目前無預約故無法接待，請顧客自行撥打電話聯繫主管", "correct": false, "explanation": "這種做法缺乏服務熱誠，應由櫃檯協助聯繫主管，而非讓客人自行處理。"}, {"text": "請顧客在大廳稍坐，不需登記資料，直接等主管下樓巡視時再處理", "correct": false, "explanation": "未留下基本資料將導致無法追蹤來訪紀錄，且被動等待會導致客人感受不佳。"}], "answer_index": 0}, {"id": "OP-FO-23-Q03", "stem": "若聯繫主管後確認該訪客確實為公司高層熟識，且當下營運情況允許，後續應如何安排？", "hint": "", "difficulty": "", "options": [{"text": "由櫃檯夥伴親自離崗帶領訪客進行全館介紹", "correct": false, "explanation": "櫃檯人員需留守崗位，且流程規定確認熟人身份後應由主管進行專業介紹。"}, {"text": "請訪客自行搭電梯上樓，並請其參觀完後回櫃檯領取紀念品", "correct": false, "explanation": "非住宿旅客的參觀應由人員陪同導覽，而非由其獨自在館內活動。"}, {"text": "請值班主管下樓接待，並進行全館瀏覽介紹", "correct": true, "explanation": "高層熟人參訪在確認身份後，由主管親自帶領介紹能確保服務品質與專業度。"}, {"text": "僅能指引其在 1 樓展覽區活動，不可前往客房層", "correct": false, "explanation": "針對確認過的熟識貴賓，在情況允許下是可以進行全館導覽的。"}], "answer_index": 2}, {"id": "OP-FO-23-Q04", "stem": "一對情侶路過飯店想參觀環境，此時已是晚上 7 點半，櫃檯夥伴應如何指引？", "hint": "", "difficulty": "", "options": [{"text": "請其登記資料後，開放 11 點前的時段供其上樓快速參觀", "correct": false, "explanation": "晚間 7 點後已超過參訪時間，不得開放上樓，應嚴格遵守時段限制。"}, {"text": "告知目前的參訪時間已過，僅能參觀一樓大廳，並需留意其動向", "correct": true, "explanation": "超過參訪時限（11:00-19:00）的民眾僅限於 1 樓活動，且人員需維持現場監控。"}, {"text": "為了顧客滿意度，破例開放並請其於 10 分鐘內離開客房區", "correct": false, "explanation": "非預約民眾的參訪時間限制是為了維護住宿旅客的隱私與安全，不應隨意破例。"}, {"text": "請其先至櫃檯登記，再告知可由其自行上樓參觀公設", "correct": false, "explanation": "不論何時，一般路過民眾均不應在無人員引導下自行前往客房樓層。"}], "answer_index": 1}, {"id": "OP-FO-23-Q05", "stem": "一組由 4 位朋友組成的參訪團體欲參觀飯店，關於登記作業的正確流程為何？", "hint": "", "difficulty": "", "options": [{"text": "為了安全起見，要求 4 位參訪者皆必須留下姓名與手機", "correct": false, "explanation": "針對多人參訪，SOP 規定僅需留一位代表即可，以兼顧行政效率。"}, {"text": "請其中一位代表留下姓名及聯絡電話進行登記即可", "correct": true, "explanation": "這是符合多人參訪作業說明的簡化登記方式，只要有一位負責人資訊即可追蹤。"}, {"text": "不需登記資料，直接由櫃檯口頭引導參觀路線即可", "correct": false, "explanation": "遺漏登記手續將導致安全管理斷點，且無法符合非住宿旅客參訪的基本規範。"}, {"text": "要求其出示身分證件並拍照存檔後方可進入", "correct": false, "explanation": "SOP 僅要求留下大名與電話，過度的個資索取可能引發客訴。"}], "answer_index": 1}, {"id": "OP-FO-23-Q06", "stem": "當客人明確表達「我想要預訂下週的房間，但想先看過實際房型」，櫃檯夥伴應如何安排？", "hint": "", "difficulty": "", "options": [{"text": "直接給予客人空房鑰匙卡，請其自行上樓查看", "correct": false, "explanation": "嚴禁讓非住宿者單獨持有鑰匙卡或獨自進入房間，必須有同仁陪同。"}, {"text": "告知現在是參訪時間以外，請其明天中午再來參觀", "correct": false, "explanation": "欲訂房客人的看房需求應積極處理，而非僵化地套用一般參訪的時間限制。"}, {"text": "通知值班主管，請主管親自帶領顧客參觀空出的房間", "correct": true, "explanation": "針對有訂房意願的參觀者，應由主管引導參觀，能提高轉單機會並確保管理安全。"}, {"text": "請客人至官方網站查看照片即可，現場不提供參觀服務", "correct": false, "explanation": "這會導致潛在客戶流失，現場參觀是飯店銷售的重要環節。"}], "answer_index": 2}, {"id": "OP-FO-23-Q07", "stem": "多位民眾專程前來參觀飯店內舉辦的藝術展覽，夥伴在引導時應注意什麼？", "hint": "", "difficulty": "", "options": [{"text": "不論展覽性質，一律禁止參觀者拍照以維護版權", "correct": false, "explanation": "SOP 指出應「依照展覽設計」指引，而非強制設定統一禁令。"}, {"text": "按照展覽簽到方法請參觀者確實簽到，並指引規定的參觀路線", "correct": true, "explanation": "確實簽到能掌握展覽人流，指引特定路線則可避免參觀民眾誤入房務工作區。"}, {"text": "請參觀者自行在大廳活動，不需額外簽到或引導", "correct": false, "explanation": "漏掉簽到步驟會導致活動數據缺失，且無引導可能造成人潮混亂。"}, {"text": "僅限已訂房旅客才能參觀，拒絕路過民眾進入展區", "correct": false, "explanation": "展覽參觀通常對外開放，這與非住宿旅客參訪的初衷相符。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
