<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-15 訪客接待流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-15 訪客接待流程</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-15 訪客接待流程.pdf｜5 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-15", "title": "OP-FO-15 訪客接待流程", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-15 訪客接待流程.pdf", "questions": [{"id": "OP-FO-15-Q01", "stem": "當一位訪客來到櫃檯並表示要找住客時，作為櫃檯人員，第一時間最正確的服務儀態與開場白為何？", "hint": "請思考在標準作業流程中，強調服務溫度與「不讓顧客感受到被質疑」的關鍵動作。", "difficulty": "", "options": [{"text": "起身並微笑親切地詢問：「您好，有什麼可以協助您的部分呢？」", "correct": true, "explanation": "良好的首要印象應包含主動起身與親切微笑，並使用標準化話術進行詢問。"}, {"text": "坐在位置上禮貌詢問：「您好，請問您要找哪一位住客？」", "correct": false, "explanation": "維持坐姿可能會讓訪客感受到被冷落或不夠受重視，應起身迎接以展現服務專業。"}, {"text": "先確認對方的身分證件，並詢問：「您好，請問有什麼事嗎？」", "correct": false, "explanation": "第一時間應先進行親切的問候與協助意願表達，而非直接進入質疑或查驗身分的程序。"}, {"text": "直接詢問：「您好，請問您有與住客約好嗎？」", "correct": false, "explanation": "此問法較容易讓訪客感受到被質疑或拒絕，不符合親切有禮的標準作業規範。"}], "answer_index": 0}, {"id": "OP-FO-15-Q02", "stem": "若住客已事先告知櫃檯有朋友來訪，當訪客到達櫃檯並正確報出住客全名後，下一步正確的操作流程是什麼？", "hint": "確認住客意願與維持電梯門禁安全是此情境的核心步驟。", "difficulty": "", "options": [{"text": "直接告知訪客房號，並請其自行搭乘電梯上樓", "correct": false, "explanation": "為了住客隱私與安全，不應直接口頭告知房號，應由人員協助感應電梯。"}, {"text": "致電住客房間確認，得到同意後協助感應電梯讓訪客上樓", "correct": true, "explanation": "致電確認能確保住客當下的方便性，協助感應電梯則是落實門禁控管的必要步驟。"}, {"text": "請訪客在沙發區稍坐，告知住客後請住客親自下來帶訪客", "correct": false, "explanation": "若住客已表示同意，櫃檯應主動提供協助感應電梯的服務，而非強制住客下樓接待。"}, {"text": "查詢訂單確認住客在房內後，給予訪客臨時感應卡上樓", "correct": false, "explanation": "給予訪客感應卡並非 SOP 中的流程，標準作法是由櫃檯人員協助感應電梯。"}], "answer_index": 1}, {"id": "OP-FO-15-Q03", "stem": "一位訪客表示要找某位住客，但該住客之前已交代櫃檯「請勿打擾」，此時你應該如何得體地回應訪客？", "hint": "當需要保護隱私或住客不希望被打擾時，有一句特定且不露聲色的應對話術。", "difficulty": "", "options": [{"text": "「不好意思，該住客現在交代我們請勿打擾。」", "correct": false, "explanation": "直接透露住客交代「請勿打擾」會間接證實住客在房內，未能有效保護住客隱私。"}, {"text": "「您好，目前沒有查詢到訂單耶。」", "correct": true, "explanation": "這是保護住客隱私的標準話術，能優雅地婉拒訪客而不透露住客的實際留宿狀態。"}, {"text": "「目前住客不方便接見朋友，請您晚點再聯繫。」", "correct": false, "explanation": "此回應語氣較生硬且透露了住客的存在，不符合 SOP 對於隱私權的保護要求。"}, {"text": "「幫您聯繫一下住客，請您稍等。」", "correct": false, "explanation": "住客已明確告知請勿打擾，若此時再致電確認會干擾到住客的休息。"}], "answer_index": 1}, {"id": "OP-FO-15-Q04", "stem": "在處理訪客接待時，關於電話的使用，下列哪一個操作符合 SOP 的注意事項？", "hint": "當訪客缺乏通訊工具時，櫃檯應提供合宜的硬體支援。", "difficulty": "", "options": [{"text": "若訪客沒有手機，可以引導其使用櫃檯電話聯繫住客", "correct": true, "explanation": "提供櫃檯電話作為輔助通訊工具，是 SOP 中對於無手機訪客的友善配套措施。"}, {"text": "為了安全起見，禁止任何人使用櫃檯內部的電話機", "correct": false, "explanation": "雖然有安全考量，但 SOP 明確指出在特定情況下可協助顧客使用電話。"}, {"text": "請訪客到大廳公用電話區使用投幣式電話", "correct": false, "explanation": "主動提供櫃檯電話協助是更具備服務熱忱的做法，且能掌握聯繫的狀況。"}, {"text": "請同仁用私人手機幫訪客撥打給住客", "correct": false, "explanation": "使用員工私人設備不符合專業作業規範，應以飯店櫃檯設備為主。"}], "answer_index": 0}, {"id": "OP-FO-15-Q05", "stem": "一位訪客因「查無訂單」的情境被婉拒後離開了飯店，接下來櫃檯人員最關鍵的後續動作為何？", "hint": "在保護隱私的前提下，確保住客擁有對訪客資訊的知情權。", "difficulty": "", "options": [{"text": "立即在交接簿註記，防止該訪客再次進入飯店", "correct": false, "explanation": "除非访客有違規行為，否則單純的註記並非首要任務，應先通知受影響的住客。"}, {"text": "致電住客告知剛才有人來訪，但因隱私考量未告知房號", "correct": true, "explanation": "此舉能讓住客掌握外界訪蹤，同時體現飯店對隱私的重視，若客有需要可自行聯繫。"}, {"text": "不需做任何動作，以免再次干擾到住客", "correct": false, "explanation": "主動告知有人來訪是服務的一環，能讓住客決定是否要回撥或與對方取得聯繫。"}, {"text": "致電給主管詢問是否需要調閱監視器紀錄", "correct": false, "explanation": "若只是正常詢問且無異常狀況，並不需要立即升級到調閱監視器的層級。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
