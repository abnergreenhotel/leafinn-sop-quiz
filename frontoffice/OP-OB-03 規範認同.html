<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-OB-03 規範認同 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-OB-03 規範認同</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-OB-03 規範認同.pdf｜8 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-OB-03", "title": "OP-OB-03 規範認同", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-OB-03 規範認同.pdf", "questions": [{"id": "OP-OB-03-Q01", "stem": "在準備新進夥伴的報到文件時，若發現公司最近剛更新了加班申請制度，但手邊還留有幾份舊版的員工手冊，此時最正確的做法為何？", "hint": "請思考 SOP 中對於文件版本以及制度更新時的具體要求。", "difficulty": "", "options": [{"text": "為了環保，先將舊版手冊發放完畢，再口頭補充新規定。", "correct": false, "explanation": "使用過時的規範會導致資訊落差，增加後續勞資爭議的風險。"}, {"text": "全面換成最新版文件，並主動提供制度更新的相關公告。", "correct": true, "explanation": "確保資訊準確性是報到準備的首要原則，且必須一併提供最新的異動說明。"}, {"text": "在舊版手冊上用紅筆修正更新處，請夥伴在修正處旁簽名。", "correct": false, "explanation": "官方文件應保持整潔且版本統一，手工塗改容易造成權益界定模糊。"}, {"text": "直接移除舊版手冊中過時的頁面，僅保留不變動的部分。", "correct": false, "explanation": "文件完整性非常重要，隨意拆分頁面會導致夥伴閱讀內容不連貫且失去規範效力。"}], "answer_index": 1}, {"id": "OP-OB-03-Q02", "stem": "當你在向新進夥伴說明「規範內容」時，下列哪一種執行方式最符合服務標準作業指導書的要求？", "hint": "注意說明過程中，除了夥伴自己閱讀外，負責引導的人員應該扮演什麼角色。", "difficulty": "", "options": [{"text": "請夥伴先自行閱讀一小時，閱讀完後直接在末頁簽名即可。", "correct": false, "explanation": "SOP 明確規定不能僅要求簽名，必須先完成重點的口頭說明。"}, {"text": "將重點彙整成投影片，僅針對出勤與請假規則進行快速帶過。", "correct": false, "explanation": "除了出勤外，服儀、工作紀律與獎懲制度等皆是必須說明的重點項目。"}, {"text": "口頭說明員工手冊重點（含紀律與獎懲），並針對疑問處即時回應。", "correct": true, "explanation": "這符合 SOP 中要求的依序說明重點項目，並包含即時回覆或記錄疑問的流程。"}, {"text": "為了加速流程，告知夥伴內容與一般業界相同，只需確認個人資料。", "correct": false, "explanation": "每家公司的勞動條件與保密義務各異，簡化說明可能導致夥伴違反特定規定。"}], "answer_index": 2}, {"id": "OP-OB-03-Q03", "stem": "在說明勞動條件時，新進夥伴對於「試用期」的法律定義提出了較為專業的法規疑問，而你並不完全確定細節，此時應如何處理？", "hint": "當現場無法立即給出專業法規建議時，SOP 建議尋求哪些對象的協助？", "difficulty": "", "options": [{"text": "根據自己的理解先行回覆，以免顯現出專業度不足。", "correct": false, "explanation": "錯誤的資訊回覆可能會造成後續法律風險或夥伴的誤解。"}, {"text": "告知夥伴試用期是業界常態，請其先簽署文件以利報到完成。", "correct": false, "explanation": "規避問題無法解決疑義，且 SOP 規定涉及法規疑義時有特定的處理對象。"}, {"text": "將疑問記錄下來，隨後轉請主管或人資單位進行更精準的補充。", "correct": true, "explanation": "當涉及薪資、排班或法規等專業疑義時，由相關專責窗口回覆是標準做法。"}, {"text": "請夥伴自行上網查詢相關勞基法條，確認後再決定是否簽署。", "correct": false, "explanation": "公司有義務對其制定的規範內容進行正確的說明，而非讓員工自行推測。"}], "answer_index": 2}, {"id": "OP-OB-03-Q04", "stem": "在引導新進夥伴簽署文件的過程中，下列哪一個行為是明確禁止的？", "hint": "關於法律效力文件，最基本且不可通融的原則是什麼？", "difficulty": "", "options": [{"text": "要求夥伴在每一份文件的日期欄都要填寫當天日期。", "correct": false, "explanation": "這是正確的要求，確保文件生效日期的正確性與完整性。"}, {"text": "因為夥伴正在接受急單教育訓練，由你代為在保密協議上簽名。", "correct": true, "explanation": "SOP 嚴格禁止代簽行為，文件必須由當事人親自閱讀並完成簽署。"}, {"text": "在需要簽名的頁面貼上便條紙提醒，避免夥伴漏簽。", "correct": false, "explanation": "這屬於預先準備的範疇，有助於提高作業效率與正確率。"}, {"text": "請夥伴逐份閱讀內容後，再開始進行簽署動作。", "correct": false, "explanation": "這是 SOP 要求的標準步驟，確保夥伴在知悉內容的前提下簽署。"}], "answer_index": 1}, {"id": "OP-OB-03-Q05", "stem": "文件簽署完成後，負責人員正準備進行「複核」步驟。此時最重要的一項檢查內容是什麼？", "hint": "複核的目的是為了確保文件具備「法律完整性」，應側重於哪些檢查項？", "difficulty": "", "options": [{"text": "確認夥伴的字體是否端正清晰。", "correct": false, "explanation": "雖然清晰度重要，但字體端正與否並非 SOP 複核流程中的核心安全檢查點。"}, {"text": "立即掃描成電子檔存入雲端硬碟備份。", "correct": false, "explanation": "複核應先於歸檔，確保紙本文件完整後再進行後續的行政處理。"}, {"text": "逐頁檢查是否有漏簽名、漏填日期或頁面附件不齊全的情況。", "correct": true, "explanation": "逐頁檢查漏簽與漏附文件是確保報到法律文件具備完整效力的關鍵步驟。"}, {"text": "詢問夥伴是否已經記住所有手冊內容。", "correct": false, "explanation": "複核階段的重點在於「文件完整性」的檢查，而非記憶力測驗。"}], "answer_index": 2}, {"id": "OP-OB-03-Q06", "stem": "如果在複核時發現夥伴漏簽了一份「勞資規範同意書」，但該夥伴已經前往其他部門工作。根據規範，這筆漏件應何時處理完畢？", "hint": "對於缺件的補齊，SOP 是否有明確的時間急迫性要求？", "difficulty": "", "options": [{"text": "等到試用期滿前，一併檢查所有缺失並補正。", "correct": false, "explanation": "延遲處理會導致報到流程處於未完成狀態，增加管理上的風險。"}, {"text": "必須於發現漏件的「當日」聯繫夥伴完成補件。", "correct": true, "explanation": "SOP 明確規定若有缺件，需當日完成補件，且文件複核完成前不得直接歸檔。"}, {"text": "由負責人員自行補上夥伴姓名，並在交接紀錄註記。", "correct": false, "explanation": "這屬於代簽行為，嚴重違反作業規範且具法律風險。"}, {"text": "註記在待辦事項中，等到下一次會議時再找夥伴簽署。", "correct": false, "explanation": "SOP 要求的是即時性，且報到流程未完成前，人員的身分規範認同尚不完整。"}], "answer_index": 1}, {"id": "OP-OB-03-Q07", "stem": "新進夥伴報到流程結束後，簽署好的個人文件暫時還沒交給主管。關於這些文件的放置位置，下列何者正確？", "hint": "請從「資訊安全」與「個資保護」的角度思考，哪些區域是不被允許的？", "difficulty": "", "options": [{"text": "暫放在櫃檯顯眼處，方便主管經過時直接拿走。", "correct": false, "explanation": "個人文件包含隱私與個資，不可任意放置於公共區域。"}, {"text": "夾在常用的交接簿中，讓下一班夥伴協助遞交。", "correct": false, "explanation": "這可能導致個資外洩給非相關人員，且公共交接簿並非妥善保管場所。"}, {"text": "妥善保管於指定位置，不可暴露於公共區域。", "correct": true, "explanation": "基於個資保護與作業規範，個人簽署文件必須妥善收納保管。"}, {"text": "放在夥伴休息室的桌上，讓夥伴自己隨時可以查看。", "correct": false, "explanation": "休息室亦屬於公共區域，且已簽署回傳的文件應由公司統一管理。"}], "answer_index": 2}, {"id": "OP-OB-03-Q08", "stem": "關於報到流程的「完成判定」，下列敘述何者最符合 SOP 精神？", "hint": "「報到完成」的指標是看口頭說明、領取手冊，還是最終的文件簽署？", "difficulty": "", "options": [{"text": "只要夥伴領取了員工手冊，即可視為報到流程完成。", "correct": false, "explanation": "領取並不代表認同或簽署，規範認同的核心在於「簽署」。"}, {"text": "若新進夥伴尚未完成所有規範文件的簽署，不可視為報到流程完成。", "correct": true, "explanation": "簽署文件是報到法律流程的最後一道防線，未完成則流程不算正式結束。"}, {"text": "只要口頭說明完畢，就算夥伴拒絕簽名也視為已完成程序。", "correct": false, "explanation": "口頭說明與書面簽署缺一不可，拒絕簽署代表流程中斷。"}, {"text": "夥伴已在現場排班工作，系統會自動預設報到流程已完成。", "correct": false, "explanation": "報到流程包含實質的行政手續，排班工作並不等於行政文件已備齊。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
