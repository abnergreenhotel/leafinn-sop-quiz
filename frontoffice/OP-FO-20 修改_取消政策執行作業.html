<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-20 修改:取消政策執行作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-20 修改:取消政策執行作業</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-20 修改:取消政策執行作業.pdf｜8 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-20", "title": "OP-FO-20 修改:取消政策執行作業", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-20 修改:取消政策執行作業.pdf", "questions": [{"id": "OP-FO-20-Q01", "stem": "有一位透過官網訂房的旅客，預計在 4 天後入住，但剛才來電表示因故需取消訂房。身為櫃檯人員，在執行取消作業前，最優先的操作是什麼？", "hint": "除了處理流程，服務應對中還有一個「挽留」或「了解」的步驟。", "difficulty": "", "options": [{"text": "詢問取消原因並詢問是否願意改期", "correct": true, "explanation": "這能協助飯店了解客群流失原因，並透過延期保留訂單，減少房費損失。"}, {"text": "直接在系統執行取消並告知下次再來", "correct": false, "explanation": "直接取消會忽略轉化訂單的機會，且未依流程紀錄取消原因。"}, {"text": "告知此為免費取消期限，請客人自行至官網處理", "correct": false, "explanation": "雖然可免費取消，但現場人員應主動協助處理並進行必要的溝通詢問。"}, {"text": "確認信用卡號碼以便進行退款作業", "correct": false, "explanation": "此情境為入住前三日以上，若尚未扣款則無需退款流程，應先確認取消意向與原因。"}], "answer_index": 0}, {"id": "OP-FO-20-Q02", "stem": "旅客在入住前兩天要求取消訂房，當您告知需酌收 50% 房費時，旅客反應非常強烈且情緒激動。此時最妥當的處理方式為何？", "hint": "作業指導書中針對「顧客反應較大」時有明確的協助流程。", "difficulty": "", "options": [{"text": "堅持觀光局規定，告知無法優待", "correct": false, "explanation": "僵化的態度容易造成客訴，忽略了異常處理中的回報機制。"}, {"text": "確實記錄客人的情況與反應，並呈報主管協調退款事宜", "correct": true, "explanation": "遇到較大反應時，應紀錄詳細資訊後尋求主管授權處理，以平衡規定與顧客關係。"}, {"text": "為了平息客人怒火，直接答應免收手續費", "correct": false, "explanation": "第一線人員無權私自更改取消政策，應經由報備程序處理。"}, {"text": "建議客人改為入住當日再取消，規避 50% 費用", "correct": false, "explanation": "入住當日取消將收取 100% 費用，此建議會造成客人更大的損失。"}], "answer_index": 1}, {"id": "OP-FO-20-Q03", "stem": "一位官網訂房的旅客決定將訂單延期，但他目前還無法確定具體的入住日期。根據作業規範，您應該如何處理這筆訂單？", "hint": "這涉及到延期保留的時間上限與記錄方式。", "difficulty": "", "options": [{"text": "告知無法保留不確定的日期，請先辦理退費", "correct": false, "explanation": "這會損失已入帳的訂金，且不符合延期保留三個月的政策。"}, {"text": "請客人確定日期後再打來，先不做任何動作", "correct": false, "explanation": "未在系統紀錄或調整，會導致訂單狀態不明確且難以追蹤保留期限。"}, {"text": "先幫客戶保留到三個月期限的最後一天，並告知客人此期限", "correct": true, "explanation": "對於不確定日期者，設定最後期限能確保飯店權益，同時給予顧客彈性空間。"}, {"text": "無限期保留訂金，直到客人主動聯絡為止", "correct": false, "explanation": "長期未結的訂單會造成帳務管理困擾，且依規定逾期三個月後應沒收訂金。"}], "answer_index": 2}, {"id": "OP-FO-20-Q04", "stem": "在處理「官網訂房」的退款申請單（UOF系統）時，下列哪一項是必須上傳的附件圖片？", "hint": "需要提供系統端的證據來對應訂單與金額。", "difficulty": "", "options": [{"text": "客人的身分證件影本", "correct": false, "explanation": "取消政策流程中並未要求留存客人身分證件圖片。"}, {"text": "德安訂金狀態明細表與 WEB HOTEL 訂單截圖", "correct": true, "explanation": "這些截圖是證明退款金額與原始訂單正確性的重要審核依據。"}, {"text": "旅客手寫的取消申請書", "correct": false, "explanation": "作業流程主要依據系統內的單據與截圖，不包含手寫申請書。"}, {"text": "當初刷卡的信用卡正反面影本", "correct": false, "explanation": "基於資安原則，禁止且不需要留存信用卡正反面圖片。"}], "answer_index": 1}, {"id": "OP-FO-20-Q05", "stem": "一位在網路平台（如 Booking.com）訂房的旅客，打電話要求飯店幫他取消當日的訂單。您應如何回應？", "hint": "思考訂單的主導權在誰手上，以及飯店是否有權限變更平台訂單。", "difficulty": "", "options": [{"text": "請客人自行聯繫網路平台處理，並告知飯店端無法操作", "correct": true, "explanation": "網路平台訂單受平台合約約束，必須由平台端發起取消流程，飯店無法代勞。"}, {"text": "直接在德安系統點選取消單筆訂單", "correct": false, "explanation": "手動取消德安訂單若未經平台確認，會造成平台方仍視為有效訂單而產生佣金或爭議。"}, {"text": "告知客人今天取消可退一半費用", "correct": false, "explanation": "各平台取消政策不同，且當日取消通常不退款，不應給予錯誤的退款承諾。"}, {"text": "請客人提供銀行帳號，飯店直接匯款退費", "correct": false, "explanation": "平台代收的款項應透過平台退款，飯店直接退款會導致帳務錯亂。"}], "answer_index": 0}, {"id": "OP-FO-20-Q06", "stem": "針對「無特別規範」的網路平台訂單，若旅客在入住前 5 天提出取消，依照 SOP 應如何執行？", "hint": "注意 SOP 中對於網路平台「入住七天內」的特定規範。", "difficulty": "", "options": [{"text": "符合免費取消規範，告知客人直接在平台按取消", "correct": false, "explanation": "網路平台若無特別規範，入住七天內取消通常是不符合免費取消政策的。"}, {"text": "告知此情況不符合退款政策，平台會收取全額款項", "correct": true, "explanation": "依 SOP，無特別規範之平台訂單入住七天內為不可退款期，需明確告知權益。"}, {"text": "告知客人可保留金額延期三個月內入住", "correct": false, "explanation": "平台訂單通常不適用飯店自有的延期政策，應以平台的規範為主。"}, {"text": "請客人先聯絡主管爭取免扣款", "correct": false, "explanation": "應先明確告知政策，若客人有疑慮應請其聯繫平台客服，而非直接推給主管。"}], "answer_index": 1}, {"id": "OP-FO-20-Q07", "stem": "在完成取消或退款作業後，關於德安系統的「歷史備註」，下列哪項操作是正確的？", "hint": "紀錄應包含：時間、金錢、以及「誰做的」。", "difficulty": "", "options": [{"text": "在訂單 Profile 備註輸入退款日期、金額及申請人名稱", "correct": true, "explanation": "詳盡的歷史備註能確保後續查詢時，清楚了解該筆款項的去向與經辦人。"}, {"text": "只要在 UOF 系統填寫即可，德安不需紀錄", "correct": false, "explanation": "德安為前台主要管理系統，必須保留完整的訂單變動軌跡。"}, {"text": "直接刪除該筆訂單以清出房位", "correct": false, "explanation": "訂單應執行「取消」而非刪除，否則會失去所有歷史紀錄與追蹤資訊。"}, {"text": "在房型名稱後面加上「已退款」字樣", "correct": false, "explanation": "這不是標準的紀錄位置，應在 Profile 的備註欄中紀錄詳細資訊。"}], "answer_index": 0}, {"id": "OP-FO-20-Q08", "stem": "若旅客當初訂房是使用「信用卡預先授權」而未實際扣款，現在要辦理免費取消，櫃檯應如何處理？", "hint": "預先授權（Pre-auth）與實際請款（Charge）在金流上的性質不同。", "difficulty": "", "options": [{"text": "請客人提供銀行帳號，以便退還預授權金額", "correct": false, "explanation": "預授權僅是佔用額度而非實際轉帳，無須且無法透過匯款方式退還。"}, {"text": "告知客人飯店會進行取消預授權，额度將會返還", "correct": true, "explanation": "取消預授權會解除信用額度佔用，不會產生實際扣款帳單，這是正確的處理說明。"}, {"text": "必須先將預授權請款，再執行退費流程", "correct": false, "explanation": "這會產生額外的手續費且作業冗長，直接取消預授權才是最有效率的做法。"}, {"text": "告知客人需等三個月後額度才會自動恢復", "correct": false, "explanation": "飯店端手動取消後通常數日內即可恢復，不應給予錯誤的長時等待資訊。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
