<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-18 OTA 平台基礎 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-18 OTA 平台基礎</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-18 OTA 平台基礎.pdf｜7 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-18", "title": "OP-FO-18 OTA 平台基礎", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-18 OTA 平台基礎.pdf", "questions": [{"id": "OP-FO-18-Q01", "stem": "當櫃檯夥伴在核對 Booking.com 訂單時，發現系統顯示「預先授權失敗」，根據標準作業流程，第一時間應如何處理？", "hint": "注意 SOP 對於 Booking.com 平台特有的「授權失敗」處理標註規定。", "difficulty": "", "options": [{"text": "直接撥打電話給旅客要求匯款，若不匯款則逕行取消訂單。", "correct": false, "explanation": "SOP 規定 Booking.com 授權失敗應優先於後台留言告知，並非第一時間要求改為匯款或取消。"}, {"text": "至 Booking.com 平台後台留言告知旅客需更換信用卡，並同步標註信用卡無效。", "correct": true, "explanation": "這是針對 Booking.com 授權失敗的標準處理動作，確保有透過系統紀錄並通知旅客更新資訊。"}, {"text": "先不做處理，等旅客入住當天現場刷卡即可，以免影響旅客心情。", "correct": false, "explanation": "忽略授權失敗會增加訂單 नो-शो (No-show) 無法扣款的風險，違反作業安全原則。"}, {"text": "向飯店經理回報系統故障，請資訊單位檢查信用卡授權機台。", "correct": false, "explanation": "授權失敗通常是卡片端問題，應先依 SOP 在平台端執行標註與通知，而非判斷為系統故障。"}], "answer_index": 1}, {"id": "OP-FO-18-Q02", "stem": "夥伴正在處理「電話訂房」與「Booking.com」的訂單（項目 1-1），若發現旅客超過三日仍未匯款或預先授權持續失敗，應採取什麼行動？", "hint": "針對支付異常的案件，SOP 有明確的聯繫天數限制。", "difficulty": "", "options": [{"text": "主動聯繫並詢問顧客狀況。", "correct": true, "explanation": "根據作業說明，三日內未匯款或授權失敗屬於異常狀況，需主動聯繫顧客確認入住意願或支付方式。"}, {"text": "在系統備註「此顧客信用不良」，並通知房務部不用準備該房間。", "correct": false, "explanation": "未完成匯款不代表信用不良，且在未聯繫確認前不應擅自停止房務準備。"}, {"text": "等到入住前七日聯繫時再一併詢問付款狀況，節省通話時間。", "correct": false, "explanation": "SOP 明確指出針對「三日內」未完成者需聯繫，與「入住前七日」的例行確認是分開的流程。"}, {"text": "不需聯繫，系統會自動在入住前一日發送簡訊提醒付款。", "correct": false, "explanation": "前一日的簡訊是「提醒入住」，而支付異常則需要在更早期（三日內）進行人工聯繫確認。"}], "answer_index": 0}, {"id": "OP-FO-18-Q03", "stem": "在與「官網訂單」的旅客進行聯繫確認時，哪一項資訊是特別需要與顧客核對的重點？", "hint": "官網訂單的優惠通常較多樣，核對的對象與 OTA 略有不同。", "difficulty": "", "options": [{"text": "詢問旅客是否需要代訂火車票。", "correct": false, "explanation": "此項目不在 SOP 的官方網站訂單確認規範中。"}, {"text": "與顧客確認專案內容。", "correct": true, "explanation": "SOP 特別強調官網訂單需與顧客確認專案內容，以避免現場對優惠或配套產生誤解。"}, {"text": "與顧客確認早餐內容，即使專案沒含也要問。", "correct": false, "explanation": "雖然確認早餐是 OTA 訂單的重點，但官網訂單最核心的核對項是「專案內容」。"}, {"text": "僅需確認預抵時間即可，官網訂單不需確認專案。", "correct": false, "explanation": "官網常有各種不同優惠專案，忽略確認可能導致入住時的爭議。"}], "answer_index": 1}, {"id": "OP-FO-18-Q04", "stem": "某位 Agoda 的旅客即將在 7 天後入住，但訂單中並未留下聯絡電話。根據流程，你應該如何執行「入住前七日聯繫」？", "hint": "當通訊軟體或電話不可用時，平台本身具備聯繫功能。", "difficulty": "", "options": [{"text": "因為沒有電話，直接略過聯繫步驟，等旅客現場出現再問。", "correct": false, "explanation": "略過聯繫會導致無法掌握停車需求，違反作業流程 1-2 的規範。"}, {"text": "在 Agoda 平台後台留訊息詢問需求。", "correct": true, "explanation": "SOP 規定若訂單無電話，應在平台後台留言進行確認，確保服務不中斷。"}, {"text": "查詢旅客的電子郵件並發送個人信件告知飯店規約。", "correct": false, "explanation": "流程優先建議使用後台留言，而非繞過平台使用個人郵件，且重點應在預抵時間與需求。"}, {"text": "直接打給 Agoda 客服人員，要求客服人員馬上提供旅客的私人電話。", "correct": false, "explanation": "只有在「特殊事項需直接聯繫」且無電話時才致電平台客服，一般例行詢問應優先使用留言功能。"}], "answer_index": 1}, {"id": "OP-FO-18-Q05", "stem": "入住前一日的提醒服務中，若發現該筆訂單（如 Expedia）完全沒有旅客電話，該如何完成此項作業？", "hint": "思考「前一日提醒」的替代通訊管道。", "difficulty": "", "options": [{"text": "不發簡訊，改在後台留言提醒入住。", "correct": true, "explanation": "作業 1-2 提到入住前一日寄提醒簡訊，若無電話則在後台留言，確保旅客收到資訊。"}, {"text": "改打給訂房平台客服，請客服逐一唸出旅客的聯絡地址。", "correct": false, "explanation": "這不符合提醒入住的效率原則，且地址對前一日提醒入住的實質幫助不大。"}, {"text": "將該筆訂單標註為異常，交由夜班主管處理。", "correct": false, "explanation": "無電話屬於常見狀況，應依留言流程處理，而非將其列為異常交辦事項。"}, {"text": "略過該旅客，僅針對有電話的旅客發送訊息。", "correct": false, "explanation": "所有旅客都應獲得提醒，無電話時需尋求替代方案（後台留言）而非放棄。"}], "answer_index": 0}, {"id": "OP-FO-18-Q06", "stem": "針對 Booking.com、Agoda 或 Expedia 的訂單，在與旅客核對資訊時，「早餐」的確認標準為何？", "hint": "注意 OTA 訂單在溝通話術中被特別圈選出來的確認項目。", "difficulty": "", "options": [{"text": "只有旅客主動問起時才需要確認。", "correct": false, "explanation": "SOP 要求需主動與顧客確認，並非被動等待詢問。"}, {"text": "不論訂單內容為何，一律告知飯店不提供早餐。", "correct": false, "explanation": "這與事實不符，應是確認「有無含」早餐，而非統一否定。"}, {"text": "需主動與顧客確認訂單內容是否有包含早餐。", "correct": true, "explanation": "這是 OTA 訂單確認流程中的明文重點，用以對齊飯店與旅客之間的權益認知。"}, {"text": "統一在入住當天由櫃檯人員判斷，不需要提前聯繫確認。", "correct": false, "explanation": "提前確認可以減少現場 Check-in 的時間，並降低旅客因期待落差產生的不滿。"}], "answer_index": 2}, {"id": "OP-FO-18-Q07", "stem": "若旅客有特殊需求或緊急事項（例如更動人數）必須立即聯繫，但訂單中無電話，且在後台留言後旅客遲遲未回覆，此時應如何處理？", "hint": "當我們無法直接找到旅客時，誰是我們與旅客之間的橋樑？", "difficulty": "", "options": [{"text": "放棄聯繫，等旅客到店後再處理糾紛。", "correct": false, "explanation": "這會導致現場混亂，不符合專業服務精神。"}, {"text": "在 Google 搜尋旅客姓名，嘗試尋找對方的聯絡方式。", "correct": false, "explanation": "這可能涉及個人資料安全疑慮，且並非 SOP 規定的專業路徑。"}, {"text": "致電平台客服人員，請客服人員代為聯繫旅客。", "correct": true, "explanation": "這是 SOP 在針對旅客有特殊事項需直接聯繫，卻無法透過電話聯繫時的最終標準指引。"}, {"text": "直接將訂單暫時保留，不安排任何房號。", "correct": false, "explanation": "未經聯繫確認就隨意變更訂單狀態是不正確的，應先尋求平台客服協助對接。"}], "answer_index": 2}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
