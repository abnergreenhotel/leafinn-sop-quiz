<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <title>OP-FO-27 顧客遺留物作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-27 顧客遺留物作業</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-27 顧客遺留物作業.pdf｜10 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-27", "title": "OP-FO-27 顧客遺留物作業", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-27 顧客遺留物作業.pdf", "questions": [{"id": "OP-FO-27-Q01", "stem": "房務同仁在 302 號房發現房客遺留的一件夾克。櫃檯人員聯繫上客人後，對方表示隔天會親自回來領取，此時櫃檯人員應優先執行的後續操作為何？", "hint": "請思考 SOP 中關於實體物品存放前，需要在物品上註記哪些資訊以供核對。", "difficulty": "", "options": [{"text": "將物品直接放入行李房，等客人明天來再登記。", "correct": false, "explanation": "未即時標示與登記容易造成交接遺漏或物品混淆。"}, {"text": "在物品上黏貼寫有取物人全名與手機的便條紙，並放置於行李房上方置物籃。", "correct": true, "explanation": "明確的資訊標示與固定存放位置是確保失物能準確歸還的關鍵步驟。"}, {"text": "將夾克暫時放在櫃檯下方，方便隨時交給客人。", "correct": false, "explanation": "櫃檯並非指定存放區域，可能造成桌面凌亂或物品受損。"}, {"text": "為了環保，不使用便條紙，僅在 PMS 系統備註即可。", "correct": false, "explanation": "實體物品上必須有清楚標識，以便現場人員快速核對身分。"}], "answer_index": 1}, {"id": "OP-FO-27-Q02", "stem": "一位房客退房後致電飯店，表示可能將無線耳機遺落在房間內。房務人員初步回報「未看到」。身為櫃檯人員，下列哪種回覆最符合服務流程？", "hint": "關鍵在於溝通態度與對話術的掌握，避免讓客人感到被懷疑。", "difficulty": "", "options": [{"text": "告知客人「房務已經找過了，確定沒有，請您再回憶一下放在哪裡」。", "correct": false, "explanation": "這種說法容易讓顧客感到被質疑，且未展現持續協助的態度。"}, {"text": "詢問客人最後一次使用後可能放置的位置，告知會持續尋找並再次回電給客人。", "correct": true, "explanation": "確認細節並承諾後續追蹤能展現積極負責的態度，也是 SOP 指定的話術邏輯。"}, {"text": "直接告訴客人「如果是貴重物品，沒看到通常就是找不到了」。", "correct": false, "explanation": "此回應過於消極且帶有負面暗示，違反服務專業。"}, {"text": "請客人自行向警方報案，飯店不介入尋找流程。", "correct": false, "explanation": "飯店有義務協助客人確認房內狀況，而非直接推諉給警方。"}], "answer_index": 1}, {"id": "OP-FO-27-Q03", "stem": "客人要求將遺落的相機以「黑貓貨到付款」方式寄回。櫃檯人員在與客人溝通時，下列哪項資訊是必須提醒客人的？", "hint": "請回想 SOP 中關於委託宅配服務時，需告知客人的運費預估與配送天數。", "difficulty": "", "options": [{"text": "飯店將代墊運費，請客人事後匯款。", "correct": false, "explanation": "SOP 明定採用「貨到付款」模式，由客人收貨時支付運費。"}, {"text": "運費大約 120-150 元，且寄送需要 3-5 天的作業時間。", "correct": true, "explanation": "提前告知預估費用與時程能避免客人對物流成本或速度產生誤解。"}, {"text": "物品寄出後若有損壞，飯店將負全責。", "correct": false, "explanation": "SOP 未提及飯店須承擔物流過程的毀損責任，此為不當承諾。"}, {"text": "運費一律固定為 100 元。", "correct": false, "explanation": "運費會依大小變動，SOP 提供的是 120-150 元的參考區間。"}], "answer_index": 1}, {"id": "OP-FO-27-Q04", "stem": "大夜班同仁在執行巡檢時，發現員休冰箱內有一份「已開封」且客人未約定領取日期的甜點。根據保管期限規定，應如何處理？", "hint": "針對「易腐敗/衛生用品」的特性，考慮其保留的時效性。", "difficulty": "", "options": [{"text": "直接將該食品丟棄，因為易腐敗物品不留過夜。", "correct": true, "explanation": "對於易腐敗或衛生用品，SOP 規定不留過夜，通常於大夜巡檢時處理。"}, {"text": "將其轉移到行李房置物籃保留 6 個月。", "correct": false, "explanation": "食物會腐敗，不能與一般物品一樣長期存放。"}, {"text": "等早班同仁聯絡客人後，再決定是否丟棄。", "correct": false, "explanation": "除非客人有指定領取日期，否則易腐敗物品不應保留至隔日。"}, {"text": "讓同仁自行領用，避免浪費食物。", "correct": false, "explanation": "未經核准的遺留物不可隨意領用，且衛生用品具安全疑慮。"}], "answer_index": 0}, {"id": "OP-FO-27-Q05", "stem": "房客反映在房內遺失了一只名貴鑽戒。針對此類「貴重物品」的搜尋流程，下列做法何者最正確？", "hint": "這涉及到異常處理與自我保護，多人協作與影像紀錄是重點。", "difficulty": "", "options": [{"text": "房務同仁自行進入房間翻找，找到後再回報。", "correct": false, "explanation": "單獨作業缺乏公信力，且可能衍生更多紛爭。"}, {"text": "必須由主管及房務同仁一同進入房間搜尋，且過程最好錄影。", "correct": true, "explanation": "多人見證與錄影存證能保護員工並確保搜尋過程透明。"}, {"text": "因為是名貴物品，應立即請警察進入客房搜尋。", "correct": false, "explanation": "應先由飯店內部進行複查流程，若無尋獲再依規回報主管處理。"}, {"text": "為了效率，請下一班交接人員有空再去尋找。", "correct": false, "explanation": "遺失貴重物品應立即處理，並回報主管。"}], "answer_index": 1}, {"id": "OP-FO-27-Q06", "stem": "在使用 PMS 系統進行「失物明細」登記時，關於 A 區的「遺失日期」與「資料連結」，下列操作何者正確？", "hint": "思考如何正確關聯遺失物品與原本入住的顧客身分。", "difficulty": "", "options": [{"text": "日期應填寫遺失物被丟掉的那一天。", "correct": false, "explanation": "遺失日期通常設定為登記當日或發現日。"}, {"text": "點選右方「查詢住客」，透過 C/O 日期與房號找到客人資料並帶入。", "correct": true, "explanation": "透過系統連結退房資料，能確保客人身分與聯繫方式正確無誤。"}, {"text": "只需填寫房號，不需要帶入客人個人資料。", "correct": false, "explanation": "缺少聯繫資訊將導致後續無法與客人聯繫取回。"}, {"text": "日期應手動輸入客人的入住日期 (C/I)。", "correct": false, "explanation": "應以遺失物登記當日為基準，並透過退房日 (C/O) 查詢住客。"}], "answer_index": 1}, {"id": "OP-FO-27-Q07", "stem": "飯店內存放的一般遺留物（如書籍、衣物）已超過 6 個月的保管期限。根據 SOP，下列哪項不是正確的後續處理方式？", "hint": "注意 SOP 針對「一般物品」與「貴重物品」在逾期處理上的差異。", "difficulty": "", "options": [{"text": "直接將物品移交警察局處理。", "correct": true, "explanation": "移交警方主要是針對「貴重物品」，一般物品通常由內部領用、轉贈或捐贈。"}, {"text": "經主管核准後，由拾獲的員工領回。", "correct": false, "explanation": "這是符合 SOP 的一般物品處理方案之一。"}, {"text": "統一彙整後，捐贈給公益團體。", "correct": false, "explanation": "捐贈給公益團體是 SOP 中建議的處理方式之一。"}, {"text": "員工領用或轉贈處理。", "correct": false, "explanation": "這屬於一般物品逾期後的合法處理範圍。"}], "answer_index": 0}, {"id": "OP-FO-27-Q08", "stem": "若遇連假期間，黑貓宅急便暫停收件，但客人急需寄回失物，櫃檯人員應如何變通處理？", "hint": "請查找 SOP 中提到關於「連假或暫停收件」時的替代寄件方案。", "difficulty": "", "options": [{"text": "告知客人連假後才能寄送，請客人耐心等候。", "correct": false, "explanation": "雖然是一種做法，但 SOP 有提供更具主動性的替代方案。"}, {"text": "改前往鄰近的 7-11 進行寄件作業。", "correct": true, "explanation": "當貨運收件暫停時，超商寄件是 SOP 明確指定的應變措施。"}, {"text": "請客人自行聯繫其他貨運公司到飯店收貨。", "correct": false, "explanation": "這會增加客人的負擔，非最佳服務做法。"}, {"text": "將物品暫時存放，直到連假結束自動忘記這件事。", "correct": false, "explanation": "這屬於嚴重的服務疏失。"}], "answer_index": 1}, {"id": "OP-FO-27-Q09", "stem": "在 PMS 系統中，當客人已透過黑貓宅配領取物品後，最後必須完成哪個步驟才算流程結束？", "hint": "思考在系統操作流程的最後一步，如何更新物品狀態為「已領取」。", "difficulty": "", "options": [{"text": "直接按離開放棄操作。", "correct": false, "explanation": "未完成狀態更新會導致該失物在系統中一直處於未領取狀態。"}, {"text": "勾選該筆資料，點選「遺失者領回」，並在領回備註填寫取回方式後存檔。", "correct": true, "explanation": "完整的銷案動作必須包含選擇領回模式、備註說明並按下存檔鍵。"}, {"text": "刪除該筆資料，以免佔用系統空間。", "correct": false, "explanation": "應保留紀錄而非刪除，以備後續查證。"}, {"text": "點選「新增報失」，重新輸入一次資料。", "correct": false, "explanation": "這是重複輸入，並非結案動作。"}], "answer_index": 1}, {"id": "OP-FO-27-Q10", "stem": "當客人詢問是否有物品遺失時，若現場搜尋後並「無尋獲」，櫃檯人員下列哪項行為是必須的？", "hint": "關鍵在於「聯繫」的必要性，無論結果是肯定還是否定。", "difficulty": "", "options": [{"text": "因為沒找到，所以不需要回電給客人。", "correct": false, "explanation": "SOP 明定「有無尋獲皆須聯繫顧客」，這是基本的服務禮儀。"}, {"text": "無論結果如何，皆必須主動聯繫顧客回報狀況，並落實交接。", "correct": true, "explanation": "主動回報能確保客人得知進度，且交接能讓下一班同仁了解已處理完畢。"}, {"text": "直接告訴客人「飯店沒有監視器，無法確定是誰拿的」。", "correct": false, "explanation": "此說法帶有卸責嫌疑，且非 SOP 規範之應對。"}, {"text": "先將遺失物表填好，但不做任何後續動作。", "correct": false, "explanation": "填表僅是過程，後續的聯繫與交接才是確保服務延續的重點。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
