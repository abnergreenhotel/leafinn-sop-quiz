<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-OB-04 隱私資安 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-OB-04 隱私資安</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-OB-04 隱私資安.pdf｜6 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-OB-04", "title": "OP-OB-04 隱私資安", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-OB-04 隱私資安.pdf", "questions": [{"id": "OP-OB-04-Q01", "stem": "一位自稱是房客熟識的朋友來到櫃檯，表示想要給房客一個驚喜，並請求您提供該房客的房號與住宿天數，您該如何處理？", "hint": "思考住客個資是否屬於機密資訊，以及在何種前提下才能查閱或提供。", "difficulty": "", "options": [{"text": "為了維持良好的服務品質並展現親切，核對該名朋友的身分證件後即可告知。", "correct": false, "explanation": "即使確認了詢問者的身分，在未經房客本人授權的情況下洩漏資訊仍會構成資安漏洞。"}, {"text": "婉拒提供資訊，並說明基於隱私保護原則，不可透露住客的房號與住宿細節。", "correct": true, "explanation": "嚴守隱私保護原則能確保住客的安全與信任，避免因第三方詢問而造成個資外洩。"}, {"text": "若該名朋友能提供房客的完整姓名與電話，即可視為已獲得房客授權，可以告知房號。", "correct": false, "explanation": "持有基本個資不代表擁有查詢隱私資訊的權限，這種判斷方式容易讓有心人士獲取敏感資料。"}, {"text": "私下查閱系統確認房客是否在房內，若房客在房內則請該位朋友直接上樓敲門。", "correct": false, "explanation": "引導訪客直接前往客房區不僅違反隱私規範，也可能造成住客驚嚇或產生安全風險。"}], "answer_index": 1}, {"id": "OP-OB-04-Q02", "stem": "適逢連假入住尖峰時刻，新進夥伴尚未取得正式的 PMS 系統帳號，前輩為了縮短客人排隊時間，提議先共用他的帳號讓新進夥伴操作，請問這樣的做法正確嗎？", "hint": "考慮系統操作紀錄的追蹤性與權責歸屬。", "difficulty": "", "options": [{"text": "不正確，帳號與密碼僅限本人使用，不得借用、共用或代為登入。", "correct": true, "explanation": "堅持帳號專人專用原則，能確保每一筆操作紀錄都能追溯到具體責任人，維護資安權限的嚴肅性。"}, {"text": "正確，在營運效率優先的前提下，可彈性處理帳號權限問題，事後再補申請即可。", "correct": false, "explanation": "營運效率不能凌駕於資安規範之上，共用帳號會導致權責不清，發生異常時無法釐清責任。"}, {"text": "正確，只要前輩在旁邊監督操作，共用帳號並不違反資訊安全規定。", "correct": false, "explanation": "監督行為並不能取代系統的授權機制，且共用行為本身即已破壞了權限管理的獨立性。"}, {"text": "不正確，但如果由前輩輸入密碼登入後，再交由新進夥伴操作則不在此限。", "correct": false, "explanation": "「代登」同樣屬於違反規範的行為，系統使用權必須與個人的工作職務及帳號嚴格對應。"}], "answer_index": 0}, {"id": "OP-OB-04-Q03", "stem": "在設定與管理系統密碼時，下列哪一種行為符合公司規定的安全規範？", "hint": "思考密碼設定的複雜度以及存放位置的隱密性。", "difficulty": "", "options": [{"text": "將密碼寫在標籤紙上，黏貼在螢幕邊框或鍵盤下方，方便交接時查看。", "correct": false, "explanation": "將密碼放置於公開可見處會極大增加帳號被盜用的風險，違反基本的資安防護意識。"}, {"text": "將帳號與密碼透過通訊軟體的公開群組傳送，以便主管隨時查核。", "correct": false, "explanation": "在群組傳送機敏資訊容易導致外洩，且不符合交接應由主管或資訊窗口處理的流程。"}, {"text": "密碼應避免使用生日或電話等易猜測組合，且設定後不應記錄在他人看得到的地方。", "correct": true, "explanation": "使用複雜性密碼並妥善隱藏，能有效提高非法侵入的難度，保障系統與個資安全。"}, {"text": "為了方便記憶，多個不同的系統（如信箱與 PMS）皆使用同一組簡易連號密碼。", "correct": false, "explanation": "使用連號或跨系統共用密碼會產生連鎖風險，一旦一組密碼被破解，所有帳號都會暴露在危險中。"}], "answer_index": 2}, {"id": "OP-OB-04-Q04", "stem": "櫃檯夥伴在處理退房流程中途，因住客緊急需要協助搬運行李而必須離開崗位，此時電腦畫面仍顯示住客名單與房卡資料，該夥伴應如何處理？", "hint": "離開工作站前的標準動作為何？", "difficulty": "", "options": [{"text": "直接前往行李房，因為只是離開幾分鐘，回來後再繼續處理即可。", "correct": false, "explanation": "暫時離開也可能導致路過的第三人窺視機敏資料，應隨時防範個資外流的可能。"}, {"text": "將電腦螢幕關閉即可，不需要執行登出或鎖定，以免回來時重新登入太耗時。", "correct": false, "explanation": "單純關閉螢幕並未結束系統作業，他人只需開啟螢幕即可接續操作或查閱資料，無實質保護作用。"}, {"text": "請隔壁正在忙碌的同事幫忙「盯著」螢幕，待回來後再繼續作業。", "correct": false, "explanation": "同事在工作時無法分心確保您的螢幕安全，且個資防護應由該崗位執行人員親自落實。"}, {"text": "必須先將系統登出或鎖定畫面，並確認紙本報表或名單沒有隨意放置於檯面上。", "correct": true, "explanation": "執行鎖定動作可確保在人員離開期間，無人能隨意接觸系統資訊，落實裝置管理規範。"}], "answer_index": 3}, {"id": "OP-OB-04-Q05", "stem": "夥伴在館內看到某位知名 KOL 辦理入住，覺得很興奮，想要在個人的社群媒體分享工作生活，下列哪一項做法是正確的？", "hint": "考慮個人社群媒體與對外發言的授權界線。", "difficulty": "", "options": [{"text": "可以拍攝系統上的房客名字與房號，但發布前先用貼圖把房號遮起來。", "correct": false, "explanation": "系統畫面本身屬於內部機敏資訊，無論是否遮蓋，均不得拍攝或發布至個人社交平台。"}, {"text": "嚴禁在個人社群媒體發布住客資料、內部系統畫面或館內未公開的營運數據。", "correct": true, "explanation": "明確區分個人生活與公務資訊界線，能防止公司敏感資訊在非授權管道流傳。"}, {"text": "若是有媒體或網友私訊詢問該名 KOL 的入住細節，應立即依據現有資訊詳細回覆。", "correct": false, "explanation": "未經授權的發言可能引發公關危機，面對外部詢問應統一轉由指定窗口或主管處理。"}, {"text": "只要不拍到 KOL 的長相，僅拍攝其行李吊牌或住宿登記表是沒有問題的。", "correct": false, "explanation": "行李吊牌與登記表同樣含有個資，拍攝並發布此類資訊已嚴重違反隱私資安規範。"}], "answer_index": 1}, {"id": "OP-OB-04-Q06", "stem": "若在值班時發現系統帳號出現不明登入通知，或是懷疑公司配發的隨身碟內資料異常遺失，最正確的處理程序是什麼？", "hint": "當發生資安異常時，對於現場狀態與回報順序的要求為何？", "difficulty": "", "options": [{"text": "為了避免擴散，立即刪除所有疑似異常的紀錄，並將設備格式化。", "correct": false, "explanation": "自行刪除紀錄會破壞事故現場，使後續資訊人員無法追蹤異常來源或評估損害程度。"}, {"text": "先保留現況，並立即通知主管與資訊窗口處理，不擅自進行後續操作。", "correct": true, "explanation": "保留現場並優先通報能讓專業人員及時介入，依循標準指令處理可降低事件影響範圍。"}, {"text": "因為情況不確定，應先觀察幾天，若持續發生異常再向上呈報。", "correct": false, "explanation": "資安事件具有時效性，延遲回報可能導致資料被進一步竊取或系統遭到更嚴重的破壞。"}, {"text": "私下詢問其他同事是否也有相同狀況，若大家都有，則判定為系統正常能量釋放。", "correct": false, "explanation": "資安判定應基於專業通報而非集體猜測，任何可疑跡象都應正式記錄並上報。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
