<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-04 PMS 系統操作 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-04 PMS 系統操作</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-04 PMS 系統操作.pdf｜6 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-04", "title": "OP-FO-04 PMS 系統操作", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-04 PMS 系統操作.pdf", "questions": [{"id": "OP-FO-04-Q01", "stem": "當你在準備登入 PMS 系統開始值勤時，發現自己的帳號密碼似乎因權限問題無法進入，而此時櫃檯正有客人等待處理，下列做法何者最符合規範？", "hint": "", "difficulty": "", "options": [{"text": "為了不讓客人等待，先請身旁的資深夥伴幫忙輸入他的帳密供你操作。", "correct": false, "explanation": "SOP 明確規定不可借用他人帳號登入，以確保個人操作責任歸屬及系統安全。"}, {"text": "先確認帳號密碼與權限是否正確，若仍無法進入則立即截圖資訊並向主管回報。", "correct": true, "explanation": "在遇到無法登入的情況時，應先自我核對資訊，若確認無誤後需按流程回報，並遵守一人一帳號的原則。"}, {"text": "嘗試使用預設的公用帳號進入系統，等客人處理完後再處理自己的帳號問題。", "correct": false, "explanation": "即使是公用帳號或他人帳號，在規範中都是被禁止借用的，應堅持使用個人帳號。"}, {"text": "直接聯絡資訊系統廠商，要求即時重設密碼以利作業。", "correct": false, "explanation": "根據 SOP，異常應先向館內主管回報，而非直接略過內部流程聯繫外部廠商。"}], "answer_index": 1}, {"id": "OP-FO-04-Q02", "stem": "一位客人前來辦理入住，但你在系統中以「姓名」與「日期」查詢「有效訂房」時都找不到相關資料，此時你應該如何進一步操作？", "hint": "", "difficulty": "", "options": [{"text": "告知客人查無資料，請客人聯繫原訂房平台確認是否訂房成功。", "correct": false, "explanation": "在告知客人前，應先排除系統篩選條件導致的結果，而非直接推諉責任。"}, {"text": "將訂房卡狀態由「有效訂房」切換為「全部」，再次確認是否為取消或已更動之訂單。", "correct": true, "explanation": "SOP 提示當查詢不到訂單時，應調整搜尋狀態至「全部」，以查看除有效訂房以外的資料。"}, {"text": "立即為客人現場手動新增一筆完全一樣的訂單，避免客人等待。", "correct": false, "explanation": "在未查明是否有重複訂單或串單異常前，不應任意手動建單，以免造成後續帳務混亂。"}, {"text": "請客人提供訂單確認信的畫面截圖，直接依截圖內容手動修改房態。", "correct": false, "explanation": "應先在系統內盡力查找現有資料，調整查詢條件是第一步，而非直接修改現有房態。"}], "answer_index": 1}, {"id": "OP-FO-04-Q03", "stem": "在核對訂單資料時，若需要更新客人的特殊需求（如：需要嬰兒床、停車需求），下列哪一項是正確的操作標準？", "hint": "", "difficulty": "", "options": [{"text": "為了讓畫面簡潔，直接將新需求覆蓋掉原本舊有的備註文字。", "correct": false, "explanation": "備註應保留重要歷程並明確新增，直接覆蓋可能導致舊有重要資訊遺失。"}, {"text": "在備註欄位最末端輸入需求，不需要特別標註日期以免版面雜亂。", "correct": false, "explanation": "重要資訊的修改必須標註日期，以便後續人員判斷該需求的更新時間點。"}, {"text": "在備註欄開頭加上修改日期（例如：6/11），再簡潔明確地寫入需求內容。", "correct": true, "explanation": "SOP 要求修改重要資訊時應於開頭加上修改日期，且內容需簡潔明確。"}, {"text": "只需要口頭告知當班夥伴，不需要特別記錄在 PMS 系統內。", "correct": false, "explanation": "任何客人的需求更新都應落實在系統備註，以利跨班別資訊同步與正確執行。"}], "answer_index": 2}, {"id": "OP-FO-04-Q04", "stem": "當客人致電確認訂房，但你當下在系統中搜尋不到訂單，為了不讓客人在電話中久候，最合適的服務應對為何？", "hint": "", "difficulty": "", "options": [{"text": "請客人在線上稍候，直到你成功切換各種查詢條件找到訂單為止。", "correct": false, "explanation": "讓客人在電話中盲目等待會降低服務滿意度，並非 SOP 建議的做法。"}, {"text": "先留下客人的聯絡電話，告知後續處理完畢後會再次致電回報結果。", "correct": true, "explanation": "SOP 建議若電話中搜尋不到訂單，應先留電話後處理，完成後再回電，以維護溝通效率。"}, {"text": "直接告知客人在系統中沒有看到這筆訂單，可能是訂房平台系統尚未傳送。", "correct": false, "explanation": "在未經進一步確認前直接否定客人的訂位，容易造成不必要的爭議與恐慌。"}, {"text": "要求客人直接掛斷電話並聯繫訂房平台，由平台端發起查詢。", "correct": false, "explanation": "飯店端應展現積極處理的態度，先留聯絡方式自行確認是較佳的服務流程。"}], "answer_index": 1}, {"id": "OP-FO-04-Q05", "stem": "在操作 PMS 系統時，若發現系統畫面跳出錯誤提示訊息，或串單功能似乎出現異常，下列哪一個行為是被禁止的？", "hint": "", "difficulty": "", "options": [{"text": "截取異常畫面的關鍵資訊以利回報。", "correct": false, "explanation": "截取畫面是 SOP 中明確要求的處理步驟，以便後續判斷問題點。"}, {"text": "依據 SOP 判斷是否需要轉由手動建單或聯繫 Web 確認。", "correct": false, "explanation": "這是遇到異常時的標準作業判斷流程。"}, {"text": "自行嘗試各種修改功能，直到畫面恢復正常或錯誤消失。", "correct": true, "explanation": "SOP 特別強調系統異常不可自行亂試，以免造成資料庫錯誤或資料遺失。"}, {"text": "告知客人系統異常，請其稍候並進一步確認。", "correct": false, "explanation": "這是誠實向客人說明並爭取處理時間的正確話術。"}], "answer_index": 2}, {"id": "OP-FO-04-Q06", "stem": "新進夥伴阿強想練習查詢訂單，但他對欄位還不熟悉，他應該遵守哪一項操作原則？", "hint": "", "difficulty": "", "options": [{"text": "可以先在正式訂單中隨意輸入文字，測試看看儲存後的顯示效果。", "correct": false, "explanation": "SOP 嚴禁在未熟悉欄位前，任意修改正式資料。"}, {"text": "在不熟悉操作時，先主動詢問資深夥伴或主管，確保步驟正確。", "correct": true, "explanation": "遇不確定操作時，應尋求經驗豐富的同仁協助，是確保操作正確的關鍵。"}, {"text": "只要不點擊儲存按鈕，可以隨意更改任何欄位的數值進行觀察。", "correct": false, "explanation": "即使不儲存，也可能因誤觸而導致資料連動，不熟悉的狀態下應避免非必要的更動。"}, {"text": "嘗試將正式訂單刪除再重新建立，以練習完整的訂房流程。", "correct": false, "explanation": "刪除正式資料是嚴重的操作錯誤，練習應在測試環境或在指導下進行。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
