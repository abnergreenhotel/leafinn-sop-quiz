<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-12 續住作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-12 續住作業流程</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-12 續住作業流程.pdf｜6 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-12", "title": "OP-FO-12 續住作業流程", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-12 續住作業流程.pdf", "questions": [{"id": "OP-FO-12-Q01", "stem": "當住客表達想要續住時，櫃檯人員完成房號與房型空房確認後，下一步最優先的房務安排原則是什麼？", "hint": "", "difficulty": "", "options": [{"text": "不論房型是否相同，直接安排至當日最容易清理的空房", "correct": false, "explanation": "隨意更換房間會增加客人的行李搬運負擔，也會增加房務重新整備一間房的成本。"}, {"text": "優先安排入住原房號，以避免不必要的換房作業", "correct": true, "explanation": "維持同一房號入住能簡化行政流程，並提升住客的便利性，符合作業標準中避免換房的原則。"}, {"text": "請客人先退房並將行李寄放櫃檯，等下午三點後再重新入住", "correct": false, "explanation": "這屬於重新入住流程而非續住流程，會造成客人的極大不便。"}, {"text": "強制要求客人升等至較高等級的空房，以增加營收", "correct": false, "explanation": "續住作業應以滿足客人需求與穩定房況為主，而非在流程中強迫推銷升等。"}], "answer_index": 1}, {"id": "OP-FO-12-Q02", "stem": "在確認住客要續住後，櫃檯人員應如何與房務單位進行後續的溝通協作？", "hint": "", "difficulty": "", "options": [{"text": "等當日所有住客退房後，再統一彙整名單給房務群組", "correct": false, "explanation": "延遲通報會導致房務人員無法及時排進工作排程，影響清潔效率。"}, {"text": "僅需告知房務部有房間續住即可，不需說明清潔需求", "correct": false, "explanation": "若未告知清潔需求與出門時間，房務人員將無法判斷何時進場作業。"}, {"text": "應立即通知房務，並註明客人是否需要清潔及預計出門的時間", "correct": true, "explanation": "即時通報清潔需求與客人動向，能讓房務團隊精確掌握工作節奏，確保服務品質。"}, {"text": "請客人自行撥打房內分機向房務部預約清潔時間", "correct": false, "explanation": "櫃檯應作為資訊轉達的中心，由櫃檯統一回報群組才是標準流程。"}], "answer_index": 2}, {"id": "OP-FO-12-Q03", "stem": "住客詢問是否可以安排在下午三點以後才進行續住房間的清潔，根據服務標準，櫃檯人員應如何回覆較為適當？", "hint": "", "difficulty": "", "options": [{"text": "直接答應客人的要求，以客為尊", "correct": false, "explanation": "這違反了 SOP 中關於最晚清潔時間的規範，可能導致房務人員下班前無法完成工作。"}, {"text": "委婉告知客人，續住房間的最晚清潔受理時間為下午二點前", "correct": true, "explanation": "明確告知服務限制時間，有助於管理客人的期待並確保房務作業能在規定時間內完成。"}, {"text": "告訴客人下午三點房務已經下班，完全無法提供任何服務", "correct": false, "explanation": "這種回覆方式過於生硬，且未提供 SOP 中建議的替代時間點或標準說明。"}, {"text": "告知客人若要在下午三點清潔，必須額外加收清潔費用", "correct": false, "explanation": "SOP 中並未提到加收費用的規定，應以標準時間限制進行溝通。"}], "answer_index": 1}, {"id": "OP-FO-12-Q04", "stem": "關於續住房費的收取流程，下列哪一項操作符合作業指導書的規範？", "hint": "", "difficulty": "", "options": [{"text": "要求客人必須在表達續住意願的當下立即付清房費，否則不予續住", "correct": false, "explanation": "過於強硬的態度可能損及服務體驗，SOP 建議的是約定一個合適的時間。"}, {"text": "告知客人房費可以等最後一天退房時再一併結清", "correct": false, "explanation": "為了降低欠費風險，SOP 規定應在續住當日的約定時間前完成支付。"}, {"text": "與客人約定一個時間，並請其在該時間前至櫃檯支付房費", "correct": true, "explanation": "透過事先約定付款時間，既能給予客人彈性，又能確保飯店能按時入帳。"}, {"text": "直接從客人的信用卡授權中扣款，不需另行通知客人", "correct": false, "explanation": "金流作業應與客人明確溝通付款時機，直接扣款若未經說明容易引發糾紛。"}], "answer_index": 2}, {"id": "OP-FO-12-Q05", "stem": "在執行續住作業的話術中，當發現飯店「目前已無空房」時，正確的處理方式為何？", "hint": "", "difficulty": "", "options": [{"text": "建議客人直接在走廊等待，看有沒有人提早退房", "correct": false, "explanation": "這並非專業的飯店應對方式，且會造成公共空間的混亂。"}, {"text": "立即向客人致歉並明確告知目前已無空房，無法提供續住", "correct": true, "explanation": "透明且誠懇的溝通是處理房況不足的基礎，能讓客人及早做其他安排。"}, {"text": "私下聯繫其他同業，強行將客人轉介過去並收取出差費", "correct": false, "explanation": "SOP 僅規範了告知無房的話術，未授權現場人員進行此類複雜的外部轉介操作。"}, {"text": "請客人在櫃檯稍坐，由櫃檯人員不斷刷新系統直到有房為止", "correct": false, "explanation": "若當日已滿房，被動等待會浪費客人的時間，應依照標準話術直接回覆。"}], "answer_index": 1}, {"id": "OP-FO-12-Q06", "stem": "在續住作業的注意事項中，關於房價的處理原則，下列敘述何者正確？", "hint": "", "difficulty": "", "options": [{"text": "因為是續住，所以必須以當日的最高門牌價（Rack Rate）計費", "correct": false, "explanation": "這不符合鼓勵客人續住的銷售邏輯，且偏離了 SOP 的建議。"}, {"text": "續住期間飯店可以視情況提供房價折扣", "correct": true, "explanation": "提供折扣是續住作業中常見的優惠措施，有助於提高住客滿意度與留客率。"}, {"text": "續住一律不給予折扣，且需加收續住手續費", "correct": false, "explanation": "SOP 明確提到「續住可給房價折扣」，而非加收額外費用。"}, {"text": "折扣額度由房務人員在清潔時根據房間整潔程度決定", "correct": false, "explanation": "房價與折扣屬於前台行政與業務範疇，並非由房務人員決定。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
