<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-17 自建單訂房流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-17 自建單訂房流程</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-17 自建單訂房流程.pdf｜8 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-17", "title": "OP-FO-17 自建單訂房流程", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-17 自建單訂房流程.pdf", "questions": [{"id": "OP-FO-17-Q01", "stem": "當你在接聽電話訂房時，如果電腦系統反應較慢或是當下無法立刻操作「德安系統」，最標準的做法是什麼？", "hint": "思考在現場作業中，如何兼顧效率與正確記錄客人需求。", "difficulty": "", "options": [{"text": "請客人稍後再撥，待系統恢復正常後再進行預訂。", "correct": false, "explanation": "這會造成客人的不便並可能導致訂單流失，並非服務的首選方式。"}, {"text": "先掛斷電話，等系統可以登入後再主動回電給客人。", "correct": false, "explanation": "重複撥接電話會降低作業效率，且可能讓客人感覺服務不夠即時。"}, {"text": "先取出紙本「訂房單」，一邊聽取需求一邊填寫資料。", "correct": true, "explanation": "使用紙本訂房單可以確保在無法操作系統時，仍能精確記錄客人的需求，避免遺漏。"}, {"text": "憑記憶記下關鍵資訊，等電話掛斷後再補登入系統。", "correct": false, "explanation": "僅憑記憶容易造成日期、房型或聯絡電話等重要資訊的錯誤。"}], "answer_index": 2}, {"id": "OP-FO-17-Q02", "stem": "在查詢房間庫存時，若發現某個日期的「庫存數」小計欄位呈現「負數」，這代表現場發生了什麼狀況？", "hint": "數值小於零在房間管理中通常意味著「賣過頭」了。", "difficulty": "", "options": [{"text": "該房型目前有大量空房待售。", "correct": false, "explanation": "負數通常與短缺有關，而非剩餘量過多。"}, {"text": "系統發生錯誤，需要聯絡資訊部門進行修復。", "correct": false, "explanation": "雖然可能是系統問題，但在訂房邏輯中，這通常是業務量超過負荷的警示。"}, {"text": "網路平台（OTA）尚未同步最新的預訂資訊。", "correct": false, "explanation": "網路平台同步延遲通常反映在 WRS 鎖控數，而非庫存小計的負數。"}, {"text": "現場可能已經發生「爆房（Overbooking）」的情況。", "correct": true, "explanation": "庫存小計為負數表示已售出的房間超過了實際持有的房間數，需立即處理。"}], "answer_index": 3}, {"id": "OP-FO-17-Q03", "stem": "當客人詢問公司是否有簽訂「特約合約」但不確定細節時，在系統的訂房公司欄位中，應輸入什麼符號來輔助查詢？", "hint": "這是一個常用的系統快捷符號，用於進行模糊比對或歷史資料檢索。", "difficulty": "", "options": [{"text": "在公司名稱前輸入「*」字號。", "correct": false, "explanation": "星號並非該系統預設的模糊搜尋或自動查找符號。"}, {"text": "在公司名稱前輸入「%」百分比符號。", "correct": true, "explanation": "使用百分比符號可以啟動系統的自動搜尋功能，幫助找出歷史簽約資料或統編。"}, {"text": "直接輸入客人的手機號碼查詢。", "correct": false, "explanation": "手機號碼主要用於查詢個人旅客資料，而非公司特約名單。"}, {"text": "輸入「#」井字號再加上公司統編。", "correct": false, "explanation": "井字號不具備系統內部的搜尋過濾功能。"}], "answer_index": 1}, {"id": "OP-FO-17-Q04", "stem": "當你手動建立一筆「電話訂房」並完成德安系統操作後，為何還需要進入「網路訂房管理」手動修改庫存？", "hint": "想想看，如果網路上顯示還有房，但你剛才在電話裡已經把它賣掉了，會發生什麼事？", "difficulty": "", "options": [{"text": "為了同步更新網路平台上的房價資訊。", "correct": false, "explanation": "房價變動與庫存扣除是不同的操作流程。"}, {"text": "為了讓系統自動發送簡訊給客人。", "correct": false, "explanation": "簡訊發送通常是透過專門的簡訊平台操作，與調整網路庫存無關。"}, {"text": "避免該房間在網路上被其他客人重複訂走。", "correct": true, "explanation": "手動建立的訂單不會即時扣除網路銷售額度，必須手動扣除以確保不超賣。"}, {"text": "這是為了記錄員工的工作進度，以便績效考核。", "correct": false, "explanation": "此步驟的核心目的是房務庫存控管，而非個人考核。"}], "answer_index": 2}, {"id": "OP-FO-17-Q05", "stem": "在建立新住客資料（Profile）時，輸入旅客姓名後按下 Enter，系統詢問是否新增，點選「是」進入 Profile 頁面後，哪些是必填的關鍵欄位？", "hint": "思考哪些資訊是讓你能正確稱呼客人，並能發送訂房確認訊息的關鍵。", "difficulty": "", "options": [{"text": "姓名、出生日期、電子郵件。", "correct": false, "explanation": "雖然這些資訊很有用，但出生日期與電子郵件並非建檔的最基本必要通訊資訊。"}, {"text": "姓名、性別、行動電話。", "correct": true, "explanation": "姓名與性別用於稱呼，行動電話則是後續發送匯款簡訊或緊急聯絡的必要工具。"}, {"text": "姓名、地址、車牌號碼。", "correct": false, "explanation": "地址通常在入住時補齊即可，車牌號碼則應記在訂單備註而非 Profile 基本資料。"}, {"text": "姓名、國籍、身分證字號。", "correct": false, "explanation": "身分證字號通常在櫃檯辦理入住核對證件時才會正式登錄。"}], "answer_index": 1}, {"id": "OP-FO-17-Q06", "stem": "若客人需求「加嬰兒床」與「澡盆」，除了在訂單的「排房備註」輸入外，還必須執行哪個步驟以確保設備充足？", "hint": "備品數量有限，除了在訂單寫下需求，還需要「占用」掉一個額度。", "difficulty": "", "options": [{"text": "通知房務部立刻把備品搬進房間。", "correct": false, "explanation": "這屬於現場執行面，訂房階段應先確保系統庫存被正確占用。"}, {"text": "在「備註」欄位再次寫上重複的需求。", "correct": false, "explanation": "重複紀錄並不能幫助系統計算剩餘可借用的數量。"}, {"text": "點選「櫃檯備品」並扣除對應的「使用數」。", "correct": true, "explanation": "透過櫃檯備品功能扣除數量，能避免多位客人同時需求而導致現場備品不足。"}, {"text": "請客人自行帶備品，告知飯店數量有限。", "correct": false, "explanation": "這不是良好的服務應對方式，應優先查詢並保留飯店現有資源。"}], "answer_index": 2}, {"id": "OP-FO-17-Q07", "stem": "如果客人選擇使用「銀行匯款」作為保證訂房方式，結束通話後，櫃檯夥伴的標準作業流程為何？", "hint": "這涉及到如何將匯款資訊正確且快速地傳遞給客人，並設定期限。", "difficulty": "", "options": [{"text": "直接將訂單狀態改為「已付款」並存檔。", "correct": false, "explanation": "在未確認收到款項前，不可將訂單狀態改為已付款。"}, {"text": "開啟瀏覽器登入「三竹簡訊」發送匯款資訊，並要求 3 日內完成。", "correct": true, "explanation": "透過簡訊提供正式的匯款帳號，並設定明確的查帳期限，是標準的保證流程。"}, {"text": "等待客人再次來電詢問帳號後，再口頭告知。", "correct": false, "explanation": "這會增加客人的麻煩，且口頭告知帳號容易發生錯誤。"}, {"text": "要求客人立刻操作網銀轉帳，並在電話中等待結果。", "correct": false, "explanation": "這會讓通話時間過長，且銀行轉帳作業可能需要時間處理。"}], "answer_index": 1}, {"id": "OP-FO-17-Q08", "stem": "在與客人的最後確認階段，除了日期、房型與價格外，哪一項「取消規定」是必須提醒客人的？", "hint": "明確的取消時限可以保護飯店庫存，也讓客人知道自己的權益。", "difficulty": "", "options": [{"text": "當天取消將不退還任何訂金。", "correct": false, "explanation": "雖然這是事實，但 SOP 規定應提醒「免費取消」的期限，給予客人正面且明確的資訊。"}, {"text": "入住前三日內取消或更改，可免收手續費。", "correct": false, "explanation": "根據 SOP 提醒內容，應是告知「前三天」可以免費取消。"}, {"text": "入住前三天可以免費取消或是更改入住日期。", "correct": true, "explanation": "提供清晰的取消政策可以減少後續可能的交易糾紛。"}, {"text": "只要還沒匯款，隨時都可以取消訂房。", "correct": false, "explanation": "這會誤導客人，忽略了保證訂房的法律效力與政策細節。"}], "answer_index": 2}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
