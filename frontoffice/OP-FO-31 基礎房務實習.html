<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-31 基礎房務實習 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-31 基礎房務實習</h1>
        <div class="meta">來源：03 SOP教材pdf檔/客務SOP/OP-FO-31 基礎房務實習.pdf｜10 題</div>
      </div>
      <a href="./index.html">回到客務 SOP 教育訓練題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-31", "title": "OP-FO-31 基礎房務實習", "source_pdf": "03 SOP教材pdf檔/客務SOP/OP-FO-31 基礎房務實習.pdf", "questions": [{"id": "OP-FO-31-Q01", "stem": "當房務員抵達客房門口準備執行清掃作業時，正確的敲門與告知身分流程應為何？", "hint": "請注意 SOP 中提到的敲門次數、間隔秒數以及必須同時進行的口頭動作。", "difficulty": "", "options": [{"text": "連續敲門 3 下，每次間隔約 2 秒，並在敲門時同步口頭告知「Housekeeping」。", "correct": true, "explanation": "此做法符合 SOP 標準流程，確保給予客房內人員足夠的反應時間並清楚辨識來者身分。"}, {"text": "快速連續敲門 5 下以確保客人聽見，隨即按鈴 1 次後直接開門。", "correct": false, "explanation": "快速敲門可能造成客人壓力，且未依規定間隔與告知身分即進門會侵犯客人隱私。"}, {"text": "先按門鈴 3 次，若無回應則直接使用工作卡進門告知身分。", "correct": false, "explanation": "SOP 規定門鈴應按 2 次且每次間隔 2 秒，且進門前須經過多次確認而非直接進入。"}, {"text": "敲門一次並大聲喊叫房號，等待 5 秒後若無動靜即開門。", "correct": false, "explanation": "僅敲門一次且等待時間不足 10 秒，可能導致正在休息或洗澡的客人來不及回應。"}], "answer_index": 0}, {"id": "OP-FO-31-Q02", "stem": "在敲門並告知身分後，房務員發現房內沒有回應，此時最正確的下一步操作是什麼？", "hint": "考慮到客人可能正在做無法立即應門的事情，需要預留一段緩衝時間。", "difficulty": "", "options": [{"text": "立即使用工作卡（Master Key）開門進房清掃以節省時間。", "correct": false, "explanation": "直接進入可能會驚擾到反應較慢或在聽不到聲音處的客人。"}, {"text": "必須在門口等待約 10 至 20 秒，確保客人有充足時間應門。", "correct": true, "explanation": "這是為了預防房客正在洗澡、睡覺或因故無法立即回應的情境，體現對隱私的尊重。"}, {"text": "轉往下一間房清掃，半小時後再回來重新開始流程。", "correct": false, "explanation": "雖然可彈性調整順序，但在等待不足規定的時間前不應直接判斷為無人房。"}, {"text": "直接推開房門並大喊房號，確認裡面是否真的沒人。", "correct": false, "explanation": "未經二次確認且未依標準等待即推門是嚴重違反進房禮儀的行為。"}], "answer_index": 1}, {"id": "OP-FO-31-Q03", "stem": "若客房門口顯示「請勿打擾（DND）」燈號，但該房是預計今日退房的房間（退掃房），房務員應如何處理？", "hint": "當客人需求（請勿打擾）與工作排程（退掃）衝突時，應先尋求行政端的確認。", "difficulty": "", "options": [{"text": "既然是退房日，可直接敲門詢問客人何時離開。", "correct": false, "explanation": "只要 DND 燈號亮起，嚴禁任何敲門或按鈴動作，以免干擾客人權益。"}, {"text": "先與櫃檯確認該房是否已辦理退房手續，而非自行敲門或按鈴。", "correct": true, "explanation": "這是處理 DND 房況與退房衝突時的標準查核程序，可避免誤闖仍有客人在內的房間。"}, {"text": "無視燈號，照常執行敲門 3 下與按鈴 2 次的進房流程。", "correct": false, "explanation": "無視 DND 燈號會導致客訴，且違反 SOP 中「切記勿去按門鈴或敲門」的規定。"}, {"text": "在門口大聲喊叫 Housekeeping，確認客人是否已經離開。", "correct": false, "explanation": "口頭喊話同樣會干擾到室內需要安靜的客人，應透過系統或櫃檯查詢房況。"}], "answer_index": 1}, {"id": "OP-FO-31-Q04", "stem": "房務員在進入「續住房」放置補充備品時，若客人目前不在房間內，下列哪項做法符合 SOP 安全與禮儀規範？", "hint": "考慮到「衛生」與「作業透明度」兩個現場實務要點。", "difficulty": "", "options": [{"text": "穿著工作鞋快速進入，將備品放下後關門離開並回報。", "correct": false, "explanation": "進入已入住的客房必須脫鞋以保持室內清潔，這是對客人的基本尊重。"}, {"text": "進入房間前必須脫鞋，且在房內放置備品期間應保持房門敞開。", "correct": true, "explanation": "脫鞋是為了維持客房地板乾淨，敞開門則是為了保護房務員並避免空間封閉引起的誤會。"}, {"text": "為了安全起見，應進入房間後反鎖房門，避免其他客人誤入。", "correct": false, "explanation": "房務員單獨在客房內作業時不應關門，以確保作業透明度與安全性。"}, {"text": "直接將備品掛在門外把手上，不進入房間以保障客人隱私。", "correct": false, "explanation": "SOP 要求的是進入放置備品，直接掛門口不符合該項作業的執行說明。"}], "answer_index": 1}, {"id": "OP-FO-31-Q05", "stem": "關於布巾數量的紀錄與登記，下列哪一種操作方式最能降低數量出錯的風險？", "hint": "SOP 中有特別強調關於填寫工作表的時間點，以避免漏記或記錯。", "difficulty": "", "options": [{"text": "將整層樓所有房間拆下的布巾集中後一次清點並填寫表格。", "correct": false, "explanation": "集中清點容易導致房號與數量對不上的混亂，違反 SOP 逐間紀錄的原則。"}, {"text": "憑記憶在休息時間一次補填所有清掃過房間的布巾數量。", "correct": false, "explanation": "憑記憶填寫極易發生錯誤，導致後續布巾盤點不準確。"}, {"text": "每完成一間房的拆床與清點，立即在工作表上對應房號欄位確實填寫。", "correct": true, "explanation": "SOP 強調「拆床一間寫一間」，這能確保數據的即時性與準確性。"}, {"text": "只記錄缺少的布巾數量，數量正確的房間則不需填寫以加快速度。", "correct": false, "explanation": "每一間房都應確實記錄，不論數量是否異常，以便後續追蹤控管。"}], "answer_index": 2}, {"id": "OP-FO-31-Q06", "stem": "在鋪床作業中，關於枕頭套的擺放與處理，下列敘述何者正確？", "hint": "想像兩顆枕頭擺在床頭時，如何讓枕套的開口被藏起來不被客人看見。", "difficulty": "", "options": [{"text": "枕頭套開口應朝向床外側，方便客人拉取更換。", "correct": false, "explanation": "開口朝外會露出枕芯，影響視覺美觀且不符合標準。"}, {"text": "將枕頭套開口朝向內側（兩枕互相面對），並立式擺放對靠床頭板。", "correct": true, "explanation": "這能隱藏枕套開口，維持床鋪整體視覺的整齊美觀。"}, {"text": "枕頭應平放在床墊上，開口一律朝向房門口方向。", "correct": false, "explanation": "開口方向應對向內側而非門口，且應以立式對靠床頭板擺放。"}, {"text": "為了塞枕頭方便，枕頭套的開口應保持上下對齊而非左右對齊。", "correct": false, "explanation": "SOP 未提及上下對齊，重點在於「開口朝內」與「互相面對」的視覺標準。"}], "answer_index": 1}, {"id": "OP-FO-31-Q07", "stem": "房務員在進行「鋪床 sheet（床單）」作業時，為了提高效率並符合標準，應如何操作？", "hint": "尋找 SOP 中關於床單攤開順序的具體步驟：長條、中線、兩側。", "difficulty": "", "options": [{"text": "先將床單揉成團後再慢慢拉平，以確保能覆蓋整個床墊。", "correct": false, "explanation": "將床單揉成團會產生大量皺褶，且拉平過程非常費時。"}, {"text": "先將床單攤開成一長條並對準中線，接著再向左右兩側攤開。", "correct": true, "explanation": "這是確保床單鋪設平衡且定位準確的最快方式，能有效對準床墊中心。"}, {"text": "直接將床單四個角塞入床墊下，最後再調整中間的平整度。", "correct": false, "explanation": "先塞角會導致中間無法對準中線，造成兩側長度不均。"}, {"text": "站在床腳處將床單整張甩開，讓它自然落在床墊上後再整理。", "correct": false, "explanation": "這種方式很難精準控制中線位置，且容易讓床單滑落到地面。"}], "answer_index": 1}, {"id": "OP-FO-31-Q08", "stem": "在鋪被套（Duvet cover）時，有一個關鍵步驟是為了「防止客人使用時被芯與被套分離」，該動作為何？", "hint": "SOP 中特別提到需要確實了解的一種「結」的打法。", "difficulty": "", "options": [{"text": "使用大頭針將四個角落固定在床墊上。", "correct": false, "explanation": "使用大頭針有安全疑慮，並非正確的旅館房務做法。"}, {"text": "在被子四個角用力下壓，利用摩擦力固定位置。", "correct": false, "explanation": "僅靠下壓無法在客人拉扯被子時維持固定，被芯仍會位移。"}, {"text": "將被角與被套內部的繩子打上活結固定。", "correct": true, "explanation": "打活結是為了固定被芯與被套，且選擇「活結」方便下次換洗時拆卸。"}, {"text": "將被套開口處用強力膠帶黏貼封口。", "correct": false, "explanation": "這種做法會損壞布巾且不美觀，不符合房務專業流程。"}], "answer_index": 2}, {"id": "OP-FO-31-Q09", "stem": "若在進房檢查時，房務員發現房內竟有客人在（疑似櫃檯排房錯誤），第一時間該如何反應？", "hint": "優先考慮客人的隱私受損，並依循 SOP 規定的回報對象。", "difficulty": "", "options": [{"text": "若客人在睡覺，應悄悄關上門離開，當作沒發生過。", "correct": false, "explanation": "不論客人是否醒著，都必須回報主管做後續處理，否則會影響房況正確性。"}, {"text": "立即向客人致歉並離開，隨後回報給櫃檯與值班主管處理。", "correct": true, "explanation": "這是處理「誤開房門」的標準作業流程，確保客人情緒得到緩解且問題被紀錄。"}, {"text": "向客人索取身分證明文件，確認對方是否為登記房客。", "correct": false, "explanation": "查驗身分是櫃檯的權責，房務員第一時間應致歉並退出，避免與客人發生爭執。"}, {"text": "要求客人立即離開房間，告知此房為待掃狀態。", "correct": false, "explanation": "這對客人極度不禮貌，且排房錯誤可能是飯店方的疏失。"}], "answer_index": 1}, {"id": "OP-FO-31-Q10", "stem": "關於鋪床作業的注意事項，SOP 提到可以利用哪種原理來減輕推動床墊的體力負擔？", "hint": "找尋 SOP「鋪床（枕頭）」項目旁的備註，有提到一個物理力學概念。", "difficulty": "", "options": [{"text": "利用滑輪原理，在床墊下方塗抹潤滑劑以便推動。", "correct": false, "explanation": "這是不切實際的做法，且會弄髒地毯與床墊。"}, {"text": "利用槓桿原理，藉由床頭板將床推出以便後續鋪床。", "correct": true, "explanation": "這是 SOP 建議的技巧，能讓房務員在狹窄空間更有效率地進行鋪床作業。"}, {"text": "利用慣性原理，快速撞擊床墊使其位移。", "correct": false, "explanation": "暴力撞擊會導致家具損壞，並非專業的作業技巧。"}, {"text": "利用大氣壓力原理，將床墊稍微抬高後即可輕鬆移動。", "correct": false, "explanation": "房務作業中無法實際應用大氣壓力來移動重物，此說法不成立。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
