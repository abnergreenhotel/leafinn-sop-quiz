<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-30 公區維護作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-30 公區維護作業 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-30 公區維護作業.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-30", "title": "公區維護作業", "source_pdf": "03 SOP教材pdf檔/OP-FO-30 公區維護作業.pdf", "questions": [{"id": "OP-FO-30-Q01", "stem": "在執行「每班例行巡檢」時，關於巡視方式的標準要求，下列敘述何者正確？", "difficulty": "", "options": [{"text": "為節省時間，可以站在櫃台內觀察周邊環境即可", "correct": false, "explanation": "作業規範明確要求巡檢需實際走動查看，而非僅憑目測，以確保無死角遺漏。"}, {"text": "必須實際走動巡視各個區域，不可僅憑目測櫃台周邊", "correct": true, "explanation": "實際走動能發現目測無法察覺的細節，如氣味、照明或地面微小污損，是確保品質的基礎。"}, {"text": "只有在尖峰時段才需要實際走動，一般時段目測即可", "correct": false, "explanation": "無論是否為尖峰時段，標準流程皆要求實際走動查看以維持一致的環境水準。"}, {"text": "巡檢時只需針對公共廁所進行走動查看", "correct": false, "explanation": "巡檢範圍包含大廳、門口、電梯、廁所、休息區及外圍動線，並非僅限於廁所。"}, {"text": "若現場有主管巡視，夥伴即可不必執行該班次的走動巡檢", "correct": false, "explanation": "每班巡檢是夥伴的例行職責，不因主管是否巡視而免除作業程序。"}], "answer_index": 1}, {"id": "OP-FO-30-Q02", "stem": "當你在大廳進行「例行清潔工作」時，若現場有顧客在場，應採取何種服務態度與行動？", "difficulty": "", "options": [{"text": "立即停止所有清潔動作，直到顧客離開為止", "correct": false, "explanation": "完全停止清潔可能導致環境品質下降，應在不影響顧客的前提下繼續作業。"}, {"text": "請顧客暫時移動到其他區域，以便能徹底清潔該處", "correct": false, "explanation": "飯店服務應以顧客體驗優先，要求顧客配合清潔而移動會降低服務滿意度。"}, {"text": "以不打擾顧客動線為原則，靈活調整清潔範圍", "correct": true, "explanation": "在維護環境整潔的同時，確保顧客的活動空間與感受不被干擾是服務標準的核心。"}, {"text": "加速清潔動作，即使產生較大噪音也應快速完成", "correct": false, "explanation": "清潔時的噪音與急促動作會影響顧客的休息品質與環境氛圍。"}, {"text": "無視顧客存在，按照既定計畫完成每一項清潔任務", "correct": false, "explanation": "完全無視顧客會顯得不夠體貼，清潔應隨現場動態調整作業方式。"}], "answer_index": 2}, {"id": "OP-FO-30-Q03", "stem": "關於公區備品的補充原則，下列哪一項做法符合「公區備品補充」的標準規定？", "difficulty": "", "options": [{"text": "為了環保與成本控制，需等衛生紙完全用完再行更換", "correct": false, "explanation": "標準規範禁止等備品完全用完才補充，以免造成顧客使用不便。"}, {"text": "只需在每日早班交班前進行一次全面補充即可", "correct": false, "explanation": "備品補充應視現場消耗狀況隨時調整，而非僅限於特定班次。"}, {"text": "隨時注意餅乾數量，若數量不足應立即補充", "correct": true, "explanation": "大廳餅乾是迎賓區的重要環節，標準要求需隨時注意數量並適時補充以滿足顧客需求。"}, {"text": "迎賓區用品若快用完時，先將其收起以保持陳列整齊", "correct": false, "explanation": "備品短缺時應及時補充而非收起，確保功能性完備才是陳列標準的要求。"}, {"text": "備品補充只需注意數量，擺放位置可隨作業方便調整", "correct": false, "explanation": "補充時需確認擺放整齊並符合「館內陳列標準」，以維持視覺美感。"}], "answer_index": 2}, {"id": "OP-FO-30-Q04", "stem": "當進行「區域專案維護」（如植栽區加強整理）時，若需要封閉部分區域，該如何正確執行？", "difficulty": "", "options": [{"text": "由作業人員自行決定封區時間，不需告知其他單位", "correct": false, "explanation": "專案維護涉及安全與動線，必須經過適當的確認與協調流程。"}, {"text": "先確認作業時段與安全性，並與現場營運動線協調", "correct": true, "explanation": "為了降低對顧客的干擾，任何可能影響動線的維護都必須考慮營運時段與安全防範。"}, {"text": "僅在夜間執行，因此不需考慮與營運動線的協調問題", "correct": false, "explanation": "即使在夜間執行，仍需與櫃台或相關同仁協調，確保現場安全與應變。"}, {"text": "先將封鎖線圍起來後，再回報主管進場作業", "correct": false, "explanation": "應先確認時段與安全後再執行封閉動作，以避免突發的動線混亂。"}, {"text": "直接請房務部負責封區與安全確認即可", "correct": false, "explanation": "專案維護的執行者需負起確認作業時段與安全的責任，而非單方面推給其他部門。"}], "answer_index": 1}, {"id": "OP-FO-30-Q05", "stem": "巡檢時發現公共區域有無法立即排除的污損或漏水，最正確的處理流程是什麼？", "difficulty": "", "options": [{"text": "先假裝沒看見，等下一個班次的人員來處理", "correct": false, "explanation": "異常狀況必須立即回報，推遲處理可能會導致問題擴大或損及安全。"}, {"text": "立即回報並視情況聯繫房務、工務或主管，並設置提醒警示", "correct": true, "explanation": "回報、尋求專業支援與設置警示是處理異常的三大核心步驟，確保問題能被追蹤且不影響顧客安全。"}, {"text": "不需回報，自行嘗試修理直到修好為止", "correct": false, "explanation": "超出能力的清潔或故障應尋求專業部門（如工務、房務）處理，以防造成二次損壞。"}, {"text": "只在交班本記錄即可，不需現場設置警示", "correct": false, "explanation": "無法立即排除的異常若不設置提醒或警示，可能會導致顧客意外受傷。"}, {"text": "等待每月的區域專案維護時一併處理", "correct": false, "explanation": "漏水或設備故障屬於「異常回報與追蹤」範疇，應即時處理而非延至專案維護。"}], "answer_index": 1}, {"id": "OP-FO-30-Q06", "stem": "關於「確認與交接」作業，下列哪一項行動是下班前的關鍵標準程序？", "difficulty": "", "options": [{"text": "只要把公區燈光關掉就可以離開", "correct": false, "explanation": "公區維護包含多項檢查與準備工作，單純關閉燈光不符合交接標準。"}, {"text": "僅需口頭告訴下一班同仁大致狀況即可", "correct": false, "explanation": "未完成事項與異常案件必須「寫入交班」，以確保有紀錄可查且權責分明。"}, {"text": "下班前再巡視一次重點公區，並將未完成事項與待補耗材寫入交班", "correct": true, "explanation": "最後的巡視能確保交接時的公區水準是良好的，並讓接班者能快速掌握待辦重點。"}, {"text": "將所有備品藏起來，以免下一班太快用完", "correct": false, "explanation": "交接應致力於公區維護結果可被接手，惡意隱藏備品違反職業道德與作業標準。"}, {"text": "若本班次很忙，未完成的巡檢可不寫入交班", "correct": false, "explanation": "無論原因為何，未完成的事項都必須確實交接，這也是維護整體品質的關鍵。"}], "answer_index": 2}, {"id": "OP-FO-30-Q07", "stem": "根據標準作業流程，下列哪一個時間點是進行公區巡檢的必要時刻？", "difficulty": "", "options": [{"text": "每班開始與尖峰前", "correct": true, "explanation": "在班次開始及人潮高峰前巡檢，能預先發現問題並確保提供最完善的環境給顧客。"}, {"text": "僅在早班開始時進行一次", "correct": false, "explanation": "規範明確標示為「每班」例行巡檢，意指早、中、晚班皆需執行。"}, {"text": "顧客投訴環境髒亂後才進行", "correct": false, "explanation": "巡檢應是「主動預防」而非「被動補救」，需按照班別規律執行。"}, {"text": "每個月執行一次大規模巡檢", "correct": false, "explanation": "每班的巡檢屬於「例行」性質，與每月一次的「專案維護」不同。"}, {"text": "只有在主管巡場前才需要預演巡檢", "correct": false, "explanation": "巡檢應是為了維持服務品質與顧客安全，而非僅為了應付主管檢查。"}], "answer_index": 0}, {"id": "OP-FO-30-Q08", "stem": "在例行清潔工作中，對於「大廳桌上植栽」的維護要求為何？", "difficulty": "", "options": [{"text": "每日噴灑亮光劑以保持翠綠", "correct": false, "explanation": "作業說明中僅提到依班別執行「澆水」，過度使用化學藥劑可能損害植栽。"}, {"text": "依班別執行澆水作業", "correct": true, "explanation": "維持植栽生命力是公區美化的重點，規範要求夥伴在清潔時一併注意水分補充。"}, {"text": "將植栽移至門口曬太陽", "correct": false, "explanation": "除非是特定的專案維護或主管要求，否則例行工作中僅需執行澆水與基本整理。"}, {"text": "每兩小時澆一次水以確保濕潤", "correct": false, "explanation": "澆水應適度，頻率應依照植栽特性與班別計畫，過量可能造成爛根或溢水污損。"}, {"text": "植栽維護屬於外包廠商工作，夥伴不需處理", "correct": false, "explanation": "「大廳桌上植栽澆水」被明確列入夥伴的例行清潔工作中。"}], "answer_index": 1}, {"id": "OP-FO-30-Q09", "stem": "執行公區巡檢時，除了確認環境整潔外，還包含哪些重要的檢查項目？", "difficulty": "", "options": [{"text": "氣味、照明與安全狀況", "correct": true, "explanation": "優質的環境包含視覺（整潔）、嗅覺（氣味）與安全感，這些都是巡檢的關鍵要素。"}, {"text": "櫃台內的私人物品擺放", "correct": false, "explanation": "巡檢的核心在於「公共區域」，櫃台內私人物品並非此項作業的巡查重點。"}, {"text": "確認同仁的出勤打卡時間", "correct": false, "explanation": "人員考勤不屬於公區硬體維護巡檢的範疇。"}, {"text": "檢查客房內的備品是否補齊", "correct": false, "explanation": "本規範專指「公區維護」，客房內部屬於房務部的其他標準作業程序。"}, {"text": "統計路過門口的行人數量", "correct": false, "explanation": "行人數量統計與環境維護、安全檢查無關，非巡檢主要目的。"}], "answer_index": 0}, {"id": "OP-FO-30-Q10", "stem": "若在清潔過程中導致「地面濕滑」，根據注意事項，首要動作應為何？", "difficulty": "", "options": [{"text": "大聲提醒路過的顧客小心滑倒", "correct": false, "explanation": "口頭提醒效果有限且可能造成干擾，應以具體的視覺警示為主。"}, {"text": "立即設置告示（警告牌）", "correct": true, "explanation": "即時設置物理告示能有效預防滑倒意外，是飯店公共安全的基本要求。"}, {"text": "停止清潔動作，等待地面自然風乾", "correct": false, "explanation": "若不設置告示，風乾期間仍有顧客受傷的風險，應先示警。"}, {"text": "請其他同仁站在該處引導顧客", "correct": false, "explanation": "以人力引導在人力資源分配上不具效益，標準做法是使用告示牌。"}, {"text": "若現場沒有顧客，可以不必設置告示", "correct": false, "explanation": "環境隨時可能有顧客或同仁經過，只要地面濕滑就必須即時設置告示。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
