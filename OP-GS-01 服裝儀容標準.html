<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-GS-01 服裝儀容標準 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-GS-01 服裝儀容標準 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-GS-01 服裝儀容標準.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-GS-01", "title": "服裝儀容標準", "source_pdf": "03 SOP教材pdf檔/OP-GS-01 服裝儀容標準.pdf", "questions": [{"id": "OP-GS-01-Q01", "stem": "夥伴在準備上班前進行自我檢查，發現制服上有輕微但可見的摺痕，且名牌放在置物櫃忘記配戴。根據規範，下列哪項做法正確？", "difficulty": "", "options": [{"text": "因為摺痕不明顯，只要補戴名牌後即可直接上線服務", "correct": false, "explanation": "規範要求制服需整燙平整且不得有明顯皺摺，儀容不整者不得直接上線。"}, {"text": "名牌可放於口袋內，只要服裝整潔即可符合標準", "correct": false, "explanation": "名牌必須配戴於明顯且固定的位置，不可隨意放置或藏於口袋。"}, {"text": "應先將制服整燙平整並正確配戴名牌，確認整體外觀後再上線", "correct": true, "explanation": "上班前的自主檢查涵蓋了服裝平整度與名牌配戴，這是確保專業形象的基本要求。"}, {"text": "只要整體外觀乾淨無污漬，皺摺部分可於值勤空檔再處理", "correct": false, "explanation": "上線服務前的檢查應包含確保無明顯皺摺，而非上線後才處理。"}, {"text": "若趕著交班，可先口頭向主管報備後再省略自我檢查流程", "correct": false, "explanation": "標準作業程序強調上班前必須完成自我檢查，以維持統一的服務水準。"}], "answer_index": 2}, {"id": "OP-GS-01-Q02", "stem": "在寒冷的天氣裡，某位夥伴想在規定制服外加穿一件自己購買的私人防寒外套。根據制服穿著標準，下列敘述何者正確？", "difficulty": "", "options": [{"text": "只要私人外套顏色與制服相近，即可自行搭配穿著", "correct": false, "explanation": "規範嚴禁私自混搭非規定款式的衣物，以維持團隊形象的統一。"}, {"text": "若有外套穿戴需求，必須依館內規範統一穿戴指定配件", "correct": true, "explanation": "任何制服以外的配件或外套，都必須遵循館內的統一標準，不可私自搭配。"}, {"text": "私人的保暖衣物只能穿在制服內層，不可露出來", "correct": false, "explanation": "雖然保暖重要，但標準中強調的是制服外觀的完整性與統一性。"}, {"text": "只要主管口頭同意，即可隨意搭配不同款式的配件", "correct": false, "explanation": "標準規定需依職務規定或指定服裝穿著，而非隨意變動。"}, {"text": "外套屬於個人防寒物品，不受到制服標準作業指導書的規範", "correct": false, "explanation": "制服標準明確涵蓋了外套與配件的穿戴規範。"}], "answer_index": 1}, {"id": "OP-GS-01-Q03", "stem": "某女性夥伴擁有長髮，關於其髮型整理的原則，下列哪項做法最符合「綠宿行旅」的專業形象？", "difficulty": "", "options": [{"text": "為了展現個人風格，可隨意選擇誇張的染髮顏色與造型", "correct": false, "explanation": "過於突兀或誇張的造型需先與主管確認，以免影響專業形象。"}, {"text": "長髮應依規定綁束，且不遮擋臉部與視線，保持俐落感", "correct": true, "explanation": "整齊、俐落且不干擾視線是髮型整理的核心原則，長髮需妥善綁束。"}, {"text": "只要頭髮保持清潔，散亂或遮擋臉部並不會影響專業感", "correct": false, "explanation": "散亂的頭髮會影響專業形象，規範要求避免遮擋視線。"}, {"text": "值勤期間只需在開班前檢查一次髮型，之後不需再維持", "correct": false, "explanation": "規範要求值勤期間應隨時維持清潔與整齊。"}, {"text": "髮型規範僅針對女性夥伴，男性夥伴不受此限", "correct": false, "explanation": "髮型與個人清潔標準適用於全體夥伴，不分性別。"}], "answer_index": 1}, {"id": "OP-GS-01-Q04", "stem": "夥伴在值勤過程中，因協助客人搬運大量行李導致汗流浹背、儀容略顯凌亂。此時該如何處置最適當？", "difficulty": "", "options": [{"text": "因為是辛勤工作的表現，即使儀容不整也應留在崗位繼續服務", "correct": false, "explanation": "值勤中若因特殊狀況造成儀容失整，應儘速整理而非維持不整的狀態。"}, {"text": "繼續服務直到下班前再進行整理即可", "correct": false, "explanation": "延遲整理會影響飯店的服務形象，應在發現失整後儘速處理。"}, {"text": "應儘速前往整理，確保儀容恢復標準後再回到崗位", "correct": true, "explanation": "規範明確要求因勞動導致儀容失整時應立即調整，以維持服務品質。"}, {"text": "直接請主管幫忙整理，避免離開服務崗位", "correct": false, "explanation": "個人儀容應由夥伴自行負責整理，主管職責是檢查與督導。"}, {"text": "不需要理會儀容，只要服務熱誠即可彌補外觀的不足", "correct": false, "explanation": "專業形象與服務態度相輔相成，規範強調必須維持標準儀容。"}], "answer_index": 2}, {"id": "OP-GS-01-Q05", "stem": "關於值勤時的飾品配戴與妝容規範，下列哪一項敘述是錯誤的？", "difficulty": "", "options": [{"text": "飾品配戴應以不影響服務動作與安全為原則", "correct": false, "explanation": "這是規範中明確要求的原則，旨在確保工作效率與安全。"}, {"text": "香水味道若能讓客人遠遠聞到，更能展現飯店的高級感", "correct": true, "explanation": "規範特別註明香水味道不可過濃，過濃的氣味可能造成客人不適。"}, {"text": "妝容應以自然、乾淨、精神佳為基本訴求", "correct": false, "explanation": "自然乾淨的妝容是符合專業形象要求的標準。"}, {"text": "指甲應修剪整齊，且不可影響到工作的執行", "correct": false, "explanation": "指甲長度與整潔度是個人清潔與飾品規範中的重點。"}, {"text": "不可配戴體積過大或容易掉落的飾品", "correct": false, "explanation": "這是為了避免影響服務品質與排除安全疑慮的具體規定。"}], "answer_index": 1}, {"id": "OP-GS-01-Q06", "stem": "當主管在巡檢時對夥伴說：「您的服裝需要再整理一下，麻煩您先調整完成後再回到櫃檯」。這表示夥伴應執行什麼後續動作？", "difficulty": "", "options": [{"text": "向主管說明工作忙碌，請求等一下再處理", "correct": false, "explanation": "若未達標，應立即調整而非推託，這是對專業標準的尊重。"}, {"text": "立即在櫃檯前方當著客人的面整理衣物", "correct": false, "explanation": "整理儀容應在適當場所進行，直接在服務台前整理並不專業。"}, {"text": "應立即調整儀容，待符合標準後再回到崗位，避免重複被提醒", "correct": true, "explanation": "規範要求未達標時應立即調整，若提醒後仍未改善將依內部管理規範處理。"}, {"text": "不需要做任何調整，因為這只是主管的個人主觀意見", "correct": false, "explanation": "主管的抽查是基於統一的標準指導書，夥伴必須遵循。"}, {"text": "只需要整理主管指出的部分，其他部位不需重新檢查", "correct": false, "explanation": "被提醒後應全面重新檢視，確保整體符合值勤標準。"}], "answer_index": 2}, {"id": "OP-GS-01-Q07", "stem": "在制服維護方面，如果夥伴發現制服的拉鍊壞了或是扣子掉落，該如何處理？", "difficulty": "", "options": [{"text": "用別針暫時固定，繼續穿到報廢為止", "correct": false, "explanation": "別針固定不符合服裝整齊的要求，且制服需保持完整。"}, {"text": "若破損不明顯，可不需理會繼續穿著", "correct": false, "explanation": "制服扣子、拉鍊等細節必須保持完整，以維持專業感。"}, {"text": "應立即回報並申請更換，確保穿著完整性", "correct": true, "explanation": "規範明確規定制服若有破損（如拉鍊、扣子問題）需立即回報更換。"}, {"text": "自行去外面購買類似款式的衣物代替", "correct": false, "explanation": "私自更換非規定款式違反了制服統一穿著的規範。"}, {"text": "等到年度發放新制服時再進行更換", "correct": false, "explanation": "破損應「立即」回報，不可長期穿著損壞的制服。"}], "answer_index": 2}, {"id": "OP-GS-01-Q08", "stem": "下列關於個人衛生與整體清潔的執行說明，哪一項符合標準？", "difficulty": "", "options": [{"text": "手部清潔僅需在處理食物前進行，一般櫃檯服務不需注意", "correct": false, "explanation": "規範要求保持口氣、手部與整體的全面清潔，不限特定職務內容。"}, {"text": "只要噴了重口味的香水，就不需要注意口氣清新", "correct": false, "explanation": "香水過濃與口氣不佳皆不符合衛生標準。"}, {"text": "應隨時保持口氣清新與手部清潔，維持良好的近距離服務品質", "correct": true, "explanation": "個人清潔是服務業專業形象的重要組成部分，直接影響客人感受。"}, {"text": "手部指甲只要塗上指甲油，即使長度過長也可以接受", "correct": false, "explanation": "指甲長度應以不影響工作為原則，過長並不符合規定。"}, {"text": "整體清潔僅指制服乾淨，不包含身體散發的異味", "correct": false, "explanation": "個人衛生標準涵蓋了整體清潔，包含口氣、手部與汗味等細節。"}], "answer_index": 2}, {"id": "OP-GS-01-Q09", "stem": "夥伴在選擇上班配戴的飾品時，哪一項最符合規範中的「簡單、不影響服務」原則？", "difficulty": "", "options": [{"text": "配戴長度垂至胸前的華麗項鍊，以增加視覺亮點", "correct": false, "explanation": "過大或易掉落的飾品會造成安全疑慮或干擾工作動作。"}, {"text": "配戴會發出清脆聲響的多個手鐲", "correct": false, "explanation": "發出聲響或過多的飾品不符合簡潔專業的原則。"}, {"text": "選擇設計簡潔、且在搬運物品時不會勾到衣物的飾品", "correct": true, "explanation": "飾品應以簡單、簡潔且不干擾服務動作為首要原則。"}, {"text": "為了展現時尚感，左右手各配戴三枚大型戒指", "correct": false, "explanation": "過多的飾品會顯得雜亂，且大型戒指可能影響手部作業。"}, {"text": "只要自己覺得美觀，任何形式的飾品皆可配戴", "correct": false, "explanation": "飾品選擇必須遵循館內的專業與簡潔標準，而非僅憑個人喜好。"}], "answer_index": 2}, {"id": "OP-GS-01-Q10", "stem": "主管巡檢的主要目的與權限，根據指導書內容，下列敘述何者正確？", "difficulty": "", "options": [{"text": "主管僅能在夥伴上班打卡的那一刻進行檢查", "correct": false, "explanation": "主管可於開班前或巡檢時進行抽查，並不限於打卡當下。"}, {"text": "主管可隨時抽查，若夥伴未達標，有權要求其立即調整後再回崗位", "correct": true, "explanation": "督導機制包含開班前與巡檢抽查，其目的是確保夥伴隨時維持在標準狀態。"}, {"text": "主管只能提醒，不具備處置未改善夥伴的權限", "correct": false, "explanation": "若提醒後仍未改善，應依內部管理規範進行處理。"}, {"text": "主管的檢查結果應由全體員工投票決定是否需要調整", "correct": false, "explanation": "標準指導書中賦予主管檢查與督導的權責。"}, {"text": "巡檢的目的只是為了找夥伴的麻煩，並非必要流程", "correct": false, "explanation": "巡檢與複核是維持整體服務標準與專業形象的必要控管環節。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
