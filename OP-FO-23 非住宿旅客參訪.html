<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-23 非住宿旅客參訪 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-23 非住宿旅客參訪 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-23 非住宿旅客參訪.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-23", "title": "非住宿旅客參訪", "source_pdf": "03 SOP教材pdf檔/OP-FO-23 非住宿旅客參訪.pdf", "questions": [{"id": "OP-FO-23-Q01", "stem": "當一位訪客進入大廳，櫃檯夥伴的首要確認動作應為何？", "difficulty": "", "options": [{"text": "直接引導至沙發區稍坐並提供飲料", "correct": false, "explanation": "雖然提供服務很重要，但首要步驟應是釐清訪客身份與來意，以決定後續適用的作業流程。"}, {"text": "詢問該訪客是否為住宿旅客", "correct": true, "explanation": "根據流程1-1，第一步必須先確認來客是否為住宿旅客，以區分後續是執行入住手續或參訪流程。"}, {"text": "請訪客留下大名與電話以便登記", "correct": false, "explanation": "登記資料是針對非住宿旅客參訪的具體執行細節，並非對所有進店客人的首要確認動作。"}, {"text": "通知值班主管有客人來訪", "correct": false, "explanation": "通知主管通常是在確認訪客有特殊需求或背景（如熟人介紹）後的步驟，並非第一時間的反應。"}, {"text": "確認交接事項中有無今日預約", "correct": false, "explanation": "確認交接事項是針對「非住宿旅客」且「自稱為熟人介紹」時的下一步骤，需先確認身分後再進行。"}], "answer_index": 1}, {"id": "OP-FO-23-Q02", "stem": "若訪客表示是由公司高層（如 SEVEN 或 KEVIN）介紹來參訪，櫃檯夥伴應優先執行哪項查核？", "difficulty": "", "options": [{"text": "立即致電該高層確認", "correct": false, "explanation": "直接致電高層可能干擾其工作，應先查閱內部已有的資訊紀錄。"}, {"text": "請訪客於一樓大廳稍坐，並直接讓其上樓", "correct": false, "explanation": "規範中明確規定切勿直接讓顧客上樓，必須經過身份確認與主管許可。"}, {"text": "先確認交接事項中是否有紀錄今日預約參訪", "correct": true, "explanation": "流程1-2-1規定應先確認交接事項有無預約，這是確保資訊對接與維持現場秩序的第一步。"}, {"text": "要求訪客出示與高層的通訊記錄", "correct": false, "explanation": "流程中並無要求查驗私人通訊紀錄，夥伴應透過內部交接與主管確認來查證。"}, {"text": "請主管帶領該顧客進行全館瀏覽介紹", "correct": false, "explanation": "全館瀏覽介紹的前提是主管確認認識該顧客且情況允許，並非在尚未核對資訊前就執行。"}], "answer_index": 2}, {"id": "OP-FO-23-Q03", "stem": "若交接事項內無預約紀錄，且訪客自稱為熟人介紹時，下列哪項處置是錯誤的？", "difficulty": "", "options": [{"text": "請顧客於一樓大廳稍坐", "correct": false, "explanation": "這符合流程1-2-2的規定，即在確認身份期間應安頓客人在公共區域等待。"}, {"text": "向當班主管或 Kevin 告知有該組顧客欲參訪", "correct": false, "explanation": "當交接事項查無紀錄時，主動向上級呈報確認是標準的應變流程。"}, {"text": "向顧客留下大名及手機號碼", "correct": false, "explanation": "獲取訪客基本聯繫資料有助於身分核對與後續追蹤，是正確的執行步驟。"}, {"text": "為節省訪客時間，先帶領訪客上樓參觀", "correct": true, "explanation": "流程1-2-2特別註記「切勿直接讓顧客上樓」，避免在身份未明前造成安全或管理上的疑慮。"}, {"text": "若主管確認不認識該顧客，則轉為執行一般路過民眾的流程", "correct": false, "explanation": "根據1-2-4，若主管確認不認識，應參照1-3-2說明，即視為一般民眾處理。"}], "answer_index": 3}, {"id": "OP-FO-23-Q04", "stem": "一位路過民眾在下午 2 點表示想要參觀旅館，櫃檯夥伴應如何安排登記？", "difficulty": "", "options": [{"text": "要求參訪的所有人員皆需留下姓名與電話", "correct": false, "explanation": "流程1-3-1規定若為兩人以上參觀，僅需留一位作為代表即可。"}, {"text": "請一位代表登記留下姓名與連絡電話", "correct": true, "explanation": "這是針對多數民眾參訪時，在效率與資料蒐集間取得平衡的標準作法。"}, {"text": "因為是路過民眾，不需登記即可參觀", "correct": false, "explanation": "非住宿旅客參訪皆需進行登記，以利管理並留意顧客動向。"}, {"text": "要求訪客提供身份證件以供影印留存", "correct": false, "explanation": "流程僅要求姓名與電話，過度蒐集個資不符合目前的作業指導書規定。"}, {"text": "請主管先過目確認是否允許參觀", "correct": false, "explanation": "一般民眾參訪若在規定時間內，依流程登記後即可參觀一樓或依指引進行，不需逐一由主管預審。"}], "answer_index": 1}, {"id": "OP-FO-23-Q05", "stem": "關於「一般路過民眾」的參訪時間限制，下列敘述何者正確？", "difficulty": "", "options": [{"text": "全天候 24 小時皆可進入大廳與客房層參觀", "correct": false, "explanation": "為維護住客隱私與安全，參訪時間有明確限制，且非參訪時間禁止上樓。"}, {"text": "參訪時間為早上 9 點至下午 5 點", "correct": false, "explanation": "此時間設定不符合作業指導書 1-3-2 中規定的 11:00 至 19:00 時段。"}, {"text": "晚上 8 點來訪的民眾，僅能參觀一樓大廳", "correct": true, "explanation": "因為 20:00 已超過參訪時間（11:00-19:00），依規定禁止引導上樓，僅限一樓區域。"}, {"text": "非參訪時間來訪者，需由主管特許方可參觀客房", "correct": false, "explanation": "流程明確規定非參訪時間請勿讓顧客上樓，這是維護管理標準的硬性規定。"}, {"text": "只要有登記，任何時間皆可參觀各樓層", "correct": false, "explanation": "登記僅是參訪的條件之一，時間限制與空間權限仍需依規定執行。"}], "answer_index": 2}, {"id": "OP-FO-23-Q06", "stem": "當訪客明確表達「想要參觀房間並且想要訂房」時，正確的處理流程是？", "difficulty": "", "options": [{"text": "請櫃檯夥伴自行帶領顧客前往參觀空房", "correct": false, "explanation": "櫃檯夥伴需留守崗位，且流程規定應由主管負責帶領房間參觀。"}, {"text": "請訪客自行搭電梯前往標示為展示間的房號", "correct": false, "explanation": "這違反了「切勿直接讓顧客上樓」的安全原則，且無法提供專業的訂房說明。"}, {"text": "通知值班主管，請值班主管帶領顧客參觀空房", "correct": true, "explanation": "根據流程1-4，涉及參觀房間欲訂房的情況，應交由值班主管引導，以確保服務品質。"}, {"text": "請顧客先在訂房系統下單後再安排參觀", "correct": false, "explanation": "實務上通常是先參觀滿意後才下單，流程並無限制須先訂房才能參觀空房。"}, {"text": "告知目前無空房，無法提供參觀", "correct": false, "explanation": "即使無空房，也應依流程通報主管處理，而非直接拒絕潛在客戶的參觀需求。"}], "answer_index": 2}, {"id": "OP-FO-23-Q07", "stem": "對於「參觀展覽」的民眾，作業項目中特別強調的動作是什麼？", "difficulty": "", "options": [{"text": "需檢查其行李有無危險物品", "correct": false, "explanation": "雖然安全重要，但目前的作業指導書中並未規定要進行行李檢查。"}, {"text": "必須支付參觀清潔費", "correct": false, "explanation": "資料中並未提及收費標準，應以流程中的簽到與引導為準。"}, {"text": "按照展覽簽到方法請參觀者確實簽到", "correct": true, "explanation": "依據作業項目 2「參觀展覽」，確實簽到是掌握參觀人數與對象的關鍵管控點。"}, {"text": "強制要求訪客在社交媒體打卡", "correct": false, "explanation": "打卡屬於行銷建議，並非作業指導書中規定的必要作業流程。"}, {"text": "引導至二樓以上的客房走廊參觀", "correct": false, "explanation": "展覽路線應依設計規劃，且需符合參訪空間的管控，不一定包含客房區域。"}], "answer_index": 2}, {"id": "OP-FO-23-Q08", "stem": "若公司高層或熟人介紹的顧客到訪，且身份經主管確認後，在什麼樣的條件下可以進行「全館瀏覽介紹」？", "difficulty": "", "options": [{"text": "只要顧客提出要求即可進行", "correct": false, "explanation": "全館介紹會耗費較多人力與資源，不能僅憑顧客單方面要求即執行。"}, {"text": "當下情況允許，並由值班主管親自帶領", "correct": true, "explanation": "流程1-2-3指出，需在主管確認身份且情況允許（如人力、館內狀況）時，由值班主管執行全館介紹。"}, {"text": "由櫃檯夥伴於空檔時間帶領", "correct": false, "explanation": "全館瀏覽介紹層次較高，規範明確指名由「值班主管」執行，而非櫃檯夥伴。"}, {"text": "不論當下情況如何，高層介紹者皆應優先服務", "correct": false, "explanation": "作業規範中特別提到「當下情況允許」，意味著仍需考量現場營運的實際能量。"}, {"text": "必須在早上 11 點以前進行", "correct": false, "explanation": "11點至19點是一般民眾的時間規範，熟人介紹流程中並無強制此時間限制，而是以情況允許為主。"}], "answer_index": 1}, {"id": "OP-FO-23-Q09", "stem": "在「1-3 一般路過民眾」的注意事項中，除了登記資料外，夥伴還需要特別注意什麼？", "difficulty": "", "options": [{"text": "向顧客推銷當季的住宿優惠專案", "correct": false, "explanation": "推銷是行銷行為，但在管理流程中，首要重點在於現場狀況的掌握。"}, {"text": "要求顧客穿著正式服裝方可入內", "correct": false, "explanation": "規範中並無服裝限制的相關規定。"}, {"text": "留意顧客動向", "correct": true, "explanation": "對於非住宿的一般民眾，在開放空間參觀時，留意其動向是確保館內安全與秩序的重要責任。"}, {"text": "引導顧客至餐廳用餐", "correct": false, "explanation": "這與參訪管理流程無直接關聯，不應作為作業指導書中的核心注意事項。"}, {"text": "確認顧客是否攜帶寵物", "correct": false, "explanation": "雖然旅館可能有寵物政策，但指導書中針對參訪流程強調的是動向監控而非特定攜帶物。"}], "answer_index": 2}, {"id": "OP-FO-23-Q10", "stem": "若路過民眾欲於非參訪時間（如早上 10 點）進入旅館，夥伴應如何指引？", "difficulty": "", "options": [{"text": "嚴格拒絕入內，請其在門外候至 11 點", "correct": false, "explanation": "過於僵化的服務可能造成負評，應提供適當的開放空間作為替代。"}, {"text": "告知僅能參觀一樓大廳，並留意其動向", "correct": true, "explanation": "流程1-3-2說明，在非參訪時間，顧客僅能參觀一樓大廳，這能平衡服務與館內管理需求。"}, {"text": "告知主管有特殊情況，申請提前開放客房層參觀", "correct": false, "explanation": "作業規範中已明確規定非參訪時間的處理方式，不應隨意申請破例。"}, {"text": "請其先至附近參觀，待 11 點後再回來", "correct": false, "explanation": "雖然是一種建議，但指導書中明確提到「僅能參觀一樓大廳」，這是第一線的標準答覆。"}, {"text": "不論時間，只要有登記就可前往客房層參觀", "correct": false, "explanation": "時間限制是為了保護住宿旅客的安寧，不論是否登記，非時段內皆不得上樓。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
