<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-21 退款作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-21 退款作業流程 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-21 退款作業流程.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-21", "title": "退款作業流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-21 退款作業流程.pdf", "questions": [{"id": "OP-FO-21-Q01", "stem": "當客人透過「電話訂房」並已完成匯款，後續因故需辦理退款時，櫃檯人員應請客人提供哪一項關鍵資訊以利作業？", "difficulty": "", "options": [{"text": "提供存摺封面照片", "correct": true, "explanation": "根據流程規範，電話訂房或ATM轉帳之退款，必須索取收款人存摺封面以確保帳號資訊正確。"}, {"text": "提供原匯款收據正本", "correct": false, "explanation": "雖然收據可用於對帳，但退款流程中明確要求的是存摺封面以便進行轉帳作業。"}, {"text": "提供身分證正反面影本", "correct": false, "explanation": "流程中並未要求提供個人身分證件，主要核對的是收款帳戶資訊。"}, {"text": "提供原訂房確認簡訊", "correct": false, "explanation": "訂房確認簡訊僅用於確認訂單，無法作為退款撥款的依據。"}, {"text": "提供信用卡正反面影本", "correct": false, "explanation": "電話訂房且已匯款的情況下應採銀行轉帳退款，而非信用卡刷退。"}], "answer_index": 0}, {"id": "OP-FO-21-Q02", "stem": "針對退款作業的工作天數，櫃檯人員在與客人溝通時，應如何說明標準作業時間？", "difficulty": "", "options": [{"text": "告知需要 3 至 5 個工作天", "correct": false, "explanation": "此天數低於標準作業流程所訂定的時間範圍。"}, {"text": "告知需要 7 至 14 天（不含假日）", "correct": true, "explanation": "作業流程明確規定退款工作天為 7 至 14 天，且特別註明不含假日。"}, {"text": "告知需配合財務每月固定結算日撥款", "correct": false, "explanation": "雖然財務有其流程，但標準話術中應給予具體的天數範圍。"}, {"text": "告知次月底前會完成退款", "correct": false, "explanation": "流程中並非以「次月底」作為承諾，而是以天數計算。"}, {"text": "告知約需 21 個工作天", "correct": false, "explanation": "此天數過長，可能引起客人不滿，並非標準流程規範的時間。"}], "answer_index": 1}, {"id": "OP-FO-21-Q03", "stem": "關於退款手續費的說明與收取標準，下列敘述何者符合現行規範？", "difficulty": "", "options": [{"text": "無論何種退款方式，皆一律免收工本費", "correct": false, "explanation": "並非所有方式都免收，僅限信用卡退款免收工本費。"}, {"text": "退款會收取 10 元的行政處理費", "correct": false, "explanation": "金額不符合規範中提到的 15 至 30 元範圍。"}, {"text": "銀行轉帳退款會收取 15 至 30 元的手續費", "correct": true, "explanation": "根據話術規範 1-2，應告知退款會產生 15 至 30 元的手續費。"}, {"text": "手續費一律由飯店全額吸收", "correct": false, "explanation": "除非特定情況，否則標準流程中會告知客人將扣除手續費。"}, {"text": "手續費固定為退款總金額的 $10\\%$", "correct": false, "explanation": "手續費為固定級距金額，並非按退款比例計算。"}], "answer_index": 2}, {"id": "OP-FO-21-Q04", "stem": "若客人在預定住宿日期的「前 2 天」提出取消訂房申請，根據最新的取消規定，其訂金退還比例為何？", "difficulty": "", "options": [{"text": "退還 $100\\%$ 訂金", "correct": false, "explanation": "前 3 天取消才可退還 $100\\%$。"}, {"text": "退還 $80\\%$ 訂金", "correct": false, "explanation": "現行規範中並無 $80\\%$ 的退款級距。"}, {"text": "退還 $50\\%$ 訂金", "correct": true, "explanation": "最新取消規定指出，預定住宿日前 1-2 天取消者退還 $50\\%$。"}, {"text": "退還 $30\\%$ 訂金", "correct": false, "explanation": "現行規範中並無 $30\\%$ 的退款級距。"}, {"text": "不予退還任何金額", "correct": false, "explanation": "當日取消才會沒收全額訂金。"}], "answer_index": 2}, {"id": "OP-FO-21-Q05", "stem": "若客人在「訂房網站（平台）」預訂且欲於「當天」取消，櫃檯人員應如何協助或告知相關權益？", "difficulty": "", "options": [{"text": "由櫃檯直接在後台退回現金給客人", "correct": false, "explanation": "平台訂單必須透過平台聯繫，飯店不能直接進行退款操作。"}, {"text": "告知會沒收全額，但可於三個月內使用", "correct": true, "explanation": "針對平台當日取消，規範註明會沒收全額，但提供三個月內可使用的彈性。"}, {"text": "告知平台訂單一旦取消即無法再使用", "correct": false, "explanation": "雖然沒收全額，但規範中有提到三個月內使用的備註。"}, {"text": "請客人聯繫平台，飯店可協助爭取全額退款", "correct": false, "explanation": "規範中並未承諾當天取消可全額退款。"}, {"text": "告知當天取消可退還 $50\\%$ 訂金", "correct": false, "explanation": "當天取消屬於沒收訂金的情況，不適用比例退還。"}], "answer_index": 1}, {"id": "OP-FO-21-Q06", "stem": "在 UOF 系統填寫「B0.02 訂房退款申請單」時，若「退款類別」勾選為「信用卡退款」，則「是否酌收工本費」一欄應如何處理？", "difficulty": "", "options": [{"text": "依據退款金額大小決定是否收取", "correct": false, "explanation": "工本費收取與金額大小無關，與退款方式有關。"}, {"text": "一律勾選「是」", "correct": false, "explanation": "信用卡退款是唯一明確標註不收取工本費的項目。"}, {"text": "一律勾選「否」", "correct": true, "explanation": "申請單表單備註明確指出，如為信用卡退款，一律「不」收取工本費。"}, {"text": "視客人取消原因是否具備正當性而定", "correct": false, "explanation": "行政費用的收取是依據支付渠道的特性，而非取消原因。"}, {"text": "由財務部審核後再自行勾選", "correct": false, "explanation": "申請人應於填寫表單時即根據規則完成勾選。"}], "answer_index": 2}, {"id": "OP-FO-21-Q07", "stem": "在「官網訂房已付款」的情況下，若客人表示無法在官網找到訂單進行取消，櫃檯人員應執行的正確步驟為何？", "difficulty": "", "options": [{"text": "直接在德安系統點選取消即可", "correct": false, "explanation": "官網訂單需先在 web 介面處理，以確保金流與資訊同步。"}, {"text": "請客人自行聯繫發卡銀行辦理爭議帳款", "correct": false, "explanation": "這不是標準的退款作業方式，且會造成金流混亂。"}, {"text": "至 web 手動取消，並在處理說明打上原因，確認德安是否下傳成功", "correct": true, "explanation": "這是官網訂單無法自行取消時的標準補救SOP。"}, {"text": "請客人等到入住日當天未到，系統會自動辦理退款", "correct": false, "explanation": "No show 通常會沒收全額，且不會自動觸發退款流程。"}, {"text": "告知官網訂房若未自行取消則無法受理退款", "correct": false, "explanation": "飯店應協助客人完成手動取消流程，而非拒絕受理。"}], "answer_index": 2}, {"id": "OP-FO-21-Q08", "stem": "在 UOF 退款申請流程中，完成表單內容填寫後，必須新增的附件圖片「不包括」下列哪一項？", "difficulty": "", "options": [{"text": "德安訂金明細表", "correct": false, "explanation": "這是 UOF 流程第 7 點明確要求的必備附件。"}, {"text": "存摺封面（若有需要時）", "correct": false, "explanation": "涉及銀行轉帳退款時必須檢附存摺封面。"}, {"text": "信用卡刷卡簽單", "correct": false, "explanation": "表單下方標註了附件可包含信用卡刷卡簽單。"}, {"text": "客人入住時的登記表 (Registration Card)", "correct": true, "explanation": "退款作業主要核對訂金與帳戶，不需檢附入住登記表。"}, {"text": "靈知訂房作業&訂金收款截圖", "correct": false, "explanation": "表單下方明確標註可作為附件的選項之一。"}], "answer_index": 3}, {"id": "OP-FO-21-Q09", "stem": "針對「電話訂房已匯款」的取消作業，在德安系統中的正確操作路徑為何？", "difficulty": "", "options": [{"text": "訂房管理 -> 輸入單號查詢 -> 開啟 Profile -> 點選取消單筆並存檔", "correct": true, "explanation": "此為德安系統取消電話訂房的標準作業四步驟。"}, {"text": "櫃檯接待 -> 房務管理 -> 選擇客房狀態 -> 執行訂單作廢", "correct": false, "explanation": "取消訂單應在「訂房管理」功能模組下操作。"}, {"text": "出納管理 -> 訂金查詢 -> 選取訂單 -> 執行退款存檔", "correct": false, "explanation": "這是退款帳務操作，而非取消訂單狀態的操作。"}, {"text": "訂房管理 -> 輸入姓名查詢 -> 開啟交易明細 -> 點選退款並存檔", "correct": false, "explanation": "取消訂單應點選「取消單筆」，而非直接在交易明細處理。"}, {"text": "系統設定 -> 資料維護 -> 批次取消 -> 存檔離開", "correct": false, "explanation": "此路徑為系統管理使用，非一般櫃檯取消單筆訂單的流程。"}], "answer_index": 0}, {"id": "OP-FO-21-Q10", "stem": "完成 UOF 退款申請單的填寫與圖片新增後，最後一個需要在德安系統執行的動作是什麼？", "difficulty": "", "options": [{"text": "直接將訂單從德安系統中刪除", "correct": false, "explanation": "訂單不可隨意刪除，應保持取消狀態以供稽核。"}, {"text": "在德安備註欄位打上「填退日期」", "correct": true, "explanation": "退款申請流程第 9 點明確要求須於德安備註打上填單日期。"}, {"text": "列印退款單並由主管簽名", "correct": false, "explanation": "UOF 為電子簽核流程，不需額外紙本列印簽名。"}, {"text": "立即執行結帳作業將餘額歸零", "correct": false, "explanation": "退款需經財務審核，不應由櫃檯人員先行在系統結帳歸零。"}, {"text": "將訂單狀態更改為「已退款」", "correct": false, "explanation": "德安系統通常只有取消狀態，退款進度由 UOF 與財務系統控管。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
