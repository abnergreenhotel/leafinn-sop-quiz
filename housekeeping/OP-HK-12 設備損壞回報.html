<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-HK-12 設備損壞回報 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-HK-12 設備損壞回報</h1>
        <div class="meta">來源：03 SOP教材pdf檔/房務SOP/OP-HK-12 設備損壞回報 .pdf｜5 題</div>
      </div>
      <a href="./index.html">回到房務 SOP 題庫</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-HK-12", "title": "OP-HK-12 設備損壞回報", "source_pdf": "03 SOP教材pdf檔/房務SOP/OP-HK-12 設備損壞回報 .pdf", "questions": [{"id": "OP-HK-12-Q01", "stem": "在客房內發現牆面插座無法供電，準備進行照片紀錄時，除了拍下損壞設備本身，還必須在照片中完成哪項操作？", "hint": "請回想 SOP 流程中對於「靜態損壞」照片紀錄的特殊視覺要求。", "difficulty": "", "options": [{"text": "使用紅色標記損壞的具體位置", "correct": true, "explanation": "根據照片紀錄作業規範，對於如插座無反應等靜態設備問題，必須以紅色標記損壞處以利後續辨識。"}, {"text": "將房務工作卡放在旁邊對比位置", "correct": false, "explanation": "雖然放置參照物可能有助於定位，但作業規範明確要求的是使用紅色標記，而非工作卡。"}, {"text": "連續拍攝三張不同距離的照片", "correct": false, "explanation": "規範中並未要求拍攝特定數量的照片，重點在於必須有損壞位置的紅色標記。"}, {"text": "在照片下方手寫註記損壞時間", "correct": false, "explanation": "時間資訊通常包含在訊息回報或系統中，規範要求照片本身的處理應著重於位置標記。"}], "answer_index": 0}, {"id": "OP-HK-12-Q02", "stem": "房務員在公區巡檢時發現消防指示燈出現閃爍情形，根據流程應如何記錄此異常？", "hint": "考慮到「閃爍」是一種動態過程，哪種紀錄媒介最能呈現真實情況？", "difficulty": "", "options": [{"text": "拍攝一段短影片紀錄動態狀況", "correct": true, "explanation": "對於燈光閃爍、異音或漏水等動態問題，短影片能更準確地呈現問題現狀。"}, {"text": "拍攝三張不同角度的高清照片", "correct": false, "explanation": "靜態照片難以呈現燈光「閃爍」的具體頻率與狀況，因此影片紀錄較為適當。"}, {"text": "直接通知水電技工到場查看", "correct": false, "explanation": "直接通知技工前應先依據流程完成影像紀錄與群組回報，以留存設備異常證據。"}, {"text": "在群組內用文字詳細描述閃爍頻率", "correct": false, "explanation": "文字描述可能存在主觀誤差，作業規範規定此類問題應透過短影片方式紀錄。"}], "answer_index": 0}, {"id": "OP-HK-12-Q03", "stem": "在進行損壞設備的「群組回報」時，下列哪一項是必須包含在訊息中的核心內容？", "hint": "請思考主管在收到回報後，最需要哪些資訊來決定下一步的支援動作。", "difficulty": "", "options": [{"text": "是否已進行初步處理測試", "correct": true, "explanation": "回報內容必須包含：位置、損壞原因、是否做過初步測試以及是否需要主管協助，以利判斷後續處理優先度。"}, {"text": "損壞設備的原始購入價格", "correct": false, "explanation": "採購資訊並非現場回報流程所需的即時資訊，重點應放在現況與初步處理結果。"}, {"text": "預計修復所需的作業時間", "correct": false, "explanation": "修復時間通常由專業維修人員判斷，房務回報的重點在於精準傳達受損現況。"}, {"text": "該房間前一位住客的姓名", "correct": false, "explanation": "雖然損壞可能與住客有關，但 SOP 規定的回報核心內容不包含住客個人資料。"}], "answer_index": 0}, {"id": "OP-HK-12-Q04", "stem": "若遇到週六等連續假期「趕房」期間發現設備損壞，為了確保作業效率，回報方式應如何調整？", "hint": "假日趕房重視的是「速度」與「資源調配」，應尋求誰的快速支援？", "difficulty": "", "options": [{"text": "即時回報損壞原因並請主管立即協助", "correct": true, "explanation": "假日趕房時可簡化流程，透過即時回報原因讓主管介入協助，以確保客房能準時交付。"}, {"text": "等當天所有房間整理完後統一回報", "correct": false, "explanation": "延後回報會導致維修延遲，影響客房供應，應在發現時即時請求主管支援。"}, {"text": "略過影像紀錄，僅口頭告知下一班", "correct": false, "explanation": "口頭告知容易遺漏資訊，假日趕房雖可求快，但仍應即時向主管回報損壞原因。"}, {"text": "先自行嘗試拆解修復以節省時間", "correct": false, "explanation": "房務員應專注於趕房與初步測試，擅自拆解設備可能造成二次損壞或安全問題。"}], "answer_index": 0}, {"id": "OP-HK-12-Q05", "stem": "當房務員發現設備損壞（如電視無法開啟）時，執行的第一個動作應該是什麼？", "hint": "在動用影像紀錄或求援之前，應該先對現場狀況做什麼樣的基礎動作？", "difficulty": "", "options": [{"text": "確認損壞位置原因並做初步測試", "correct": true, "explanation": "作業流程的第一步是確認損壞具體狀況，並透過初步處理測試排除簡單的操作問題。"}, {"text": "立即拍影片上傳至房務群組", "correct": false, "explanation": "影像紀錄應在初步確認與測試原因之後才進行，以確保影像內容能準確反映問題。"}, {"text": "搬動另一台電視進入房間替換", "correct": false, "explanation": "在未確認損壞原因與獲得指示前，不應擅自搬動大型設備，應先執行初步測試。"}, {"text": "聯絡工務單位直接進行維修", "correct": false, "explanation": "應先依照 HK (房務) 內部 SOP 流程進行初步確認與回報，再由主管協調專業維修。"}], "answer_index": 0}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
