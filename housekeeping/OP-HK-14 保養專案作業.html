<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-HK-14 保養專案作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-HK-14 保養專案作業</h1>
        <div class="meta">來源：03 SOP教材pdf檔/房務SOP/OP-HK-14 保養專案作業 .pdf｜8 題</div>
      </div>
      <a href="./index.html">回到房務 SOP 題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-HK-14", "title": "OP-HK-14 保養專案作業", "source_pdf": "03 SOP教材pdf檔/房務SOP/OP-HK-14 保養專案作業 .pdf", "questions": [{"id": "OP-HK-14-Q01", "stem": "在進行週保養時，針對木質房門框與浴室內的白鐵把手，應使用哪一種藥劑進行擦拭保養？", "hint": "", "difficulty": "", "options": [{"text": "必麗澤", "correct": true, "explanation": "根據 SOP 規範，木質與白鐵材質的表面（如門框、開關、把手等）應統一使用必麗澤進行細部除塵保養。"}, {"text": "穩潔", "correct": false, "explanation": "穩潔主要用於外窗與玻璃材質，對於木頭牆面或白鐵把手的保養效果並非 SOP 建議的標準。"}, {"text": "漂白水", "correct": false, "explanation": "漂白水具腐蝕性，通常用於浴室牆面與地板除垢，不適合用於日常木質家具或門框的擦拭。"}, {"text": "檸檬酸", "correct": false, "explanation": "檸檬酸主要用於半月保養中的快煮壺與杯子浸泡除垢，而非用於表面家具的擦拭。"}], "answer_index": 0}, {"id": "OP-HK-14-Q02", "stem": "夥伴在執行「半月保養」的快煮壺與杯子清潔時，下列哪項操作最符合品質標準？", "hint": "", "difficulty": "", "options": [{"text": "集中於浴缸內用檸檬酸浸泡半小時，沖洗後確保無水漬", "correct": true, "explanation": "SOP 規定快煮壺與杯具需用檸檬酸浸泡約 30 分鐘，且完成後不可殘留水漬以維持衛生美觀。"}, {"text": "使用必麗澤噴灑壺身內外，再用乾布擦乾", "correct": false, "explanation": "必麗澤屬於表面保養劑，不可用於接觸飲用水的快煮壺內部清潔。"}, {"text": "為了徹底除菌，應加入漂白水與清潔劑混合浸泡", "correct": false, "explanation": "清潔劑不可混用，且快煮壺除垢應優先使用檸檬酸，使用漂白水可能造成殘留風險。"}, {"text": "浸泡後直接自然風乾，無需刻意擦拭", "correct": false, "explanation": "SOP 特別強調「不可有水漬」，自然風乾容易產生水痕，不符品質規範。"}], "answer_index": 0}, {"id": "OP-HK-14-Q03", "stem": "進行「每月浴室重保養」使用漂白水刷洗時，為了避免旅客不適與確保現場安全，下列哪一項做法是錯誤的？", "hint": "", "difficulty": "", "options": [{"text": "為了讓空氣流通，應同時開啟客房空調運作", "correct": true, "explanation": "SOP 明確指出應關閉冷氣以避免整個空調系統充滿漂白水味，並需全程開窗通風。"}, {"text": "保養完成後需在浴室噴灑除臭劑", "correct": false, "explanation": "這是正確的做法，SOP 要求保養完畢需噴除臭劑以掩蓋藥劑味道，提升旅客舒適度。"}, {"text": "作業過程中必須全程打開窗戶保持通風", "correct": false, "explanation": "這是 SOP 規定的安全步驟，旨在減少化學藥劑氣味在室內的濃度。"}, {"text": "針對牆面 Silicone 與地板細縫進行全面除垢", "correct": false, "explanation": "這是月保養的重點工作之一，目的是確保浴室各處細節都經過深度清潔。"}], "answer_index": 0}, {"id": "OP-HK-14-Q04", "stem": "在進行每月「更換給皂劑」的保養作業時，下列哪項做法最能兼顧衛生與成本控制？", "hint": "", "difficulty": "", "options": [{"text": "將舊液倒掉並清洗乾淨後，再補充半瓶左右的新品", "correct": true, "explanation": "SOP 規定需清洗瓶身後補充，且預計保養前一週以半瓶為主，可避免更換時造成過多浪費。"}, {"text": "直接在剩餘的皂液上補充新品，確保瓶身全滿", "correct": false, "explanation": "SOP 要求需先倒掉並清洗乾淨，直接添加可能導致細菌滋生或新舊液混雜。"}, {"text": "僅在給皂劑完全耗盡時才進行清洗與更換", "correct": false, "explanation": "這是月保養的固定項目，旨在維護品質，而非等耗盡才處理。"}, {"text": "為了清潔方便，直接將給皂機外殼拆下送洗", "correct": false, "explanation": "SOP 強調的是內部殘液的處理與瓶口清潔，並非大範圍拆卸外部硬體。"}], "answer_index": 0}, {"id": "OP-HK-14-Q05", "stem": "針對客房床墊的「季保養（翻床）」，現場夥伴應如何正確執行？", "hint": "", "difficulty": "", "options": [{"text": "將床墊進行方向對調（轉向），但不可翻面", "correct": true, "explanation": "SOP 備註欄明確提醒「床只能轉向對調，不能翻面」，以符合床墊設計的正確維護方式。"}, {"text": "為了讓兩面磨損均勻，每季應將床墊翻面使用", "correct": false, "explanation": "這違反了 SOP 備註中「不能翻面」的警示，可能損壞特定結構的床墊。"}, {"text": "翻床時若發現保潔墊乾淨，可不送洗以節省工時", "correct": false, "explanation": "SOP 規定季保養包含更換保潔墊並送洗，屬於固定保養流程。"}, {"text": "翻床作業應在每年的 2 月與 8 月進行", "correct": false, "explanation": "SOP 規定的季保養月份為 1、4、7、10 月。"}], "answer_index": 0}, {"id": "OP-HK-14-Q06", "stem": "週保養中關於冷氣與通風設備的清潔，下列操作何者正確？", "hint": "", "difficulty": "", "options": [{"text": "清洗冷氣迴風網並風乾，抽風機內部則需用牙刷刷淨", "correct": true, "explanation": "根據 SOP，冷氣迴風網需清洗風乾，而抽風機外蓋拆下後，內部需配合牙刷進行細部清潔。"}, {"text": "冷氣出風口處灰塵較多，應噴灑大量清潔劑後擦乾", "correct": false, "explanation": "SOP 提醒藥劑應適量，避免過多，且出風口處主要使用必麗澤進行保養。"}, {"text": "抽風機只需擦拭外蓋，不可拆卸以避免損壞", "correct": false, "explanation": "SOP 指示抽風機外蓋應拆下清洗，才能確保內部清潔度。"}, {"text": "LED 投射燈應使用濕抹布直接擦拭燈珠", "correct": false, "explanation": "SOP 指出 LED 投射燈應翻轉後，利用油漆刷進行除塵，而非濕擦。"}], "answer_index": 0}, {"id": "OP-HK-14-Q07", "stem": "在 1 月份的保養計畫中，除了季保養外，還包含了哪一項獨有的「年度保養」項目？", "hint": "", "difficulty": "", "options": [{"text": "浴室維修孔區域的天花板除塵", "correct": true, "explanation": "根據年度保養表單，1 月份需執行天花板除塵，特別是針對浴室維修孔改區域。"}, {"text": "更換客房內的滅火器藥粉", "correct": false, "explanation": "SOP 僅提到滅火器外觀使用必麗澤保養，並未提及內部藥粉更換流程。"}, {"text": "全面清洗客房窗簾與床裙", "correct": false, "explanation": "床裙與窗簾屬於「半年保養」項目，分別於 2 月與 9 月執行。"}, {"text": "更換天花板的所有冷氣口濾網", "correct": false, "explanation": "濾網清潔屬於「週保養」的例行範疇，並非年度保養才處理。"}], "answer_index": 0}, {"id": "OP-HK-14-Q08", "stem": "夥伴在執行半年保養時，使用烘被機處理枕頭與棉被，其主要目的是什麼？", "hint": "", "difficulty": "", "options": [{"text": "透過高溫殺滅塵蟎與減少霉味的產生", "correct": true, "explanation": "SOP 註明烘枕烘被半小時後換面，是為了減少因潮濕而產生的霉味。"}, {"text": "單純加速寢具烘乾，方便立即恢復使用", "correct": false, "explanation": "雖然烘乾可能有此效果，但 SOP 內明確提到的作業目標是「減少霉味產生」。"}, {"text": "取代定期洗滌枕頭的流程", "correct": false, "explanation": "烘乾是為了保養防霉，不應視為完全取代清洗的替代方案。"}, {"text": "增加枕頭的蓬鬆度與外觀美感", "correct": false, "explanation": "雖然蓬鬆度會提升，但 SOP 核心強調的是氣味與濕度管理的保養效益。"}], "answer_index": 0}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
