  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">

    </div>
  </div>
  <script>
    const payload = {"code": "OP-HK-03", "title": "OP-HK-03 浴廁清掃標準", "source_pdf": "03 SOP教材pdf檔/房務SOP/OP-HK-03 浴廁清掃標準.pdf", "questions": [{"id": "OP-HK-03-Q01", "stem": "房務員在執行浴廁清掃時，為了確保效率與清潔品質，正確的刷洗先後順序應為何？", "hint": "請回想 SOP 中「由外而內」的作業動線。", "difficulty": "", "options": [{"text": "浴缸 > 玻璃 > 蓮蓬頭 > 馬桶 > 洗手台", "correct": false, "explanation": "此順序與 SOP 要求相反，這會導致已清潔區域在後續作業中再次受到污染。"}, {"text": "洗手台 > 馬桶 > 蓮蓬頭 > 玻璃 > 浴缸", "correct": true, "explanation": "這符合 SOP 要求的由外而內清潔邏輯，確保清潔路徑的一貫性與衛生。"}, {"text": "馬桶 > 洗手台 > 浴缸 > 蓮蓬頭 > 玻璃", "correct": false, "explanation": "馬桶應在洗手台之後清潔，且浴缸應作為刷洗流程的最後一站。"}, {"text": "玻璃 > 蓮蓬頭 > 洗手台 > 馬桶 > 浴缸", "correct": false, "explanation": "雖然浴缸排在最後，但玻璃不應作為清潔起點，應遵循從洗手台開始的順序。"}], "answer_index": 1}, {"id": "OP-HK-03-Q02", "stem": "在整理洗手台區域時，關於抽屜內部的清潔與整理標準，下列何者正確？", "hint": "關鍵在於清潔後的查驗流程要求。", "difficulty": "", "options": [{"text": "抽屜需關閉整齊，並在把手處貼上已清潔封條", "correct": false, "explanation": "SOP 未提及封條要求，且明確規定抽屜的擺放狀態以便查驗。"}, {"text": "抽屜內部只需確認吹風機收整，不需要除塵", "correct": false, "explanation": "SOP 明確規定抽屜內部需要進行清潔除塵作業。"}, {"text": "需將抽屜打開備查，並確保內部清潔無塵", "correct": true, "explanation": "這符合 SOP 要求將抽屜打開以便後續督導查驗除塵與收整狀況的標準。"}, {"text": "抽屜內只要沒有垃圾，不需要特意打開給主管看", "correct": false, "explanation": "這違反了 SOP 中「需將抽屜打開備查」的具體執行說明。"}], "answer_index": 2}, {"id": "OP-HK-03-Q03", "stem": "關於免治馬桶的清潔重點，除了刷洗內座外，夥伴最容易忽略但也必須確實清潔的部位是？", "hint": "請注意馬桶功能面（出水）以及視覺死角的檢查。", "difficulty": "", "options": [{"text": "沖水把手與水箱蓋上方", "correct": false, "explanation": "雖然這也需要清潔，但 SOP 特別強調的是出水孔與細部髒污的檢查。"}, {"text": "出水孔處及馬桶下緣有無髒污", "correct": true, "explanation": "這是 SOP 特別提醒的死角，包括出水孔、馬桶下緣及坐墊是否有血跡或污漬。"}, {"text": "馬桶蓋後方的軸心縫隙", "correct": false, "explanation": "SOP 主要是強調出水孔與底座區域，軸心並非 SOP 提到的關鍵檢查點。"}, {"text": "牆壁噴濺到的水花", "correct": false, "explanation": "這屬於牆面清潔範疇，非馬桶本體清潔標準中強調的細節。"}], "answer_index": 1}, {"id": "OP-HK-03-Q04", "stem": "夥伴在整理淋浴空間時，針對蓮蓬頭的清潔與維護，哪項作業是正確的？", "hint": "請考慮如何處理蓮蓬頭內殘留的積水。", "difficulty": "", "options": [{"text": "只需擦拭金屬表面，確保光亮無水漬即可", "correct": false, "explanation": "僅擦拭表面是不夠的，SOP 要求需有瀝乾的動作以確保衛生。"}, {"text": "清潔時需將蓮蓬頭轉開瀝乾後再裝回", "correct": true, "explanation": "這能防止蓮蓬頭內部積水產生異味或衛生問題，是 SOP 中的明確要求。"}, {"text": "蓮蓬頭軟管不可轉動，以免損壞密封墊片", "correct": false, "explanation": "這與 SOP 要求轉開瀝乾的指引相違背。"}, {"text": "只要確認出水順暢，就不需要拆開處理", "correct": false, "explanation": "瀝乾內部積水是標準作業流程的一環，不論出水是否順暢都應執行。"}], "answer_index": 1}, {"id": "OP-HK-03-Q05", "stem": "在檢查洗髮精、沐浴乳的容量時，何時需要進行補充？", "hint": "請留意 SOP 圖片中標註的「紅線」參考位置。", "difficulty": "", "options": [{"text": "容量低於瓶身二分之一時", "correct": false, "explanation": "SOP 規定了更具體的參考基準線，而非粗略的二分之一。"}, {"text": "瓶內清潔劑快見底時再補充即可", "correct": false, "explanation": "這會導致客人使用不便，不符合飯店服務標準。"}, {"text": "容量低於貼紙下緣位置（紅線處）時", "correct": true, "explanation": "這是 SOP 規定的精確補充時機，確保客人有充足的量可使用。"}, {"text": "每天固定補滿，不論剩餘多少", "correct": false, "explanation": "雖然這也是一種做法，但 SOP 主要是設定了低於貼紙下緣的補充門檻。"}], "answer_index": 2}, {"id": "OP-HK-03-Q06", "stem": "整理雙人房的漱口杯時，若採用「直式擺法」，正確的顏色擺放順序應為？", "hint": "請回想雙人房中黑白杯子的內外層次規定。", "difficulty": "", "options": [{"text": "白色在外、黑色在內", "correct": false, "explanation": "這與 SOP 中規定的雙人房直式擺放順序相反。"}, {"text": "兩支黑色在外、兩支白色在內", "correct": false, "explanation": "雙人房通常只有兩支杯子，此敘述較像四人房的情況且擺法不符。"}, {"text": "黑色在外、白色在內", "correct": true, "explanation": "這是 SOP 針對雙人房直式擺法明確設定的視覺標準。"}, {"text": "隨機擺放，只要杯口擦拭乾淨即可", "correct": false, "explanation": "旅館非常講究視覺的一致性，SOP 有明確規定顏色順序。"}], "answer_index": 2}, {"id": "OP-HK-03-Q07", "stem": "夥伴更換完垃圾桶袋子後，關於塑膠袋收口的細節，正確的做法為何？", "hint": "這關係到「隱藏不美觀部分」的美感原則。", "difficulty": "", "options": [{"text": "收口處應朝向客人進門最明顯的方向", "correct": false, "explanation": "這樣會影響視覺美觀，讓客房顯得不夠精緻。"}, {"text": "將多餘的袋口塞入垃圾桶底部隱藏", "correct": false, "explanation": "這不是 SOP 要求的特定位置，收口方向應有固定準則。"}, {"text": "塑膠袋向內收的地方需要朝向牆壁方向", "correct": true, "explanation": "這能將不美觀的收口隱藏起來，確保客人視角看到的是平整的桶面。"}, {"text": "不需特別在意方向，只需套緊桶緣", "correct": false, "explanation": "忽視細節會降低客房質感，SOP 明確要求收口應向後（牆壁）。"}], "answer_index": 2}, {"id": "OP-HK-03-Q08", "stem": "在洗手台旁擺放「三小瓶」與「洗手乳」時，由內而外的正確順序應為何？", "hint": "請記住第一個是「香香噴瓶」，最後一個是「洗手乳」。", "difficulty": "", "options": [{"text": "洗手乳 > 身體乳 > 衣物手洗精 > 香香噴瓶", "correct": false, "explanation": "此順序為由外而內，方向與 SOP 要求完全相反。"}, {"text": "香香噴瓶 > 衣物手洗精 > 身體乳 > 洗手乳", "correct": true, "explanation": "這符合 SOP 規定的排列邏輯，確保備品擺放的統一美感。"}, {"text": "身體乳 > 洗手乳 > 香香噴瓶 > 衣物手洗精", "correct": false, "explanation": "此排列完全不符合 SOP 要求的特定項目順序。"}, {"text": "衣物手洗精 > 香香噴瓶 > 洗手乳 > 身體乳", "correct": false, "explanation": "這混淆了噴瓶與洗劑的擺放邏輯。"}], "answer_index": 1}, {"id": "OP-HK-03-Q09", "stem": "關於浴缸置物架的擺放位置與清潔標準，下列敘述何者正確？", "hint": "關鍵字是「1:2」比例與「圓孔細清」。", "difficulty": "", "options": [{"text": "置物架應放在浴缸正中央，以利左右對稱", "correct": false, "explanation": "SOP 要求的是 1:2 的比例位置，而非正中央。"}, {"text": "只需沖洗表面，不需特別清理圓孔處", "correct": false, "explanation": "SOP 特別強調縫隙與圓孔處需進行細清與除霉。"}, {"text": "放置於靠近大圓弧處約 1:2 的位置，且圓孔需無黴垢", "correct": true, "explanation": "這完全符合 SOP 中對於置物架擺放比例與細部清潔的要求。"}, {"text": "放置於浴缸前端，方便客人坐下時拿取", "correct": false, "explanation": "SOP 有明確指定 1:2 的特定擺放區域以維持美觀。"}], "answer_index": 2}, {"id": "OP-HK-03-Q10", "stem": "浴室清潔最後完成時，對於地板與踏墊的收尾工作，何者符合 SOP？", "hint": "請注意踏墊在毛巾籃旁的特定擺放方式。", "difficulty": "", "options": [{"text": "地板濕拖完畢後即可離開，讓其自然風乾", "correct": false, "explanation": "這可能會讓客人滑倒，且 SOP 提到需要用滾滾處理毛髮。"}, {"text": "踏墊需整齊捲好，放置在毛巾籃的左邊", "correct": true, "explanation": "這是 SOP 關於備品擺放 8.1 項中的明確收納位置規定。"}, {"text": "踏墊應平舖在浴室門口，不需捲起", "correct": false, "explanation": "SOP 要求的收納方式是「整齊捲好」，並非平舖。"}, {"text": "只要把地板毛髮撿乾淨，不一定要用滾滾", "correct": false, "explanation": "SOP 明確指引需使用「滾滾」來徹底清除細微毛髮。"}], "answer_index": 1}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
