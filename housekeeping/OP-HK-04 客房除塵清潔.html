<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-HK-04 客房除塵清潔 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-HK-04 客房除塵清潔</h1>
        <div class="meta">來源：03 SOP教材pdf檔/房務SOP/OP-HK-04 客房除塵清潔.pdf｜6 題</div>
      </div>
      <a href="./index.html">回到房務 SOP 題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-HK-04", "title": "OP-HK-04 客房除塵清潔", "source_pdf": "03 SOP教材pdf檔/房務SOP/OP-HK-04 客房除塵清潔.pdf", "questions": [{"id": "OP-HK-04-Q01", "stem": "在整理客房的 Mini Bar 時，即使發現杯具（玻璃杯、馬克杯）看似乾淨且客人未曾使用，房務員仍應執行哪項動作？", "hint": "", "difficulty": "", "options": [{"text": "僅需確認杯蓋是否有蓋好，若有蓋好則不需重複檢查", "correct": false, "explanation": "僅檢查杯蓋無法確保杯身本身的清潔度，環境微塵或前次留下的指紋仍可能存在。"}, {"text": "仍需檢查是否有指紋、棉絮或灰塵，並使用杯子專用擦毛擦拭", "correct": true, "explanation": "細節檢查能確保每一位入住客人接觸到的容器都是無瑕疵的，且專用抹布能避免交叉感染。"}, {"text": "為了節省作業時間，只要杯具擺放位置沒變動即可跳過", "correct": false, "explanation": "跳過檢查可能導致下一位客人發現杯子上有指紋或灰塵，造成服務品質的負面印象。"}, {"text": "使用手邊現有的客用毛巾快速擦拭杯緣，確保無灰塵即可", "correct": false, "explanation": "客用毛巾不應作為清潔工具使用，這違反了衛生規範，應使用專用的擦毛。"}], "answer_index": 1}, {"id": "OP-HK-04-Q02", "stem": "房務員在執行冰箱區域的除塵作業時，除了冰箱內部、上方及兩側縫隙，哪一個「視線死角」是 SOP 特別強調要注意的？", "hint": "", "difficulty": "", "options": [{"text": "冰箱門把手的內側", "correct": false, "explanation": "門把手雖重要，但並非 SOP 中特別註記需注意積塵的特定「死角」區域。"}, {"text": "冰箱內部的照明燈罩", "correct": false, "explanation": "照明燈罩通常位於冰箱內，較不易積聚環境灰塵，非外部除塵的重點提醒事項。"}, {"text": "冰箱下方的空間", "correct": true, "explanation": "冰箱下方容易積聚棉絮與灰塵，卻常因位置低而被忽略，是維持客房深度清潔的關鍵細節。"}, {"text": "冰箱後方的散熱葉片", "correct": false, "explanation": "雖然散熱片也會積塵，但 SOP 主要是針對房務清潔可觸及的冰箱周邊（含下方）進行規範。"}], "answer_index": 2}, {"id": "OP-HK-04-Q03", "stem": "在準備客房書桌的面紙盒時，下列哪一項設置最符合飯店的服務標準？", "hint": "", "difficulty": "", "options": [{"text": "面紙量維持在 8-9 分滿，且最上層的衛生紙需進行折角處理", "correct": true, "explanation": "維持 8-9 分滿可確保面紙好抽取且不顯空洞，折角則能傳遞「已完成整理」的服務細節。"}, {"text": "面紙盒必須補到全滿，以防客人在使用中途用完", "correct": false, "explanation": "面紙盒若過滿反而會導致抽取困難，甚至造成面紙撕裂，影響使用體驗。"}, {"text": "只要盒內還有剩餘面紙，不論剩多少都暫不補充", "correct": false, "explanation": "若面紙量過低，會讓客人感到飯店未落實房務巡檢，且可能造成使用上的不便。"}, {"text": "面紙應維持 8-9 分滿，但為求效率不需特別折角", "correct": false, "explanation": "折角是飯店業中常見的服務標記，代表此區域已通過房務員的檢查與整理。"}], "answer_index": 0}, {"id": "OP-HK-04-Q04", "stem": "房務員在進行地板清潔作業時，為了有效地收集毛髮並確保清理動線不造成重複污染，正確的操作流程為何？", "hint": "", "difficulty": "", "options": [{"text": "由房門口往室內擦拭，並在床底收尾", "correct": false, "explanation": "由外而內的動線會將髒污帶進房內，且最後在床底收尾不便於垃圾的最後處理。"}, {"text": "由室內到外採 Z 字形拖法，將毛髮集中至門口後統一處理", "correct": true, "explanation": "Z 字形能確保最大覆蓋率，由內而外的動線則能引導髒污至門口收尾，避免踩踏已清處區域。"}, {"text": "在房內採取畫圓式拖法，將毛髮集中在房間正中央", "correct": false, "explanation": "畫圓拖法容易漏掉角落，且將毛髮集中在房間中央會讓後續的收尾處理變得困難。"}, {"text": "先拖乾淨走道區域，再處理床邊與桌下的死角", "correct": false, "explanation": "這種做法缺乏系統性動線，容易導致死角的毛髮被帶回到已拖乾淨的走道上。"}], "answer_index": 1}, {"id": "OP-HK-04-Q05", "stem": "關於客房內行李掛衣架的除塵，房務員應注意哪些組成部分的清潔？", "hint": "", "difficulty": "", "options": [{"text": "只需擦拭層板表面即可", "correct": false, "explanation": "掛衣架結構包含鋼架，若僅擦拭層板，鋼架上的灰塵仍會沾染客人的行李或衣物。"}, {"text": "層板以及連接的黑色鋼架均需除塵", "correct": true, "explanation": "行李掛衣架由不同材質組成，全方位的除塵才能確保整體設施的潔淨感。"}, {"text": "只針對黑色鋼架除塵，因為層板通常有行李擋住看不見", "correct": false, "explanation": "層板是放置私人物品的主要位置，若不清潔將直接影響衛生，不能因被行李遮擋而省略。"}, {"text": "優先清潔衣架掛鉤，鋼架只需每週定期清理一次", "correct": false, "explanation": "除塵清潔應是客房整理的日常項目，不應將結構部分拆分週期處理。"}], "answer_index": 1}, {"id": "OP-HK-04-Q06", "stem": "在清潔 Mini Bar 的杯子時，SOP 對於「抹布的使用」有非常嚴格的禁忌，下列哪一項做法是完全錯誤的？", "hint": "", "difficulty": "", "options": [{"text": "使用專用的單獨擦毛來擦拭", "correct": false, "explanation": "這是符合規範的正確做法，專用擦毛能確保杯具的衛生標準。"}, {"text": "絕對不可以拿取客用毛巾或擦拭過馬桶的毛巾來擦拭杯子", "correct": false, "explanation": "這是 SOP 中的明確禁忌事項，強調了衛生防線，避免細菌交叉污染。"}, {"text": "若杯子專用擦毛不夠時，暫時使用尚未拆封的乾淨客用毛巾代替", "correct": true, "explanation": "即使是乾淨的客用毛巾，其材質、纖維特性可能不適合擦杯具，且違反了工具分類使用的原則。"}, {"text": "檢查杯具是否有棉絮留下，並確保專用擦毛本身是乾燥且清潔的", "correct": false, "explanation": "這是檢查杯具清潔品質的必要步驟，能確保杯身不留殘跡。"}], "answer_index": 2}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
