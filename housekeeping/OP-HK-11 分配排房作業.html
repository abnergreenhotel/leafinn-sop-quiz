<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-HK-11 分配排房作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-HK-11 分配排房作業</h1>
        <div class="meta">來源：03 SOP教材pdf檔/房務SOP/OP-HK-11 分配排房作業.pdf｜7 題</div>
      </div>
      <a href="./index.html">回到房務 SOP 題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-HK-11", "title": "OP-HK-11 分配排房作業", "source_pdf": "03 SOP教材pdf檔/房務SOP/OP-HK-11 分配排房作業.pdf", "questions": [{"id": "OP-HK-11-Q01", "stem": "排房辦事員阿明正在規畫今日的整房分配。為了提高房務員的工作效率，當他安排某位房務員的整房樓層時，最理想的跨度應控制在幾個樓層內？", "hint": "", "difficulty": "", "options": [{"text": "最多 2 個樓層", "correct": true, "explanation": "將工作範圍控制在鄰近的二個樓層內，能有效避免房務員因頻繁跨層移動而耗費不必要的時間成本。"}, {"text": "最多 3 個樓層", "correct": false, "explanation": "三個樓層已超過最理想的二個樓層跨度，會增加跨層移動與時間成本。"}, {"text": "最多 4 個樓層", "correct": false, "explanation": "超過三個樓層會增加房務員在樓層間往返的體力與時間消耗，不符合作業效率原則。"}, {"text": "視當天總房數而定，無樓層跨度限制", "correct": false, "explanation": "若無樓層限制會導致作業動線混亂，因此必須設定具體的鄰近樓層規範。"}], "answer_index": 0}, {"id": "OP-HK-11-Q02", "stem": "辦事員小美今日除了排房，也需要親自下場查房。若當天有大量續住房與四人房，下列哪一種房間分配組合符合小美個人的最高查房限額？", "hint": "", "difficulty": "", "options": [{"text": "安排 6 間房，其中包含 3 間標準四人房 (CQ)", "correct": false, "explanation": "雖然總數符合 6 間，但四人房的間數超過了單人上限規定。"}, {"text": "安排 7 間房，其中包含 1 間標準四人房 (CQ)", "correct": false, "explanation": "辦事員查房的總間數（含續住）不應超過法定的 6 間標準。"}, {"text": "安排 6 間房，其中包含 2 間標準四人房 (CQ)", "correct": true, "explanation": "此組合同時符合總數不超過 6 間以及四人房不超過 2 間的雙重限制。"}, {"text": "安排 5 間房，其中包含 4 間標準四人房 (CQ)", "correct": false, "explanation": "雖然總間數較少，但過多的大型房型會使查房負荷過重，違反四人房的分配上限。"}], "answer_index": 2}, {"id": "OP-HK-11-Q03", "stem": "今日是週六連續假期，館內 3 間「舒適家庭房 (SF)」與 2 間「標準四人房 (CQ)」全滿。排房時應如何分配這些特殊房型最為合適？", "hint": "", "difficulty": "", "options": [{"text": "集中由一名資深正職人員負責，以確保清潔品質", "correct": false, "explanation": "集中分配會導致該人員壓力過大，且若遇到換房需求時將缺乏人力調配空間。"}, {"text": "平均分配給不同的夥伴負責", "correct": true, "explanation": "分散特殊房型可避免單一夥伴因趕房壓力而影響品質，同時在需要換房時能更靈活應對。"}, {"text": "優先全數分配給承攬或兼職人員", "correct": false, "explanation": "特殊房型通常較複雜，應考慮人員分配的平衡而非全數交給外部人力。"}, {"text": "依照房號順序由同一樓層的人員全包", "correct": false, "explanation": "僅依房號分配可能導致某位夥伴負擔過多特殊房型，應以「分散負責」為首要原則。"}], "answer_index": 1}, {"id": "OP-HK-11-Q04", "stem": "飯店今日的人力配置包含正職人員、承攬人員與兼職人員。在分配整房任務時，原則上應如何排序？", "hint": "", "difficulty": "", "options": [{"text": "先讓兼職人員做完，剩下的再給正職", "correct": false, "explanation": "應以飯店核心人力為優先保障對象，以維持穩定的整房量。"}, {"text": "將所有房間平均分配給現場所有人員，不分身分", "correct": false, "explanation": "分配應有先後順序，而非單純的齊頭式平等，以確保資源運用最適化。"}, {"text": "應先讓正職人員達到最大整房數後，再安排其他人員", "correct": true, "explanation": "優先發揮正職人力的最大效能是標準作業邏輯，除非正職另有專案任務。"}, {"text": "優先將困難房型分配給承攬人員", "correct": false, "explanation": "分配邏輯是基於人力身分與工作量，而非將特定難度的房間轉嫁給外部人員。"}], "answer_index": 2}, {"id": "OP-HK-11-Q05", "stem": "有一組家庭客預訂了今日入住，並事先要求在房內準備「嬰兒澡盆」與「消毒鍋」。辦事員在排房時，優先將此需求安排在 7 樓，其主要考量為何？", "hint": "", "difficulty": "", "options": [{"text": "因為 7 樓的採光較好，適合親子客", "correct": false, "explanation": "排房邏輯主要基於後勤作業流程，而非單純的景觀或採光考量。"}, {"text": "因為對應的備品倉庫位於 7 樓，可使工作流程更流暢", "correct": true, "explanation": "將有特定備品需求的客房安排在對應的倉庫樓層，能減少人員取用備品的時間。"}, {"text": "因為 7 樓的房間坪數較大，放得下這些設備", "correct": false, "explanation": "分配樓層的決策點在於備品取得的便利性，而非空間大小。"}, {"text": "因為主管規定所有帶小孩的客人都必須住 7 樓", "correct": false, "explanation": "此安排是基於「作業流暢度」的專業判斷，而非無差別的規定。"}], "answer_index": 1}, {"id": "OP-HK-11-Q06", "stem": "今日有一筆「生日專案」的訂房，客房需要進行特別佈置。辦事員小王應優先將此房安排在幾樓，以利房務夥伴作業？", "hint": "", "difficulty": "", "options": [{"text": "安排在 5 樓", "correct": false, "explanation": "5 樓並非規範中針對生日專案或加人專案建議的優先作業樓層。"}, {"text": "安排在 6 樓", "correct": true, "explanation": "針對加人或生日專案等特殊需求，優先安排在 6 樓能對應相關作業流程與備品取得。"}, {"text": "安排在 7 樓", "correct": false, "explanation": "7 樓主要負責澡盆、消毒鍋等硬體備品，與生日專案的對應邏輯不同。"}, {"text": "安排在 8 樓", "correct": false, "explanation": "8 樓並未在 SOP 中被指定為特定專案備品的優先對應樓層。"}], "answer_index": 1}, {"id": "OP-HK-11-Q07", "stem": "在平日排房時，辦事員發現 1 號房最近常有水流聲或施工噪音的紀錄。根據作業守則，最合適的處理方式是什麼？", "hint": "", "difficulty": "", "options": [{"text": "照常排房，等客人投訴後再處理", "correct": false, "explanation": "這會降低顧客滿意度並增加後續處理成本，應採取預防措施。"}, {"text": "將此房型優先分配給續住房客", "correct": false, "explanation": "續住房客同樣會受到噪音影響，並非解決「問題房」的正確做法。"}, {"text": "盡量避開安排該房號，並查閱交接表確認最新房況", "correct": true, "explanation": "平日房數較充裕時應避開已知問題房，並透過紀錄掌握該房是否已修繕或仍不可用。"}, {"text": "直接將該房號從系統中永久移除", "correct": false, "explanation": "辦事員應是根據即時房況調整安排，而非擅自永久移除房間。"}], "answer_index": 2}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
