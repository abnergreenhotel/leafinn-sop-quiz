<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-HK-10 查房作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-HK-10 查房作業流程</h1>
        <div class="meta">來源：03 SOP教材pdf檔/房務SOP/OP-HK-10 查房作業流程 .pdf｜8 題</div>
      </div>
      <a href="./index.html">回到房務 SOP 題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-HK-10", "title": "OP-HK-10 查房作業流程", "source_pdf": "03 SOP教材pdf檔/房務SOP/OP-HK-10 查房作業流程 .pdf", "questions": [{"id": "OP-HK-10-Q01", "stem": "夥伴進入客房準備執行查房作業時，第一步最合適的操作是什麼？", "hint": "", "difficulty": "", "options": [{"text": "由外向內檢查，先巡視地板是否有明顯垃圾。", "correct": false, "explanation": "查房應遵循由內到外的原則，且應先確認房況更新而非直接清潔。"}, {"text": "確認群組房況是否有延退或續住等更新，並開啟全室電燈。", "correct": true, "explanation": "掌握最新房況可避免作業衝突，開啟電源則能確保檢查環境光線充足並同步測試電器。"}, {"text": "先到浴室檢查沐浴用品是否充足。", "correct": false, "explanation": "未確認房況與開啟電源前就進入特定區域，容易忽略整體動線效率與電器測試。"}, {"text": "直接測試電視網路與頻道是否正常。", "correct": false, "explanation": "雖然需要測試電視，但在確認房況與開啟全室電源之前不應跳過前置準備步驟。"}], "answer_index": 1}, {"id": "OP-HK-10-Q02", "stem": "在檢查洗手台上的三小瓶備品（衣物手洗精、乳液、洗手乳）時，關於擺放與補充的標準，下列何者正確？", "hint": "", "difficulty": "", "options": [{"text": "擺放順序應為：洗衣精、乳液、洗手乳，並補充至八分滿。", "correct": true, "explanation": "統一的擺放順序能確保服務的一致性，補充至八分滿則可避免溢出並維持視覺美感。"}, {"text": "只要三瓶都有在洗手台上即可，順序並不重要。", "correct": false, "explanation": "隨機擺放會降低客房的專業感，不符合標準作業指導書要求的固定順序。"}, {"text": "為了環保，內容物低於三分之一時才需要補充。", "correct": false, "explanation": "這可能導致下一位房客使用不足，標準規定應補充至八分滿以確保備品充足。"}, {"text": "擺放順序應為：洗手乳、乳液、洗衣精，並補滿至瓶口。", "correct": false, "explanation": "此順序不符合 SOP 規範，且補得太滿容易在房客按壓時造成液體滲漏。"}], "answer_index": 0}, {"id": "OP-HK-10-Q03", "stem": "整理床鋪區域時，為了維持視覺上的整齊與專業感，被子與枕頭之間應保持多少距離？", "hint": "", "difficulty": "", "options": [{"text": "被子應緊貼枕頭，不留任何縫隙。", "correct": false, "explanation": "緊貼會顯得過於侷促，且不符合 SOP 定義的標準美感比例。"}, {"text": "距離約 15 公分，大約是一支遙控器的長度。", "correct": true, "explanation": "使用具體參照物（如遙控器）測量距離，能確保不同夥伴整理出的床鋪視覺效果一致。"}, {"text": "距離約 30 公分，方便房客放置靠枕。", "correct": false, "explanation": "此距離過長，會讓床鋪看起來不夠連貫，且背離了 15 公分的標準要求。"}, {"text": "距離約 5 公分，只要看得到床單即可。", "correct": false, "explanation": "過小的距離無法展現被子反摺後的層次感。"}], "answer_index": 1}, {"id": "OP-HK-10-Q04", "stem": "檢查浴室馬桶區域時，關於捲紙架的維護細節，下列哪一項是常被遺漏但必須達標的？", "hint": "", "difficulty": "", "options": [{"text": "確認捲紙有摺成三角形，且捲紙架上方已完成除塵。", "correct": true, "explanation": "摺三角形代表房務已巡檢過，而架子上方是房客視線易及處，除塵能展現對細節的重視。"}, {"text": "只要紙筒內還有紙，就不需要調整外觀。", "correct": false, "explanation": "忽略外觀調整會讓房客覺得房間未經專業整理。"}, {"text": "捲紙剩餘用量只要超過一半就不需檢查。", "correct": false, "explanation": "SOP 要求需檢查剩餘用量，以確保房客使用過程中不會突然斷紙。"}, {"text": "只需要注意馬桶內部是否刷乾淨，捲紙架不屬於檢查範圍。", "correct": false, "explanation": "捲紙架與馬桶按鍵、馬桶邊縫同屬浴室檢查的關鍵項目。"}], "answer_index": 0}, {"id": "OP-HK-10-Q05", "stem": "在執行 Mini Bar 與冰箱的查房項目時，下列哪項做法最能展現對衛生標準的堅持？", "hint": "", "difficulty": "", "options": [{"text": "只要確認冰箱電源有開，且裡面沒有垃圾即可。", "correct": false, "explanation": "冰箱還需檢查是否有前房客留下的異味或食物，以確保清新。"}, {"text": "檢查玻璃杯是否有指紋或棉絮，並確認冰箱無異味與遺留物。", "correct": true, "explanation": "透明器皿上的指紋最易引起衛生疑慮，確保冰箱空置且無味是基本要求。"}, {"text": "為了節省時間，玻璃杯若看起來沒人用過就不用再次檢查。", "correct": false, "explanation": "即使未被使用，玻璃杯仍可能積聚棉絮或在清掃過程中沾染指紋。"}, {"text": "只需確認茶包和餅乾的數量是否正確。", "correct": false, "explanation": "數量正確僅是基本，層架與托盤的除塵同樣是查房指導書中的重點。"}], "answer_index": 1}, {"id": "OP-HK-10-Q06", "stem": "查房時檢查床區細節，下列哪一個位置是必須特別留意是否有毛髮、垃圾或食物殘渣的重點區域？", "hint": "", "difficulty": "", "options": [{"text": "床頭板的頂端。", "correct": false, "explanation": "床頭板雖然也要除塵，但最容易積聚食物殘渣與垃圾的地方是床底。"}, {"text": "被子的外表面。", "correct": false, "explanation": "床底是更容易隱藏垃圾與食物殘渣的視覺死角。"}, {"text": "床底及其周邊地板。", "correct": true, "explanation": "房客常會遺落物品或在此處殘留零食碎屑，若不檢查會導致嚴重的衛生問題。"}, {"text": "床墊的側邊縫隙。", "correct": false, "explanation": "雖然也是清潔點，但指導書特別強調床底需留意毛髮、垃圾、食物屑及拖鞋。"}], "answer_index": 2}, {"id": "OP-HK-10-Q07", "stem": "在洗手台區域檢查時，關於旋轉蓋（小圓蓋）的標準擺放角度，以及毛巾的整理要求為何？", "hint": "", "difficulty": "", "options": [{"text": "旋轉蓋完全蓋平，毛巾疊放在抽屜內。", "correct": false, "explanation": "旋轉蓋蓋平不利於排水，且毛巾需挺立呈現以示專業。"}, {"text": "旋轉蓋呈 45 度角，且大小毛巾的緹花要對齊並挺立。", "correct": true, "explanation": "45 度角是排水與美觀的平衡點，毛巾緹花對齊則能展現極致的服務細節。"}, {"text": "旋轉蓋隨意放置，毛巾只要有摺整齊即可。", "correct": false, "explanation": "這缺乏標準化美感，無法滿足 SOP 對「挺立」與「緹花對齊」的要求。"}, {"text": "旋轉蓋垂直立起，毛巾緹花向內反摺隱藏。", "correct": false, "explanation": "垂直立起不穩定，且緹花應是視覺亮點而不應刻意隱藏。"}], "answer_index": 1}, {"id": "OP-HK-10-Q08", "stem": "關於客房電視的測試標準，下列哪一項操作符合作業流程的要求？", "hint": "", "difficulty": "", "options": [{"text": "音量應設定在適當的 7 號，並測試網路與頻道功能。", "correct": true, "explanation": "固定音量可確保房客開啟時不會受到驚嚇或聽不到聲音，測試網路與頻道則是功能查驗。"}, {"text": "音量設定為 0 以避免干擾隔壁客房。", "correct": false, "explanation": "設定為 0 會讓房客誤以為電視沒聲音或故障，建議音量為 7。"}, {"text": "只要確認電視能開啟，不需要特地切換頻道。", "correct": false, "explanation": "SOP 要求包含頻道測試，以確保訊號傳輸完全正常。"}, {"text": "音量隨意設定，只要遙控器有電即可。", "correct": false, "explanation": "這忽略了對房客體驗的細節管理，不符合作業流程中對音量的具體規範。"}], "answer_index": 0}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
