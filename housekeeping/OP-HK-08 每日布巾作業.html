<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-HK-08 每日布巾作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-HK-08 每日布巾作業</h1>
        <div class="meta">來源：03 SOP教材pdf檔/房務SOP/OP-HK-08 每日布巾作業.pdf｜7 題</div>
      </div>
      <a href="./index.html">回到房務 SOP 題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button type="button" id="submitBtn">送出作答並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-HK-08", "title": "OP-HK-08 每日布巾作業", "source_pdf": "03 SOP教材pdf檔/房務SOP/OP-HK-08 每日布巾作業.pdf", "questions": [{"id": "OP-HK-08-Q01", "stem": "當你在核對「洗旺紅單」時，發現送來的大毛巾每綑數量不一。根據作業標準，每一綑大毛巾應該包含幾條？", "hint": "", "difficulty": "", "options": [{"text": "10 條", "correct": true, "explanation": "大毛巾與足布的標準綑紮數量均為 10 條，以便於快速點收與記錄。"}, {"text": "20 條", "correct": false, "explanation": "這是小毛巾一綑的標準數量，而非大毛巾的配置。"}, {"text": "50 條", "correct": false, "explanation": "50 條是枕套的標準綑紮數量，不適用於大毛巾。"}, {"text": "15 條", "correct": false, "explanation": "此非 SOP 中定義的任何布巾類別綑紮標準數值。"}], "answer_index": 0}, {"id": "OP-HK-08-Q02", "stem": "小明正在準備當日的房務作業，他發現倉庫內的「擦毛」僅剩下 15 條。此時小明最正確的後續處理方式為何？", "hint": "", "difficulty": "", "options": [{"text": "立即回報洗旺群組並提醒廠商多送", "correct": true, "explanation": "當擦毛低於 20 條的預警水位時，應及時聯繫廠商補貨以防作業短缺。"}, {"text": "先將就使用，等下午全部用完再回報", "correct": false, "explanation": "延遲回報可能導致後續夥伴無物可用，不符合預警回報機制。"}, {"text": "直接修改工作表上的需求量", "correct": false, "explanation": "修改需求量無法解決實體備品不足的問題，且會導致數據統計錯誤。"}, {"text": "向其他樓層夥伴借調，不需報備", "correct": false, "explanation": "非正式的借調會導致各樓層剩餘量統計失準，且未解決總量不足的問題。"}], "answer_index": 0}, {"id": "OP-HK-08-Q03", "stem": "在整理客房時，你發現一條乾淨的被套上有明顯未洗淨的殘留污漬。請問該如何處置這條被套？", "hint": "", "difficulty": "", "options": [{"text": "在汙點處打結並放置於 6 樓布巾間的回洗區", "correct": true, "explanation": "在汙漬處打結是為了標記位置方便廠商重新處理，並應集中於指定的回洗區。"}, {"text": "直接丟入一般的回收髒毛桶中", "correct": false, "explanation": "未打結標記會使洗衣廠難以辨識特定汙點，可能導致再次洗不乾淨。"}, {"text": "放在當層樓的備品車下層等待收走", "correct": false, "explanation": "回洗布巾應專門放置於 6 樓指定區域，避免與當日髒毛混淆或遺失。"}, {"text": "自行先用清水搓洗後再繼續使用", "correct": false, "explanation": "現場夥伴不應自行處理洗滌，且可能造成布巾無法完全乾燥而產生異味。"}], "answer_index": 0}, {"id": "OP-HK-08-Q04", "stem": "若你在更換枕套時，發現枕套邊緣有嚴重破損缺口。關於此破損布巾的處理，下列敘述何者正確？", "hint": "", "difficulty": "", "options": [{"text": "先回報HK群組讓主管知悉，再放至報廢區等待評估", "correct": true, "explanation": "破損布巾需先回報以便向廠商反應，並由主管評估後進入報廢程序。"}, {"text": "將破損枕套計入當日回收髒毛總量中", "correct": false, "explanation": "SOP 明確規定破損品不應列入當日髒毛數量統計。"}, {"text": "直接打結後丟入 6 樓回洗區", "correct": false, "explanation": "破損並非汙漬，回洗無法修復，應走報廢流程而非回洗流程。"}, {"text": "為了節省成本，反摺後繼續給客人使用", "correct": false, "explanation": "提供破損布巾會嚴重影響服務品質與飯店形象。"}], "answer_index": 0}, {"id": "OP-HK-08-Q05", "stem": "當日工作結束後，房務夥伴必須將記錄好的工作表交到哪裡，以便辦事員進行後續登記？", "hint": "", "difficulty": "", "options": [{"text": "2 樓員休室桌上", "correct": true, "explanation": "這是統一收集工作紀錄的指定地點，確保數據能被準確統計。"}, {"text": "6 樓布巾間入口處", "correct": false, "explanation": "雖然 6 樓是布巾存放區，但非辦事員收集行政表單的指定位置。"}, {"text": "直接交給當班的主管簽收", "correct": false, "explanation": "主管僅負責簽名確認，實際登記流程需將表單放置於指定的 2 樓位置。"}, {"text": "放在備品車上隨車交班", "correct": false, "explanation": "表單放置於車上容易遺失或被遺忘，且無法讓辦事員即時統計。"}], "answer_index": 0}, {"id": "OP-HK-08-Q06", "stem": "在填寫「每日布巾作業表」時，表單下方的「回洗布巾總量」應該如何填寫才正確？", "hint": "", "difficulty": "", "options": [{"text": "僅填寫發現有污漬而打結回洗的數量", "correct": true, "explanation": "回洗量專指因汙漬需重複洗滌的品項，與破損報廢品應區分開來。"}, {"text": "包含當日所有回收的髒毛數量", "correct": false, "explanation": "髒毛數量應填寫在另一欄位，回洗是指「乾淨卻有汙點」需重新處理的部分。"}, {"text": "將汙損品與破損品全部加總填入", "correct": false, "explanation": "破損品不列入當日髒毛或回洗統計，應另外回報。"}, {"text": "如果當天沒有破損，就填寫 0", "correct": false, "explanation": "回洗與破損是不同的概念，此選項混淆了兩者的定義。"}], "answer_index": 0}, {"id": "OP-HK-08-Q07", "stem": "小華從樓梯上來右轉準備開始作業，他應該如何將工作車定位？", "hint": "", "difficulty": "", "options": [{"text": "將車輛定位於樓梯與電梯中間通道，備品車在前", "correct": true, "explanation": "這符合 SOP 定位方向規範，確保工作人員推進時的便利性與走道秩序。"}, {"text": "將車子推進客房內以避免阻礙走道", "correct": false, "explanation": "工作車體積大，進入客房會造成空間侷促且可能損壞房內家具。"}, {"text": "將布巾車停在電梯旁，備品車停在房門口", "correct": false, "explanation": "車輛應集中定位管理，分散停放會造成管理困難且顯得凌亂。"}, {"text": "隨意停放，只要不擋到房門即可", "correct": false, "explanation": "缺乏統一停放標準會影響飯店專業形象及緊急疏散安全。"}], "answer_index": 0}]};
    const letters = ["A", "B", "C", "D", "E", "F", "G", "H"];
    const form = document.getElementById("quizForm");
    payload.questions.forEach((question, questionIndex) => {
      const panel = document.createElement("section");
      panel.className = "panel";
      const title = document.createElement("h2");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.stem}`;
      panel.appendChild(title);
      question.options.forEach((option, optionIndex) => {
        const label = document.createElement("label");
        label.className = "option";
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `q${questionIndex}`;
        input.value = String(optionIndex);
        label.appendChild(input);
        const text = document.createElement("span");
        text.textContent = `${letters[optionIndex]}. ${option.text}`;
        label.appendChild(text);
        panel.appendChild(label);
      });
      const explanations = document.createElement("div");
      explanations.className = "explanations";
      explanations.id = `explanations-${questionIndex}`;
      panel.appendChild(explanations);
      form.appendChild(panel);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let score = 0;
      payload.questions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : -1;
        const answerIndex = question.options.findIndex((option) => option.correct);
        if (selectedIndex === answerIndex) score += 1;
        const target = document.getElementById(`explanations-${questionIndex}`);
        target.innerHTML = "";
        target.classList.add("visible");
        const answerNote = document.createElement("div");
        answerNote.className = "answer-note";
        answerNote.textContent = `正解：${letters[answerIndex]}. ${question.options[answerIndex].text}`;
        target.appendChild(answerNote);
        question.options.forEach((option, optionIndex) => {
          const feedback = document.createElement("div");
          feedback.className = `choice-feedback ${option.correct ? "correct" : "incorrect"}`;
          feedback.textContent = `${letters[optionIndex]}. ${option.explanation}`;
          target.appendChild(feedback);
        });
      });
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = `作答完成：答對 ${score} / ${payload.questions.length} 題`;
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
</html>
