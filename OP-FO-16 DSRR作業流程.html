<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-16 DSRR作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-16 DSRR作業流程 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-16 DSRR作業流程.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-16", "title": "DSRR作業流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-16 DSRR作業流程.pdf", "questions": [{"id": "OP-FO-16-Q01", "stem": "在 DSRR 作業流程中，「DSRR」代表的完整英文意涵為何？", "difficulty": "", "options": [{"text": "Daily Suite Room Rate", "correct": false, "explanation": "這是一個常見的旅館業術語，但並非此作業流程中所指的隱藏房價代號。"}, {"text": "Don't Show Room Rate", "correct": true, "explanation": "根據文件標題與內容，DSRR 指的是「不顯示房間價格」，即飯店不向入住客人揭露其訂房成本。"}, {"text": "Discount Special Room Rate", "correct": false, "explanation": "雖然 DSRR 訂單通常與優惠或合約價有關，但其核心規範在於「不顯示」而非「折扣」。"}, {"text": "Double Stay Room Rate", "correct": false, "explanation": "此為完全不相關的造詞，與隱藏房價的作業流程無關。"}, {"text": "Direct Sales Room Rate", "correct": false, "explanation": "DSRR 往往涉及第三方代訂或旅行社，而非僅限於直接銷售的房價。"}], "answer_index": 1}, {"id": "OP-FO-16-Q02", "stem": "當客人表示房費是由友人代訂（訂房人代訂），且在櫃檯詢問房價時，夥伴應採取何種處理方式？", "difficulty": "", "options": [{"text": "直接告知客人該訂單的合約房價", "correct": false, "explanation": "這違反了 DSRR 的核心規範，且可能洩露代訂人的隱私或合約機密。"}, {"text": "委婉請客人詢問代訂人", "correct": true, "explanation": "作業流程規範，對於代訂類訂單應引導客人直接與其代訂者溝通以獲取價格資訊。"}, {"text": "告知客人現場房價以供參考", "correct": false, "explanation": "隨意告知現場房價可能會導致客人與代訂人間的價格誤會或糾紛。"}, {"text": "拒絕提供任何住宿相關資訊", "correct": false, "explanation": "我們仍需提供住宿服務，只是在房價資訊上需進行控管，而非全面拒絕溝通。"}, {"text": "要求客人出示代訂人的授權書才可告知", "correct": false, "explanation": "流程中並無此要求，標準做法是請客人直接與代訂人確認。"}], "answer_index": 1}, {"id": "OP-FO-16-Q03", "stem": "針對「旅行社」訂單的客人詢問房價，下列哪一項話術或作業規定是正確的？", "difficulty": "", "options": [{"text": "詳細解釋旅行社與飯店之間的佣金抽成比例", "correct": false, "explanation": "飯店與旅行社的商業合約細節不應對客人揭露。"}, {"text": "委婉告知飯店端沒辦法提供房價資訊", "correct": true, "explanation": "作業規範要求對旅行社訂單應明確表示無法提供，以維護合約神祕性。"}, {"text": "主動告知客人當日的現場房價（Walk-in Rate）", "correct": false, "explanation": "執行說明中明確提到「盡量也不要告知現場房價」，以避免產生比價心理。"}, {"text": "建議客人直接取消訂單改為現場訂房", "correct": false, "explanation": "這會損害合作夥伴（旅行社）的利益，且不符合標準服務流程。"}, {"text": "告知客人旅行社的訂房金額通常比較貴", "correct": false, "explanation": "這種說法缺乏事實根據且極不專業，容易引發客人不滿。"}], "answer_index": 1}, {"id": "OP-FO-16-Q04", "stem": "當處理 OTA（線上訂房平台）訂單時，若客人詢問訂房金額，櫃檯夥伴應如何說明？", "difficulty": "", "options": [{"text": "告知因為系統連線問題，現在查不到", "correct": false, "explanation": "這並非誠實的說法，標準話術應聚焦於權限或系統顯示限制。"}, {"text": "告知客人我們只能看到稅前金額", "correct": false, "explanation": "這仍揭露了部分房價資訊，不符合 DSRR 的精神。"}, {"text": "委婉告知我們在系統上看不到訂房金額", "correct": true, "explanation": "這是執行說明中針對 OTA 訂單指定的標準話術，用以回應價格查詢。"}, {"text": "請客人直接撥打 OTA 平台的客服電話詢問", "correct": false, "explanation": "雖然是方法之一，但標準首選應是告知飯店端無法看到金額。"}, {"text": "告知客人飯店會另外寄送電子發票至其信箱", "correct": false, "explanation": "OTA 訂單通常由平台開立憑證，飯店不一定能直接寄送包含房費的發票。"}], "answer_index": 2}, {"id": "OP-FO-16-Q05", "stem": "根據 2026/04/09 修訂的注意事項，關於「住宿證明」的開立限制為何？", "difficulty": "", "options": [{"text": "住宿證明不可開立房費項目", "correct": true, "explanation": "這是文件中特別強調的新增注意事項，旨在防止 DSRR 價格透過證明文件外流。"}, {"text": "住宿證明必須包含完整的稅金明細", "correct": false, "explanation": "若不可開立房費，自然也不會包含與房費相關的稅金明細。"}, {"text": "住宿證明僅限於入住當天開立", "correct": false, "explanation": "文件中並無針對開立時間的限制，而是針對「內容項目」進行限制。"}, {"text": "住宿證明必須由經理簽核後方可顯示金額", "correct": false, "explanation": "規範中是直接禁止開立房費，並非透過簽核即可顯示。"}, {"text": "住宿證明只能提供給代訂人，不能給房客", "correct": false, "explanation": "房客可以領取證明，但證明上的內容（房費）必須受到限制。"}], "answer_index": 0}, {"id": "OP-FO-16-Q06", "stem": "在處理旅行社或 OTA 客人的房價問題時，為何指導書建議「盡量不要告知現場房價」？", "difficulty": "", "options": [{"text": "因為現場房價每日浮動，容易講錯", "correct": false, "explanation": "雖然房價會浮動，但主要原因並非怕講錯，而是預防價格爭議。"}, {"text": "為了節省辦理入住手續的時間", "correct": false, "explanation": "告知房價與否對手續時間的影響微乎其微。"}, {"text": "避免客人將現場房價與其訂房成本做比較而產生後續困擾", "correct": true, "explanation": "當客人發現兩者有價差時，常會向櫃檯或旅行社要求退費或補償，增加處理成本。"}, {"text": "因為現場房價屬於商業機密，不可對外公開", "correct": false, "explanation": "現場房價通常是公開透明的，並非機密，只是在特定情境下不宜主動揭露。"}, {"text": "為了強迫客人以後都透過旅行社訂房", "correct": false, "explanation": "飯店通常更歡迎直接訂房，此說法完全不符邏輯。"}], "answer_index": 2}, {"id": "OP-FO-16-Q07", "stem": "一位 OTA 客人堅持要求在「住宿證明」上註明他支付給平台的 $3,500 元房費，你應如何處理？", "difficulty": "", "options": [{"text": "既然客人知道金額，就直接幫他寫在證明上", "correct": false, "explanation": "這違反了「住宿證明不可開立房費」的硬性規定。"}, {"text": "委婉告知公司規定住宿證明不可開立房費項目", "correct": true, "explanation": "應堅持標準作業程序，不因客人知道金額就破例開立。"}, {"text": "請客人在住宿證明上自己手寫金額，飯店蓋章證明", "correct": false, "explanation": "這屬於偽造或不實證明的範疇，具有法律風險。"}, {"text": "請客人提供 OTA 的收據，我們根據該收據開立飯店發票", "correct": false, "explanation": "飯店不能針對非由飯店收取的款項開立發票或正式證明。"}, {"text": "告知客人若要顯示金額，需額外支付 10% 的手續費", "correct": false, "explanation": "這是不正當的收費要求，且不符合文件規範。"}], "answer_index": 1}, {"id": "OP-FO-16-Q08", "stem": "關於 DSRR 作業流程的適用館別與版本資訊，下列敘述何者正確？", "difficulty": "", "options": [{"text": "此流程僅適用於特定品牌之館別", "correct": false, "explanation": "文件上方雖有「適用館別」欄位，但目前呈現的是通用標準指導書格式。"}, {"text": "目前的版本編號為第 2 版", "correct": false, "explanation": "根據圖表資訊，該版本欄位下方顯示為數字「1」。"}, {"text": "此作業指導書的最修訂日期為 2026/04/09", "correct": true, "explanation": "文件右上方明確標註修訂日期為 2026/04/09。"}, {"text": "這是一份關於「客房整理」的標準作業指導書", "correct": false, "explanation": "這是一份關於「DSRR 作業流程」的指導書，屬於前台業務。"}, {"text": "文件代號為 OP-FO-20", "correct": false, "explanation": "文件開頭標題顯示代號為 OP-FO-16。"}], "answer_index": 2}, {"id": "OP-FO-16-Q09", "stem": "在執行 DSRR 流程時，「委婉」一詞在話術中多次出現，這代表什麼溝通核心？", "difficulty": "", "options": [{"text": "代表語氣要卑微，不斷向客人道歉", "correct": false, "explanation": "專業服務不代表卑微，而是以得體且尊重的態度說明。"}, {"text": "代表要避重就輕，轉移客人的注意力", "correct": false, "explanation": "「委婉」是為了維持服務品質並堅定立場，而非逃避問題。"}, {"text": "在不揭露限制資訊的前提下，給予客人合適的引導與建議", "correct": true, "explanation": "委婉地拒絕或解釋，是為了在執行規定的同時，兼顧客人的感受。"}, {"text": "代表語速要放慢，確保客人聽得清楚", "correct": false, "explanation": "委婉與語速無關，與措辭與態度較有關聯。"}, {"text": "代表只能使用氣聲說話，避免被其他客人聽到金額", "correct": false, "explanation": "這並非委婉的定義，且溝通應保持正常且專業的音量。"}], "answer_index": 2}, {"id": "OP-FO-16-Q10", "stem": "若一位代訂房客人（DSRR）在現場要求延長住宿並詢問續住價格，根據流程邏輯應如何處理最適當？", "difficulty": "", "options": [{"text": "直接以當初代訂的低價讓客人續住", "correct": false, "explanation": "原本的代訂價格通常是特定合約價，續住應重新評估房價。"}, {"text": "請客人再次聯絡原代訂人處理續住事宜", "correct": true, "explanation": "這符合「委婉請客人詢問代訂人」的流程邏輯，維持價格的一致性與隱密性。"}, {"text": "告知客人續住必須免費，因為是 DSRR", "correct": false, "explanation": "DSRR 與免費住宿完全無關。"}, {"text": "強迫客人必須先辦理退房，再重新訂房", "correct": false, "explanation": "這是不必要的負面服務體驗，應有更好的處理方式。"}, {"text": "直接告知客人現場最高的門市房價", "correct": false, "explanation": "雖然可以提供續住價格，但應遵循「不隨意告知現場房價」的謹慎原則，先確認原訂單性質。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
