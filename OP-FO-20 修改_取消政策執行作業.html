<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-20 修改_取消政策執行作業 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-20 修改_取消政策執行作業 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-20 修改_取消政策執行作業.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-20", "title": "修改_取消政策執行作業", "source_pdf": "03 SOP教材pdf檔/OP-FO-20 修改_取消政策執行作業.pdf", "questions": [{"id": "OP-FO-20-Q01", "stem": "當一位透過官網訂房的顧客在入住前兩天要求取消，並對收取 $50\\%$ 房費的規定反應激烈時，根據作業指導書，第一線人員應如何處理？", "difficulty": "", "options": [{"text": "堅持依照定型化契約執行，直接拒絕退款要求", "correct": false, "explanation": "雖然契約有規定，但指引強調若顧客反應較大，需先了解紀錄並尋求主管協助，而非強硬拒絕。"}, {"text": "私下承諾顧客可以全額退款以平息情緒", "correct": false, "explanation": "員工無權私自更改取消政策，應遵循回報主管的程序。"}, {"text": "確實了解情況並紀錄後，告知主管協助處理退款事宜", "correct": true, "explanation": "指導書規範對於反應較大的顧客，應詳細記錄並呈報主管，由主管決策退款相關事宜。"}, {"text": "立即請顧客撥打觀光局投訴電話以維護權益", "correct": false, "explanation": "飯店應先嘗試內部協調與主管處理，而非直接建議顧客向外部機構投訴。"}, {"text": "直接將訂單改為免費取消，無需經過主管核准", "correct": false, "explanation": "此舉違反了作業流程中需由主管協助退款事宜的規範。"}], "answer_index": 2}, {"id": "OP-FO-20-Q02", "stem": "關於官網訂單的「延期」政策，下列哪一項敘述符合標準作業流程？", "difficulty": "", "options": [{"text": "顧客可以無限次修改日期，只要在三個月內入住即可", "correct": false, "explanation": "政策明確規定延期僅限「一次」，並非無限次修改。"}, {"text": "若顧客無法確定日期，應先幫客保留至三個月期限的最後一天", "correct": true, "explanation": "當顧客同意延期但暫不確定日期時，系統應預設保留至三個月期限的最後一日。"}, {"text": "延期訂單可以保留半年，屆時未入住才沒收訂金", "correct": false, "explanation": "保留訂單的時間限制為三個月，而非半年。"}, {"text": "辦理延期時，不需在德安系統備註原入住日期", "correct": false, "explanation": "規範要求需確實記錄原入住日期以便後續追蹤與核對。"}, {"text": "延期後的訂單若再次逾期，可以申請退還 $50\\%$ 訂金", "correct": false, "explanation": "再次逾期時，該筆訂金將會被沒收，不予退還。"}], "answer_index": 1}, {"id": "OP-FO-20-Q03", "stem": "顧客透過網路平台（如 Agoda、Booking.com）訂房後致電要求取消，飯店端人員應如何引導顧客？", "difficulty": "", "options": [{"text": "飯店端可直接在德安系統點選取消，無需顧客操作", "correct": false, "explanation": "網路平台訂單需由顧客聯繫平台或在平台上操作，飯店端無法單方面取消。"}, {"text": "請顧客自行聯繫平台客服，再由平台聯繫飯店執行政策", "correct": true, "explanation": "平台訂單的取消權限與政策執行需經由訂房平台，飯店端需引導顧客遵循此程序。"}, {"text": "告知顧客飯店沒有該訂單資訊，請直接找信用卡公司", "correct": false, "explanation": "飯店應先協助查詢訂單並確認其取消政策，而非推諉給信用卡公司。"}, {"text": "告知顧客因保護個資，飯店無法查詢平台訂單", "correct": false, "explanation": "流程中提到應協助查詢訂單並確認其取消政策，以便提供正確資訊。"}, {"text": "直接建議顧客向消保官申訴，因為飯店無法操作", "correct": false, "explanation": "飯店應引導顧客正確的取消渠道（平台客服），而非引導至外部糾紛處理單位。"}], "answer_index": 1}, {"id": "OP-FO-20-Q04", "stem": "在辦理「訂房退款申請單2.1」的審批流程中，關於附件的上傳要求，下列何者正確？", "difficulty": "", "options": [{"text": "僅需上傳顧客的身分證影本即可", "correct": false, "explanation": "身分證並非流程中要求的標準附件，應以上傳系統畫面為主。"}, {"text": "需截圖德安訂金狀態明細表及官網 WEB HOTEL 訂單上傳", "correct": true, "explanation": "這是為了確保退款金額與訂單狀態經由系統資料核對無誤的必要步驟。"}, {"text": "只需在備註欄位寫下金額，不需要任何圖片證明", "correct": false, "explanation": "流程中明確要求「新增圖片」，包含系統明細表與官網訂單截圖。"}, {"text": "上傳顧客與飯店人員的通話錄音檔", "correct": false, "explanation": "通話錄音非標準審批附件，應提供系統內的訂金與訂單數據。"}, {"text": "若為信用卡退款，需上傳信用卡正反面照片", "correct": false, "explanation": "收集信用卡照片涉及高度資安風險，非標準作業流程所要求。"}], "answer_index": 1}, {"id": "OP-FO-20-Q05", "stem": "針對「入住當日」才臨時提出取消要求的官網訂單顧客，飯店的標準回覆應為：", "difficulty": "", "options": [{"text": "可退還 $30\\%$ 房費作為慰問", "correct": false, "explanation": "當日取消不退款是標準政策，隨意給予成數退款不符規定。"}, {"text": "僅收取第一晚房費，後續天數全額退款", "correct": false, "explanation": "資料中明確指出入住當日取消將收取 $100\\%$ 房費。"}, {"text": "依觀光局契約規定，收取房費的 $100\\%$，無法退款", "correct": true, "explanation": "這符合指導書中對當日取消案件的法律依據與執行標準。"}, {"text": "雖然無法退款，但可以無條件轉讓給他人入住", "correct": false, "explanation": "轉讓並非指導書中針對「當日取消」所提及的標準作業選項。"}, {"text": "自動幫顧客轉為三個月內的保留訂單", "correct": false, "explanation": "保留（延期）選項通常適用於提前取消的情況，當日取消依規定是不予退款的。"}], "answer_index": 2}, {"id": "OP-FO-20-Q06", "stem": "若顧客先前已使用信用卡「預先授權」，辦理取消時應如何向顧客說明？", "difficulty": "", "options": [{"text": "告知款項已扣除，需等下個月帳單才能看到退款", "correct": false, "explanation": "預先授權尚未實際扣款，故不需經過退款程序，僅需取消授權。"}, {"text": "告知會進行取消預先授權，不會入帳，額度將會返回", "correct": true, "explanation": "這準確描述了取消預先授權的操作本質：額度解凍而非實際退款。"}, {"text": "請顧客自行聯繫銀行，飯店端無法取消預先授權", "correct": false, "explanation": "飯店端可以執行取消預先授權的操作，不應推給銀行。"}, {"text": "告知預先授權的金額將轉為飯店點數存於會員帳戶", "correct": false, "explanation": "取消政策中無此項操作，應直接歸還信用額度。"}, {"text": "預先授權的額度會被沒收充當行政手續費", "correct": false, "explanation": "若符合免費取消規範，額度應全數返還，不能擅自沒收。"}], "answer_index": 1}, {"id": "OP-FO-20-Q07", "stem": "當網路平台訂單「無特別規範」時，入住前七日內取消該如何處理？", "difficulty": "", "options": [{"text": "依照飯店官網政策，酌收 $50\\%$ 房費", "correct": false, "explanation": "網路平台訂單有其獨立的「無特別規範」之執行標準，與官網政策不同。"}, {"text": "仍可免費取消，但需收取 $100$ 元手續費", "correct": false, "explanation": "資料顯示入住七天內為不可取消且不可退款。"}, {"text": "屬於不符合退款政策的情況，平台會收取全額款項", "correct": true, "explanation": "針對無規範之平台訂單，七天內的取消狀態為不符合退款，須全額支付。"}, {"text": "飯店端應主動聯繫平台幫顧客爭取免責取消", "correct": false, "explanation": "飯店應維持立場並告知規範，而非主動違反取消政策進行免責申請。"}, {"text": "直接將訂單改為延期三個月，不扣任何款項", "correct": false, "explanation": "此類訂單明訂不可取消不可退款，延期非標準預設選項。"}], "answer_index": 2}, {"id": "OP-FO-20-Q08", "stem": "在「德安飯店前台系統」中進行顧客訂單歷史備註時，不包含下列哪一個動作？", "difficulty": "", "options": [{"text": "輸入訂單編號並查詢全部狀態", "correct": false, "explanation": "這是查詢訂單的基礎步驟，屬於標準流程。"}, {"text": "在 Profile 備註輸入退款日期金額及申請人", "correct": false, "explanation": "這是記錄退款資訊的關鍵動作，確實包含在內。"}, {"text": "將顧客加入系統黑名單，禁止再次預訂", "correct": true, "explanation": "取消政策執行中並無要求將正常辦理退訂的顧客列入黑名單。"}, {"text": "點選取消單筆並存檔離開", "correct": false, "explanation": "這是完成系統內取消操作的最後步驟。"}, {"text": "開啟顧客訂單點選 Profile 進入備註介面", "correct": false, "explanation": "這是輸入備註前的必要系統操作路徑。"}], "answer_index": 2}, {"id": "OP-FO-20-Q09", "stem": "某顧客已透過匯款方式支付官網訂房訂金，現在欲辦理退款，作業程序為何？", "difficulty": "", "options": [{"text": "直接領取櫃檯週轉金現金退還顧客", "correct": false, "explanation": "匯款訂單應透過公司退款流程進行銀行轉帳，不應直接給予現金。"}, {"text": "請顧客提供退款銀行帳號與帳戶資料，並參照《退款流程》執行", "correct": true, "explanation": "這是針對匯款顧客的標準標準退款作業，需收集匯款資訊以利財務作業。"}, {"text": "告知顧客僅能退回至原匯款帳號，不需提供任何資料", "correct": false, "explanation": "雖然通常退回原帳號，但飯店仍需主動確認並收集正確的帳戶資料以確保作業準確。"}, {"text": "告知顧客款項無法退還，只能轉為住宿券", "correct": false, "explanation": "若符合退款政策，飯店應退還房費而非強迫轉換為住宿券。"}, {"text": "要求顧客親自到飯店櫃檯填寫紙本領據", "correct": false, "explanation": "指導書中並未要求親自臨櫃，主要以線上審批流程為主。"}], "answer_index": 1}, {"id": "OP-FO-20-Q10", "stem": "當網路平台訂單符合「免費取消」規範時，話術中必須提醒顧客哪一件事以避免產生費用？", "difficulty": "", "options": [{"text": "提醒顧客一定要在平台上按下「取消」，否則依然會被收費", "correct": true, "explanation": "即使符合免費政策，若平台端沒有對應的取消紀錄，系統仍會自動請款。"}, {"text": "告知顧客直接不來入住即可，系統會自動判定取消", "correct": false, "explanation": "不入住房間（No-show）在平台上通常會被視為已入住而扣全款。"}, {"text": "要求顧客先把平台上的訂單截圖傳給飯店主管", "correct": false, "explanation": "截圖是飯店內部的核對動作，並非避免顧客被扣費的直接操作建議。"}, {"text": "請顧客聯繫信用卡銀行止付該筆款項", "correct": false, "explanation": "止付並非正規取消流程，應優先透過平台操作。"}, {"text": "告知顧客必須刪除訂房平台的應用程式（App）", "correct": false, "explanation": "刪除 App 不等於取消訂單，此建議具有明顯邏輯錯誤。"}], "answer_index": 0}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
