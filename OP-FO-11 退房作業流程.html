<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OP-FO-11 退房作業流程 教育訓練測驗</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-alt: #f0f4ef;
      --line: #d7ddd7;
      --text: #18201a;
      --muted: #5d675f;
      --brand: #2e7d5b;
      --brand-dark: #20563e;
      --danger: #af3b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .topbar a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .question-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .option {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option input {
      margin-right: 10px;
      vertical-align: top;
    }
    .option-text {
      display: inline;
    }
    .actions {
      position: sticky;
      bottom: 0;
      padding-top: 12px;
      background: linear-gradient(180deg, rgba(246,247,248,0) 0%, rgba(246,247,248,1) 30%);
    }
    button {
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    .result {
      display: none;
      margin: 0 0 20px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .explanations {
      display: none;
      margin-top: 14px;
    }
    .explanations.visible {
      display: block;
    }
    .answer-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }
    .choice-feedback {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: #f7f8f7;
      border: 1px solid var(--line);
    }
    .choice-feedback.correct {
      border-color: #8dc8ac;
      background: #edf8f1;
    }
    .choice-feedback.incorrect {
      border-color: #d7b0b0;
      background: #fbf1f1;
    }
    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      h1 { font-size: 24px; }
      .question-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>OP-FO-11 退房作業流程 教育訓練測驗</h1>
        <div class="meta">來源：03 SOP教材pdf檔/OP-FO-11 退房作業流程.pdf</div>
      </div>
      <a href="./index.html">回到題庫入口</a>
    </div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
    <div class="actions">
      <button id="submitBtn" type="button">送出答案並查看解析</button>
    </div>
  </div>
  <script>
    const payload = {"code": "OP-FO-11", "title": "退房作業流程", "source_pdf": "03 SOP教材pdf檔/OP-FO-11 退房作業流程.pdf", "questions": [{"id": "OP-FO-11-Q01", "stem": "根據退房作業標準流程，旅客最晚應於什麼時間前歸還房卡辦理退房？", "difficulty": "", "options": [{"text": "上午十點半前", "correct": false, "explanation": "這比規定的退房時間早了一個小時，並非手冊中提到的截止時限。"}, {"text": "上午十一點前", "correct": false, "explanation": "雖然是一般飯店常見的時間，但手冊中明確規定的版本作業時間為十一點半。"}, {"text": "上午十一點半前", "correct": true, "explanation": "根據「版本1」與注意事項，旅客應於十一點半前歸還房卡完成退房流程。"}, {"text": "中午十二點前", "correct": false, "explanation": "這超過了規定的退房時間，可能會產生加收費用的問題。"}], "answer_index": 2}, {"id": "OP-FO-11-Q02", "stem": "若旅客遺失一張房卡，應如何處理收費？", "difficulty": "", "options": [{"text": "無需收費，直接補發", "correct": false, "explanation": "作業流程中明確規定遺失房卡是有成本賠償責任的。"}, {"text": "一張收取一百元", "correct": true, "explanation": "根據執行說明，若有遺失房卡，需依每張一百元的標準收費。"}, {"text": "一張收取兩百元", "correct": false, "explanation": "兩百元是加休一小時的費用，並非房卡的遺失賠償金。"}, {"text": "一張收取三百元", "correct": false, "explanation": "此金額超出了手冊規定的房卡重製成本費用。"}], "answer_index": 1}, {"id": "OP-FO-11-Q03", "stem": "當旅客退房時表示有借用的「餐具組」尚未交還，且可能放在房間內，櫃檯人員優先該怎麼做？", "difficulty": "", "options": [{"text": "直接向旅客收取清潔費用", "correct": false, "explanation": "在尚未確認物品狀態前，不應直接加收費用，應先進行確認。"}, {"text": "請旅客自行回房間拿下來", "correct": false, "explanation": "這會降低顧客滿意度，流程建議應主動詢問並由內部人員確認。"}, {"text": "詢問房務員是否已收到並清洗完畢", "correct": true, "explanation": "針對需要清洗的租借品（如餐具、酒杯），應確認房務端是否已回收處理。"}, {"text": "直接在德安系統點選退房結帳", "correct": false, "explanation": "在租借物品未核銷或確認前完成結帳，可能導致資產損失。"}], "answer_index": 2}, {"id": "OP-FO-11-Q04", "stem": "關於加休費用的計算與規定，下列敘述何者正確？", "difficulty": "", "options": [{"text": "每小時酌收一百元，不限時數", "correct": false, "explanation": "加休每小時的費用應為兩百元，且有最高時數限制。"}, {"text": "每小時酌收兩百元，最多加休兩小時", "correct": true, "explanation": "手冊規定加休一小時收兩百元，上限為兩小時，之後須完成退房作業。"}, {"text": "每小時酌收兩百元，最多加休三小時", "correct": false, "explanation": "雖然每小時單價正確，但上限應為兩小時而非三小時。"}, {"text": "加休不滿一小時不計費", "correct": false, "explanation": "手冊並未提到不計費的寬限期，應以小時為單位進行收費。"}], "answer_index": 1}, {"id": "OP-FO-11-Q05", "stem": "若旅客是透過 Agoda (AG) 或 KLOOK 訂房，要求在櫃檯開立房費發票，該如何回應？", "difficulty": "", "options": [{"text": "直接幫顧客開立發票並加蓋統編章", "correct": false, "explanation": "這會造成稅務上的重複開立，因為平台端已負責相關帳務。"}, {"text": "請顧客改用現金支付才可開立發票", "correct": false, "explanation": "訂房平台的支付方式與現場開立發票的規範不應以此掛鉤。"}, {"text": "告知發票需向原訂房平台或處申請", "correct": true, "explanation": "手冊明確指出 AG, EXP, KLOOK 等平台訂房皆無現場發票，應向原訂房處申請。"}, {"text": "僅能開立住宿證明，不能給收據", "correct": false, "explanation": "雖然不能開立發票，但回應時應清楚引導顧客去正確的管道索取憑證。"}], "answer_index": 2}, {"id": "OP-FO-11-Q06", "stem": "在製作「住宿證明」時，關於房費顯示的規定為何？", "difficulty": "", "options": [{"text": "不論有無發票，皆必須顯示房費金額", "correct": false, "explanation": "房費顯示與否取決於現場是否有開立發票，以避免帳務混淆。"}, {"text": "僅有開立發票者，方可在證明上顯示房費", "correct": true, "explanation": "根據作業說明，開立發票者可顯示房費，無發票者不可顯示房費。"}, {"text": "為保護隱私，住宿證明一律不顯示房費", "correct": false, "explanation": "若旅客需要報帳且現場有開立發票，住宿證明是可以用於核對金額的。"}, {"text": "所有證明皆不需蓋章，直接列印即可", "correct": false, "explanation": "手冊要求在顧客確認資訊無誤後，必須蓋上公司統編章。"}], "answer_index": 1}, {"id": "OP-FO-11-Q07", "stem": "使用德安系統處理退房結帳時，找到房號或姓名後，第一步應點選哪一個選單？", "difficulty": "", "options": [{"text": "房務管理", "correct": false, "explanation": "房務管理主要負責房間狀態，結帳應在接待相關選單下進行。"}, {"text": "報表管理", "correct": false, "explanation": "報表管理用於輸出數據，而非處理個別旅客的即時結帳與入帳。"}, {"text": "旅客帳處理", "correct": true, "explanation": "在房號上按右鍵後，應點選「旅客帳處理」來進行後續的入帳與結帳動作。"}, {"text": "房卡設定", "correct": false, "explanation": "此功能用於讀寫卡片，與系統上的財務帳務處理流程不同。"}], "answer_index": 2}, {"id": "OP-FO-11-Q08", "stem": "在「顧客關懷」環節，若遇到旅客反映住宿期間有不滿意的地方（客怨），下列做法何者不符合 SOP？", "difficulty": "", "options": [{"text": "先關心客人並致歉", "correct": false, "explanation": "這是處理客怨的基本態度，符合流程中「先關心、致歉」的指導。"}, {"text": "視情況贈送小禮物", "correct": false, "explanation": "流程建議在發生客怨時，可視情況送禮以示誠意。"}, {"text": "若無法處理應立即通知主管", "correct": false, "explanation": "當一線人員權限不足或無法平息不滿時，尋求主管協助是標準步驟。"}, {"text": "告知旅客退房時間已到，請其先離開再投訴", "correct": true, "explanation": "此做法完全違反顧客關懷原則，流程強調應立即處理或通知主管。"}], "answer_index": 3}, {"id": "OP-FO-11-Q09", "stem": "退房完成後，關於「旅客住宿登記卡」的處理方式，下列何者正確？", "difficulty": "", "options": [{"text": "直接交還給旅客帶走", "correct": false, "explanation": "登記卡屬於飯店留存資料，且含有個資，不能隨意讓旅客帶走。"}, {"text": "放置於櫃檯下方留存，避免個資外洩", "correct": true, "explanation": "手冊特別提醒個人個資不可外洩，且須放置於櫃檯下方安全處。"}, {"text": "張貼在辦公室公佈欄方便核對", "correct": false, "explanation": "這會導致嚴重的個資外洩問題，違反隱私保護規範。"}, {"text": "立即放入碎紙機銷毀", "correct": false, "explanation": "法律通常規定需留存一段時間備查，不應在退房後立即銷毀。"}], "answer_index": 1}, {"id": "OP-FO-11-Q10", "stem": "在送客流程中，若遇到下雨天，櫃檯夥伴應主動提供什麼服務？", "difficulty": "", "options": [{"text": "幫顧客叫外送", "correct": false, "explanation": "雖然是服務的一種，但非流程中針對雨天情境特別註記的送客行為。"}, {"text": "幫顧客撐傘", "correct": true, "explanation": "作業流程第7點特別標註「雨天幫顧客撐傘」，展現貼心服務。"}, {"text": "販售拋棄式雨衣", "correct": false, "explanation": "流程強調的是主動的服務（撐傘），而非轉向銷售商品。"}, {"text": "請顧客在門口等雨停", "correct": false, "explanation": "這並非積極的送客與關懷表現，應主動協助顧客離場。"}], "answer_index": 1}]};
    const form = document.getElementById('quizForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    function renderQuiz() {
      payload.questions.forEach((question, qIndex) => {
        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.dataset.qid = question.id;

        const title = document.createElement('h2');
        title.className = 'question-title';
        title.textContent = `${qIndex + 1}. ${question.stem}`;
        panel.appendChild(title);

        question.options.forEach((option, oIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = question.id;
          input.value = String(oIndex);

          const span = document.createElement('span');
          span.className = 'option-text';
          span.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.text}`;

          label.appendChild(input);
          label.appendChild(span);
          panel.appendChild(label);
        });

        const explanations = document.createElement('div');
        explanations.className = 'explanations';
        question.options.forEach((option, oIndex) => {
          const block = document.createElement('div');
          block.className = 'choice-feedback';
          block.dataset.optionIndex = String(oIndex);
          block.textContent = `${String.fromCharCode(65 + oIndex)}. ${option.explanation}`;
          explanations.appendChild(block);
        });

        const note = document.createElement('div');
        note.className = 'answer-note';
        note.textContent = `正確答案：${String.fromCharCode(65 + question.answer_index)}`;
        explanations.appendChild(note);

        panel.appendChild(explanations);
        form.appendChild(panel);
      });
    }

    function gradeQuiz() {
      let score = 0;
      const panels = [...document.querySelectorAll('.panel')];
      panels.forEach((panel, qIndex) => {
        const question = payload.questions[qIndex];
        const picked = form.querySelector(`input[name="${question.id}"]:checked`);
        const pickedIndex = picked ? Number(picked.value) : -1;
        if (pickedIndex === question.answer_index) score += 1;

        const explanations = panel.querySelector('.explanations');
        explanations.classList.add('visible');
        [...explanations.querySelectorAll('.choice-feedback')].forEach((block) => {
          const optionIndex = Number(block.dataset.optionIndex);
          block.classList.remove('correct', 'incorrect');
          if (optionIndex === question.answer_index) {
            block.classList.add('correct');
          } else if (optionIndex === pickedIndex) {
            block.classList.add('incorrect');
          }
        });
      });

      result.style.display = 'block';
      result.innerHTML = `<strong>作答完成：</strong> 共 ${payload.questions.length} 題，答對 ${score} 題，得分 ${Math.round(score / payload.questions.length * 100)} 分。請依各題解析複核標準作業流程。`;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    submitBtn.addEventListener('click', gradeQuiz);
    renderQuiz();
  </script>
</body>
</html>
